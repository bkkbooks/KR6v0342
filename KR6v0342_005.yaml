body:
  text: 法稱論師造僧成大師釋民國法尊譯編現量品第三丁三釋現量明現見義之現量品分三戊一於量數與行境除邪分別二於現量自體除邪分別三於量果除邪分別初又分二己一成立數定二斷諍初又分三庚一立因二成立相三結義今初所量有二故能量唯二種問若新生不欺誑是量之相其量差別有幾耶曰現比二量決定以有自共二種所量決定故以自相為所現境之量必是現量以共相為所現境之量必是比量故庚二成立相分二辛一成立宗法相二成立遍相初又分三壬一略標二廣釋三總結初又分三癸一立因二成立遍相三斷諍今初能否作義故髮影等非義勝解義無故同不同性故聲境非境故若有餘因由有無覺心故問如青蓮華豈非有自共合雜之第三類境云何自共二相決定耶曰所量唯有自共二相決定以所量有能作義與不能作義二法決定故又以共同性為所現境之覺前現為隨餘法轉與以不同不共性為所現境之覺前現為不隨餘法轉之二法決定故又以自為現境之覺前如其所現即能詮聲之境共相與如其所現非即聲境要由自體成就乃為現境自相之二法決定故除所取義外若有餘因由如名言功力等亦能有緣自之覺心者與僅有名言等不能起緣自之覺心要由自體成就乃能生緣自之覺心者二種現境決定故前者為分別心之現境共相後者為無分別心之現境自相問若爾錯亂根識所見之髮相即病眼所見之黑絲如髮亂墜之影相應非是境以俱非自共相故以不能作義故非自相明了顯現無隨行故非共相共相不明現而隨別法行曰錯亂根識所見之髮影等非所量義以不勝解為所量義故難者謂髮影等既非自共相應屬第三類癸二成立遍相勝義能作義是此勝義有餘為世俗有說為自共相如瓶甌等是此論中所說之勝義有以勝義能作義故餘於分別心現為瓶者唯世俗有以是不能作義之法故能作義即有作用法不能作義即無作用法其能不能作義二法即說自相共相故癸三斷諍若一切無能種等於芽等現見有功能若計彼世俗云何能如是若謂皆有彼非爾不見覺隨共相進退如眼色等覺此說名力等隨內支轉故瓶及舉與總並數等之覺髮影等非共不著為義故執為所知故無事不犯過彼等之後起如是事無遮明了所現性是識體義故謂髮等諸覺以共為行境現髮是無義若謂總應是識體性義者許故過非有義體性之總一切性同故彼依於遮故若謂以勝義能作義為自相之相不應道理以一切法皆無勝義能作義故曰其因不成現見種子等有生芽等之功能故若謂從種生芽計為世俗曰從種生芽若唯世俗何能如是必不能爾以是由境自成就故若謂因不成者則種應不生芽以種生芽非由境自成就故境自成就謂彼境本身具備彼功能之義即種子本身有生芽之功能非由人之意志使之如是也若謂勝義能作義為自相之相不應道理以自共一切皆有彼故曰共相非能作義於緣自覺不見能饒益故其緣自覺不見隨汝進退轉故異喻如由眼色等引生眼識以此說隨共相進退之理說明於緣瓶實舉業總及數功德等之覺無所取義以如是覺是隨名言功力等內支而轉故若謂不能作義是共相者錯亂根識所見之髮影亦應是共相者曰彼所見髮影非是共相不著為義故若爾無事應非共相不著為義故曰無事不犯以不著為義之理由而成非共相之過失以執為所知故彼見髮影亂墜根識之後所起分別上現起如髮影之事則是共相許為共相無所遮故問若錯亂根識所見髮影不成就者錯亂根識現見髮影應成相違曰無違錯亂根識明了所現髮影是自相法是識體性義故勝解此是髮等之覺其所現者則是共相以此覺是以共相為行境之分別故其見髮影亂墜之根識無所取義是邪知故若謂緣總分別之所取相應是自相是識體性故者曰彼應是自相之過非有以許是自相故問若爾分別所現瓶相云何是總即共相耶曰由義體性門於分別心所現瓶相即是總相於一切瓶體性相同而隨行故以是依於遮非瓶之分別所現境故壬二廣釋分三癸一成立分別所現為無事二成立色等為自相三明共相差別初又分八子一以是所詮成立二以非一異成立三以現相相同成立四以是共性成立五以是果故成立六以待名言故成立七以單獨不現成立八以能作義空成立初又分二丑一正說二斷諍今初所詮故非事根等俱果故顯示聲境是共相中或曰於分別心所現色應即是色以是言色聲之境故如色曰彼有法非有事以自為現境之分別覺如其所現是聲所詮故或謂若爾色應非有事以自為現境之分別覺如其所現即聲所詮故曰彼困不成以色為現境者是根等俱果故以色為現境者即眼根及眼識也丑二斷諍分三寅一破計名等為所詮二破計總為所詮三破計色等為所詮初又分二卯一敘計提問二各別破三答今初若詮說名等為說者聽者所詮相連繫為名等無繫婆沙師說根等不犯無義之過以言瓶之聲即詮說瓶之名等不相應行故問曰若如是者言瓶之聲為詮與說者及聽者相連繫之名等為詮與所詮瓶相連繫之名等為詮與彼三事都無連繫之名等耶卯二各別破三答應於義不轉若義由理同錯誤而轉者應非一切時非於境錯誤於識則不同生彼相覺故餘則無彼義以不許有覺現外義相故即許亦離識各異非有量遮遣不成故若識皆有義非理如夢等見為餘相故亦非從行生現青等相故無礙非青等住近處不知自知故是識以此說名等所許眼等覺由何許具義若見義能故餘應得無義無繫亦不轉若具義連繫去來非所詮義與彼盡故若如初者詮與說者聽者相違之名等則諸士夫應不由於言瓶之聲而趣向於瓶義瓶聲只詮名不詮實義之瓶以唯詮名等故若謂由於瓶與瓶名等道理相同或相似因而錯誤於瓶義轉者曰若由錯誤者則由言瓶之聲不應於一切時於瓶轉應有時於名等轉以由瓶與瓶名等道理相同唯錯誤而轉故如雙生子又言瓶之聲不應唯於瓶與瓶名等一境錯誤以彼瓶名等是唯與能說能聽之覺相連繫故若謂汝亦同犯過以言瓶之聲詮分別心所現瓶故曰由言瓶之聲詮識中所現瓶相則士夫不趣向瓶此過不同由言瓶之聲詮於識中所現瓶相則能生現如是瓶相之覺故餘婆沙宗則無識現義相以不許現外義行相之覺故即許有覺其與緣名等識相異之名等為彼識之所取義亦無量成立以名等與遮遣不成立故若名等是彼識之所取義者則無名等時亦應無彼識然名等與彼識無此關係以無瓶名亦能生緣瓶之識故由見瓶之現量即能生緣瓶行相之分別心故與瓶名無彼遮遣關係由此不能成立瓶名等為緣瓶覺之所取義也若謂其因不成以一切識皆有所取義故彼意謂一切識皆有所取義則緣瓶名之識亦有所取義除瓶名之外無別法為所取義故瓶名即彼識之所取義也曰說一切識皆具所取義不應道理如夢等識則除具所取義外見為餘相故現見夢中識無所取義故若謂其因不成許不相應行為彼所取義者曰夢中識應非由不相應行為所取義而生以見青等相故可以夢見青等色相非不相應行若謂夢中所見青色是外青色彼即所取義者曰夢中所見青色應非外青色是無礙故若爾是何曰是識自性以住可見近處者不能了知唯夢者自己以感受相而了知故以無間所說之理亦說名等是識自性以住可見處之餘人不能定解唯通達者自己以感受相而了知故又試問眼等諸覺由何道理許具所取義若謂現見由所取義之功能而生故者曰是則餘緣名等之分別應得無所取義以未見從所取義之功能而生故若謂詮說全無繫屬之名等者答第三問曰則諸士夫由言瓶之聲應不趣於瓶即瓶聲應不於轉以僅詮全無繫屬之名等故若謂以與瓶義相連繫之名等為所詮者答前第二問曰是則過去未來之瓶應非現在所詮以現在世過去之瓶義及彼之名等皆已盡故未來者尚未有亦非所詮或過去未來瓶等之名應非瓶聲之所詮以彼聲只詮現在與瓶義相屬之名而過去瓶名現在已滅盡未來瓶名尚未生故寅二破計總為所詮若聲詮總故不許犯過者非爾單獨總無說故即說彼非同非顯故應常可緣以是常性故若由顯現顯能生緣我識彼是功能性若有時無能彼應皆無能彼能或無能由本性安住常故無可治彼盡故何能彼總識相連青等行相分所已決定者於彼何所變若謂不許根等應無義即無因之過失以聲是詮單獨之總故意謂聲詮單獨總抽象不詮差別事具體差別事由諸根緣故諸根非無義也曰非由聲詮單獨總便無諸根無義之過失以無單獨總可詮說故即使可說亦應非於差別同有及非由差別所顯以不待差別單獨由聲詮說故總法必遍於別法及由別法所顯如瓶必為各種瓶所共有而且是由各種瓶所顯現若離開各種瓶器則無獨立之瓶也又彼總應常可得以是不待差別之常住性故外道各派皆計總是常若謂總亦須由顯差別所顯方於現量而顯者曰彼總應常能生緣自識以於引生緣我之識是具足功能之常法故若謂有時無功能者曰彼總應一切時皆無功能以有時無功能而是常法故以上能生則應一切時生不能生則應一切時不生此二因決定以彼自性安住之總應無任何功能使彼生緣自識之功能成為永盡無功能或原無生緣自識之功能而使成為有功能以非衆緣所能治故是常住故其與彼總識相連繫之青等決定行相分於彼緣總覺前由何總所變生應不能生以緣總覺緣單獨總故此說緣單獨總之識不應有見青等別法之行相以緣獨立之總不緣青等別法故但事實上總是離不開別的緣青等總之識必見青等行相此行相是誰所生的不應是由總所變生因為總是獨立法不與青等別法相連繫故故反證無單獨總可緣也寅三破計色等為所詮若現知義故根非無義者一事故聲等覺由何現異若謂能詮之聲雖詮色等然根識非無義以是能現知色等義故者曰根識與分別覺由何從聲等有明不明了各異顯現應不現異以同以一事為所取義故子二以非一異成立分三丑一正說二彼所成義三斷諍今初有類非類故不依餘顯性若謂成異者待故說為果從自因成故雖不依仗果由分別相連非果如何繫是餘彼無繫故成無自性不成為無類彼無所待故瓶總於事自性中已成為無以與別瓶物體若一若異皆不成故數論者說物體是一破曰具有種類之金瓶瓶是總是種類金瓶瓦瓶等是別是有種類即別法必具有總義也應非別瓶之種類以於餘瓦瓶等別顯體性不隨轉依止故顯即別之名若總別一體則總所遍處別亦應遍瓶是總金瓶是別瓶所遍處金瓶亦遍然實不爾故總別一體不應道理勝論者說總別異體破曰瓶總應說是別瓶之果性以與彼異體而觀待彼故若非因果之總別如何有勝義連繫應無繫屬如因果關係之種芽尚無勝義繫屬故以果芽完成之後尚不依仗於種子僅由分別使連繫故若是勝義連繫則任何時皆應連繫既不如是則非勝義僅由分別計為連繫耳問云何不依仗耶曰芽成之後即不依仗種子說自因已完成故彼瓶總應與別瓶無連繫以與別瓶是餘體性又非彼果故關係只有二種一是同一體關係二是因果關係總別二法若實有體其關係必屬二中之一今既計為異體則應是因果關係既非因果關係則證知非實有體也外曰若無事體猶是總者兔角亦應是總曰所無兔角不成為類即不成總不待其別故丑二彼所成義故依於自體計無體種類於彼差別轉諸聲所宣說於彼現實體於義執彼性彼誤無始時見習之所變諸義所有總以遣餘為相此諸聲所說彼無少體性於無體總覺見為總性故於義成錯誤或計無為總彼亦染污故彼中無實義故非有體性無性非所詮外問若分別所現瓶是無事者以聲詮說有何所為耶曰依於瓶之體性施設無體性之種類於此分別所現瓶相由諸聲而宣說者有所為義是為於彼差別瓶而轉趣故又於分別所現瓶相現為瓶體性或於瓶義執為瓶總皆是錯誤是由於無始時來自相見習之力所變起故又諸義之總如瓶之總是從餘遮為相從餘非瓶而遮反顯是瓶此諸聲所詮說者都無少許實事體性是由分別所增益故又緣瓶總之覺亦於義成錯誤以見無瓶體性之總以為瓶性故又於義無瓶而計為總彼亦非有實事體性以被分別所染污故及於彼中無實義故又彼瓶總是無體性以與別瓶物體若一若異皆非所詮故此皆就外計而破丑三斷諍若由有所詮許為有事者則諸事如何非是非所詮近因各異故非可說為他是假施設故過去未來義亦以總為因諸聽聞轉者有何為無法若許彼假立假於衣等無而與現在瓶無事何所親覺無誤轉者常時為真名於婆羅門子增益名獅子世有如是說無義由衆生何共稱立聲彼是彼真名彼理相同故錯亂分別者餘是俗假名如無事功能名無如分別有能亦名勝此等之名聞是衆生所作若謂瓶總雖與別瓶物體非一非異然許為有事以與衣總物體有所詮異故即可詮說與衣總異體也破曰若爾則與諸別瓶如何可說非一異所詮應是所詮以是有事故又瓶總與衣總亦非可說為物體異他以無實事故瓶總與衣總雖無實體然可說為各異以其近因瓶衣物體各異故依彼近因假施設為異故這是說瓶總與衣總以無實事故不可說物體有異然由近因之瓶衣各異故假立為異耳外曰於過去未來之義亦由總事為因諸聽聞者乃轉故總是實事破曰彼總於現在所無去來瓶法現在如何轉應不轉以是常事有故若許不轉者則現在言瓶之聲應於去來之瓶不轉也若謂言瓶之聲於去來之瓶假立瓶名而轉者破曰言瓶之聲於去來之瓶假立名轉而於衣等假名不轉應無此差別以於衣等不轉而於無現在瓶事之去來之瓶無任何親近因緣故都無現在實瓶何疏於衣等不假名瓶何不親於衣等而亦假名瓶耶如言獅子之聲常為獸王之真名與於婆羅門童子增益之假名如是言說亦世間所有以於獸王是初所立名覺由此名於獸王無錯誤而轉於婆羅門童子是由與獸王相似為理由之名故若謂有餘總義可說者為真名無餘總義可說者為假名此不應理雖無餘總義若由衆生初於何事共稱安立彼聲彼名即彼義之真名若由與真名轉義相同故以錯亂分別隨轉之名彼即彼事之世俗假名故譬如子事是為成父志如無此功能則云無子又如數論分別計自性名最勝於能成辦國人事業之老人亦稱最勝如此等名聞皆是衆生所作非有實體也子三以現相相同成立如已滅由聲於覺如何現於未滅亦爾而於耳等識有義者無彼能取唯總故二心皆相同單獨能取彼於前已遮訖緣現在未滅瓶之分別覺亦無實事所取義如由聲力緣已滅法之分別覺如何顯現今亦如是顯現其理相同故此因決定以耳等識有所取義者與緣已滅之分別覺則無彼現相相同故若謂不定唯緣總為所取義故故二種心現相相同破曰彼非唯緣其總此於前已遮訖故前已破單獨總為所詮子四以是共性成立諸互差別者何成無別性縱有二體性彼何成一事若彼共同事而異於彼等說為彼等總則成無繫屬於遣則無破故此相同總是無事為相諸差別瓶如何成為無差別體性應不能成以是物體互異之差別事故若謂不定以有自性是一分位各異之二種體性故破曰諸別瓶如何能成一事應不能成以是異物故若謂彼等別法所共同有之總事異於彼等別法而是餘物者曰說彼總是彼等別法之總應無繫屬以與別法是異物故於遮非瓶所現相觀察一異不能破以許為無事故此別法共同之總是以無事為相是共相故子五以是果故成立若彼是果者應成多與壞然亦不許彼壞唯事相連故非是常性種類非果故應無繫無事試問彼總是果非果若總是果者總應有多分與可壞滅以是果故然彼亦非所許以計常一故彼總應非是常是有事故此因決定以壞滅唯與有事相連繫故若非果者則彼種類應於別法勝義無繫屬應成無事以非果故子六以待名言故成立事力所生識非待於名言而於總覺前無如是現相見二事有覺雖無有名言亦無異隨轉是義近相連如無有種類而有識果者則許為眼等由何而區別種類亦隨轉緣總之覺無所取義以不待名言則不如是現緣自境時必待名言故以由所取義事力而生之識不待名言故若謂根本因不成即不知名言見禿牛與白牛亦執為一類故此亦是由總事增上故爾者曰若見兩頭牛即使無名言亦有種類無異之覺隨轉此非由總事增上故爾是由與𤚲乳䭾物等義接近相連而起是覺故如雖無種類實事然由眼等相近有眼識果於禿牛白牛牛之種類亦隨轉以由何理從非牛而區別故由是牛類而區別於非牛或由區別於非牛而為牛類子七以單獨不現成立任何相於識無現為事故有色故諸根若有能見者彼身應顯現諸種類不爾單獨非見故即取別法時離彼聲及體無餘法顯現總是無事以任何行相於不錯亂識都不現為實事故或問若爾眼根應法無所見故曰諸根若有遍智為能見者汝身應可見是有色故又諸種類即以遍智亦不能見任何時都不能單獨見故即緣別法時亦不能見單獨種類以於爾時除彼別法之聲及顯形等體性外無餘法可顯現故子八以能作義空成立故彼唯生識亦不能作義不能故無性彼是無事相彼總全無實事自性不能作義故即唯生緣自識之作義亦不能故更不用說其他作用其不能作義即無事之相故以上八節皆是成立總相為無實事也癸二成立色等為自相如所說相反許彼為自相許彼色等為自相如上所說相反是能作義等故癸三明共相差別分二子一正說二斷諍今初依有事無事及依二俱故其總亦三種問若總是無事者彼應無差別曰彼亦有三種以有依有事無事及二俱之諸總相故譬喻如次如分別所現之瓶無事及所知子二斷諍若謂依有事有事相繫故應知有事者非爾已答故及於過去等見為餘相故若失有事法以緣事為先知彼故無過若謂依於有事之緣瓶分別應成以瓶事為所取義之識以與瓶事相連繫故曰彼有法非是彼宗於彼已答破故及於過去等法離分別覺具所取義外見餘行相故即見無所取義行相若分別心能見實事為所取義則根等成無用此過前已說訖若謂分別所現瓶應失去為瓶事之法性以與瓶相繫故此因不了解盛寶大師解此文為若依有事之分別以無事為所取境者則失壞彼境是依有事之法性則不可分三種分別之差別也曰彼無非瓶法之過失彼分別是以緣瓶事之現量為先而了知彼瓶之法故說此分別心之境雖是無事然是依有事而起以彼分別是先由現量親見瓶事依此事乃生分別心所現之瓶相而了知瓶壬三總結分二癸一正說二斷諍今初自相一所量觀有無求義由彼成辦故彼由自他性之所通達故許所量為二非如所著故許第二為誤能作義之所量決定唯一自相以諸觀察有無取捨之果者其所求義唯由自相所成辦故問若爾論師如何說自共二種所量耶曰論師許所量為自共二種者謂自相法現量以自體性為所現境比量以餘共相體為所現境而通達故問若於唯一自相有二種通達之理何者錯誤曰許第二通達之理如通達聲無常之比量為錯誤者以自所現聲無常非是如實而著為聲無常故癸二斷諍若由他性知錯誤應非量意樂無欺故雖誤亦是量見由餘相知此品已答訖如於珠燈光以珠覺而趣錯知雖無別於作義有別如是雖無義比量於現彼由作義相繫故安立為量外曰若自相為所誤境不應道理以他共相體性為所現境而通達故又應非量是錯誤故曰雖是錯誤而是量性意樂於所趣境新生無欺故又獲得自相應不須以自相為所取境以除以摩尼為所取境外現見由餘行相亦能了知獲得摩尼故應不以自相為所取境以於此品計自相為所取境者已答訖故雖錯誤然不得所趣境則不相同如於珠光與燈光以珠覺而趣此二覺屬於邪智雖無差別然於獲得有作義之珠則有差別故於珠光處求珠則可得珠於燈光處求珠則不得珠如同彼喻了達聲無常之比量與於彼比量所現之覺如如所現義雖同非有然安立汝是不欺誑量以與汝作用所趣境相繫之名言是符合實義之名言故辛二成立遍相若由義功能有隨轉還覺取彼自在者其餘事超根其不見體性了達依餘義若彼依繫屬時即能了性時能了隨行通達總體性故不知不現義一切差別由有繫屬法於有法生解不現之能立彼比量定一問如何由二種所量決定而成立二量決定耶曰如青色是現事以有隨義功能轉還之現量覺緣汝有自在力故隨義功能轉還者即隨所取義功能之有無而能緣之現量有無也此量所取義即屬現事以現事為所取義者即是現量現量緣境不待其他理由自在而緣比量智緣不現見境要待正因等理由方能了義故非自在緣其餘事超過諸根不可見之體性如火聚義是不現事以了達汝之所依是餘義具三相之因故何為彼因曰煙成立有煙山上有火爾時是能了性以是與成立彼有煙山上有火之所依有法有繫屬之宗法及正確遍相故這是說依因三相了達之義屬不現見事了達此事者即比量智問若爾彼因是成立某山有栴檀等火之能了否曰爾時能了之煙非能了知某山有栴檀等不現見義一切差別以僅了達某山有隨行之總體性火故不現見法之能立決定唯一比量由於宗法與所立法有連繫之因於有法上新生通達所立法之覺決定為比量故庚三結義除現不現外餘所量非有故由二所量許能量為二見二所量故除遣三一數由於所量二種決定故許能量二種決定以除現見與不現見外無有其餘所量事故此即除遣三量一量數決定以現見所量自共二相決定故己二斷諍分二庚一破計數少二破計數多初又分二辛一諍二答今初無非所量故言一順世派言共相非所量是無事故以是所量決定唯一自相故能量亦決定唯一現量辛二答分四壬一所許已成二須許比量三於彼斷諍四若無比量則太過失今初吾亦許順世派對佛弟子不須成立能作義所量唯一自相吾亦如是許故壬二須許比量雖無決定故不定非所量彼定第二量於無非根覺由義力生故不待義功能於有障隔等根覺亦應生若由遮現事定解無事者相違或彼是有遮行隨因了知他心故成立有二量言說等轉故定成彼體性無欺故是量雖是無事若成立共相為非所量是不定因以汝是量所決定故又第二比量應已成立以彼無事由量決定故若謂不定以彼無事是由根現量所親證者破曰從根所生之覺即眼識非能親量無事以從所取義力而生故若謂不待所取義功能者破曰從根所生之覺於有障隔等境亦應能生以是根現量而不待所取義故若謂無過由遮能量之現量故決定總等為無者破曰彼義為唯由遮能量之現量便決定總等為無抑由遮能量之現量為因而決定總等為無耶若如初者唯遮能量之現量以汝決定總等為無應成相違以汝是無遮故若如第二者第二量應即成立其遮能量之現量者即成立總等為無有宗法及遮遣與隨行即因三相之正因故及有了知他心之量故知他心之量亦是比量故以有了知他心之量證明比量已成問如何有曰順世派師即決定成彼心體性以有言說等轉故即由彼因能成立新了知他人相續有心之覺是正量性以是新生不欺誑之智故壬三斷諍若謂某等處誤故不可靠見邪因故同某時於某事由某成知彼彼定從彼生或定彼體性無自因或體則彼義非有所見彼自性於餘亦是相若可見自體或可見自因有餘能見因而無彼顯現如何有具彼若謂如以橄欖比知味淡有處錯誤故一切正因皆不可靠者破曰順世派非彼立者以彼僅見邪因故妄執正因與彼相同而正因之繫屬實無錯亂故問如何不錯亂曰由何因在某時於某處如成立知有彼火之煙若無自因之火汝義必不能有以汝定從火生故又如所作性若無自體性之無常汝必不能有以定是彼無常性故除煙與所作性外所有果法與自性因亦皆是於自所立法有不錯亂相以於自所立法見有繫屬之自性故問於能立因可不錯亂於能破因如何不錯亂耶曰如瓶清淨地方即無瓶處如何能有具足彼瓶定應非有以可見瓶自體性有能見餘因而瓶不顯現故又如夜間海上亦無具足彼煙以可見煙自因之火有能見餘因而火無顯現故壬四若無比量則太過失總覺若非量應無如他世若謂由諸根餘時能知者非爾根能等根覺非有故若知為無者覺生應無因由無分別性於自相為現非無別緣總故彼是比量現在不現見之地方等應成為無以總覺比知非是量故如他世事若謂不同現在不現見之地方等由諸根現量餘時能了知故可有而他世根現量終不能見故無也破曰由根現量終不能見故謂他世無者不應爾如眼根及彼生眼識之功能等能量之根覺終不轉故若謂了知彼等為無者破曰眼覺發生應成無因無眼根故若問汝由何知有眼根曰由因新知有眼根之覺即是比量非無分別量度境故是緣總之量故此因決定以於自相若是現見則定是無分別故庚二破計數多分二辛一難二答今初若所量決定不知色無常彼覺成餘量無因而有故見差別不知與因繫屬故彼亦是餘量所量衆多故諸量亦衆多於一多轉故一三數不遣喻如見差別境無決定故有餘所量故外曰若所量自共二相決定者則不應了知顯色無常如是決定則了知顯色無常之覺應是餘量故以緣總故非是現量以無因而有非比量故又了知差別之覺亦是餘量以見差別故是量以緣總故非現量以不了知煙因與前火之繫屬非比量故又諸量應成多以所量除自共二相外有多故即於一境亦有多量轉故喻如先在屋內見火已後由煙因亦能見火差別又一量與三量之數亦應不能除遣以現比二量境各別無定故以自共二相外有餘所量故辛二答分三壬一破依因之覺為餘量二破後生之覺為餘量三破知差別為餘量初又分三癸一標二釋三結今初不犯此過失配於色總故若謂了知顯色無常之覺是餘量者為說由所作性因新了知顯色無常之覺抑說見顯色臨斷絶時現量後所生了知顯色無常之覺耶若如初者由所作性因新了知顯色無常之覺不犯此成第三種量之過以是於顯色總配無常總之量故癸二釋分二子一略標諍答二廣說無欺之理今初非無事體性彼由如是成是則成立故由餘不成餘非爾成彼故外曰無常應是無事是總法故曰彼無常應非無事體性由如是成立彼顯色無常是則成立故若謂前所說之覺非成立餘顯色無常是將餘顯色無常之總義作為所現境故曰非以彼為所現境便不能成立顯色無常雖以彼為所現境由與顯色無常相繫屬即能成立彼顯色無常故子二廣說無欺之理分二丑一依能立因之比量無欺二依能破因之比量無欺今初若事如何成如是因心因由彼如是事彼生有因覺此因與因覺間接繫事故似彼現而空然非欺誑性彼性空彼等著為彼性故彼事雖不欺然立為錯誤故於所達事能遍體或因是所遍心因彼復是覺因外曰比量豈非從因生如何於所趣境不欺誑耶曰若聲事如何成無常如是能立彼所作性是自果緣因心之因以是彼之能生故其緣聲無常如是事有因之覺即了知聲無常之比量智是由彼成立聲無常之緣因心所生起緣因心是引起比量智的親因是從起故如是能立彼聲無常之因及有因覺現似彼所取義雖空即現似所取義而非所取義然於自相非是欺誑以間接繫屬於彼事故其繫屬彼事之名言亦是合理名言故外曰應無錯誤於自相無欺誑故曰於自相事雖無欺誑然安立為錯誤以彼自相體性雖空然以彼等為所現境執著為彼自相之體性故如於所了達聲無常事以能遍無常之體性所遍所作性列為因時其所作性是自果緣因心之因由是彼之能生故又能立彼聲無常之緣因心復是能立彼聲無常有因覺之因以是彼之能生故此說由因生緣因心由彼心生有因之覺此覺即比量智又如諸火是煙之因能生煙故其煙即是緣因心之因是彼心之能生故丑二依能破因之比量無欺分四寅一真能破因二似能破因三相違可得之差別四無欺誑之原因今初能破性一切由不可得成諸說量成者由義相反成遮彼或彼因見說相違事彼亦能引出無有彼能量餘說一事有何知餘為無若謂相違故彼復由何成若不共處故彼復由何許若現無見故彼應非能量故以自聲說彼亦無能立說彼非量者破遍非所詮故說彼相違義果即引說皆是結構異於義無別異問依能破因之比量如何無欺耶曰能破性是於一切由所破不可得而成立諸說量所成立則決定為有由彼義之相反可現而不可得則許決定為無故若謂不須由遮能緣所破之量而成立其破以有能緣相違品之因故曰如於某處為遮寒觸及寒果毛竪說見有與彼寒觸或寒果毛竪之因相違法彼亦能引出無彼能緣寒觸之量餘若不能引者則說有一火事如何能知餘寒觸為無應不知故若謂能知以寒熱相違故彼等相違由何成立若謂寒熱不共處故彼不共處復因何許若謂寒觸相續不斷而有由近火力則不見寒觸顯現故破曰彼不見寒觸可現者應非遮寒觸之量以不須由遮能緣所破之量成立能破故即以相違可得因自聲詮說亦引伸彼可現而不可得即無之能立由遮能緣所破之量而成立能破故若何派說可現不可得非是無之能立量者則能破應一切種非是所詮以無能立量故若將與彼寒觸相違義之果煙說為因者亦說引出無能緣所破之量以一切相違可得因皆顯示無能緣所破之量故又一切相違可得因於成立破義全無差異其繫屬不可得與相違可得只是結構之差異故寅二似能破因相違及方便若無立與破說破是量者非正理隨行如以言說等成立無遍智及無他世等與超根諸義相違無成故若說者是明何能所害體如是不得故說彼為能立已說不可得非如是能定故於極不現非能定有無若未成立所破法之相違品與未破除彼所破法及其方便而說成立其破是量者彼非隨正理行如以言語等說無遍智及說無他世等或問彼如何非正因耶曰言說非成立他人不是遍智之正因以不能成立與超諸根義之遍智等互相違故若許同一事既是說者又是遍明即一切智都無能害所害之體性故若謂因不成有言說者則無遍智以如是遍智不可得故破曰於遍智不可得應說是成立他人非是遍智之真能立以是成立他人非遍智與言說隨一之正因而非成立言說之正因故然不能許爾以不可得非能如是決定前已說故又順世派汝以現量非能決定有無遍智以彼遍智於汝是極不現見故寅三相違可得之差別相違彼法異或不異結構如火立無雪於生有違害問若能破因結構有二種差異其相違可得因結構有幾種耶曰相違可得因有二種有與所破法物體各異或物體不異之二種因故譬喻如次如成立某處無雪立火為因如說芽於種子時非有從種生故於生立能害為因寅四無欺誑之原因如成立事性許諸事能立如是遮事性即能遮諸事由此即除遣分別所計法宗及同品中任隨何法等隨一可有故彼復能遍法能了遮所遍若有自遮者則於決斷時若於無彼事無彼量為因是為最愚者牧女共知故不可得唯爾決定無為果此復許可現其因或自性皆無可現見如成立火事性許諸煙事為能立如是遮火事性即能遮諸煙事以煙繫屬於火故此說正因必從異品遮遣此即除遣分別所計法於宗與同品中任隨何法等為成立聲常之正因以彼同品中任隨一法於異品亦可有故問若爾由煙遮故火亦應遮火煙繫屬成就故曰由火遮故說煙遮者彼亦是許能遍法火遮為所遍法煙遮之能了若火煙自遮之繫屬於決斷時則成為能了故非一切有繫屬者一方遮遣則餘方亦遮要是因或能遍遮其果或所遍方遮也以無樹成立無樺樹亦當了知或問能破因唯爾許耶曰如於某處成立無瓶以無緣瓶為境之量說為因者彼是為最愚蒙之敵者而說於瓶可見而不可得處決定無瓶是乃至牧女所共知故問若爾為何唯說三種不可得因耶繫屬不可得因唯此三種以決定成立無為果說彼三種有所為義是為顯示若有則可見之因或能遍或自性皆無可見是能了因故癸三結比緣無常等此理中所許由所作性因新緣顯色無常等之覺非第三聚量是此比量理中所許故壬二破後生之覺為餘量分三癸一自宗成立無常之理二他派了知無常之理三斷諍初又分二子一以現量成立之理二以比量成立之理今初餘取已取故不許為量性離於有事外無有餘無常彼由根先成多事非所詮分別所生法乃是其所詮總所依若成彼總即成立除比量通達顯色無常外餘緣顯色臨斷絶時之現量後所生決定顯色無常之決知非許為量性以緣自因前量已取境故成立其因者緣顯色臨斷絶時之根現量彼色無常亦由汝於決知前已成立以離顯色事外無餘無常既見顯色無常無錯亂因誤顯色常故問若顯色與無常非異物者言顯色之無常則不應理曰言顯色無常之聲非以顯色與無常衆多事物為其所詮唯以分別所生法顯色與無常現似各異為所詮故要先成立總之所依顯色次乃能成立總無常以了知顯色無常之順緣具足而無違緣故子二以比量成立之理若不成如是為成故比量有餘相同故有時不能知誤故如卵異不見其異故如是即無因乃至愚夫類見無後生起燈等則熄滅亦能自決斷能雖事自性然非無間生不見其果故愚無明定故為遮彼愚蒙而宣說比量大慧由見性能定一切相由從一切遮無異於彼義遮為因相覺及如假名聲如異所依轉若無錯亂因由彼性能生與自隨順覺外曰若現量能成立顯色無常則了達顯色無常之比量應成無用曰了達顯色無常之比量亦有用義以若現量雖見而不能成立彼顯色無常時為成立彼顯色如是無常故問現量由何因緣錯誤為常耶曰於顯色相續生時有不了知顯色無常之因緣謂前後顯色不見有異誤為一故以前後顯色有餘相同者出生故如卵相各異盛寶疏謂如幻術師所變卵相各異有餘相同者生是誤以為常之原因謂不待因下至愚夫於無自類後起相連之燈等熄滅即由現見能決斷故問雖現見而不決定有何喻耶曰如生芽之功能屬種子事之自性雖是現量所見但於種子有生芽之功能容有愚蒙以於種子生芽容無明顯決定故以芽從種子非無間生故容不見從種子親生芽果故又了達聲無常之比量有所為義是為遮止彼愚蒙聲常而說故大慧聖者對汝不須成立聲無常以汝由見聲即能決定無常等一切行相故問若聲所作無常非異物者如何有異聲轉耶曰於彼聲雖無異物然由遮遣為因緣之覺及如假名之聲皆如各異所依而轉以從非所作及常住等一切中遮遣故即由彼聲若無錯亂因緣本性能生與自相隨順之覺是有事故癸二他派了知無常之理又此不得因成立為壞滅先有事變無說名為無常除以現量了知顯色無常之外又有部派說於此顯色臨斷絶時由先有不可得因以比量成立顯色壞滅以有部派說先有事後變為無名無常故先有後無為無常者是粗無常癸三斷諍分三子一諍二答三略明自宗今初有說斷二邊有或相繫法是無常聲者正理派說非唯有事即是無常虛空應無常故已滅亦非無常言有事之無常第六囀聲不可用故有正理派說斷除二邊之有或與有相繫屬為性之有事乃是無常聲之義子二答說何為彼邊若謂前後無彼何非無常六等不可故於邊彼如何有性與相繫以是常住故非邊所簡別若因果是邊能別應成無無繫故由彼不許事先無於彼彼差別彼說亦不成有性與自因相繫故名因有性與彼繫若常此果何若彼無能作先無事非具不許相繫故故此整應常試問彼敵宗說何為彼邊耶若謂前後所無為是邊再問彼前後所無因何非無常耶若謂前後所無非是無常以言有事之無常第六囀聲等不可用故破曰若爾彼應非邊如言有事之邊第六囀聲如何能用不可用故是無事故敵人計前無者謂未生後無者謂已滅故以未生與已滅二者中間安住之有事或於彼有事和合繫屬者計為無常又彼有性與彼繫屬應非前後所無之邊所簡別之事是常住故敵人計有性等是常法故若謂前後所無非是邊因果是邊者彼計因即前邊果即後邊破曰汝說彼有事有彼因果所簡別者應亦不成其能別因果應成無故以無先無新生之關係故此因彼許以正理派不許有事先無故若謂根本因不定果非由因新生是果先有後由和合使與自因連繫故和合是因連繫是果破曰若爾彼有性與彼連繫云何是此因之果應非是果是常住故又此整個有事應成為常以非果故若謂彼果先無後由因造者於汝宗中彼不應理以非具足彼先無有事故以不許先無新生之連繫故子三略明自宗無義由增益所詮各異覺許無異義者亦以遮為依同時所無之義增益為有異物因果繫所詮之覺執為因果異體連繫之覺及許為無異物同體繫義之覺與聲亦非以實成就連繫為境是依各異所遮故這說緣因果繫為異體之分別心及計同體繫無異物之分別心並說無異體之聲皆非以實事連繫為所取境皆觀待所遮而說故壬三破了知差別為餘量剎那各異故了知差別非執與見同故亦非別有境若彼是喻故而非總執者是喻故已成餘量何所作若忘故無過是故則非喻若謂所見事以量成立者於餘事增益為此成顛倒彼成非有量現與餘一故一成二俱成著餘相結合智者知為念待因故非念非爾錯亂故了知差別應非是量如火剎那各異而執為一故亦非差別之有境以執彼後火與前所見火相同故若謂非緣前火與後火之總以彼前火是量後火之喻喻與有喻無差異故破曰是則前火於量後火時應已成立以是量後火之同喻故若許爾者則何用餘量更量度汝應全無義若謂量後火時已忘記故無過失者曰是則應非彼喻已忘記故若謂前所見火其事一分由後量成無過失者破曰了知差別汝所成立應非有所依量以彼後火與前火是餘事而是增益為彼前火之顛倒故若謂因不成以是一者破曰是則現量與餘了知差別之境二火應成立一二俱成立以是一故問若爾彼覺是何種類曰了知差別智者了知是憶念以是將彼後火與餘前火結合為一之執著故若謂觀待因故非憶念者破曰若觀待因便非憶念應不能遍以彼遍相有錯亂故戊二於現量自體除邪分別分二己一真現量二似現量初又分二庚一現量之相二現量之差別初又分二辛一以現量成立離分別二以比量成立離分別今初現量離分別即由現量成衆分別依名是各別自證從一切攝心內體不動住眼見諸色時彼覺是根生仍少起分別了我此分別於前說分位根知則無彼問若現比二量數決定者現量相如何曰離分別不錯亂之智問若爾以何成立離分別耶曰未被宗派染害相續之智者對汝不須用因成立現量為離分別以汝即以現量便能成立現量是離分別故外曰不定即有分別於現量亦不可現曰非爾一切士夫之分別以名為所依者皆是各別自證之所證故若謂雖則如是然無離可見分別之根識曰應非如是以從一切外境攝心又無內體心散動安住之時亦有眼識現見諸色彼覺即是離可見分別根所生識故若謂住定時之根識雖有分別然不能決定曰應非如是以從定中仍少起分別即了知吾起如此分別故於前說分位之根知是無分別以可見分別不可得故辛二以比量成立離分別分三壬一破計根識是合名分別二破計根識是合義分別三再破是合名分別初又分三癸一自宗二誤認現量分別為一之原因三破他派今初一所見差別於餘則不見非離於彼別有異體餘總各異覺無故故從根生覺皆差別有境於諸差別事非有諸聲轉無隨差別轉由無名轉故所有諸聲境即彼等相合言彼名為此連繫所現義若彼是連繫彼非根行境爾時明了現義相非有故由識現別異為諸義差別眼雖現彼義然他示謂此彼由聲相合非是根行境於無根用者他語不現故非未作連繫應自能知故若謂根識是分別者為是合名分別抑是合義分別破初計者一切從根所生覺皆是以差別自相為境應非合名分別以於立名一時所見之差別則於餘時所不能見非離彼差別有餘別異之總自相於眼識明了顯現故中因成立以異體之總於不錯亂覺無可現故解說彼義謂諸差別如於現量所現諸聲非有如是轉以如現量所現名無如是轉故以差別互相無隨行故前因決定以即於彼諸聲之境為諸名所結合故問若爾何為立名之境曰如言此為彼義之名於連繫名之分別所現之義若彼等是連繫名者彼非根現量之所行境以彼連繫名時於分別心無有明顯所現義故此因決定以由識所現別異而使諸義差別各異故若謂於眼識所見義安立名時則於分別境明了現曰眼雖現彼義若他指示謂此者彼即以聲使名相合而非根現量所行境於分別心明了顯現若果爾者則於無眼根作用之盲人應唯由他語明了現見諸色然無如是現故若謂未連繫名時根識將名義合雜而取破曰根識非於未作名連繫時將名義合雜而取若合取者則於鼓腹器未立瓶名時由於瓶聲應自能知為鼓腹器故癸二誤認現量分別為一之原因有無分別意由其頓轉故或由速轉故愚執彼為一若謂分別隔所見應間斷餘亦諸異類分別時何非若如見火輪事品具力者彼於餘亦同字亦應頓聞此若有衆義頓集諸根者五識雖間斷現如不斷覺諸名究竟智剎那合雜故現間斷希有故覺應頓轉所現無差別云何間無間即唯意分別應不次第緣於某有愛心近義亦不取由貪令生餘功能失壞故二俱有此諍火炭等速轉隨逐損壞目有誤輪相生非由結合見問若現量非分別者誤認彼為分別之原因為何曰有分別與無分別之意與根識愚者有執彼等為一之原因由於一境頓時而轉故或轉速疾故若謂見雜色繩之根識於見自境應有間斷以於見自境中間有分別間隔故曰於計根識為分別之他派中除牛外分別異類瓶時其見牛之根識於見自境如何非間斷應亦間斷以於見自境中間有分別間隔故若謂分別過去之分別不能間斷以較彼具強力故以有事品以速轉之理而緣取故如見旋火曰餘見雜色繩之根識於見自境中間亦應分別不能間隔以有事品以速轉之理而緣取彼與汝相同又薩羅海與羅薩味字亦應誤為頓聞以速轉聞故若謂許多覺不頓生此中若有衆義及頓集諸根者則緣色根識應非不間斷緣自境以於緣自境中間有五轉識相隔斷故雖有彼隔斷然如無間斷顯現破曰彼許如是覺於間斷現不間斷之覺又許緣名究竟薩羅與羅薩字之識前剎那與後剎那雖合雜不間斷而現似間斷甚為稀有不應道理自許相違故又多覺應能頓生以多覺不頓生正理違害故又根識如何有間斷與無間斷二種俱有應非俱有以自境無間斷顯現無差別故又單獨意識分別亦應不次第緣自境以緣自境速疾轉故外問若二覺頓生者如何近聲之士夫有時不生緣聲耳識耶曰有時由意於美色有過於愛著之心聲義雖近而不生緣聲之耳識者亦有原因是由意貪著美色而損壞發生緣聲耳識之功能故近聲士夫如何有時不生緣聲耳識解除此諍非唯許二覺頓生者之事即許不許二覺頓生者俱有此諍故又見旋火之根識應非由旋火之火炭前後相續結合而生是由隨逐旋火等速疾轉動損壞眼目生起誤為輪相之根識故癸三破他派有說根生故如兒覺無別兒無分別因是失壞名言彼等無別故兒應成現量離名言因故後亦應不知若未習名言有意故許彼根生亦應爾如此是有餘成立兒童者亦此中所說根覺相同故此說領受等有主論師等有說老人之根識是無分別以是根生及領受行相轉等故喻如幼兒根覺幼兒根覺是無分別之原因說是由於失壞名言破曰在彼敵派幼兒一切覺皆應成為現量明現境相是無分別識故又彼幼兒後亦應不知名言以離名言之因分別故若謂未習名言者身中有意以是後時能知名言破曰幼兒之根生根識如幼兒之意亦應後時能知名言以幼兒之意後時能知名言與彼無分別相同故又如此根生亦應非成立老人根識為離分別之正因是成立彼之有餘因故若謂幼兒根識是離分別以與分別可分離故破曰其能成立幼兒根識為離分別者謂與分別可分離彼於此成立老人根識為離分別中亦應是所說因以是成立幼兒根識為離分別之因而成立幼兒與老人之覺為離分別難易相同故言如此是有餘因之理此亦是說以領受行相轉等亦非正因故壬二破計根識是合義分別分三癸一成立遍相而立因二成立宗法三結義今初差別所別事連繫世間論受已而總合如是知非餘如有杖類等未知差別故非有具彼合故此無分別外曰根識雖非合名分別然由結合種類等實物而緣故是合義分別破曰若差別與所別事及彼二連繫若世間論派之名言皆先各別受已後將彼等總合如是了知所別事中具能別法除先各別受持外餘則非能了知所別事中具能別法喻如有杖人彼緣有杖人之覺是合義分別是於所別事結合能別法而緣取故於此根識無結合種類實物之分別以非有種類與具彼種類相結合故以無了知種類等之差別故癸二成立宗法分三子一破根識緣餘物種類二破緣和合三破餘物種類之能立今初彼有隨行識聲及明了現顯形字相空宣說為牛性彼性雖相同於眼境不見無二現相故異覺亦難得彼有隨行緣總之識非以總為所取境以現別法之聲及顯色形色等之行相明了現故此因決定以由顯形文字等所空說為牛之總性故若謂分別心所現之顯形等即別法所同之總性故是眼識所現破曰分別心所現之顯形等於眼識境則無所見以彼根識境明不明之各異覺亦難得故以無境明不明之二種現相唯有明了顯現故子二破緣和合分二丑一正破二破釋難今初根不緣和合不見連繫住根識不見和合之連繫而住以不緣和合故丑二破釋難言此縷為衣此聲乃自作世言牛有角不言角有牛謂牛餘支分不見間隔故言彼縷之衣謂縷織作已說後起為果任何非一時有於因增益或示聲所依簡去一股縷言縷於果轉或能益所益或現無間隔無錯誤而知最初立名言行境是實名外曰想此縷為衣之覺應有因是覺故彼因即是和合破曰言此縷為衣之聲等是正理派自己所作不順世間言牛有角是世間所共稱言角有牛則非世間所共稱故外曰言牛有角之名言亦是由和合自相增上而立破曰應非爾除角之外尚有謂牛之諸餘支分無間隔可得乃說牛有角故頌文為不見間隔故解為見無間隔其義一也即見牛之諸餘支分與牛角為一聚故說牛有角外曰縷衣若無和合自相則說此是彼諸縷之衣此名言不應道理曰言此是彼諸縷之衣此聲任何亦非由縷衣一時和合而有是縷為緣經過織造後起能防寒之整幅說此果為衣故外曰若縷衣無和合自相者或問何是先前之縷答言此衣則此名言不應道理曰此則應理言先前之縷即是此衣顯示此聲之所依有人於衣增益為縷因或簡去一股縷而於果時之縷說縷聲轉故外曰若無和合自相者則言牛聲轉應成相違曰此無相違以牛諸支分互為能益所益或於無間隔顯現言牛聲轉故外曰若無和合自相者彼亦不應理曰於犎等聚言牛之聲是汝之實名以從牛聲無有錯誤了知是汝又初立牛名所立境故
