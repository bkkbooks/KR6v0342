body:
  text: 法稱論師造僧成大師釋民國法尊譯編丙二釋令他生起方便語之自性分二丁一釋能詮語二釋所詮義今初如集量論云他義比量者善顯自見義解釋此義分三戊一説自見之所為二説義之所為三説善顯之所為初又分二己一標二釋今初為開示他故有説非自見他見亦能立為斷彼執故而説自見言或問若言宣説三相因是他義比量即可何故而説自見耶曰為破邪執故數論者有説雖立論者自未見然由敵論者教中所見以彼為因是真能立以他義諸因是為開示他故此亦喻如數論者對佛弟子立云覺樂是無心是物質有生滅故如有色等五微故於解釋他義比量之相中説自見言有所為義是為斷除立論者自量未見僅以敵論者教中所説以彼為因即是正因宣説彼因即是真能立言故己二釋分二庚一唯受許非能立二斷自同過初又分二辛一破能立二破所立初又分三壬一唯佛自教非能立二教列出自能立三唯受許即能立太為過失今初觀察而取故於所比度境非許言為量彼比量不轉為違害教故説成立餘故爾時彼非量以彼所成立非成立無餘若具彼教成是誰人之教正量所妨害彼教如何成若受彼相違如何以彼成除彼若受餘彼捨支非量或問唯教所説如何非量曰佛教之語於事力比量境非許為能立量以於初二所量處現見事與不現見事遍觀察已乃取為極不見事如業果等超人之事之能立故於彼覺樂有生滅事力比量應不轉唯以教成立故然彼佛教應非能立量為妨害彼義故而説為餘覺樂無心之真能立故若許爾者爾時則由汝所成立之覺樂無心宗非成立無餘所立只成立有生滅不能成立覺樂無心以佛教非能立量故若謂彼教具足受許故成立為量者破曰佛弟子之教非由佛弟子受許為覺樂有生滅之原因便是聖教量以佛弟子不許為彼之能立故佛弟子之教如何成立為量應不成立是量所妨害之教故若謂由佛弟子許為聖教量故成立為量者破曰佛弟子如何由是佛弟子所許之教便能成立覺樂有生滅應不能成理應受許與彼佛弟子教相違義故此因決定以離彼教受許餘者則説彼教是應捨棄之支分非正量故壬二教列出自能立自解由何生何不説能立何理持彼教此亦何不持先由何能立凡常能了解生根諸能立知能修彼義如知復能行若斷絶繫屬總亦非行境彼義無少許觀能立所立數論派自己由何能立了解覺樂無心對佛弟子為何不説彼能立理應宣説以是對佛弟子成立覺樂無心之真立者故若謂我由數論之教了解覺樂無心汝不受許數論之教故説隨一因者破曰宣説覺樂無心之教由何正理持助汝為量此佛弟子何不持彼正理理應受持是教量故若謂我之覺樂無心是由瑜伽現量了解汝無瑜伽現量故説隨一因者破曰數論派先是凡常人由何能立了解瑜伽現量及出生根瑜伽現量之能立理應為佛弟子宣説以是覺樂無心唯瑜伽現量方能了解之立論者故此因決定以知佛弟子亦能修彼瑜伽現量之義且如所知而能行故若謂彼瑜伽現量與任何能立皆斷絶繫屬故不能顯示者破曰是則彼覺樂無心之義應無少許能立所立之觀察以唯瑜伽現量是覺樂無心之能立而彼瑜伽現量之總相亦非所行境故壬三唯受許即能立太為過失士意樂增上立真非真者應無因似因彼非依事故有義觀待知無知非能立應由士夫意樂增上便能安立真正因與非真正因以唯由敵論者所許便成為正因故若許此者則正因與似因應無專一決定也此亦決定以彼所許非依事實故又若三相於義非有唯由分別假立者非真能立若是正因其三相於義是有並觀待正量了知故辛二破所立縱有不繫事解無解相同自性及果法或現無見因彼繫若事成何故自不成餘人由餘解亦不應道理若謂雖無能立而有所立覺樂無心者破曰覺樂無心縱有了解汝應與無了解相同以與能立事無繫屬故又有生滅應是成立覺樂無心之自性及果法或可現無所見之隨一因以是成立彼宗之正因故若許爾者則有生滅與覺樂心之繫屬立論者自己何故不成應當成立以事實成立故若彼不成者則餘有生滅餘佛弟子由汝了解覺樂無心亦不應理以與無心不繫屬故庚二斷自同過以他所妄計成立其過失二者繫屬故一無破餘故或問若他所許不能為因者則汝與前諸論師以他許為因成立過失不應道理謂以他勝論派假立常事牛總破曰汝常事總應成多性以與多別法勝義繫屬故如是成立其所不欲之過失有所為義以一總若無多自性為破與餘多別法勝義繫屬故以彼無多自性與多別法勝義不繫屬相繫屬故本段大意是説佛弟子以勝論妄計之常法總與多別法相繫屬為因破其妄執此因唯就他許非以量成立旨在破執故無過失數論派則是以佛教所許為因欲成立其覺樂無心宗其因不成故成過失與佛弟子以勝論所許破勝論妄計不同也戊二説義之所為言義彼諸聲分別增益體為成其非因由義成義故分別及諸教唯屬作者欲除事有他故假立是錯亂或問説顯示自所見為因是他義比量即可何故言義耶曰解説他義比量之言中而言義者有所為義以於未成立義諸聲及分別增益為體之因為成立其非正因故顯示要由於義所有之三相因成立於義所有之所立宗故問彼何以非正因耶曰由分別及言教所假立諸因遍相錯亂以唯與作者之欲樂相繫屬除同品事外容向餘轉故戊三説善顯之所為分三己一破宗語為能立語支二斷自同過三明餘答辨無繫屬初又分二庚一明能害二破能立今初由義解義故説宗及説因於義無功能故彼等自己非住於能立宗言若能示説者之意樂是量彼生疑故非親能立由宣説所立傳亦無功能説因自無能而能示功能即由因義境而説彼無能或問言善顯有何義曰於彼言中言善顯者有所為義為遮宗言是能立支故問如何遮曰説宗及因之諸言非由自身安住成立有煙山上有火之能立以無生起了解山火聚義之功能故此因決定以凡是正因須由三相之義了解所立之義故或問若爾何為所説之聲量曰如説聲無常之宗言是能顯示説者自意樂之能立量是成立彼宗之三相故又彼宗言非聲無常之親能立以由汝於聲無常引生疑故或問若爾是傳能立即間接作能立耶曰彼言傳亦無成立聲無常之功能僅是親説所立聲無常故或問若爾因言亦傳非能立耶曰如云凡所作性皆是無常譬如瓶等聲亦是所作性此説因之言自己雖無親成立聲無常之功能然可説是聲無常之能立以是顯示三相親能成立聲無常之言故或問陳那論師許否宗言若親若傳皆非能立曰亦許如云從彼生疑故及云彼顯所比者許為因義境此即解説宗言無成立宗之功能是説彼宗故庚二破能立若彼亦有能因言轉故者彼由疑欲知依止彼分位受許異品者同故應無窮內支分功能正住於三相於彼生憶念正住於彼言若謂未示境因無轉趨故由顯示境故許功能成者先遍雖無彼然説聲所作如此皆無常義生彼壞覺雖未顯示宗成立無障故三中隨一相未説即不全若謂彼宗言亦有成立宗之功能以依於汝宗言因言轉故者破曰由疑彼聲常無常之原因而欲了知徵問立論者之分位亦應是能立語之支分以依於汝因言轉故又諸受計彼異品聲常之言亦應是能立語之支分以是依止汝因言轉之言相同故若許爾者成立聲無常之能立語支應成無窮説聲常之言亦是成立語之支分故宗言無成立所立之功能以內支分親成立所立之功能正住於三相於彼三相生起憶念者則正住於宣説彼三相之言故若謂若無顯示宗境則因不轉故由於顯示宗境許成立宗之功能得成者破曰如説凡如此所作性皆是無常喻如瓶等聲是所作性説此遍相為先之能立語雖未親顯示宗然以義引生了解彼聲壞滅之覺以雖未親顯示宗然是成立聲無常無諸障礙之能立語故或問何為能立語不完全曰如云聲是無常所作性故喻如瓶等説此言是不完全之能立語於三相中隨一遍相未親顯示故己二斷自同過説所立為宗彼説亦非過由為説能立似因非過故雖無簡別説一類則生疑餘凡説所立皆應成為宗説成能立故餘亦無過者彼顯示所立豈是能立支説宗言是能立語支不僅正理妨害自許相違亦成妨害如何妨害曰彼宗應是能立支以宗言是能立語支故喻如由説宗法之言是能立語之支分故宗法是能立之支分等若許爾者宗應是列為能立而不極成者以是能立支而敵者不極成故喻如不極成之因喻若許爾者應非所立也若謂不遍列為能立而不極成即是所立者破曰若爾不極成之因喻應是所立由列為能立而不極成若不能成立為非所立者更等餘成立非所立之能立故若許爾者則説汝不極成之因喻應是立宗也此遍相已許以許説所立是宗之相故或問若爾在汝自宗亦應是所立以所立體性是敵者不極成汝不極成之因喻亦是敵者不極成故若許爾者則説汝應是立宗以説所立即宗之相故者答曰我實不許説所立即立宗之相即許説所立為立宗之相佛弟子亦無説不極成因喻犯立宗之過失以似因喻無犯應成所立之過失故以彼不極成之因喻是作為能立而不極成者其所立則非作為能立而不極成故或曰為遮不極成因喻為所立宗故須説指定詞答曰彼非所須即無指定詞簡別而説説所立為立宗之相亦無過失以於一類同類可生疑惑不極成之因喻與所立非一類故餘者若非一類亦生疑者如言當製瓦瓶等凡説所立者皆應成為他義因之宗以説他義所立及不極成皆相同故此頌義盛寶解為吾等建立立宗之相應無説不極成之因喻疑為立宗之過失若無唯性等指定詞之簡別總言説所立為立宗之相者有生彼疑之過然説説唯所立以為宗唯為所立説名為宗故如於黃牛與青牛同一類者可生疑惑而於柴等則不生是牛之疑故餘者僅説不極成同為一類故疑為立宗者則陶師説當製瓶等應成立宗彼亦説未成就義故若謂其他正理派等計宗言為能立者亦應無説不極成因喻應為能立支之過失以凡是能立支須説敵者已極成故者破曰彼顯示所立者如何是能立支應非能立以説敵者不極成故這段辨論是因為他宗説宗言是能立支故難云宗不極成若是能立支則不極成之因喻亦應是能立支彼救云不極成因喻非能立支以能立支須説敵者極成者故難云是則宗言應非能立支以敵者不極成故己三明餘答辨無繫屬列舉及似等餘無繫堪笑謂彼非正理此如前已説有作理門論疏者説正理派者云宗言是能立語支以於及似能立時説故列此等能立應答彼云以現量為不定等破曰此答是智者笑處以敘無繫屬之疑而作無繫屬之答故或問若爾當如何答耶曰當答云及似能立時所説者非是成立宗言為能立支之正因以成立彼宗之逆遍相不極成故此因決定以凡逆遍相不極成者理非正因前已説故在第一品破吠陀派時已説丁二釋所詮義分二戊一勢所詮為所立二親所詮為因初又分二己一立自宗二破他派初又分二庚一所立之相二似宗之喻初又分二辛一標二釋今初雖由説能立是所了解義然為無愚故顯示所立相體介自樂言説彼相有四未成非能立義説立者許問曰若爾顯示所立相不應道理是由説能立之勢即能了解彼義故答曰雖則如是然顯示所立之相有所為義為令於所立相無愚蒙故問若爾所立相為何曰論云自性唯所顯自樂非所遣即顯示彼相問若爾宣説自性等四言有何所為答曰解説他義所立相之語言中宣説自性唯詞隨自所樂四種言者有所為義以凡是成立他義所立者為令了知必是敵者不成非列為能立是立者義説即所樂及是立者自所許故理門論云是中唯隨自意樂為所成立説名宗非彼相違義能遣入正理論云隨自樂為所成立性大意相同唯入論增説極成有法極成能別差別性故可供研究辛二釋分三壬一廣釋所樂二廣釋隨自三廣釋不遣初又分三癸一明所樂境即所立二若非所立則太過三此理亦破餘派今初雖未説樂遍所立如我用雖他欲皆遮疏解説自我為遮所疑處此為彼義作此觀待而説法有法差別雖未説所樂由時而了解喻無隨行過如説我是他彼於喻不成彼妨害所樂解説他義所立相之言中説所樂之言者有所為義為令了解立論者雖未直説其意樂所遍者即許為所立故譬如數論派成立眼等必為他用列積聚性為因時意説眼等為我所用也數論計神我是受者餘自性所變二十三諦是所受用意欲成立神我受用眼等矯立眼等為他所用其他即意説神我也或曰若爾則説隨自應全無用以説所樂言即遮一切所不樂為所立故答曰雖説所樂言能遮一切他人所樂為所立宗然集量論疏解説此隨自言有所為義或疑立者所許一切教義皆是所立為遮彼疑處而作故非立者所許一切教理皆是所立要隨自己所樂立者乃是所立或曰若爾必為我用應是成立彼之法自性以説眼等必為我用是所立故若許爾者則與論説此於法差別顛倒故是相違應成相違答曰無違為我所用彼觀待説法不同説為法差別及有法差別故如説眼等為他用我為法差別若説他受用眼等我便為有法差別或問既未直陳説由何了解為所立耶答曰積聚性因語中雖未説眼等必為我用亦能了解許彼為所立以欲立彼為所立由列汝積聚性為因時即可了知故其他若非指神我便指假我若説假我受用眼等既非數論者所欲成立亦犯相符極成之過故知用積聚性因是欲成立眼等必為非積聚性之神我所用也問以彼為所立有何過耶曰亦有彼所立法不隨同喻轉之過失以為我所用是所立法彼不隨同喻轉故如世親論師説若彼他許是我彼於喻不成又積聚性是成立眼等必為他用之相違因以是成立彼宗之宗法性於意樂境之所立法能違害故癸二若非所立則太過若為諍何事列舉其能立彼若非所立所立為何等若是其他者不樂或無果若於有我無我諍論何事之時彼為成立有我而列舉能立爾時若不以眼等必為我用為所立者試問何為彼之所立若謂眼等必為他用為所立者破曰眼等必為他用應非所立以汝既非立者所樂成立或對敵者成立全無果故敵者已極成故再成則無果益癸三此理亦破餘派分三子一正説二斷諍三破非樂境非是相違今初此於有二式顯示無隨行及有諸相違假若説以總許為所立者彼無餘義故身不成不成諸説所詮空是無知所惑此破數論矯立比量之理有所為義以顯順世派之有二比量無法喻相隨行及是相違因故順世派之有二比量如云瓶是身心一體士夫之身與瓶隨一之有對非塢波羅故如有瓶牆壁奘師所譯因明論中未見此例若謂許身心一體士夫之身與瓶隨一有對之總為所立者破曰其瓶身心一體士夫之身與瓶隨一之有對非已成立以彼瓶離瓶無餘義故身心一體士夫之身亦不極成故其説此瓶是身心一體士夫之身與瓶隨一之有對之言是由無知所惑亂而起是空無詮之語故順世派為成立無後世矯立比量説身心一體士夫之身身心若是一體身壞時則心亦滅故無後世若無前後世則亦無解脫是斷滅見子二斷諍計聲瓶差別壞滅亦同者非由成壞滅聲如是成故如是有餘義瓶亦具足彼若由聲差別無常不隨行遮不繫故非不具及具餘其遮有二種僅遮不具故非無隨他轉彼總是所立故非立已成彼有法差別無不隨行過外曰若計聲瓶之差別則以所作性因成立聲壞滅亦相同以聲之所作性於瓶不成瓶之所作性於聲不成故破曰雖聲之所作性於瓶不成瓶之所作性於聲不成然所作性非成立聲無常之似因以是由成壞滅如是成立聲無常之三相故如是若有餘義之總瓶亦應具足彼餘義之總然瓶應非具餘義之總以無餘義之總故無有離開別法之總前已多處宣説若謂無常應不隨瓶轉以是聲所差別故破曰無常非由聲所差別便遍不隨瓶轉僅遮於聲不繫屬故無常非由聲所差別便與餘瓶不相隨轉以遮不具與遮具餘二種遮中聲以遮不具所差別故他曰所作性因成聲無常應是成立已成以彼無常於電等上已極成故破曰所作性因非成立已成之聲無常以是成立聲上總無常為所立之三相故又彼無常非由聲所差別便有不隨瓶轉之過失以聲由遮不具所差別故子三破非樂境非是相違此顯諸破除有法差別法法差別有法是除遣有法不如是立故於有法除遣諸聚非相違非樂如是立唯法是所立此顯所樂境為所立之理若於聲上諸破除以有法差別法及以法差別有法是除遣相違因以於有法聲不如是成立聚義故所作性於聲除遣餘義之聚非是相違因何以故以非樂於聲如是成立餘義之聚故於此聲上唯無常法是所立故壬二廣釋隨自分三癸一標二釋三結今初雖於一有法論立多種法自樂謂所立故説隨自聲解説他義所立相中説隨自聲有所為義以於有法論中建立有多種法為令了解唯隨立者自己所樂乃是所立故癸二釋分二子一破計他部教義為所立二破計共教義為所立初又分二丑一敘計二破執今初若謂許論故則受許一切若妨害一義因宗皆有過若謂立者受許論故一切教義皆取為所立故若妨害一種教義則諸宗因皆犯相違過失丑二破執分二寅一標二釋今初成立聲無常遮香地德故應成相違因非時故非者彼餘亦相同此有法是時彼亦害論義若説由能立有法之法等立者欲樂者有時成所樂由彼亦了解強謂汝樂此顯是自在行説非有果因由錯亂妨害非是無不生雖妨害彼義於餘何妨害若所作性能立聲無常應由遮香常是地德門中亦成相違因以由彼門亦妨害一教義故若謂遮香常是地德非相違因以彼非時故破曰遮聲常住亦應非相違因以彼非時於餘聲常亦相同故若謂此中聲常是時以聲是時故香常地德非是時以有法香非是時故破曰遮香常地德亦應是相違因以於遮香常地德亦是妨害一論義故若謂由是有法聲上法等之能立故説成立聲無常之立者有於聲上樂比度常虛空德者破曰彼不應理以有敵者懷疑聲常無常等時立者生樂比度聲無常心彼樂比度亦可了解由其列舉能立之時即能了解故若強令成立聲無常之立者謂汝樂此常虛空德不應道理顯然與自在之惡行相等故是有法聲之法説非是成立立者樂於聲上比度常虛空德之果法因由於成立彼之遍相錯亂於是正因能妨害故其餘無常雖妨害常虛空德然何害於汝應不妨害以非無常住虛空德汝即不生故寅二釋分三卯一於事力境教不妨害二明教所害境三斷諍今初比量自行境説不待於教彼成彼善成爾時不待論爾時捨所諍無受故非捨此是受方便雖有亦非支了解聲無常之比量於自所行境教不能妨害以不待教説自境成就故又彼比量量度聲無常時非待受許論義以汝所成立之聲無常是事力量所善成故外曰若觀察事力境時不受許教者應是棄捨立者所諍答曰爾時成立聲無常之立者受許與教相違應非捨棄所諍以無受許教故又觀察事力境時縱有所受許教亦非能妨害支以此觀察事力境只是受許教之方便故卯二明教所害境如是二境淨彼是持論時爾時論能害彼成義與彼不可思違故轉於第三處受論則應理彼與所立法違害無不生應捨非捨餘犯無窮過故謂一切觀察須取諸論者此派由何作諸無宗派者由煙不解火其人單獨生未見諸德失此宗派惡鬼嗚呼誰所差問若爾何為受許之時曰觀察極不現事時論能妨害如是於初二境觀察清淨次觀察極不現境則許為受持論之時故以由彼教所成立之義不可思維與彼教相違故若轉移第三所量處時則受許論具足正理以除教外別無極不現事之能立故即於受許教時若妨害與所立法無則不生者則捨其為正因非由妨害餘事亦捨其為正因如是則犯無窮過故若説一切觀察教義皆須取論為能立者此派由何理所作無理所作如是諸無宗派之人應不由煙了知有火有是過故以彼未受許論故以彼人無所依屬單獨而生以彼未見受教之功德與不受教之過失故其説一切觀察教義皆須受許教為能立者此宗派如同惡鬼譏笑云嗚呼是誰所差使耶卯三斷諍分三辰一破除教義非因之過二破除教義非立者過三若破教義則相違太為過失今初若謂於同喻一切論顯示遍一能立性是為能立者此規超世間無繫法不成如何不成立彼成説能立如何因有過有法無餘法喻唯無全取由語及煙等比有心火等不錯亂能立自性及因義由害有所説非遮於自性彼樂所立義了解無不生餘人由彼因如何非能解若謂於同喻上由一切論顯示遍於一能立性是真能立者破曰其説凡是正因須由一切教義於同喻上顯示遍者此不應理是超出世間名言之惡規故所作性因雖不成立不繫屬法常住虛空德如何不成立聲無常應能成立以雖不成立常住虛空德而是成立聲無常之三相故所作性因雖妨害常住虛空德如何是成立聲無常之有過因雖妨前者而説是成立聲無常之真能立故若謂凡是正因須以有法之無餘法於同喻上周遍顯示曰應不須爾以有法之無餘法於同喻上唯無周遍受許以諸衆生由語言及煙等比度有心及有火等故問如何比度曰能立自性無常之所作性義由其妨害有立者説常住虛空德非從成立聲無常之本性退轉以是成立彼宗之宗法而與無常之繫屬不錯亂故又如煙於有煙山妨害無火非從有煙山成立有火因之本性退轉以是成立彼宗之宗法而於有火不錯亂故若謂彼所作性雖妨害教義而是正因然如何由彼了解所立耶曰彼所作性因其他敵者如何非由汝了解聲無常應能了解以是成立彼宗之宗法而了解與樂為所立法無常義無則不生故辰二破除教義非立者過隨説不説因若相違立者於此何所作非由彼説過彼生妨害論説害故過失豈若不宣説彼便無害耶非作不應理云何有過失似因於餘人能立自樂故説無義成過成彼故此非若謂所作性因雖無過失然説所作性能害常住虛空德故是立者有過失破曰成立聲無常之立者非由説彼所作性能為妨害之過失而使彼所作性為妨害論義而新生此説所作性能為妨害作何過失都無所作故隨説不説彼所作性因能為妨害然與常住虛空德互相違故若謂由不觀察而説能害故有過失破曰為何由不觀察説所作性能為妨害便有過失應非如是以説所作性能為妨害非作不應理故豈不説能為害彼所作性便不妨害常住虛空德耶實能害故若謂若爾於成立聲無常列眼所取為因之立者應非有過以隨列不列為因然眼所取是似因故破曰本許立正因而説無義之似因故立者當有過失以彼似因無能對他成立自所樂之境故成立聲無常之立者説所作性妨害常住虛空德此立者非有過失以彼所作性是成立彼聲無常之三相故辰三若破教義則相違太為過失若謂由有論某事非理故破餘説理者是剎帝利規諸義皆同己非能説能立故諸能所立建立皆失壞於一有法上相違不可故於相違決定妨害此非有如是相違過若謂彼雖非能害與所害由害論義故無繫亦害者一切害一切若謂有繫屬故當害彼者不爾一切因皆於自所立觀察德失故無所立不生彼繫此不解此唯妨害論是過餘亦同若由有論説常住虛空德不應理故而破除者便謂亦能破餘説正理者不應道理以與剎帝利之惡規相同故又於一切能立所立之建立皆應失壞以將一切教義與所立相同則不能説真能立故若謂以所聞性因成立聲常與以所作性因成立聲無常二者應不相違以所作性妨害聲常住虛空德與成立聲無常不相違故破曰一聲有法常無常正相違二性決定應成違害以於汝上常無常相違二性不可和合同事故由破常住虛空德成立聲無常都不相違以非常住虛空德與此無常性非有如是常無常相違故若謂常與無常雖無繫屬然若破常住虛空德則妨害聲無常以非常住虛空德與無常雖非能害所害然若破常住虛空德則損害論義故破曰應一切因妨害一切所立以破無關係之教義則妨害當時之所立故若謂由常住虛空德與聲有繫屬故若妨害彼則成相違因若妨害餘事則非相違因破曰所作性非由妨害常住虛空德故成為成立聲無常之相違因雖妨害彼然於成立聲無常之成立所立無妨害故以一切因皆待自所立觀察為有過失與有功德故若無常住虛空德則所立法無常不生之繫屬於此中無所了解故由妨害常住虛空德則妨害聲無常此中唯是妨害論義為過如是由勤勇所發性妨害香常住地德亦應是相違因以彼妨害論義於餘勤勇所發性妨害香常住地德亦相同故子二破計共教義為所立分二丑一敘計二破執今初若謂許論故論見盡所立若自他部有謂立者受許論故凡論中所見一切盡應是所立也丑二破執分二寅一説不成因喻應成為宗二説隨自聲應成無義今初説因喻不成亦應成為宗説能立故非説所樂故者所立以理得非由言而遮不樂非所立立者所不樂餘法非所立爾時非所立妨害何相違論中所説不極成之因喻應成為宗是詮所立故若謂説為能立之不極成因喻非是所立為遮是所立故集量論説唯言理門論説所樂故破曰不極成之因喻是所立者非由唯言及所樂言所能遮止以由正理得為所立故若謂不極成因喻非是所立立者不樂為所立故破曰是則餘法常住虛空德亦應非所立立者不樂為所立故許則爾時彼所作性由妨害汝常住虛空德因何相違應不相違以汝非所立故寅二説隨自聲應成無義分二卯一出過二破救今初是宗相外義自聲亦無義雖説隨自聲應離宗相而是外義以為遮教義為所立而説然教義是所立故若許爾者則於解釋宗相之言中而説應成無義也卯二破救分三辰一破計為隨欲趣論而説二破計為取共許有法而説三破計為了解有法非所立而説今初為欲趣論者此疑由何起彼量無破者受持何能遮若量能破者由言何能入彼等先於宗由自樂而持彼後何不得隨意而持餘樂無害非立顯示無窮故除邪分別故此作隨自聲若謂不應無義是為隨欲趣入論故説隨自聲破曰若爾利根立者何須除此疑謂疑豈非隨欲趣入論耶應不須除以彼利根立者若教義無量能破則受持彼教都不能遮若彼教義量能破者則由隨自言由何而趣彼教必不趣故若鈍根立者應不須為趣入論故説隨自聲以彼鈍根立者先於宗派亦隨自欲受持不隨道理則彼後時亦何不得隨意受持餘論亦得受持故若謂於汝自宗説隨自聲亦應無義答曰在此解釋所立相時作隨自聲有所為義為除或想教義是所立之邪分別故此即能除以此顯示妨害教義而無害於所樂境之所立教義非是所立若妨害教義便妨害當時之所立者則無窮故辰二破計為取共許有法而説餘説為捨棄教所作差別所共許有法故説隨自聲由觀察時故共許依已成自欲立差別諸事無諍故有餘解集量論者云捨棄各自宗派所作差別之有法為取共許之有法而説隨自聲破曰由是觀察能別法之時立敵二所共許之所依有法即已成立以各別隨欲假立之差別有法上能別法諸事無所諍故辰三破計為了解有法非所立而説分二巳一破計為了解已成有法非所立而説二破計為了解未成有法非所立而説今初若由説已成有法非所立由説自體性此了解彼義説已成能立若是有疑者説顯所立性此則具果利釋的部分原本缺失巳二破計為了解未成有法非所立而説分二午一標二釋彼原因今初由説正比量是以總為境此中縱不説宗無少相違有法為所立彼有何過失彼無能何故因無隨行故豈非彼等過觀待於後支不許為宗過若爾因等失亦應成宗過皆妨害宗故故唯彼繫屬許宗過非餘如違現量等若謂為了解單獨未成有法非所立故説隨自聲破曰彼不應理陳那論師説正比量以總聚為境由此即能了解單獨未成有法非所立故又此解釋所立相時為了解單獨未成有法非是所立即不説隨自之言於成立真宗之相亦無少許相違故試問以單獨未成有法為所立彼有何過失若謂因不能成立彼故問何故不能成立若謂因宗法不成及於法喻不隨行故破曰此因宗法不成及於法喻不隨行者應非宗過豈非彼因喻之過失是彼過故以觀待後支因喻之過失不許為宗過故若謂彼是宗過以妨害成立宗故破曰若如是者因等一切過失亦應皆成宗過以皆妨害成立宗故或問若爾何為宗過耶曰如取成立聲是所聞為宗敵者已極成許為宗過非餘因過以是唯與彼宗相屬之過失故喻如立聲非所聞現量相違之宗午二釋彼原因分二未一正説二斷諍今初不觀待遣除因等相所遣斷不遍及返故宣説宗相隨自唯性聲及不被遣等能除其相返樂聲除不遍許所立宗相彼等無宗相遣則有妨害餘相不轉故或問由何原因彼因喻過非宗過耶曰彼因喻之過非是宗過若是宗過者則應由遣除因喻相之所遣門解説宗相然不觀待遣除因喻等相之所遣是為斷除不遍與相返太遍過寬等過而説宗相故或問由何言聲遣除不遍與太遍過耶曰在解釋宗相之言中其隨自唯言自性聲及不遣言是遣除他義所立之相返太遍過者以遣除立者所不樂之教義及正列為能立並敵者已極成與被量所遣除者為他義之所立故彼言中之所樂聲是遣除他義所立之不遍過者以顯示語雖未説只要意許即是所立故此是為廣破邪分別故如是宣説即集量論中廣釋所立之相時廣説五相即隨自唯自性所樂不遣略説謂量所不遣及是有智立者許為所立者是他義真宗之相以是彼之能立故此即理門論略説之宗相具足三法謂所樂自性不遣未説唯與隨自二相下文廣辨但在奘師譯本中具説五相謂是中唯隨自意樂為所成立説名宗非彼相違義能遣或問若爾彼量所不遣及有智立者許為所立中完具自性義等五法否即理門所説之三相具否集量所説之五相答曰完具以為量所遣等彼諸過中無宗相轉故以量所遣者即為量所妨害故其餘敵者已成等四過中則有智立者許為所立之宗相不轉故有智立者所許之所立宗必離彼四過故未二斷諍説隨自所樂雖解指定義作邊相屬故遮餘時故説樂緣此非支成所樂言等是支即由彼破不成因等或問集量論中説指定詞唯字應無所用以説隨自及所樂言即能了解指定義故答曰集量論解釋所立相之言中所説之隨自與所樂聲若與所説無有所別事能別法之關係者亦能了解指定義以是隨自所樂是名宗之言故雖則如是然彼所説之隨自所樂言不能了解指定義以能作邊是聲明中字緣結構之詞暫無法解釋是與所説有所別事能別法關係之隨自所樂言故集量論解釋所立相之言中説唯言者有所為義為遮於餘未來時可為所立之不成因喻是所立故若謂彼言中之隨自所樂言應能遮不成因喻是所立是説隨自所樂是名宗之言故答曰集量論中於所樂字界給以字緣成為所樂之言非是能遮不成因喻是所立之支以是與所説有所別事能別法關係之所樂言故或問若爾理門論亦應説指定詞答曰理門論所説之成所樂言則由彼言能破不成因等是所立以是能遮彼是所立之支故此段要義謂理門論所説之所樂言於字界上給的字緣表現在式即樂為現在之所成立性故能遮不極成因喻為所立宗因為不極成之因喻雖於未來可成所立但現在是能立非是所立也集量論所説之所樂言於字界上給的字緣表三世式其所樂之所立可通三世故不能遮不極成之因喻為所立宗為遮彼故須説唯言即唯説所立不説能立故能遮不極成之因喻為所立宗這些是梵文結構法用漢文是無法説清楚的癸三結非詮故非理故隨自自樂不待一切論彼樂即所立故不樂相屬所樂亦能害如立無害故宗因皆無過隨自之聲説是顯示隨欲趣入論等不應正理以彼等非能詮故隨自之聲是顯立者隨自所樂是所立宗以顯不觀待一切論即彼立者所樂是所立故故所作性若能妨害與立者所不樂相屬造論者之所樂則成立聲無常之宗因是無過失雖妨害彼然如何成立聲無常則無妨害故壬三廣釋不遣分二癸一標二釋今初彼所許亦是無諸量能破因對疑説故遣非因所依由比量差別説四種能害所許是果因衆稱是性因彼立者所許亦是無現比諸量能破者許為所立以量所遣便非因轉之所依故凡是他義正因須是量不能遣於敵者所疑之合聚義即前後陳合聚之義宣説能立故或問能違害量定為二種如何此説四能害量答曰妨害似宗之量可説為四謂能害量有現量與比量比量分為三故或問若信解量即聖教量與名稱量即世間共許量皆是比量彼之所依於果法自性不可得三種因中為是何因答曰彼三種比量中其立者所受許之信解語對受許自所詮果者可説是成立所詮之果法正因以對彼人可説是成立彼宗之三相故衆生所共稱説於分別境中有者是成立有兔奘師譯為懷兔致生許多誤解直譯有兔即有兔影之月輪也可以月聲説即可説名為月之自性正因以是成立彼宗之能立正因因有破立兩種此是能立因於可以月聲説是同體繫故癸二釋分二子一由何能遣不遣二於何有法不遣初又分三丑一廣釋信解不遣二廣釋共稱不遣三廣釋現量不遣初又分二寅一教能害礙之理二明成量之教初又分二卯一自語與教語合一之原因及所為二明教所害境今初欲説正決定自他信同故將自語與論合説為一種如自若非量言語則不轉如是不依論彼稱義觀察亦説相同故彼論時所依則有所妨害為顯此義故此自語同説故於此諸喻亦顯示相同若無有諸量論語不可故自語違明喻於教示方隅彼説法未來不感樂是喻或問誰是信解者何為彼語曰立論者自與造論者他是信解者以欲説具足決定之真實義故自語與論集量論中説為信解有合説為一種能遣之原因以同是信解者之語故合説彼二為一能遣有所為義如立論者自語若非是量則為示他義故其語不轉如是若不依止許為定量之論則彼論中所稱説之極不現義不可觀察亦相同故此論與自語同時説者有所為義是為顯示當時所依極不現義唯以受許彼論為能害與能立故自語與此論如説無有所量義之定量顯示汝自己相違之譬喻相同亦有原因以汝自己相違之宗唯以所許為能害故如説無有所量義之定量彼語可作自語相違與自論相違即自教相違二者之譬喻以若無諸量則論與自語皆不可為定量故與説一切語言皆是虛妄相同若謂説無有所量義之定量之語不可作自教相違之譬喻以成立所詮之逆品不觀待教故曰彼是自語相違明顯譬喻以是正勢相違之宗語成立所詮逆品不觀待教故彼語非自教相違明顯譬喻僅是表示自教相違方隅之喻故或問何為自教相違之明顯譬喻曰如説白法未來不感安樂是彼自教相違之明顯譬喻是於唯以教成立之有法上所立與教相違之宗故卯二明教所害境分二辰一事力所成有法教不妨害二由教所成有法教能妨害今初不依彼説事縱違論非害二者諸功能相等故能礙喻如自語違彼亦自語性彼中何有量彼於餘能害非爾離理宗功能相等宗如何能妨害如實義比量諸教為量者如前已廣遮若謂由事力所成立之有法教應能妨害唯由所許教能妨害故破曰不依彼教而於聲事如行者派先許聲常後量未成立而與論相違説聲無常然非能害僅是彼二宗互相障礙故以彼二宗相違功能相等故喻如説我母是石女自語相違以是行者派先許説聲常之論為定量後量未成立而許聲無常爾時説聲常之論亦非能害聲無常宗以是行者派自語相違之體性故若謂彼不相等以聲無常宗能害聲常宗故破曰彼聲常無常二宗中若由量成已則彼聲無常宗能害餘聲常宗以是親立聲常之逆品是有定量為所依之宗故倘非如是若説聲常之論能害聲無常之宗者然説聲常之論應不能害聲無常之宗以是與離正理所依之聲無常宗功能相等之宗如何能妨害了解如實義聲無常之比量耶定不能害故説教是定量如前已廣破故辰二由教所成有法教能妨害是故受許已觀察許此過妨害故受許非離比量外顯境差別故而作為別異非爾應太過或別説無義自語亦別異唯語即能礙若由彼受許論是定量故應害一切事若不許彼者豈是能害耶若自語違者則自語及論相違應無異若士夫欲作此即圓滿量故於共許義捨論無過失不現不許論觀察則不轉或問若爾何者是教所能害曰若受許已次觀察白法立宗云汝不能感安樂則許有此教能妨害之過失以汝能感樂是由教所成立故以是當知受許之信解比量非是比量以外事以是依於正因能害似宗義之定量故雖則如是然説信解比量異於比量有所為義為顯信解比量之不共境之差別故若非如是説是為令了知比量之差別故而説信解比量異比量者則此講能遣根本差別時亦須説依止果法自性因之比量太為過失以為了解比量之差別故而説信解比量異於比量故若謂依止果法及自性因之比量不須説異於比量以攝於比量內故破曰信解比量離於比量而別説者亦應無義以攝於比量內故或問若爾理門論中説自語異於論者有何所為曰理門論中説自語異於論者有所為義為顯唯説語言即能障礙自相違宗故若謂由彼立者許論為量故於一切事教是能害破曰若立者不許彼論豈亦是能害耶應是能礙以是事力能妨害故若謂與論相違即是立者自語相違破曰自語與論二者於唯障礙自相違宗應無差別以與論相違即立者自語相違故若謂教是定量是由士大夫所欲作為量故破曰自語應即是量以圓滿此由所欲作為量故若於現量所共許義棄捨論為能立亦無過失以由事力所成立故極不現事若不許論為量者則於汝觀察不轉以汝唯由教成立故寅二明成量之教於此善觀察多説相違義貪等非法本浴能淨非法於見不見事理成及自語無害所有論應取觀察轉或問若爾極不現事之能立隨許一種教即可耶曰應非如是以觀察此教多是詮説內相違故如見彼説貪等為非法之根本又説沐浴能根本淨除非法罪惡故或問若爾何等教是極不現事之能立曰若於可見現事與不現事由正理成立於不可見極不現事所有自語無害之論依汝於極不現事則觀察轉汝是應取為極不現事之能立教故丑二廣釋共稱不遣分五寅一顯可説是共稱二顯可説是能害三論師許可説是共稱四釋經言之意趣五別説共稱之原因今初士夫欲相繫欲聲所詮義無破故無害衆許所信解名言所生法名聲之所詮現量等所量增能量聲説或問若他義所立須共稱不遣者何為共稱耶曰謂與士夫欲相繫屬隨欲説為月之聲可以汝説有兔是衆生所許所信解以汝是可説一切義無妨害之語故以一切義可為汝之所詮無可破故從月之名言所生法有兔可以月聲説有以共稱聲宣説之原因以是真共稱之境故或問可説雖妨害不可説然緣聲現量如何妨害聲非所聞耶曰聲是所聞於汝增益能緣現量之聲而説亦有原因以汝是緣聲現量之所量故以聲是所聞直接妨害由非所聞即顯緣聲現量直接妨害聲非所聞也寅二顯可説是能害依彼所出生欲轉故無遮已作未作等種種性皆可唯義相繫屬已生或當生聲可即由彼能害諸異品依彼欲樂所出生名月之聲可於一切義轉都無所遮以是由欲而轉之聲故種種有兔若前已作名為月與前未作名為瓶等皆可宣説以是分別境中所有性故又彼有兔由前已有名月或當有名瓶等皆可宣説則能妨害彼逆品不可宣説以是僅與分別境中所有義相繫屬故寅三論師許可説是共稱雖無名於事可性由彼力彼繫一切聲故於彼彼成餘則於此中害因非不共若謂論師陳那説共稱妨害未説可説妨害曰如彼瓶事雖無月名稱然汝可以月聲宣説彼即成就雖無彼名然於分別境中所有即由彼力可説一切聲相連繫故若非許可説即共稱餘唯已稱方説為共稱者於此有兔可説月聲中其説能害之因於分別境中有者應非成立有兔不可説月聲之不共因以有衆多未稱為月者故即有許多法為同喻則其因應非不共因也如理門云又若於中由不共故無有比量為極成言相違義遣如從懷兔非月有故説有故是成立非月之不共因於成立是月則是世間共許之正因寅四釋經言之意趣如量經云又若於中由不共故無有比量為聲起共稱相違義遣亦非是宗如説有兔非月有故解釋此義分二卯一配不可説釋二配可説釋今初破彼應比量聲義根不轉若有不隨行諸因名不共如是説因喻許具足果利聲依止於名彼復唯依欲聲成非不成如是説聲名顯比量所成相違無不謬如是者即是共稱比量故有兔可以月聲説若破彼應是由比量破以量而破現量不能破故以於聲義諸根現量若破若立皆不轉故然不能許爾以有故因是成立有兔不可以月聲説之不共因故或曰有故雖是不共豈無餘因耶曰如説有兔非月有故説此因喻許具足果利如於成立有兔不可以月聲説其有故因無同品隨轉如是諸餘因亦皆不共為令如是了解故或問有兔可以月聲説雖無妨難有何能立曰經言聲起共稱奘譯為極成言有所為義共成立可以月聲説則於一切義亦無不成立為令如是了解故以説月之聲是依於名彼名復是唯依欲故聲起共稱是顯於事力比量所成諸義若相違者無不錯亂如有兔可以月聲説顯如是了解之共稱比量是無比對故卯二配可説釋分三辰一立自宗二破他派三結義今初又世間所説説無有比量以是離比量名稱異有境故諸事有無隨轉比量異彼不自在轉顯彼從欲生有兔不許月彼稱何所許故彼無同喻許彼是不共第一句文由不共故無有比量顯示有兔可以月聲説無有妨難又初句文顯離事力比量共稱比量其境各異以説世間有兔事實以月聲説無比量故或問如是顯示有何所為曰顯示離事力比量共稱比量行境各異有所為義為顯異於隨諸事有無而轉之事力比量彼共稱比量不由事增上轉是從分別生故或問如何無比量曰以許彼有故因是成立有兔事實可以月聲説之不共因有如是許之原因以是成立彼之宗法如是成立無同喻故可以月聲説許為何事不應許故即極稱為月之有兔可以月聲説亦不許為事實故總之説有兔是月唯由世人共稱而説非由事實而説無實事故辰二破他派分二巳一應不遍餘喻二明當時喻有同喻今初非唯由此喻故作如是説如是説答帝非樹亦害故有説初句文由於世間只有一月之原因故説有故因是成立有兔可以月聲説之不共因破曰如説有兔非月有故應唯約此一譬喻如是説聲起共稱以如上説故若許爾者第二句文應非如是説以顯共稱妨害之相遍於所相事故如有兔不可以月聲説為共稱所妨害如是説答帝具言為答達利伽樹之名非可以樹聲説亦為共稱所妨害故巳二明當時喻有同喻此龍腦汞等世間亦見故由名所轉者豈亦是不共若有彼成者彼應事力成若許由名成則於非有兔亦無能遮故若於事成彼有兔亦無遮若無彼事者於有兔雖遮然非有過失故事無決定有名從聲生諸法可説義於欲無礙故若有彼成者彼應事力成若許由名成有兔無遮故破彼可説性從無破名生謂名稱比量可有境能害此説隨名轉諸聲義無定彼等若於彼破則成相違成立有兔可以月聲説非無同喻於此世間龍腦水銀等亦見以月聲説故月聲豈是唯可於有兔不共轉應非如是以是由名而轉故若謂唯於有兔等成就彼月聲者破曰彼月聲應是由事力於有兔成就以唯於有兔成就故若謂是由共稱許於有兔成就者則於非有兔之水銀等亦應是由共稱而轉不可遮止以於有兔是由共稱成就原因相等故若謂水銀等説月聲是由因緣增上而轉以潔白與清涼等事實成就故破曰於有兔説月聲亦應是由因緣增上而轉不可遮止以潔白與清涼等事實成就故若謂此因不成以無潔白與清涼等事者破曰於有兔上縱遮月聲由無潔白清涼等原因而不名月亦應非有共稱妨害之過失以彼月聲是有因緣之聲而汝有兔無有月聲隨轉之因緣故以有因緣之聲不於無因緣上轉故又一切法不定於事實而轉是僅觀待名言説為月聲所起諸法可詮諸義以説月聲由欲而轉無障礙故若謂唯龍腦等説彼月聲由因緣增上成就者破曰彼説月之聲應是由事力於龍腦等成就以彼由因緣而轉故若謂許彼由共稱成就者則於有兔雖説月聲由因緣增上而轉然由共稱成就應無可遮以於龍腦等雖由因緣增上而轉然由共稱成就因緣相同故又於有兔立不可説月聲之宗不應道理以若破汝可以月聲説則以從不可破説月之名所起共稱比量可説月聲之有境能妨害故由此無間所説正理即顯示其破有兔等諸法可以月聲説是相違宗以隨名轉諸聲非決定唯詮一義故辰三結義故有因聲義或是諸聲義破勝義性者顯示無妨害若破有兔是能煮有因緣之聲義則無共稱妨害以汝非能煮故又於有兔説月等聲義破勝義性者顯無共稱妨害以非於勝義可説月聲故寅五別説共稱之原因顯境差別故名稱雖非是離比量之外然作異如前成就説異者所為故此二及原因廣説非現比妨害共稱比量非離比量之外以是依因能害似宗義之量故雖則如是然將共稱比量異於比量者有所為義是為顯共稱比量不共境之差別故喻如前説信解比量問若爾由何了知是為顯信解與共稱比量不共境之差別故而顯彼二異於比量耶曰信解與共稱此二比量雖成為比量然説異於比量者有所為義如其次第為顯於自相違宗須以所許與共稱而違害故廣説對於自相違宗違害之理及原因故不廣説現量與事力比量對自相違宗違害之理亦有原因以自相違宗事力能害故易了知故
