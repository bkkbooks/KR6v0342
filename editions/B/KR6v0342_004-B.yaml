body:
  text: 法稱論師造僧成大師釋民國法尊譯編辛二加行圓滿分三壬一略標二廣釋三結義今初具悲摧苦故勤修諸方便方便生彼因不現彼難說具足悲心之加行道菩薩應精勤修習息滅眾苦之諸方便行以是欲摧滅他苦之異生故此因決定以方便所生之苦滅二諦及彼因之集道二諦是不現見事故若自對彼不現見者則難為他宣說故壬二廣釋以教理觀察由苦性差別當了別苦因彼無常等性如是因安住不見果遮故為摧彼因故當觀彼逆品了達因性故亦解彼逆品由我我所執有為為行境貪愛是其因彼之能害者見無我相違眾相多方便經長時修習於其德失相當能極明顯心亦明顯故因習氣永斷能仁為利他勝出麟喻等若爾通達四諦之方便云何曰又彼加行道菩薩有通達四諦之方便謂以教理觀察四諦理故又彼菩薩以苦性之差別暫時生故為因了別苦因及彼因無常等自性以如是因若安住則不見其果能遮止故又彼菩薩當觀彼集諦之對治逆品為欲摧毀彼苦諦之因故又彼菩薩亦能定解彼集諦之逆品以了達集之因性故問若爾苦諦之因及彼之違害為何曰由我我所執所作成之有為法為所行境之貪愛是苦諦之因以是彼之根本故現見無我之慧是彼我執之能違害者以與彼我執由於行相正相違門而能破除故問若爾由於修習現見之理云何曰偉大能仁永斷苦因之習氣以心於取捨最極明了到究竟故對於功德過失亦極明了以無量行相眾多方便三無數刼長時修習乃能如是故又偉大能仁勝出麟喻等以利他行到究竟故壬三結義義故修方便許彼是大師成就先起故說此二為因其能修無我慧之方便許彼是此處所說之大師以是彼究竟大師之因義故究竟大師是能為他人宣說無我慧者能成此大師之因即能修習無我慧者因立果名故稱大師此上意樂加行二種圓滿說為果圓滿之因以較成就二利之果先生起故庚二果圓滿分二辛一善逝二救護初又分二壬一正說二斷諍今初因斷具三德是為善逝性非苦所依故是善見無我或從彼加行生及過普起說為復退轉斷我見種故是不退轉性彼諦異體性身語心粗重無煩惱無病餘說道不明修故無餘斷世尊是得具足三德之善逝性者無餘永斷眾苦因故問三德云何曰一是善斷謂已得永斷非苦所依故二善因為先謂從現見無我或從己見修習加行而得故三不復退還生死謂是永斷我見種子故若還生生死及普起眾患說為復退轉故問通達無我慧如何違害我執曰通達無我慧能害我執以與彼我執行相各異而體性相違無倒通達四諦理故聲聞獨覺阿羅漢猶餘身語心之粗重雖無煩惱無逼惱心意之病然於宣說解脫道心不明了故諸佛世尊無餘永斷一切過失以修習對治到究竟故壬二斷諍有說語等故過失非永盡此遮相猶豫故是錯亂因常故無便故或便無知故為何遍計說諸過失無盡有因故由修因對治盡故由了知因性知彼亦成立順世派等有說能仁諸過非盡以發語故具足根等故曰此發語等非成立彼宗之正因是遍相錯亂因以於彼逆遍生猶豫故復次為何遍計諸過失無盡為因過失是常住故或雖無常而無能斷之方便故或彼方便無能知故而說諸過不能盡耶彼等一切皆不應理以過失有因故非常住由修因之對治即可斷盡故有方便由了知因之自性即亦成立知彼方便故辛二救護救護者宣說親自所見道無果不妄語具足悲心故凡一切所作為利他行故以故是定量諸佛世尊是救護者以宣說自所見道到究竟故又佛世尊不說妄語以現見宣說妄語無所求果故又佛世尊是定量士夫以具足悲心故凡一切所修道皆為利他而加行故己二逆成立量分二庚一廣說二結義初又分二辛一果圓滿二因圓滿初又分二壬一救護二善逝初又分二癸一由說四諦顯為救護二抉擇所說四諦今初復次救護者宣說四聖諦上來由順次門成立世尊是定量士夫復次當由逆次門成立謂佛世尊是救護者以宣說四聖諦到究竟故癸二抉擇所說四諦分四子一苦諦二集諦三滅諦四道諦初又分四丑一明苦二成立彼無始三破計有始四解說諦相今初苦流轉諸蘊由宣說四諦是救護者何為四諦曰苦集滅道是為四諦苦諦云何曰謂五取蘊是名苦諦從無始來流轉生死故丑二成立彼無始分二寅一出因二成立相今初由修習現見貪等明顯故順世派云前因不成無前後生故曰初生無間之貪等應有前念同類為先導以現見由於修習能明顯故寅二成立相分二卯一破無因生二破邪因生今初非是隨欲性無因生違故初生之貪等非無因緣隨欲而生以暫時生故此因決定若無因者生相違故卯二破邪因生分二辰一破三病為因二破四大種為因初又分二巳一標二釋今初由有錯亂故非風等之法若謂性雜故無過則彼法餘法何不見一切貪應同故非一切法如色等無過若非由特殊諸業增上者彼諍亦相同若計貪等是一切法性者無能無自性果由何不同若謂貪等三毒非從前念同類所生是從三病如次而生謂從痰生貪從膽生瞋從風生痴曰貪等三毒非風等之親果法以於風等有錯亂故現見患痰病者瞋增上故若謂痰中有膽性雜故無錯亂過者曰於痰病者彼膽病法除彼瞋外為何不見有肉黃等餘法理亦應見以彼有親因膽病故又貪等三毒應非一切病之親果法以若是者則三病等分之一切人應有貪心大小相同之過故若謂如大種因雖相同然色體等有大小不同者故無過失曰於彼色體亦應無大小差別之諍相同以於彼色若非特殊諸業為增上緣其大種因皆相同故又若計貪等三毒皆可從一切病生是一切病自性之法者曰是則三毒果法由何因由而不相同理應相同都無差別以無差別功能及無不同自性故以從一切病皆生三毒故當知貪等非三病之親果巳二釋諸患雖有別而無差別故不成者非爾一切變變故亦非一切生若因增長時果不可衰減猶如煩熱等貪等之轉變是從苦樂生不等分生苦若不生貪者當說由何生從等分增液從彼生貪者不等見有貪餘等分亦非餘盡滴血亦一女液無定於一不猛貪若色等亦支非皆不定故無定應不生不執德應生執德亦是支應一切皆成執為功德者因無差別故若時許有貪如是非有瞋二體不同故不見此決定若誰說貪等依賴於同類習氣差別轉彼無此過失貪等三毒亦非從一切病親生以諸病患有增減之差別時而三毒等增減之差別故若謂因不成以由膽病逼身生瞋恚故曰僅由爾許非因不成由一切病變化加重皆能變化生瞋恚故根本因決定以因增長時果不可衰減故喻如從膽病增長則增長煩熱等又貪等轉變非唯從病生是從苦樂所生故試問若從三病不等分所生痛苦不生貪者當說由何生貪若謂由三病等分增長精液從彼生貪者曰彼不應理現見三病不等分者亦有貪故餘瑜伽師雖三病等分亦非有貪故又餘士夫精液雖盡由於滴血亦見生貪故又如貪着一婦女之士夫於彼一婦女應不成猛利貪者以於彼一婦女增長精液無決定故若謂亦須好色等為生貪之支分者曰婦女之妙色非是貪欲之親因以於一切具妙色者不決定生貪故於不決定有妙色者應不生貪有此過故又於妙色不執功德亦應生貪有斯過故以上三句說妙色非生貪之親因一於有者不決定生二不計為好則不生貪三於無者亦有生者若謂於妙色執為功德亦是貪之支分者曰婦女妙色正現前時一切士夫皆應成為於彼妙色執功德者以有彼因無差別故若時痰病增上之士夫如是應非有瞋者以許是有猛利貪者故此因決定以貪瞋二心執持體性不相同故不應許爾於此患痰病者不見決定不生瞋故若謂患痰病者應不生瞋之過失汝亦相同曰彼佛弟子自宗無此患痰病者不生瞋之過失以說貪等依賴同類習氣差別而轉故辰二破四大種為因此破大種性所依亦破故白色等非是依止於地等依聲亦因義或與自所依無別而住故是依餘非理若如醉等能有別非離事有餘義功能能壞事應壞所依若全住能依應非壞若相同非爾了達現相異大種心異故乃至身壞時如色等意體應同然分別豈是義增上若時無待身有識為餘識習氣醒覺因故從識生識若謂貪等雖非三病之親果然是四大種之親果曰此破貪等是三病親果之理亦破貪等是四大種親果之法性道理相同故若謂大種是貪等生成已安住之所依曰大種亦非貪等已成後安住之所依彼同時所依亦破訖故若一切餘義所依皆破者則與說大種是大種所造色之所依應成相違曰白等色非同時依止地等大種以與大種是因果故白等色其大種是同時餘義所依非應道理以汝依彼大種之聲義亦是以大種為因之義或由與自所依法無分別而安住以此因緣說是所依故若謂如酒與麻醉功能大種與心雖是能依所依而有分別曰麻醉功能若失壞酒事亦當壞所依酒若完全安住則能依麻醉功能亦應非壞以非離酒事別有餘義之麻醉功能故若謂大種與心同一體性亦應相同曰大種與心非同一體性是異體故以不錯亂覺了達現相各異故又意體性應如色等乃至身變壞時不變同轉以彼大種是汝不壞安住之所依故若謂由所取義增上而轉者曰諸分別心豈是由所取義增上而轉非義增上是以增益為境故又諸心識是從前念識生後念識若時無所觀待身有前念識為後念餘識習氣醒覺之因故丑三破計有始分二寅一以因破二以太過破今初非識則非識親因故亦成若許一切事具識能故者草等端百象先不見言有除如牛數論餘有慚誰說百次分析因所應見體性彼性先不見如何彼當有生死無始亦得成立以識有親因而非識法非識之親因故若謂一切事皆具生識之功能故諸非識法非識之親因吾等已成此是數論計因中已有果是因中之不顯了識為顯了識親因餘法則非其因曰言於草端等因上有成百大象果以先時不見之理而云有除如牛之數論外餘有慚者誰作是說皆不應說以彼果法於因體中如何當有不能有故以於其因百次分析所應現見其果體性先於因時不可見故寅二以太過破分二卯一出過二破救今初從先無而生貪等應無定若生死有始者則貪等過於一切有情應無定生以先無同類而生故卯二破救分三辰一破有貪等之能立二破遍相不定三結今初未越大種故若都具貪等一切貪應同若由大種別諸種無生別然此別所依如其彼增減此從有應無若貪等雖異因同體無遮故非因體同一切貪應同同體生牛識或此中地等非有有情等諸差別次第暖次雖有別非有無暖火如是此亦爾非爾以離暖餘火已破故若有餘功德具差別次第彼等彼差別可斷如白等若謂一切有情皆具貪等以未越大種體性故曰一切有情貪心大小應皆相同以大種因相同故若謂由大種之差別貪心成大小者曰彼貪心先有後應成無以諸大種雖無大有情等之差別然汝增減差別之所依大種如彼增減差別而轉故若謂貪等雖有增減之異然非有畢竟盡以相同大種體性之因不能遮止故曰一切有情貪應相同以大種體性之因相同故譬如數論派說從牛同體性所生知牛識之境無大牛等差別或如此中順世派說於地等亦非有大有情等之差別次第因同果應同若謂如火雖有暖大小之次第差別然非有無暖之火如是此諸有情雖有貪等大小之差別然無無貪等之有情曰法喻非相同以離暖外餘火已破故彼諸貪等於彼身之差別有可分斷以是離身有餘義之功德具足增減之差別次第故如布上之白等辰二破遍相不定非定如色等與種無別故若彼同曰非貪等應俱故遍計為境故境亦非能定若謂如於大種色等不能分離如是貪等亦爾前說從先無而生遍相不定曰貪等非決定如所造色等不離大種以彼色等與大種無有分別貪等與大種有分別故若謂色等與貪等於大種上彼無分別相同者曰彼非相同若相同者貪瞋等應俱時生故若謂由所取增上依次而生者曰貪瞋亦非由所取境能決定使依次而生是以分別所遍計為境故辰三結離同類因故貪等應無定或因相近故諸覺於一切一切時應生貪等應於一切有情不決定生以離同類因故若謂無過大種是常因故者曰若爾一切諸覺於一切有情應一切時生以大種因常相近故丑四解說諦相彼暫可得故無常過依故因自在故苦非我非加持非因非能持常如何能生故非從一因多果異時生雖餘因和合亦不生果故若比知餘因諸常非有彼彼諸取蘊是無常相以暫時生可得故是苦相是眾過所依故及是業煩惱因他自在故非補特伽羅我相以是無常與苦故彼諸取蘊是空相非我所加持故彼我非能加持者故彼我非因故以從常一不應異時生多果以常住如何是能生非能生故以常住法無生果之功能即與餘因和合亦無暫生果故若為比知餘因彼隨行隨遮諸常住法皆非有故子二集諦分四丑一因相二集相三生相四緣相今初由是暫時性成苦性有因無因不待他應常有或無若如棘刺等銳利等無因如是皆無因有作如是說若此有彼生若此變彼變說此是彼因此於彼亦有觸是色因故於見是因由此苦已成有因性是暫時生性故若謂無因而生者曰此苦應不待他而生以無因生故若許爾者則應常有或永無也若謂如棘刺等之銳利性等都無有因如是一切事亦皆無因有順世派等作如是說曰棘刺之銳利等亦皆有因若有此因彼乃生起或此因轉變彼亦轉變即說此法是彼法之因此因道理於彼棘刺等亦皆有故外曰若爾觸應是緣色根識之因以有觸緣色之根識乃生無則不生故曰觸是於見色根識之因由是彼色之因故丑二集相破常亦非有從自在等生無能故若謂雖然有因彼因是常曰苦亦非有從自在等生彼無饒益之功能故常住為因已破除故丑三生相是故有貪是為因何故謂諸人遍執境差別得彼意樂作彼有貪何故有情於樂苦欲得捨而轉許彼等即是欲愛及壞愛有因是無常故彼有貪是為苦之因何以故以諸人遍執境界差別彼由欲得彼境之意樂而作彼即有貪故問若有愛是因者經說三愛為因則成相違曰此不相違何以故以諸有情欲得安樂欲捨痛苦而轉許彼等即是欲愛及壞愛故丑四緣相分二寅一正說二斷諍今初由著我為因於非樂樂想於一切尋求故愛是有依離貪不見生諸論師所說無身不見貪從身亦生貪許彼因故許是遣除親因若隨許此理自害自所計若生見貪故謂與生俱起同類生前成愛是三有之所依以由着我為因於非樂起樂想於一切境極遍尋求故又愛是三有之所依以諸論師說離貪不見生三有故彼應理故問若爾從身亦應生貪以無身則不見貪故曰許從身亦生貪以許身是貪之俱有緣之因由故前文非破身是貪因只是遣除是貪之親因故順世派自己違害自己所計無前後生以隨順此貪是身因之理許身是貪因故若謂貪非身因以與身生而俱起故以於身生見有貪故曰貪應不從身生以與身俱起故若許爾者則應成立前念同類以從同類因生故寅二斷諍不知是有因未說唯說愛能引相續故無間故非業有彼有無故問不說無明與業是三有因說愛為因理由云何曰不知雖是三有之因此中未直說之理由以非後有無間之能成故說愛為因之理由以能引三有相續故及是後有無間之能成故業亦非主要因以若有彼愛便有業等若無愛者縱然有業亦不定生三有故子三滅諦分三丑一滅相二靜相三妙相今初彼非堅固性因有碍等故轉故無解脫非許不成故若未壞我貪彼當受逼惱爾時增益苦不能住自性雖無解脫者勤摧邪增益離貪安住者由悲或由業引業無遮欲已越有愛者非餘所能引俱有已盡故彼苦非堅固性其因容有障礙等故若謂補特伽羅我應無解脫是輪轉法故輪轉即生死曰如是出過於佛弟子非是違害可以答許及因不成故許無我故問若無解脫者之我精勤修道應無義曰彼諸異生雖無解脫者之我然為摧毀邪增益故須勤修道乃至未能摧毀我貪便為眾苦逼惱爾時於苦增益為樂不能安住樂自性故問諸阿羅漢應剎那頃不住生死由已現證無我於自利義無希望故曰離貪之阿羅漢由於悲心或由業力安住生死由業所引餘苦無欲遮止或見有某所為而安住故問若由業住當生後有曰已越有愛之阿羅漢業力不能引餘有以俱有緣愛已盡故丑二靜相知苦以無違前行隨轉者事法生悲愍非連繫有情彼於無我法增餘我而貪由了苦相續而生起悲愍痴是過根本彼是執有情無彼則不從過因而生瞋故許悲無過非無有解脫由宿行已盡不續餘生故行功能無盡彼住無過失由悲下劣故無大功力住若是大悲者為他而安住離薩迦耶見初道應無有未斷俱生故若斷豈有有若欲得安樂及欲不受苦所有念我覺俱生有情見若不見有我則全非我貪若無有我愛非求樂奔馳問諸阿羅漢應未斷執具足悲心故曰諸阿羅漢發生悲心非與有情見相連繫是現知有情為苦逼惱於彼無違修平等性隨彼先行而轉生為心之事法故問諸阿羅漢應有貪心具悲心故曰貪與悲心所緣行相皆不相同若於非諍樂我性之法增益為餘我性而生貪心僅由了知有情是苦相續而生起悲愍心故問諸阿羅漢應有瞋恚具悲心故曰諸阿羅漢非從過失因而生瞋恚以愚痴是過失之根本彼復是執自在有情已無彼愚痴故阿羅漢之悲心許無過失以彼之悲心一切煩惱皆遠離故問若由業安住應不解脫曰諸阿羅漢非無解脫以宿行之功能已盡不再結續餘有故彼大乘阿羅漢安住三有亦無過失以二資糧行之功能無盡安住故問若以悲心安住生死應常安住曰小乘阿羅漢無大功力安住三有以悲心下劣故若諸大乘阿羅漢盡生死際為利他故安住三有以是大悲究竟之補特伽羅故問若薩迦耶見是生死根本則預流者初得聖道時應即不生三有以已離薩迦耶見故曰此因不成以未斷俱生薩迦耶見故若言已斷豈有生於後有應無有也又預流者應有俱生有情見以有想自在我之覺故以有願我安樂或願不受苦之欲心故若無自在我見則都不着我若無我愛則非為求樂而奔馳故丑三妙相生苦因即縛於常何有彼不生苦因解於常何有彼不可說無常彼非任何因於不可說中縛解皆非有若自性無壞智者說彼常棄此可羞見當說彼是常問於得妙解脫須有常我為繫縛解脫之所依曰應非須彼所依以生苦之因即能繫縛於常住中何有彼事必無有故不生苦之因即能解脫於常住中何有彼事必無有故正量部說彼常無常都不可說之我是繫縛解脫之所依曰彼我應非任何果法之因以不可說是無常性故繫縛解脫皆應非有以常無常俱不可說故正量部應拋棄此於正相違中計第三聚可羞之見當說彼我是常以彼我是不壞法故若法自性無壞諸智者即說彼法是常故子四道諦分二丑一說自宗之解脫道二破他派之解脫道初又分三寅一明達無我慧是解脫道二斷諍三明我執是三有根本今初修彼已說道轉依問若爾能解脫生死之道云何曰彼前已說現證無我之慧是解脫道以是由修彼慧獲得究竟轉依之道故寅二斷諍分二卯一斷斷已復退之諍二於證無我慧是我執之對治斷諍今初雖轉依如道過復起非爾無能故識是取境法如有而取彼彼所有體性亦是此能生是此性從此由餘緣歧誤遮止觀待緣不堅如蛇覺心自性光明諸垢是客塵故先無能者成性後無能有能於能生損害堅實事亦不能久住如濕地上火無害真實義於自性顛倒盡力不能遮覺持彼品故問若一次轉依如從有漏生道如是過失應復起曰斷德究竟之士夫過不復生以無生過失之功能故此之原因謂心性光明諸垢是客塵故如緣色根識是如色所有而緣以如境色所有而緣是彼識之法或自性故色引生緣色識則是色之自性以如自所有體性亦是緣自體性緣色識之能生故執蘊常之覺非有境之自性以從此境本性由餘緣故使成歧誤若遮止彼須待緣故然彼錯覺非於心中不可分離以不堅固是由亂因所染污故如於繩上誤起蛇覺通達諸蘊無常之覺則是心性光明以是通達境實相之覺故諸垢是客塵從錯亂因生故若心相續已成通達無我慧之體性以後諸垢再無損害之功能以先聞思觀察時尚於通達無我慧是諸無損害功能者故又不還者心中雖有引生過失之功能然非有久住之功能以是能生損害我執之對治為堅實之事故如濕地上燃火究竟轉依之士夫顛倒雖極力阻撓然已斷者終不復退以無生死違害已現證真實義彼已入心自性故以汝之覺堅持彼通達無我慧之品故卯二於證無我慧是我執之對治斷諍我執一因性是因果事故貪瞋雖互異然非能違害慈等愚無違非極治罰過眾過彼為本彼是迦耶見見明逆品故心所所緣故說邪緣無明故餘不應理相違此當說空見違彼故與彼性諸過相違善成立眾生法性故非盡如色等非爾不成故若連對治品現見可遮故已滅諸過失非如堅還生彼體使無繫如灰不定故問通達無我慧是我執對治不應道理若唯以行相相違便是對治者貪瞋亦互成對治故曰貪瞋雖行相各異然非能害以同從一我執因而生故及是互為因果之事故問唯通達無我慧是對治不應道理慈等亦是對治故曰緣有情之慈等非極治罰過失者以與愚痴無明行相無相違故一切過失無明為根本彼復是薩迦耶見故問若薩迦耶見為無明不應道理以薩迦耶見是邪分別無明是心續不明顯故曰無明非唯不明了及唯明所餘法以是明智之相違逆品故及是心所取所緣故無明與薩迦耶見說為餘體不應理經說邪緣之薩迦耶見即無明故問經如何說曰月燈經云云何為無無知謂於諸如實法不加增益問若爾云何與無明相違曰相違此當說通達空性之見與彼無明自性及彼所生一切過失皆屬相違極善成立以與無明行相正相違故問眾過失眾生應不能盡以是眾生之法性故如瓶之色等曰眾過以是眾生法性之理由說不能盡應非如是於彼法性不成立故若與對治品相連繫現見可遮止故若謂過失雖一次滅仍當復生曰究竟轉依之心諸過已滅非如金之堅性仍能復生已成通達無我慧之體性使不繫屬故及對治雖退所斷不定復生故如火雖熄然灰不復成薪寅三明我執是三有根本若彼見有我當常著於我由著愛於樂由愛障眾過見德而遍愛我所彼成取故貪著於我爾時當流轉有我則知他我他分執瞋由此等相繫起一切過失今當成立空見違依故之因謂乃至幾時貪着於我則彼補特伽羅流轉生死若誰見有補特伽羅我則彼常時愛着於我由着我故當愛我樂由愛障蔽過失見為功德周遍愛着執樂為我所為成辦彼樂而追取故又彼我執是過失之根本以有我執則知有他由執我他之分發生貪瞋由與此貪瞋相連繫當生一切過失故丑二破他派之解脫道分四寅一破勝論之解脫道二破數論之解脫道三破自在派之解脫道四破尼犍子派之解脫道初又分二卯一出過二破救今初我愛則決定不離我所愛無過則我愛離因亦非有勝論派說雖愛着我若於我所離愛即當解脫破曰欲求解脫之士夫應於我所不能離愛以是決定愛着我故又彼士夫應亦非有離我愛之因以貪着我無過失故勝論派說我是實句攝是實有物故着我非是過失若着我所而起貪愛則受生死故說斷我所愛為解脫道卯二破救分三辰一修有過非解脫道二修是苦非解脫道三執功德非繫縛今初若謂貪有過修此有何益若謂能斷彼未破除此境非能斷彼貪斷德失相連貪及瞋恚等由不見彼境非由外道理貪非由德貪是見義功德其因無所缺何能遮其果見貪有何過若謂苦所依雖爾非離貪見我所如我若謂無我所我非苦因者彼亦與此同如是俱無過故俱非離貪外若謂我雖無過然應修貪我有過問曰修彼有何益外若謂能斷彼我貪破曰若未破除此我貪所着之境應不能斷除彼我貪以斷除與德失相連之貪瞋貪與功德相連瞋與過失相連即見德生貪見過生瞋也是由於境上不見有彼功德過失即見境上無彼德失而斷彼貪瞋非如外物拔刺之理而斷故又彼我貪非由見彼之過失而斷以非僅由見彼之功德而生彼貪是由見我義之功德而生彼貪故由見我之功德而生我貪非由見我貪之功德而生我貪故修我貪有過並不能對治我貪也其欲求解脫之人如何能遮我貪果法必不能遮以彼之因我無所缺故既有我為因則必生我貪為果也試問見我貪有何過失若謂是苦之所依故破曰我貪雖是苦之所依然非於汝離貪以見汝是我所故譬如我雖是苦樂之所依然不離貪若謂我無過失以無我所之單獨我非苦因故破曰彼我所如彼我亦應無過以無我之單獨我所亦非苦因故若許爾者則應於我與我所俱不離貪以彼二俱無過故辰二修有苦非解脫道分二巳一敘計二破執今初若如蛇傷肢修苦而斷者若謂如被毒蛇所傷肢節由於我所修苦則當斷除巳二破執分二午一破喻二破義今初要摧我所覺捨此非能遮被毒蛇所傷肢節非僅修苦便能遮止要摧毀我所之覺割捨此肢乃能斷除故午二破義分四未一以有自覺破二以有我執破三以餘理破四以我無過破今初由執著根等為受用所依自覺何能遮如何能離貪於離身髮等雖起厭離心於餘生貪著是眾所現見彼由和合繫產生自所覺繫如前住故雖見苦不捨雖無和合等而有饒益性生苦故如指不起自所心彼非一向苦多如有毒食由貪殊勝樂於相違離貪由愛殊勝樂暫捨少分樂無思由貪我隨得食而趣如未獲婦女見於畜行欲所欲為我者云何欲彼滅領受及名言德所依息滅如何是所著所著性不爾對於根等執着為自所有之覺由何能遮必不能遮以執根等為受用之所依性故由眼等根受用色等境故根是受用境之所依若許爾者則於汝如何能離貪定不應理雖於脫離身之髮等起厭離心然於餘者未離身的則生貪着是一切眾人所現見成立故又諸根等縱見為苦應不能斷執為我所之心以於彼我由和合等關係而產生自所有之覺其關係如前安住故又不須於我有和合之關係為生我所執之因如衣食等雖於我無和合等然由見彼有饒益性而起執為我所之心故若謂不起自所有之心以生苦故如被毒蛇所傷之指破曰彼非一向生苦有時亦生樂故若謂彼不生自所有之心以多生苦故如雜毒飲食破曰諸異生類由於貪着殊勝快樂於彼相違下劣之樂暫能離貪然僅由此不能成立離貪如由愛着殊妙飲食之樂而暫捨棄少分餘樂然在不得殊妙飲食之時則無所思擇由貪我故隨得何飲食而趣食故喻如未獲婦女則見於畜生而行欲行所欲為我之士夫彼得解脫時其作領受憶念等所依之我如何欲令其壞滅不應道理以領受及取捨名言與功德等之所依息滅如何許為所着之我不應理故外道所計之自性我非是受念所依息滅者故未二以有我執破一切相執我則堅固我貪彼即是安住我所執種位雖勤依德轉障我所離貪亦障彼過失若於我離貪則無離貪者如彼亦許我修苦則無義彼欲得解脫之人應是安住於我所執之種子位有我執故以一切相執我者則能鞏固我貪故又彼人雖於我所勤修為苦然於我所仍作離貪障礙亦能障蔽我所之過失以依我所之德分轉故若謂得解脫時則於我亦離貪破曰是則應無離貪之我以於我離貪無所知故又彼為得解脫故而修苦應全無義以得解脫時如彼我所我亦捨故未三以餘理破雖修彼等苦僅識為苦性彼先已現見雖爾無離貪若由見彼過剎那遮彼心然彼非離貪如欲於餘婦有取捨差別從一所生貪隨彼生起時即一切貪種雖然如是修我所為苦亦應無離貪雖修彼等我所為苦亦僅了知為苦性彼先已現量成立而非離貪故若謂其因不成由見彼境之過失即見離貪故破曰設彼士夫由見彼境之過失剎那頃遮止其貪心然非於彼境離貪以於所取與所捨之差別有貪着故以從一境所起之貪心隨由異門生起之時即是一切貪心之種子故譬如有欲之人雖於一婦女見其過失然由貪着餘婦則仍起貪心未四以我無過破無過有境貪能成亦無過眾生亦唯爾今於何離貪於彼彼有過彼於我亦同彼過不離貪更於何離貪於我貪着與諸根等應皆無過失如其次第以是無過我之有境與彼樂之能立故貪是緣我之有境根是彼樂之能立若計爾者今復於何事離貪應無離處以我與我貪及我所三事皆無過失所謂眾生亦唯是彼三事故若謂於彼我所起彼貪是有過失是苦所依故破曰若爾則我亦應有過以是苦所依我亦相同故若許爾者則彼士夫當於何事離貪應無所離雖見彼我之過失猶於彼我不離貪故辰三執功德非繫縛由見德起著見過失則滅如是根非爾愚等亦見故具過亦有故雖具足功德於他則無故及於過去等我所亦無故是故我所覺因非由見德故見非功德亦非能斷彼又增不實德由貪亦見彼成彼因無害如何能害彼外曰於我所之貪着由見過失即能斷除由見功德而生起故破曰其於根等之貪着從見功德而起貪着由見過失而壞滅如是汝非由見根等之功德而生以不了知根等德失之凡愚等亦見有貪故於有過根等亦有貪故於他人之根等縱有功德亦無貪故於過去等之我所不生貪故又於我所之貪覺非由見我所之非德而能斷非以見功德為汝之因故又於我所修為苦如何能害我所貪定不能害以已成立生汝之因無違害故以於我增益不實功德之貪着亦見於彼我所而起貪故寅二破數論之解脫道分四卯一破了知各異即得解脫二破唯厭離便能解脫三明彼等是生死四教令斷除薩迦耶見今初上求利他故有生滅覺故此眾生了知我異於根等故非見一貪其貪著我者是於緣內支本性而貪著數論派說雖唯修苦非解脫道然將自性與士夫神我執為一體則流轉生死由了知各異即得解脫破曰士夫應非由見根等之自性與神我渾為一性而生貪着以此凡人亦了知我異於根等故以上根等求利他故執我常住而有了達根等生滅之覺故若爾何為貪着我所之因曰彼我貪即我所貪之因由依於汝則於所緣內支自性貪着故數論是計二元者一謂神我二謂自性神我被自性所變之二十三諦所迷則流轉生死由修禪定引發天眼見神我與自性各異自性所變息滅神我得以獨立說名解脫卯二破唯厭離便能解脫分三辰一正破二指示離貪三釋違教難今初若由現在苦厭離是瞋彼非離貪爾時有貪求餘故瞋苦為因故彼唯爾時住彼滅則自己仍依於自性若謂由苦生厭離心便得離貪破曰若如是由苦生厭離者是瞋相應非是離貪以彼厭心生時亦有貪着故以於爾時尋求餘安樂位故若謂相續生瞋則能離貪破曰懷瞋之士夫非由生瞋便成離貪以彼瞋心唯於有苦時而安住若瞋心息滅則仍依於自己本性之貪故初因成立以瞋恚是以苦為因故辰二指示離貪取捨俱斷故於刀割香塗觀一切平等說名為離貪外問若厭離不是離貪何為離貪曰阿羅漢說名離貪以於刀割香塗一切平等觀故以於所取與所捨俱斷貪着故辰三釋違教難經說修苦者意依於行苦我彼從緣生是無我見依空見得解脫餘修即為此故說無常苦由苦故無我外曰若修苦非解脫道經說修苦則成相違答曰此不相違意依周遍行苦說修苦故又我所說之彼苦亦非依於常我是從緣生故其修行苦非解脫道僅是無我見之所依故空性見乃是解脫道由修空見能解脫故經說由通達有為無常故而通達有漏皆苦由通達苦故而通達無我其理由即由空見而能解脫其餘所修即為生彼故卯三明彼等是生死非離貪有愛依止諸發趣非解脫惑業彼名生死者不許我所性則無彼受者造作受用相彼我亦應無如是計為離貪而有我執之補特伽羅名為生死者以未解脫煩惱與業故以非離貪及有愛心是依止一切取捨之發趣故若謂解脫生死者則應無彼我所之受者以不許我所性故若許爾者則爾時亦應無彼我以彼我是以造作業與受用果為相故卯四教令斷除薩迦耶見故欲解脫者當根除無始同類因種生諸薩迦耶見故欲得解脫者當根本拔除從無始同類因種子所生之薩迦耶見以薩迦耶見是生死之根本故寅三破自在派之解脫道分三卯一破能立二說違害三明解脫道今初教說如是事諸未見因者說教能解脫不能使歡喜咒種等儀軌非使人不生塗油火燒等我亦應解脫先重後輕故非能消滅罪使此重性無無體罪非重自在派說上述彼等雖皆非解脫道唯自在之言教是解脫道以用自在言教中所說之咒而咒種子則不生芽故破曰諸求解脫者非唯以自在言教宣說便生歡喜以自在言教對所說義是不欺誑未見如是事之因由故使咒過之種子不發芽之儀軌非能使人不生後有若果如是則塗油及火燒等即照自在教中所說沐浴塗油與燒護摩等儀軌亦應能使我解脫故若謂護摩能令解脫以燒護摩後將罪人稱之先重後輕故破曰僅由此事非能消滅罪由燒護摩使此身無重性罪非可稱之重故罪無體故卯二說違害分三辰一灌頂不能害三有因二破救三斷諍今初邪智及彼生愛思增上力生趣下賤處故斷彼不趣唯從彼生故即彼等能生彼思即業故能生因無失邪智及彼所愛相應思若以對治力斷除彼思則不趣向生死以由彼思增上之力趣下賤處而生故凡人生生死者即由彼邪愛相應諸思能引以唯從彼思而生故外問業豈非因耶曰離邪愛相應諸思外不須餘業為三有因自己即引後有之業故具足灌頂之士夫應生三有以有彼因未失壞故辰二破救趣與達所依彼從不見生不見滅無趣故是行非思隨有無轉故能生作根者見覺有功能非是由餘力彼等既有彼云何而不趣外曰彼應不趣三有作趣者與了達境之所依者謂諸根彼從不可見之業生由不可見之業力而滅故以是我之行為業非是思也破曰能作根之生起現見是覺思之功能應非由餘而生以隨思之有無轉故謂內有思惟乃有所作若無思惟則亦無作彼等具足灌頂之士夫云何而不趣三有定應趣彼以有彼邪愛相應之思為因故辰三斷諍若彼等無能灌頂等無間彼等由思力取轉與散亂及滅皆應無若謂於彼時無覺故不生諸垢覺相續彼等能若無活亦應無能對治與自品增則減增故罪流有自種灌頂不能遮常無觀待故次第生相違作不作同性造作成相違因果亦應一彼等若異彼作受者失壞功能亦能成他憶受等過都無所妨難全無念者故是從受生念外曰彼等士夫應不生三有以彼思等之功能由灌頂力所破壞故破曰若爾則彼等受灌頂等無間其由思增上取境於別境轉於餘境散亂及彼壞滅皆應非有以思之功能被灌頂破壞故若謂彼不生三有以彼死時則無覺故破曰若爾則彼生活時亦應無生覺之功能以諸垢染令覺相續之功能被灌頂力使無有故又有自種子之諸罪流僅受灌頂不能遮止要對治通達無我慧增長過乃損減若自品增長則愈增長故若謂唯思為因不應道理以常住我亦是因故破曰其常住我次第生果則成相違不待緣故是常住故又能作果亦成相違以作果與不作果體性相同故以常我為因先既不作果後又作果則成相違以我性相同故又因與果亦應成一體以常我為因故若謂彼等因果與彼常我物體各異者則計我是作業者與受果者便當失壞以與因果物體異故又常住我饒益果之功能應不成立以汝滅時果不滅故外難若無常住我應有他人所受餘人回憶之過失答曰以破常住我為因由他人所受餘人回憶及他人作業餘人受報等過失皆不妨害以全無常住我為憶念者故外問若爾念從何生曰念亦有因是從領受生故卯三明解脫道於四諦增益堅樂我我所此等十六相非真而愛著於彼相違義真性相了達善修之正見能破愛隨行若爾何為解脫道耶曰有於四諦性顛倒執着其於彼相違義十六真實行相隨順通達極善修習之正見是解脫道以彼能破貪愛及隨行故以於四諦增益堅固安樂及我我所等十六種非真實行相周遍愛着是三有之根本故寅四破尼犍子派之解脫道分四卯一破由有業身故流轉二破能斷業身之對治三破由斷果故業永盡四以自許相違破今初業身雖安住三因缺一故其生則非有如無種無芽尼犍子派說縱然斷愛若有業身仍當流轉破曰諸阿羅漢業與身雖仍安住然不生於三有以缺愛一因故以生三有須三因故如無種子則不生芽卯二破能斷業身之對治非斷業及身無能對治故無能故有愛仍能生起故為盡二雖勤盡業勞無義外曰斷除業身亦應解脫以生三有須三因故曰非業與身能單獨斷以無斷彼之對治故無斷彼之功能故以若有愛則業與身仍能生故若謂業與愛二法理應努力各別令盡破曰為單獨盡業勤勞無義以未斷愛不能斷業故卯三破由斷果故業永盡見種種果故比知業功能有多種差異故一苦惱事不能使都盡有行使彼生果報有減少非一切異類所應受果報若由苦行力使功能合盡為染分能斷應無染遍斷若苦行異染或即是煩惱彼即業果故則此不能使功能合雜等外曰前云無能對治故此因不成以由苦行消盡宿業不更作新業能解脫故破曰以某種苦行僅能使彼所生果有所減少非能使一切異類業都盡以一切苦行煩惱事不能盡一切業故以比知諸業功能各異故以見有可意不可意種種果故若謂由苦行功能使業功能合雜若一盡時則一切都盡破曰試問苦行為離煩惱是餘法為即煩惱若如初者應由煩惱一分斷一切業或無煩惱斷一切業以一苦行能斷一切業彼非煩惱故若如次者則彼苦行應不能使業之功能合雜以是惡業之果故卯四以自許相違破摧欲生過故能滅諸過者能害彼生業已作如何失非從業起過有患乃能作已遮則不作若無邪分別樂亦不起貪外問由貪愛斷業亦斷故許業無對治則成相違曰其能滅諸過失之達無我慧能害彼過所生之業以能摧壞欲生之我執因故已作之果如何失壞應不失壞已成就者不能斷故外曰如從愛起業亦應從業起愛答曰諸阿羅漢不從生過失已斷愛故從有患之業乃作過失已遮止者則不作過失故外曰從業樂果應生貪愛答曰諸阿羅漢從樂亦應不生貪愛以無邪分別故壬二善逝由救成證知真固無餘別善逝證義故較外道有學無學增上故世尊成就證知真實堅固及無餘之差別以是究竟救護故此處說善逝為證知者有所為義是為由救護果比知智德圓滿故世尊較諸外道及有學無學聲聞皆為增上以是具足三種差別之善逝故辛二因圓滿分二壬一加行圓滿二意樂圓滿今初為利他勤修智加行大師問彼善逝從何曰世尊是為利他勤修智加行之大師為先以具足智德圓滿故壬二意滿由彼須悲心義成為利他不捨所作故世尊以大悲為先以為利他勤修智加行故又成立世尊為定量士夫須成立以悲愍為先以自義雖已成辦然由悲心增上為利他而不捨說法所作故庚二結義由悲故善說由智而諦說說彼並能立成就其加行故是定量性世尊是善說以具足大悲心故亦是諦說以智德究竟故世尊是定量士夫以宣說智德及能立是具足究竟加行之補特伽羅故戊三以量稱讚之所為彼事讚大師為即由彼教成立為定量不遮比量故說凡生性者皆是壞滅法見由多種相顯此加行故無不生相因是比量所依明所立遍因亦顯了說彼世尊有無量功德為何以定量稱讚以成定量之事而稱讚大師者有所為義為顯即由彼大師之教而成立為量性故世尊雖說現量如何許比量耶曰世尊亦許比量以不遮比量故又說凡有生性者皆是滅法等亦見以多種行相宣說比量之加行故以因性無則不生為相之因是比量之所依故世尊亦顯了說彼因法之關係以正說所立法遍於因故
