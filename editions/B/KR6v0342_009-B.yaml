body:
  text: 法稱論師造僧成大師釋民國法尊譯編丑三廣釋現量不遣分二寅一說義之所為二說所聞之所為今初此現量妨害聲亦共稱為多事之自性由其不生起現種種覺故於聞無二現為彼故說義若捨棄此性現量能妨害彼自性是義餘是遮為相總是無事性彼非根行境集量論云現量義比量信稱於自依現量相違等五種相違自教自語合為一類名信解相違如上已說現量違害容易了解陳那論師雖未廣說然此亦有所當說者問何者當說曰說義言有所為義以聲於耳識無總別二相而顯現為令了解彼義故聲於耳識無總別二相以聲共稱為遮止多事之自性不生現總別種種耳識覺故聲是所聞若捨此者則為現量所妨害以汝是現量所成故彼聲自性說為義以是勝義成就故其餘遮止為相之總非根現量親所行境以是無事自性故寅二說所聞之所為以是總諸法成立非現故雖捨無違害言所聞顯示都非詮事故成就依彼故由彼力害故說聞根行境說聲名所聞者有所為義是為顯棄捨總諸法無現量違害故以總諸法成為非現量境故或問說聲非自相即可何故說聲非所聞曰聲於勝義名不能說以於勝義一切都非所詮事故說所聞名有餘所為以於根現量所行境之聲說名所聞者有所為義為令了解成立聲是所聞是依彼耳識故及由彼耳識之力能違害聲非所聞故子二於何有法不遣分三丑一正說二斷諍三結義初又分二寅一由害當時有法即害所立二由害無關有法不害所立今初一切立者自樂為所立法具彼法能害非餘法有法餘於餘有法雖害此何破此雖由相知言自有法者為成害有法亦即成違害由所依相違依彼亦違故餘如是相法說是所立故思唯妨害彼故言自有法問言現量義比量信稱不能遣即可何故說於自依耶曰說於自依有所為義一切為立者自所樂為所立之法若違害成就彼法之有法即違害所立若害餘法之有法於所立無害為了解彼義故如所作性非由違害常虛空德而為成立聲無常之相違因以除當時於餘有法雖有違害然於此成立聲無常無何破故若謂說於自依應無所為以害無關有法無害於所立由說隨自樂為之言即了解此義故答曰如是此義於解說所立相之言中雖由說隨自樂為之言亦能了解然說自有法有所為義是為成立由違害當時之有法亦即違害所立故由所依相違依彼能依者亦相違故除說於自依餘者或有思唯妨害彼聚義方是妨害所立以說立者所樂如是行相之法於有法上是所立故說自有法有所為義為遮或思唯妨害聚義乃是妨害所立故寅二由害無關有法不害所立此豈非義成實爾然有者唯破於有法許成就過失如說虛空等非由諸餘緣不生先無性非頓聲等因於此說破云如是虛空等有法性無事如是樂所立全無有妨害由此即顯示二俱是所立若妨害有法即破所立法故於彼妨害如是性有法亦所立非獨或問由妨害有法即妨害所立此豈非亦由隨自樂為之言義成立耶曰實爾然有立者於破唯有法亦許因有過譬如佛弟子說虛空等非由餘緣不生本無自性之常實以非頓為聲等之因故如勝論者破云非頓為聲等之因應是成立虛空非常實之相違因以破常實如是亦顯虛空等有法之自性為無事故或問如何答彼曰由破有事虛空應非成立彼之相違因由破除彼於如是成立樂為之所立全無違害故此說於自依者是顯由妨害有法即破所立法故說害彼所立以法與有法二者聚義即是所立故由妨害無關單獨有法非妨害所立立者意許如是法所差別之有法亦是所立故丑二斷諍若如是有害非頓聲等因樂等非由餘能生非如前若此因決定即成相違者漸作與無常無所相違故異品返有疑許此有餘別若謂由妨害當時之有法即妨害所立若如是者佛弟子對數論師所說妨難此中有害謂說樂等非由餘緣不生不能生之常實非頓為聲等之因故如前勝論者攻難也答曰若此論式中決定無遮為因者則成相違因然以漸次作義為因漸次作義非成立樂等無常之相違因以汝與無常性無相違故或問彼列舉之因為何等曰非頓為聲等之因許此是成立彼宗之有餘差別以於成立彼宗之返遍有疑惑故丑三結義由自所樂法是為所立故彼所依是害顯非唯有法或於餘所依由自聲顯示害餘法非害如是自有法亦說餘有法言自所依者是顯若妨害當時彼法之所依是妨害所立若妨害單獨有法或餘法之所依則非妨害所立何以故以立者自所樂法於有法上是所立故庚二似宗之喻分二辛一能別不成等非宗過之理二法差別不成等違害之理今初一切能立過皆妨害於宗雖爾唯與宗相屬是宗法待後支諸過說唯彼繫屬是故所依等不成非宗過或問何緣不說能別不極成所別不極成俱不極成等宗過能別不極成如對數論者說聲無常所別不極成如對佛弟子說我遍一切俱不極成如說我是和合因此等皆是宗過以於成立宗能違害故破曰若爾一切能立之過失皆應是宗過以於成立宗皆能違害故雖則如是然所依有法等不極成應非宗過以唯與宗相屬之過失方是宗過其觀待因喻後支之過失說是因喻相屬之過故辛二法差別不成等違害之理分三壬一以法自性相違表示二廣釋法差別相違三由彼應知二種違害有法之理今初此顯所立支有法法差別及有法自性諸有妨害者或問集量論中對於妨害法自性之似宗廣釋現量等妨害之理對於妨害法差別有法差別有法自性之似宗由現量等妨害之理何緣不廣說曰集量論對於妨害法自性之似宗廣釋妨害之理此即顯示妨害所立支有法差別法差別有法自性之諸宗皆是似宗以一切妨害所樂境所立之宗皆是似宗故集量論中廣說法自相相違過即顯示法差別相違等餘三過亦可例知故不廣說釋量論則對法差別相違過廣說對餘有法自相差別相違二過亦例知不廣說壬二廣釋法差別相違分二癸一明宗二顯害今初為顯彼義故略說喻方隅相應義實相依見有餘非不見非有別立宗則無為不見見無果欲成立有支立餘無差別是立已極成對於勝論妨害法差別似宗之喻略說妨害之方隅有所為義為顯對勝論派違害法差別有法自性之宗違害之理故問若爾違害法差別之宗是何等耶曰如勝論說由於微塵互相成就所造成義以實為相三法差別一成就重德二由彼所引下墜作用三為和合之因緣依於現量所見之有支離支實有是所立宗以立非現量所見非三法差別之有支離支實有之宗無所須故以見不現見之極微無障礙等果為成立障礙等故欲成立有支故及若立非三法差別之有支離支實有是成立已極成故癸二顯害分二子一正說二破救今初若此重下墜天平應低下故無德作用故非和合因故果自性等無見故非見故無則不生餘差別有害問對於彼宗如何妨害耶曰如重量相等兩組十枚泥丸此作九番合併之一組泥丸應無支分先無之重德與由彼引起之作用若有支分先無之重德與由彼引起之下墜作用者則與彼未合併之十枚泥丸在等數天平稱時汝之秤頭須應低下但不如是故若許爾者則此泥丸應非支分先無之重德與由彼引起之下墜作用之和合因緣以許爾故又彼三法差別之有支非量所見以彼之果與自性等皆無量見故勝論派立有支離支實有之宗不應道理以是立三法差別之有支實有宗其無則不生之餘差別三法是量所妨害故離支分外之實有支是法自相離支分外三法差別之實有支是法差別今是給彼差別出過非難離支分之有支也子二破救從微起實鬘稱故餘實重他說不可知如漸添棉絮彼若頓具足與別具塵聚若別俱稱時故重應各異磨沙等漸次數等不應理若從芥子起漸增成大聚其果如鬘等重不可知者芥子問重量微小極難知不知果重故彼因是可稱義無見如棉彼果亦無知如重不可知彼德皆無知磨沙等無增無低所表示色等增如增自根無見故餘勝論派云從微塵造起之實鬘即一串之許多實於天平稱故不能了知餘實有支之重性如漸放微小棉絮之重性天平不能了知破曰彼立者宗如兩組重量相等之十枚泥丸一組頓相應即頓放秤上一組別相應即漸次放秤上此諸塵聚各別及同時稱時其重量應大小各異頓放者應輕漸放者應重以漸放者有支多故以彼二組由稱所知重量有無眾多各異故外曰無增多重量之過失以後有支生時前者已滅故破曰如漸次合併之五金磨沙汝與未合併之五磨沙唯五磨沙等漸次數等不應道理以汝只有一有支重量彼則有增多五有支之重量故若謂微塵從芥子許輾轉增成大聚彼相應果鬘重量非稱能知極微小故破曰從微塵至芥子許中間之重量亦應極難了知以極微小故又應唯彼有支之因支分之重量是稱所量以有稱所知之重量然有支果之重量稱不了知故言如棉絮者法喻不同棉絮是現量所見其重量由稱可知其餘實有支無義可見彼果亦無可知故若謂雖無增多之重德然有增多之色等者破曰金磨沙等應無支分所無之功德增多如支分所無之重德無可了知如是彼有支之一切功德皆無可知故問若爾何以只說秤低下之差別無可取故唯破重德耶曰彼說秤低下差別無可取故者非唯欲破支分所無之重德是表示支分所無之一切功德皆無有故又金磨沙應無支分所無之色等功德增多以若有者則如其增多自根現量應須能見無可見故壬三由彼應知二種違害有法之理受許自語等由有諸妨害由所說一分餘喻亦應知勝論派立離諸支分有餘實有支之宗非是真宗以於汝義勝論派有自許相違自語相違及由現量比量共稱等如應違害故如上所說對勝論派法差別有害之宗違害之理由此一分為於勝論派餘有法差別及有法自性有害之宗所說譬喻違害之理亦應了知故己二破他派分二庚一破所立二破因宗相違之喻初又分三辛一破能相二觀所相事破三觀加唯字處破今初三世有境故非如是體性對他立爾時不樂亦所立能知時不成一切皆能知是故所立聲非依樂差別故喻因不成作為所例喻餘則兔角等不成皆所立皆有不成故故舉作業等差別而解答不能辨差別先未成性故非可所立支由誰受許相彼同所立性集量論云此言顯所立不成作義性如是說因喻不成皆應成解釋此義謂正理派云顯示所當成立是所立相破曰不成因喻非如是性而對他敵者立聲無常舉所作因爾時彼不極成因喻立者雖不樂為所立亦應成為所立以是顯示為所當成立故以是未來所立故以彼顯示通三世轉之有境故若謂言顯示所當成立者顯唯立者樂為所立者乃是所立破曰言顯示所當成立之聲非依了解唯立者樂為所立之差別以能知時之一切未極成者皆是能了知故對正理派之所立相以不極成之因喻為能破喻者有其原因以正理派說能知時之一切不極成者皆顯為所立故餘則若僅以不成為所立相者則兔角等一切不成者皆應許為所立也若謂不極成之因喻非是所立以能作所作作業三中非作業故說汝非宗支故四種宗中非遍許宗故正理派舉出三種理由證明不極成之因喻非是所立一所立宗是所作業如陶師製瓶陶師是作者輪繩等是能作瓶是所作業如是立論立論人是作者因喻等是能作即能立宗是所立即作業不極成之因喻是能作非作業故非所立宗二正理派五支中宗支乃所立不極成之因喻是能立支故非所立宗三正理派認為四種宗中以遍所許為宗不極成之因喻非遍所許宗故非所立宗破曰彼一切由非所作業等差別而作解答不能分辨便非所立以有敵者不極成故又說所立是宗支此解答亦不可證非所立以是敵者先未極成之自性故又應是宗相同以是立者所許故以隨立者所許即是遍許宗之相故此說正理派之三種理由的解答皆不能證明不極成之因喻非所立宗即以正理派許為所立之理由而反難故以他說不極成者為所立故故不論是否所作業是否說為宗支既不極成便成所立也又正理派說隨立者所許為遍許宗之相不極成之因喻亦是立者所許故應是遍許宗故彼三救皆不能救也辛二觀所相事破聚雖是所立言二互差別是所立爾時因喻相不成無故所立聲許於有法轉論何為非理如應隨自轉如立聲無常列有生為因時試問無常聲聚義何為所立耶若如初者則有生因敵者於汝與瓶二者無常同法應不極成以彼無常是汝之所立故若如第二則聲有法為成立聲無常故列因應無義以汝是成立彼宗之所立汝是敵者已極成故如集量論云若法是所立則無有同法有法為所立列因無義若謂聲與無常之合聚為所立者破曰應是聲與無常二者互相差別為所立宗如前說故若許爾者爾時汝派之因相喻相應不極成以說由喻同法能立所立為因之相由與所立同法有彼法者為同喻相以聲所差別之無常為所立故又有生因應非成立聲無常之正因以敵者於未成立所立之前由無常所差別之聲與瓶喻二者同有生法應不極成故又無常所差別之聲法有生於瓶隨轉敵者應不極成故若彼等已成者則所立亦極成矣若謂因喻相中之所立聲彼不於聚義轉故許於有法轉者外救云因喻相中所說所立不指聚義是指有法故無過失破曰若爾汝正理派為顯因喻之相何用造論應全無義以於因喻之相如應觀察立者自隨欲轉故辛三觀加唯字處破由顯能立勢知彼義所立因等相遍故於能立無疑前定辭則彼說宗相無義故勢於彼說了知有遍果若謂如佛弟子於宗相加唯字我等亦於宗相加唯字指定詞則不極成因喻無成所立之過失破曰若以顯示所當成立為所立相為指定云顯示唯所當成立為指定云唯顯示所當成立耶若如前者為遮已極成為所立故而說為遮能立為所立故而說耶若如前者凡是所立必為敵者不極成義為了解此義故正理派於宗相中不須加指定詞由顯示能立因喻相之勢即能了知故若如第二不須為遮疑能立是所立而加指定詞以說因等喻之相即引彼遍非所立故若於顯示前說指定詞者在藏文中將唯字加在顯示之前即在所立之後是所立之簡別詞但譯成漢文則應在顯示之後所立之前因漢文語法與藏文相反藏文為所立顯示漢文為顯示所立則彼正理派所說之宗相成無義故由上說兩種理由都不須在顯示前加指定詞故說無義由此勢可知是須將指定詞說在顯示之後在漢文為加在顯示之前即唯顯示所當成立在藏文為所當成立顯示唯言遍果者即遮不具為果也此說兩種遮一遮不具二遮具餘或餘具如云唯說所立即遮不具如云說唯所立即遮具餘後文說三種遮若如是者將唯字加在顯示之後漢譯加在前則不極成之因喻應是所立以是唯顯示所當成立故此過失仍存也此科文盛寶釋略有不同庚二破因宗相違之喻分二辛一觀相違義破二觀因義破今初相違樂無繫無益不共處如是因過失皆應成宗過宗過非待他此如前已說無樂是不成正理派云因與宗相違是為宗過如說聲常一切無常故試問彼因如何與宗相違若謂若一切無常則違聲常以聲亦攝於一切中故破曰若因與宗相違之義是與所樂境之所立無繫屬者彼義為是於成立所立無所利益為是於樂知有法不共處耶若是初者無益如是則一切因過應皆成宗過以於成立所立無利益故然不能許此已說宗過是不觀待餘因喻者故若如第二於有法不共處因於樂知有法上無亦應非宗過以是宗法不極成之因過破辛二觀因義破分二壬一不引無常為因二引非一切為因今初由具無常因聲如是說者如是彼應遮此中唯顯喻見有何餘義差別說餘已由總隨轉者非遍總隨轉此復有何果故說住於聲無常性即遣如言聲常一切無常故此量式由具足無常因若如是說聲無常者如是則遮彼聲常以常無常正相違故然如是量式應不引無常為因是以非一切為因成立聲常顯示異喻之似量式除此見有何義更無義故又彼量式非引於聲遍是無常以先於差別聲說餘常已後乃隨說一切無常之總言故又彼量式先別說聲常已後隨說一切無常之總言有何果利應全無果以引聲亦無常故又說聲上安住之無常性即能遣聲常亦有原因以聲若無常則違於常故壬二引非一切為因分二癸一正說二彼於聲不成今初於餘境違說故說聲為餘或問彼量式引何為因耶曰彼量式是說聲是一切之餘以說一切無常已而於餘境聲說與彼相違之常故癸二彼於聲不成分二子一明非一切所知為因不成二明非一切非聲為因不成今初總不捨別故彼亦不應理喻如有時說樺樹性非樹一切可聞言唯破於一轉故非非一切於一切差別無彼彼無故若謂引非一切為因我亦許者破曰為非一切所知為因為非一切非聲為因若如初者說聲非一切所知彼不應理聲亦攝於一切中故總一切不捨別聲故若謂因不極成唯聲非一切之語顯聲非一切故破曰唯聲非一切之語應非顯示聲非一切言一切之可聞即一切之言僅破唯於一聲轉故譬如有時言唯樺樹非樹之聲破樹聲唯於樺樹轉非破於樺樹轉也若謂聲應一切所不攝一切是無餘而汝只是一切之一分故破曰聲外餘一切差別應皆無彼一切中攝應皆為一切所不攝以皆是一切之一分故若許爾者彼一切中應無所攝以聲及聲外餘一切差別皆一切中所不攝故子二明非一切非聲為因不成分二丑一正說二斷諍今初能所知異故有法為因事能知不成故其有法為自能立不極成若如第二非一切非聲為因彼有法聲為自常之能立不成以有法為因事於能知宗法性不極成故凡是宗法則所知能知異故非一切非聲即是聲如以非一切非聲為因即是以聲為因聲是此量式中之有法又以聲為因故不成也丑二斷諍一切事無法有法差別故一切過相同否遮有別故若觀察勝義如是不成故於諸世俗事破自性他性此安住所比能比義名言於識成各異是依此施設如本性各異於彼究竟識現法有法異是名言所依此名言所立異覺無繫屬有法作能立故顯示不成別總法異故因與有因性喻如勤發故勤發聲無常雖是宗支分無害故有法非不成各異喻此有角體有角故非馬又知已退故所立時非支法異故差別為宗義非理外曰一切自性因亦應同有彼事因無異之過以聲所作無常一切事都無法與有法之區別故破曰所作性非同有與聲無異之過因與有法無異之過以與聲有所遮各異之差別故聲遮非所聞所作遮非所作世俗事聲所作無常各異諸分破一實自性與實他性以觀察勝義如是實性不成就故外難若聲所作無常無異實者則能比所比之名言不應道理答曰應理以此能比所比義安住之名言是依分別識所成立之異而施設故於異於非自之體性如實之自相究竟識現為法與有法各異彼即能比所比名言隨轉之所依故即彼有法聲作聲常之能立故說宗法不成以此聲與聲於法與有法名言所安立之覺中現為異相無繫屬故現為一故不現為異或問若爾有為應非成立有為瓶無常之宗法以與有為無異故若許爾者應非成立彼宗之正因也答曰有為成立有為瓶無常之因與有因各異有為是因有為之瓶是有因以與有為瓶遮法各異故以彼是別汝是彼之總故喻如說勤發之聲無常勤勇所發性故若謂勤勇所發應非成立勤發聲無常之宗法以勤發聲之能別法故破曰勤勇所發雖是成立勤發聲無常宗之支分是有法聲之簡別法然汝與有法勤發聲之各異應非不成雖是彼宗之支分然於成立彼宗之所立無妨害故喻如說此有角體非是馬是有角故又可說勤勇所發性於勤發聲無常為所立時已非勤發聲之能表支分以於彼時已表彼訖表用已退故若謂以所聞性成立聲常事因事即所依有法亦應無異也破曰差別所聞性說是成立聲常宗義之一分為以有法為因而不成者不應道理以彼與聲遮法各異故所聞性是遮非耳識所取義聲是遮非響義故觀所遮法各異又勤勇所發性雖是勤發聲之能別法然非彼量式之所立非彼量式之有法故無事因不異之過戊二親所詮為因分二己一標二釋今初諸因差別義為成易持故以宗法差別而總略宣說以法介詞異遮不具餘具及極其非有與能別所別所作同時說雖未加樂說即當知彼義語果遮止故如說黑善射或有猛善射或說青蓮花彼復遮相對而了知諸義如是稱及能聲樂說轉故故由遮不具以法別有法以彼所別法非無隨過依集量論云何故因似因多是宗法性故於因等義先說彼差別解釋此義或問何故不說因相而說差別曰以宗法九差別而略說者有所為義以為成立易於受持正因似因差別義故九種宗法如云宗法於同品有無俱各三於異品亦復有無二俱故謂於同品遍有遍無及俱分轉三種一一復於異品遍有遍無及俱分轉三三別故次說宗法如所作性他難曰若以聲簡別所作性則彼不隨餘法轉應無同喻如云所作性應不隨瓶轉以聲簡別故若不簡別則不成宗法答曰以聲有法簡別所作性因應非不隨聲外餘法轉以因法之介詞唯字加處各異能作多種遮作用故若云聲唯有所作則遮不具以有能別法與指定詞唯字同時說故若云所作唯聲有則遮餘具爾時將有所別與指定詞唯字同時說故若云唯有牛生犢則遮極非有以有生作用與指定詞唯字同時說故此說指定詞與能別因合說則起遮不具之作用若與所別有法合說則起遮他具之作用若與所作合說則起遮無作用之作用或問若未加指定詞是否也起了別遮之作用曰亦能起彼作用雖未親加彼指定詞然由說者樂說之意即能了知指定詞之義何以故以語言之結果即令了知所遮義故如云黑者人名善射或云有猛人名傳說中印度古代最善射者梵名阿租那善射或云蓮花青色或云青蓮此三喻雖無唯字如其次第表示三種遮義說黑者善射之語即能了知遮其相對不善射之義以如是共稱黑者善射即能遮不具不善射以語言是隨說者樂說意轉故然亦共稱有餘人善射故不遮餘具亦不須遮極不有也如是為遮有餘如有猛善射故說有猛善射即能了知遮相對餘具義餘人亦如有猛善射有猛善射較黑者早已共稱故不須遮不具與非有然須遮有餘如有猛善射者亦能遮故以語言是隨說者樂說意轉故說蓮花青色之語即能了知遮非有之義以除蓮花外餘亦有青色如是共稱故不能遮餘具義青色於蓮花不遍轉故不能遮不具義然須遮非有亦能遮故以語言是隨說者樂說意轉故彼有法聲以因法遮其不具而差別如前說故以彼聲所差別之法所作性非離聲外不隨餘法轉過失之所依以聲遮不具所差別故所作性非由是有法聲所別之法故為不隨瓶轉過失之所依以彼有法聲是由汝法遮不具義所差別故己二釋分二庚一攝為九宗法之所為二別釋難解者今初為成性果義說二因二返諍故說別共餘返是能立因有四種謂正因相違不定不成說此即足何故說九宗法耶曰解說宗法差別時說二正因及二相返相違因者有所為義是為成立正因之所相為自性果法不可得三種數決定故喻說差別不共所聞性與總共所量性二者有所為義或說有單返相及單隨相之正因遮彼諍已為令了知正因之因決定具三相故說餘三不定因者有所為義為令了知凡是正因要從一切異品返即是能立故庚二別釋難解者分三辛一說二正因之所為二說差別所聞性之所為三不別說不可得因之原因初又分三壬一說勤發為果因喻之所為二說所作為自性因喻之所為三各別說果性二因之所為今初除自性由餘非有遍所了因有錯亂故故果二種轉先有之諸識非定勤無間於能障根聲皆非近行故無待而有時無果相違故成為暫時果如此識是因或問何故不說勤發為自性因之喻而說所作性因之喻曰說彼所作性為同品遍轉自性因之喻有所為義以除所作性自性因外餘果法因無有於所了同品能遍轉者故以因於果容有錯亂故勤勇所發耳識果於成立聞吠陀聲耳識自因聲無常為先之同品作二相轉以於同品轉而不遍轉故若謂彼聞吠陀聲之耳識非自因聲無常為先以吠陀聲是常故破曰吠陀之聲聞汝之耳識應非決定由勤勇緣勤勇無間所生以於勤勇之前即聞常有之聲故以彼勤勇緣於除聽聞聲之障礙及於耳根與常聲自性皆不作利益加行故吠陀之聲有時不作果應成相違以不待緣能生果故如此勤發耳識是成立聞吠陀聲耳識以自因聲無常為先之果因以是成立彼之宗法即成為暫時有自因聲無常之果故吠陀之聲有時生識有時不生識即證明彼聲為無聲從聞此無常聲所起之耳識即是彼聲之果以果暫有證因聲是無常壬二說所作為自性因喻之所為由此成自性別說所作者若與果俱說不誤皆如是比量中已說說因為了知略說其差別其相無別異此即以果因說性依一分故由勤所顯所生同說喻或問由說勤勇所發即已成立自性因除此別說所作何為耶曰雖由此勤勇所發亦成立自性因然除此外別說所作性為自性因之喻者有所為義以與勤發果同時顯所作性為自性因之喻為令不誤認為一切自性因皆於同品作如是二分轉故既於同品轉而不遍轉即奘譯之一分轉或問因之差別豈非於自義比量中已說曰因差別義於自義比量中雖已宣說此中略說因差別者有所為義是為令了知於同品有遍轉與一分轉之差別而宣說故此中不說正因相之原因以正因相與自義比量中所說義無異故或曰若爾同品一分轉之自性因亦須宣說曰此解說宗法差別時未說同品一分轉之自性因無有過失以由說勤勇所發果因即亦說依同品一分之自性因故以是當知果因與同品一分轉之自性因以一譬喻即能表示以由勤勇所顯之果因與從勤勇所生之自性因二因同是勤勇所發故壬三各別說果性二因之所為有生無不生或自體無別彼與彼無誤為彼說此別相應等諸因非有如是繫彼有錯誤故說非是正因若是有繫屬是知彼能立決定無不生無定非能立問果性二因各別宣說有何所為曰分別宣說此果性二因有所為義是為說明與所立法若有能饒益即生無則不生或與所立法自體無別之因彼因與彼所立法無錯亂故或問如是了知有何所為曰是為說明依於相應等之因非是正因以於所立法容有錯亂故相應因和合因等皆外道所計以非有無則不生之繫屬故若謂此因不成亦有如是繫屬破曰如是則假立相應和合繫屬應全無義彼無則不生之繫屬即能立故凡是決定繫屬即是無則不生之繫屬若無決定繫屬則非真能立故若有無則不生之繫屬即是真能立不須再計相應和合等繫屬若缺無則不生之繫屬則計相應等繫屬亦非真能立故妄計彼等無義也辛二說差別所聞之所為分三壬一破於命成返遍二明命與所聞相同三即以彼理亦破餘正理派初又分二癸一正破二破救今初返性決定性說是無不生彼復無繫無是故隨行住自體或因事若成返當成故差別無返隨行亦非有唯依於不見說為單有返是故為不定餘則應能了正理派說彼命是成立活身有我有單返相之正因即單有異品遍無相而無同品定有相妄計為正因破曰應說彼命與我是成就無則不生之繫屬以是成立彼宗之返遍性決定性故以彼返遍亦是無彼繫屬無則不生則非有故若許爾者應亦安住隨行相因有宗必隨以許返遍故彼差別命既無成立彼宗之返遍亦非有隨行以彼我之自體或其因事若成立者返相雖可成立然命與我無繫屬故或問若爾與陳那說命是有返相應成相違曰此不相違以是依於唯不見異品說為唯有返相無隨行相故非說有返遍相又彼命是成立彼宗活身有我之不定因不共不定是唯不見異品故若餘謂返遍成者則彼命應是能了義之正因以既是成立彼宗之宗法返遍成就故癸二破救若謂由我返則命等應返由無命等故遍無我非爾不可由餘返而使餘返故彼性彼生者若我有可得彼得若無知無知此當成於極不現事見不見無成餘無見為性由何瓶等無其返無能知返遍如何成命等由有見若如是見我有無當了知由無何等因瓶等無所見若身亦無彼身亦無應理若少同法故雖異亦計彼所量故瓶等何不比有我若不許量性是一切許因無彼則何能建立事無事命及開目等從念欲力生彼從境根覺彼復互待緣從自種類生此性事是依唯隨彼進返計餘則無窮若謂由我返故命等當返以無命等遍無我故破曰若我返即遍命返亦非許有彼不可由餘我返而餘命返故以我命是無繫各異故若謂此因不成彼命是我體性或從我生故破曰彼命應非我體性以汝命是無常彼我是常事故又彼命應非從我生以與我不成因果故若有我作饒益則見生若無我作饒益則不見生彼性不成故彼無則不生之繫屬不成故若我可得汝則可得若我不可知汝亦不可知者則隨行返遍可得成就然彼我是縱有亦非可見之極不現事故說我是極不現事是就外計非自宗許我是極不現事汝說瓶等無我由何理成應不得成以彼我是餘縱有亦無可見為體性故若許爾者如何能成我返則命遍返應不能成以我返無可知故若謂瓶等無我不見我故破曰由於有法見有命等故了知活身有命瓶等無命如是若於有法見有我者則可了知活身有我瓶等無我瓶等由不見我應不能成立無我以縱有我亦非可見故若謂活身應無命以無我故破曰如由無覺因則不見瓶有命若活身亦無彼覺則活身無命應理然彼活身由其無我應不能成其無命以我與命是無繫屬之各異故若謂活身亦應計為異於有命計無命以與瓶少有無我同法故盛寶云若謂活身與瓶少於無我同法故如瓶無命其相異之活身亦應無命故計彼也破曰瓶等諸法何不比度有我應當比度以於活身於所量性為同法故若謂不許彼有我者破曰瓶等應許有我以有我是量所成故以量所成是一切應許之因故若無彼正量所成何能建立有事無事不能立故若謂彼我即覺之因破曰應非如是以命出入息與閉張目等是從念欲功用而生彼念欲功用復從境根前覺所生彼境根前覺復互待緣從自同類前念生故此內體諸事唯從爾許前念所生彼依有無能益隨轉還故若不爾者因應無窮以除從自同類前念外可計餘常我為因故不見有饒益之功能亦可計為因故壬二明命與所聞相同分三癸一相同之理二破計不同三破命是能了今初由錯亂所聞此命等相同非雖是有返此是錯亂故如何彼非唯從非所立返若爾義說彼非隨所立轉彼於餘亦同遮唯非所立是說住所立故說由義了以一即顯二故由無隨行不成此不亂若能破於破除立餘何為此所聞與命等返遍不成相同以返遍錯亂性相同故若謂非是相同以命是返相者而此所聞是返相錯亂故試問如何錯亂若謂所聞性返相錯亂以彼非唯從非所立異品返亦從同品返故破曰若爾由非所立隨轉應亦義說返相錯亂以從同品返即返相錯亂故若許爾者餘命應返相錯亂以不於同品轉彼於汝亦相同故由義了解於隨行隨返任說一相即俱顯二相言遮非所立法之語即是說安住所立法故由無隨行不能成立如是不錯亂之返遍以隨行隨返互不錯亂故彼命除於同品成立有外餘何所為都不應理以於同品破其所破即是立故此說若於異品遮即於同品轉若無同品轉則亦不能成立異品遮即此二相隨缺一相即二相不成其不共不定因如以有命證活身有我及以所聞證聲無常由缺同品隨轉相則返遍相亦不成立故非正因癸二破計不同分二子一敘計二破執今初所立無無返唯非所立無外計以命成立活身有我其因唯於非所立法異品無以於所立法同品無所返故以同品是無事故如汝佛弟子說我是無事故同品是無事以無事都不可為破立所依事故這外道欲借佛家說我是無事而證明其同品上不可破立則不可說同品亦無故唯是異品無即成為正因也子二破執分二丑一破計無事不可為破立所依二破以同品無返成立返相初又分三寅一明返亦無破二應斷絕名言三自不相同今初言無彼所返何許從無返無返即是立有事無亦有無事亦非有看愚夫觀察若從彼無返豈許因轉耶若非既破返是此如何破成立活身有我之同品言無命此所返如何許從汝彼同品即無事返不應許爾是無事故彼命應是成立同品有以於同品無返故若許爾者應看正理派此愚夫觀察之理命有事於同品無而計是有無事雖有而計為非有故這是說命有事於同品無而正理派妄計我有命於我同品遮其命命返是無事此無事是有而正理派妄計彼為非有即不許命返也總之彼一方面說無事我同品上不可破立而又立我有命破我無命是自語相違試問若彼命因於同品無返豈許於同品轉耶若謂亦非於同品轉即不於同品遮則應於同品轉破曰何故破彼命於同品轉理不應破以破於同品返即是於同品轉故寅二應斷絕名言除能立能破無餘聲名言彼於無無故此得無言說諸有則無破彼於無非有此理於眾生應無所破者若待處時破如其彼是有如是不能破如其彼是無如是無可破於此無事應得無可言說以除能立能破之外更無有餘聲之名言彼諸名言復於汝無事無轉故由此道理於諸眾生應無所破義以若法於諸有者彼法則無可破若破彼法彼法於無亦非有故盛寶解為以此無事不可為立破所依之理則眾生於此所知應都無破無之義與合理名言以於諸有事者不可無遮故合理破無之名言不轉彼無遮之名言不可為立破之所依則於無事亦非有故義亦難懂觀頌文原意似很簡單謂諸屬有事之法則無可破若破彼法彼法於無事亦非有破無事不可為破立所依故是以正理派之理難彼自宗若謂觀待時處有瓶可破者如此時處無彼時處之瓶破曰彼瓶觀待時處亦應無破以觀待時處如其有者則如是不能破如其無者亦如是無能破故寅三自不相同分三卯一成立聲義為破立之正所依二破是自相三如何作名言之理今初故依事無事非依於外事依聲義此中許一切立破無如彼有法彼等速繫現彼由聲轉故許有名言依若謂破立之名言皆應斷絕以彼若有則不須成立不能破除彼法若無則不須破除不能成立故此是對事物的破立與理論的破立未能辨其區別之諍事物之破立如以錘碎瓶用泥製瓶是毀有為破造成為立理論之破立如說諸法無我有漏皆苦是將本無者抉擇其無為破破其執有將本有者抉擇其有為立立其不無也破曰破立之正所依非外自相以是彼有正理違害故破立之正所依是聲義此中是依於聲義許一切立破聲義即言語所詮影相如言瓶衣思想上則現起瓶衣的影相是為聲義簡言之破立是破妄執立正義妄執與正義皆是分別心上的事非外界自相事物外此諸破立雖無如彼勝義成就然彼有法聲與彼等破立連繫顯現故聲義有三種謂有依有事依無事及通依二者之聲義故又彼聲義亦許為有之名言所依以是聲轉性故各種名聲於彼聲義上轉故如心上現起瓶相則口中呼為瓶卯二破是自相不爾則諸義一法立或破一切體立破其體無異故若異則如餘與餘破及立是則立與破不會一有法若不爾者而謂破立之正所依是自相者則於諸義如於聲上成立一法如所作性或破一法如非所作應無常等一切體性皆得成立常等一切皆得破除以所作無常體無異故若謂其因不成實各異者破曰成立所作無常與破非所作常等應不同會合於一聲以所作無常實各異故如餘瓶與餘衣破立非共同也卯三如何作名言之理種種法所依依一有法說一立如依彼諸餘如捨置若破如彼離其餘如觀待無義者名言如覺所顯示真性不觀察許為依異義無始習氣生世間義無害彼有果無果彼彼異一義猶如新增減由彼彼迷亂有所連繫故雖非具彼義能見異依者以是故彼等亦不知迷亂或問於汝自宗如何作破立之名言耶曰破立之正所依非是自相以種種法之所依有法且如依一聲說成立一所作性時彼所作性如新依止餘無常等如且捨置破非所作時彼非所作如新遠離於餘所作性如新觀待如是顯現故本來如是現似新得或問分別所現若無事者應為正量所害曰從無始習氣所生世間破立分別之義正量不能違害於事無義之名言如分別覺所顯示之真如理不觀察其為有無事輾轉依於異義自相之合理名言皆受許故或問若分別所現若無事者破立名言如何轉耶曰如一瓶義可有多種破立轉與彼不能盛水相異與彼禦寒亦異故有彼盛水之果無彼禦寒之果故又於聲上無常如新增長常性如新減少由於彼彼迷亂雖不具足彼所取義然能加行現見自相雖非現見然由依於各異自相之繫屬即能如是加行故此說先由比量分別了解自相之總相漸次修習即能現證諸法真理之自相也彼諸分別自雖迷亂然自不知以是不分現相與假立之覺故現相是真見到假立是見的假相丑二破以同品無返成立返遍有能立轉故彼非無猶豫由許非定量說無亦非理從無雖無返同品返懷疑於彼猶豫故異品返亦爾由於二蘊中隨一成決定於餘即成返雖然是不見於無見懷疑雖非遍差別有義是彼類不見有不定如刀不斷堅若謂瓶彼我非無應有無猶豫以汝瓶與活身難成立無我相同而活身有我之能立轉故又瓶無我佛弟子許無我故外計活身有我瓶等無我矯設詭辯破曰佛弟子許瓶無我其無我性應非正理以佛弟子所許非定量故若云不成者則活身應是無我佛弟子許無我故又從同品無事雖無返然命從同品返應懷疑以有無彼我起猶豫故若許爾者則從異品返亦應懷疑以於有我無我二聚中隨於一聚成就決定則從餘聚成就返故僅由於異品一分不見應不能成異品定無雖於異品一分是無所見然於雖有亦不可見之異品懷猶豫故由於異品一類不見不能決定為無於無我之差別雖非能遍然於無我種類之義容或有故如刀雖能斷堅木然刀不能斷堅固金剛癸三破命是能了分二子一由無相違是能了二由無相繫非能了今初有不見相違由何能遮疑此或定彼果彼性餘何有故從無我性此返亦懷疑縱然從彼返然由無我無不能成有我由何彼返無不許定有事如命於同品無返亦非有若因從同品無返由此因即應有隨行非隨行非返非有我無我懷疑無我返由何能遮應不能遮於無我有不見相違故若謂因不成者則於某上除決定彼我之果及彼體性餘有何事應無所有彼亦非與無我相違故此命應懷疑從無我返非與無我相違故縱然從無我返然由無我中無應不能成為有我以由何彼法無返而不許彼法定有故此說正理派自許相違彼說非無而不許定有喻如命等雖無同品返而說非有若命等因應於同品是有隨行以從同品無返由彼因故若云不遍者則應既非無我亦非有我以於同品既非隨行亦非返故子二由無相繫非能了分二丑一由無彼生繫非能了二由無一體繫非能了初又分二寅一能了觀待繫屬二彼於命不成今初轉由何自體何無不生成故彼是能返轉亦是能轉彼無則不生亦待別能立由見不見果彼等因果性如成立有煙山上有火轉有火之名言轉舉煙自體為因時彼火若退能使煙返由無火即無煙若無能益之火則成立煙不生故彼若無火則不生煙之繫屬是觀待特殊能立者以有能益之火則見生煙果若無能益之火則不見生即成立彼等為因果性故寅二彼於命不成分三卯一正說二斷諍三破救今初彼有有無定故非知餘義常有或若無彼無非有故諸果性各異從諸因生故無彼從餘生豈是彼生性聚功能異故諸事種種性若非作異者此行性應一彼命非由汝能了知活身中有餘義我以有汝而有我無定故若先有我然後有命或無我已則當無命此應非有以彼我是常實常有彼無非有故又彼命如何是彼我所生自性不應道理以無彼我從餘因生故以諸果性各異是從諸異因生故其原因謂諸有事是種種體性以從種種因緣功能生為體性各異故若謂非由異因緣生安立彼異體者則此一切有事行應成一體性也卯二斷諍此異非異作一性則失壞若一有多性火非火二性故餘能生彼為性即彼性若非能生彼彼豈從彼生如是因果等互自性決定如所見自性見果亦知彼若謂彼從異因緣生非能安立為異體如此煙既從火生亦從異彼之帝釋頂生故破曰一帝釋頂應失一性而成是火非火二性以是能生煙及無火之多種自性故餘帝釋頂應有火性是能生煙性故若謂非能生煙性者則帝釋頂彼煙如何從汝生應不生也如見從火自性有煙生則見煙果時亦應了知彼火以火與煙因果自性互決定故以彼煙從火生無火不生故卯三破救如水乳變腐如何多生一從濕功能腐二者是一性豈此異一體或異何濕性各住自體故有彼自性覺無異故說一如是火雖異然由於何分是知火所依由彼能生煙故如是了知待知火餘支從彼而生故煙於彼無誤餘果如是成煙及柴變支所依立火故彼非火非煙彼煙此即火若謂應從多因共生一果如從水乳生一腐果曰水乳二者是一種類是從一濕性功能生一腐果故若謂豈此水乳應是物異類一之二種體性以種類是一現見各別故若許此者物既各異如何是一濕性種類曰水乳是異物以是各住自體之異事故又水乳應說為一類為彼一類自性覺之因無差異故如是旃檀與柏木之火物雖各異而種類是一由從非火相返之分是了知為火之所依故煙即如是了知有火以是由彼火所生故煙於彼火是無錯亂以是從知火支分觀待餘柴之火所生故即從火所生故其火又是觀待餘柴而生火是煙之親因柴是煙之助緣故都是了知火之支分如是餘果亦應如是成立於因無錯亂以從自因生故若謂彼帝釋頂上無火者則彼上所起青氣升騰應非是煙以彼上無火故若謂彼所起青氣升騰是煙者則彼即是有火以彼青氣是煙故此因決定以於煙及柴轉變支分所依之赤色熾然安立為火故丑二無一體繫非能了如觀待自因無性知不生滅與所作性如前已廣說諸自性因應知若無自所立法則不得生以於自所立法繫屬之原因如應而繫屬故如前所說壞滅與所作性之關係如其所應專有名詞壬三即以彼理破餘正理派顯有返相同故說所聞性了知非因性此理比一切解說宗法差別時以所聞性為例喻由汝而了知命非正因即以此理應比度一切許有返相之因以顯示命與所聞返相錯亂相同故辛三不別說不可得因之原因分二壬一不別說相屬不可得因之原因二不別說相違可得因之原因初又分二癸一不別說因能遍不可得之原因二不別說自性不可得之原因今初由因能遍返宣說義返中不可得喻成故不別宣說此復士無見命等無返故說因有猶豫可見義說彼此即於有事亦不許事分能立唯遮性由於前二因亦能立非故或問為成立自性及果說二因已以何原因不說因與能遍不可得之例喻曰因與能遍不可得因於解說宗法差別時離果與自性因之外不別說汝之例喻亦有原因由說可見之因與能遍性返故果與所遍義即返汝之例喻即成就故或問因與能遍不可得因從何而得可見之差別耶曰彼因與能遍不可得亦是顯示於可見義不可得是無之能了以由士夫我無可見命等無返故以彼命因從成立活身有我之異品返說有猶豫故或問一切因豈非成立唯遮如何正因為果自性不可得三種決定耶曰一切因應非唯遮此因與能遍不可得因即於有事有法亦不許有事分是成立無遮前之果與自性二因正是能立勢成立非遮故如所作性因正成立聲是無常勢成立遮非無常即是非遮癸二不別說自性不可得之原因分三子一許自性不可得因二正釋不別說彼之原因三斷諍今初其諸可得有由可得非餘無知使知故許一不得喻無境故於彼則能遮有境知說及猶豫如非能燒故說名非是火其可得無者由不得非餘故由於彼有成彼因聲知可見若無見無名言即成彼雖是果法然由彼能成無覺聲猶豫雖然已有境而餘者於此愚故不隨說與已成同法唯使憶其名如由見不見成立為因果彼二果等聲為名言而列或問豈不許自性不可得因耶不說彼例喻之原因為何曰陳那論師為諸不知可見不可得為無名之言者令了知故許自性不可得之一喻其能立諸可緣為有者除正量所緣外餘非有故或問若爾自性不可得之例喻云何曰由可見境無可得故即於彼處能破彼法有境之智說猶豫由無所緣境即無緣彼之能緣心等如說某事非火非能燒故或問由可見不可得能成立決定無之原因為何曰由有彼可見不可得能成立彼無原因之聲智以安立可緣為無者除可見不可得外餘非有故若謂瓶可見而不見汝應不能成立無瓶以彼無瓶是汝所安立之果故以因於果有錯亂故能生所生之因果因於果容有錯亂能立所立之因果是互待法則不錯亂曰瓶可見而不見無瓶雖是汝所安立果然由汝能成立瓶覺聲疑之境瓶為無以凡是汝瓶可見而無見即名無瓶下至牧童皆共成故或問瓶淨無瓶之方處應不須成立無瓶瓶可見而不可得已成立故曰此境瓶可見而不可得雖已成立而餘敵者有不隨說無瓶之原因以於無瓶之名言容有愚蒙故此瓶淨之方處無瓶之義不須成立由示與已成立可見不可得即無之名言為同法唯使憶念無瓶之名故喻如若有能益之火則見煙生若無火則不見煙生因此成立火為因煙為果隨前餘義有無而轉還之作者名果與隨後餘義有無而轉還之作用名因彼二列為果等因之聲者有所為義是為易作名言故果法自性不可得子二正釋不別說彼之原因由因成立果此自性中攝故說因別時不別說例喻問以何因緣不別說自性不可得因之例喻耶曰此自性不可得因於說因差別時離果與自性因外不別說汝之例喻者亦有原因以汝攝於自性因中故是由能安立因成立所安立果之因故子三斷諍分二丑一正說二明唯不見不能成立決定無初又分三寅一明宗法由現量成二成立之理三餘應無窮今初由緣一領受或說已緣此或言無所緣分別則生覺由差別領受了知差別義若謂瓶可見而不可得汝應不能成立無瓶以汝量不成故曰瓶可見而不可得無量不成之過由緣一清淨方處之根現量能領受之自證現量或說已緣此方處或言未緣此瓶有分別者生此二種覺故或問若爾言緣一已足何為更言領受曰言領受者有所為義為令由差別領受了達差別諸義故寅二成立之理如是體領受此是異覺因覺別由自成彼等成彼義不爾無窮故都不能成異由領性差別遣餘者非餘故彼不可得即緣彼差別故此不可得由自現量知唯自是能了無彼轉建立緣瓶根現量與緣淨根現量二覺之差別是由自證所成立由彼二覺成立彼義之差別其領受如是淨處體性為行相根現量之自證即領受如是行相根現量之自證是能分辨此緣淨現量異於緣瓶現量覺之因故若不爾者任何淨處無瓶之能立應成無窮瓶可見而不可得現量不成故若許爾者應不能成立淨處與有瓶各異也此瓶可見而不可得是由自現量所了知以此瓶可見而不可得亦與別於彼瓶之方所可得同是一量作用所轉境故離於領受別於瓶性方處之現量其遣餘瓶執者亦非餘故以彼二同是一量作用所轉境故瓶可見而不可得於瓶淨處唯有自體有瓶可見而不可得即是無彼瓶轉建立之能了能了即是能立因無彼瓶轉之建立即建立為無瓶無瓶名言轉總之即是能了知無瓶之正因也以是成立彼之三相故寅三餘應無窮餘則義無性由不得而知其無所得性由餘故無窮若非由現量成立餘若由比量成者則瓶淨處無瓶義之能立應成無窮以無瓶由瓶可見不可得而了知彼瓶無可得復須以餘因成立故丑二明唯不見不能成立決定無不現不定故能破餘安立如他情無因不成分別等此無定果者非能成返相能成決定故因是依初說唯以不見除決定無外能破餘決定有之建立以唯不現不能決定為無故喻如於餘有情無有正因唯由不見分別等心活動數量不能成立為無也此唯不見瓶不能成立瓶返是不能決定為無瓶果故或曰與論師說不可得能成立決定無應成相違曰無違論師說不可得因能成立決定無者是依初可見不可得說以可見不可得能成立決定無故壬二不別說相違可得因之原因自式等或彼自體性為式或義能害體若有有無故成為互異故如堅事與滅亦餘量害故如定與有待若從餘因生何有決定滅若從事因生何用輾轉勞若因生餘滅故使彼滅者彼事即生於滅中有何過彼體性成者於我何能益於我非能益何為彼所待無待事終於如何非如是如彼臨滅時不欲依於住無待則剎那應不成有事如是即事性無事何能爾諸有不待餘彼有則決定如於感果業無障碍緣聚或問解說宗法差別時何緣不說相違可得因之例喻曰彼攝於自性不可得中自性不可得因不別說之原因前已說訖或問不可得因差別有幾曰不可得因自量式等總有二種謂以彼不可得自體為因及於所破法義以能害體性為因之二種量式故問於所破法有幾種能害曰有不共處相違與互排斥相違二種初如熱觸能害寒觸謂若寒觸相續有處由有汝熱觸接近時則寒觸成無故第二互排斥相違中有直接相違與間接相違二種初如常事與壞滅無常與常是正相違以與彼互異由遮表門違逆住故不共處相違是兩種事物不能共處互排斥相違是一事物兩種性質互不相能第二間接相違者如決定壞滅與待後起因而壞滅決定壞滅與待後起因壞滅是間接相違以彼由餘量違害而相違故或問如何相違曰如瓶豈有決定壞滅應無定滅以待後起因方生壞滅故若謂此因不遍以從瓶事因生能滅因從彼生壞滅故破曰即從自因而生壞因何勞彼輾轉而壞都無有義由自成已即決定壞滅故若謂由彼能壞因生餘能壞彼瓶方壞者試問若彼瓶事生為壞滅性中有何過失若謂不符本性者破曰彼餘義能壞因何能益我瓶應非能益以自體成就故若許爾者則瓶豈是彼能壞因之所觀待應非所待以於彼等非能益故又瓶云何終久非如是決定壞滅耶以是不待後起因而壞之有事故喻如瓶臨滅時不欲依住第二剎那或問若不觀待後起因而壞滅者則剎那應非有事曰如是不待而壞滅即有事性無事如何如是不待而滅非如是故若於彼法有無待餘因則彼等自成就已即於彼法是決定有如能生芽果之業無能障礙最後生芽之因緣聚會則決定生芽如是此瓶亦是不待後起之因而壞滅也此是自性因甲四論後義分三乙一明論義難解二明了解之勝利三誰造翻譯今初彼諸慧能無劣弱亦無通達甚深性彼諸增上精進者亦無能見最勝性諸眾生中我相等繼持善說不可得如眾河流歸大海吾論隱沒於自身吾法稱所造此釋量論如河流歸入大海亦將隱沒於自己慧身以眾生中與作者相等受持善說者極難得故以諸智慧功能不劣弱者亦無能通達二諦甚深法性彼諸增上精進者亦無能見甚深廣大最勝真實義故乙二明了解之勝利善辨理非理焚燒惡見林聖者親攝受開示正理路論日具百德惡慧捨畏離雖爾慧目淨能敷智者蓮此釋量論如同日輪能善分辨是理非理能燒常斷惡見稠林聖妙音尊親所攝受陳那論師所造開示正理道之論典具足如日之百種功德雖諸惡慧如梟避晝怖畏捨離然能開敷慧目清淨智者之蓮花故乙三誰造翻譯此釋量論頌是南天竺所生撓亂一切惡派美譽遍滿大地無比智者一切宣說正理者之頂珠法稱論師所造先由印度論師須菩提室利馨底善現祥靜與西藏善慧譯師譯次由迦濕彌羅國具善王論師與西藏具慧譯師修改後又由大地上無比智者釋迦室利跋陀羅等與西藏釋迦苾芻慶喜幢賢校正抉擇
