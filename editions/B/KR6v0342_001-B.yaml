body:
  text: 法稱論師造僧成大師釋民國法尊譯編法稱釋量論深廣難測度今依僧成疏略述少分義敬禮諸恩師及三寶尊今釋此論總分四科甲一解論題義二譯時禮讚三論文義四論末義今初法稱論師今造此釋量論是為廣釋陳那菩薩之集量論而造也甲二譯時禮讚敬禮聖曼殊室利童子甲三論文義分二乙一造論之支分二有支分之論初又分二丙一供讚二立誓造論今初敬禮於具足除滅分別網甚深廣大身遍放普賢光法稱論師在造論之前先頂禮具足三種圓滿之世尊為求造論能究竟故問如何具足三種圓滿耶答諸佛世尊具足自利圓滿謂永斷除諸分別網得自性身證得甚深圓滿報身並得廣大變化身故又佛世尊具足利他圓滿謂世出世間一切善妙普賢功德令諸有情隨其所應而證得故又佛世尊具足利他圓滿之方便謂遍放射說法之光明故諸佛說法即利生之方便丙二立誓造論眾生多著庸俗論由其無有般若力非但不求諸善說反由嫉妒起瞋恚故我無意謂此論真能利益於他人然心長樂習善說故於此論生歡喜上已禮讚欲何所作耶曰欲廣釋陳那菩薩之集量論也為何故造曰我法稱造此釋論無主要為利他人之意因為眾生多數愛著庸常俗論又無分辨善惡之慧力對於善說非但不尋求由妒嫉纏心反於善說起瞋恚故然我法稱對造此論仍生歡喜為使自心對於善說長時愛樂修習故乙二有支分之論分二丙一釋通達所量之能量自性二釋令他生起方便語之自性初又分三丁一明不現見義之自義品二明解脫道之成量品三明現見義之現量品初又分二戊一建立總體二廣釋支分今初宗法彼分遍是因彼唯三無不生定故似因謂所餘問此論既是為廣釋集量論而造何故違彼諸品次序而先說自義品耶曰分辨是義非義須要依靠比量智故為建立比量智除諸邪智故先釋自義比量也若爾何故不說比量之自相差別而說因耶曰由釋正因便能於比量除邪執故若爾正因之自相云何差別有幾耶曰如所作性即是成立聲無常之正因以是成立彼之宗法及是彼宗一分所立法遍於因之三相故這就是說三相就是正因的自相三相者一是宗法即前陳宗之屬性二是同品定有性即後陳法之同品事物定有因義三是異品遍無性即後陳法之異品事物必全無因義也此後二相在頌文中只云彼分遍便已包括因為後陳法的範圍既遍包因義則凡具因義者必皆具後陳法義即第二相凡無後陳法義者亦必不具因義即第三相奘師譯的因明論中說說因宗必隨宗無因不有即是此義又漢文論中之宗字有時單指前陳有法如遍是宗法性之宗字有時單指後陳法如說因宗必隨之宗字有時指總宗如宗因喻三支之宗字如是差別初學實難了解在藏文論中諸字各異故無此弊如是正因唯有果性自性不可得三種因以宗法與無則不生之關係於唯果自不可得因上決定故除彼三種之外其餘諸因皆是似因以彼諸因皆不完具三相故漢文之因字有時是因果之因即能生義有時是宗因喻之因即能立義或能了義亦難分辨藏文中二字各別無此混亂之弊又似因總有三種過謂不成不定相違若所舉因缺第一宗法相則犯不成過若所舉因缺後二相則犯相違過若缺後二中隨一相則犯不定過因與後陳法之關係若因於同品上定有於異品上全無則是正因若因於同品上無於異品上有不論全有或一分有則是相違因若因於同品異品上或皆有不論全有或一分有或皆無則是不定因如是四句已足同品有異品有同品有異品無同品無異品有同品無異品無不須用九句檢查但九句因另有作用不述戊二廣釋支分分四己一釋三正因二於定詞斷諍三釋逆品似因四廣釋無則不生初又分三庚一果法因二自性因三不可得因今初因法所有性若無則不生此果是正因問若以煙從火生故不錯亂者則灰渣亦應成能了因從火生故曰因火上所有自性若無者則定不生之果煙是於有煙山成立有火之正因以是成立彼之三相故庚二自性因若與唯有性繫屬體亦爾若與唯有無常自性相繫屬之所作體性是成立聲無常之正因以是成立彼之三相故庚三不可得因分二辛一不現見不可得因二可現見不可得因今初若諸量不轉於無而不轉為果是正因如不能見鬼之人緣鬼之諸量不轉即不起是成立於當前處彼不能見鬼之人不起決定有鬼之決知為果之正因以是成立彼之三相故此中諸量是因決知是果既無緣鬼之量則必不引生緣鬼之決知故就不能見鬼之人來說他不能起決定有鬼之決知因為他沒有見鬼之量故故名不現見不可得之因辛二可現見不可得因分三壬一體性二差別三斷諍今初觀待於差別知某無為果觀待若有則見之差別出瓶不可得之因是成立某處無瓶智說為果之正因以是成立彼之三相故壬二差別相違與果成因及體可見體生不成就是為無義者不可得四種問可現見不可得正因差別有幾耶曰無遮義者之可現見不可得正因共有四種謂有自性相違可得者相違果成就者因及自體可現見之體性不成就者之諸因故壬三斷諍以彼相違因可得為量式因由相違性無則是錯亂其相違果中亦待處時等餘則成錯亂如灰成不冷問若由相違果可得而成立無寒觸者則相違因可得亦當能成立無寒觸也曰若將由與寒觸相違之因可得而為因者則以柴草成立某處無寒觸之遍相錯亂以彼與寒觸因由無相違故問若火因柴草等不能遮寒觸者則火果煙亦應不能遮寒觸曰相違果可得因之煙於某等處遮寒觸者亦須觀待時處等差別方是正因餘不待差別則成立彼之遍相成錯亂故如成立某處不冷以有灰為因也己二於定詞斷諍分二庚一斷依前後之諍二斷依同時之諍今初所有從因聚比知能生果不待餘義故說彼是自性因聚生果力轉變相繫時於果不決定容有障礙故問若謂正因決定唯有果法自性不可得三種者則從因聚比知生果應非正因曰如麥種子與水肥暖等和合是成立於如是田上能生麥苗之自性正因以是成立彼之能立正因又不待餘因緣義即能生麥苗之自性故若問彼因何故不能比知決定生苗曰於彼成立決定生苗果其遍性猶不決定以因聚生苗果之能力在轉變發展相繫之間容有障礙發生故庚二斷依同時之諍同依一聚者由味知色等是比知因法如煙知柴變能未轉無味此即是餘因如是過去時了知是一者是從果因起問若謂正因決定唯有果法自性不可得三種者則由現在味為因引生了知現在色等之比量智不應理曰彼無不應理以由現在味為因而了知口內糖球上之現在色等者是從比知因法之果因而生故譬如由煙了知有煙山上由火燒柴發生變化之力即可比知柴之變化也由味與色依於同一聚親因若前味之能力未轉則必無現在味即彼前味亦是餘現在色之俱有因故由現在味為因了知口內糖球上現在色之比量智是從果法因所引生如是前說由現在味為因便能引生了知過去前味有引生現在色之功能及與自同時色等之比量智故己三釋逆品似因由因未和合比知其果者有餘無能故如由身比貪唯異品未見而見其總果因智是似量如語比貪等唯異品不見非即無錯誤容有錯誤故如比釜飯熟若唯以不見便說遮止者此是疑因故說彼名有餘或曰從零散因亦能比知可生果由體強壯而生染故曰以因未和合之零散麥比知能生苗果者不應道理以是成立彼之有餘因故彼無生苗之功能故如由身比度貪心若唯於異品不見而見總果以比因差別如是因智不應道理以如是因是似量即似因故如由語言比有貪等若謂以語言成立他人有貪心其逆遍成就逆遍即異品遍無性以唯於異品不見可成立故曰語言於成立彼之唯於異品不見非於逆遍全不錯亂以成立彼之逆遍容有錯亂故如與已食之飯同釜所煑為因而比餘飯亦熟也問有餘之義云何曰若唯不見而宣說遮遣之語言以成立他人有貪心此名有餘以是成立彼之宗法然於異品遣除是可疑因故己四廣釋無則不生分二庚一略標二廣釋初又分三辛一破他宗二立自宗三總結初又分三壬一破自部自教相違二明共同現量違害三破他部自許相違初又分二癸一明有繫屬二說違自教今初於因三相中為對治不成違義與錯亂故說須決定自在軍論師說唯於異品無所見即能成立逆遍是陳那論師所許曰陳那論師於因三相中說須決定者有重要義如以所作性成立聲是無常為使了知不成相違錯亂不定之對治故癸二說違自教錯亂對治中所說異品法若不見為果不說亦能知說無之語言非顯彼唯無若說無應理爾乃知為無若不見能遮豈是有餘誤有遮亦成因不成合非說差別成決斷正因不見故若餘量害者非不見而無如是於餘因容有餘量害不見故所觸見不具無誤若不如是而說唯於異品無所見即能成立逆遍者則為對治有錯亂過說法異品和合言凡非無常皆非所作不應道理以唯於異品無所見即能成立逆遍故若爾且與論說為欲對治相違不定俱說應理成相違失若謂法異品和合言是以了知唯於異品無所見為果故無過者曰法異品和合言僅為了知唯於異品不見其因而說不應道理以唯於異品不見其因汝即不說亦能了知故若謂為於異品了知決定無因故無過者曰其說於異品無因之語即法異品和合之語言應非唯使了知於異品無因是說因於異品無所見故若爾如何了知於異品無因耶曰由依彼語言爾乃能了解因於異品無以說於異品如何無因之道理說因法之繫屬故若由於異品不見其因便能成立逆遍者則以與已食之果同一樹生顏色相同而成立餘未食果成熟味力差別豈是有餘錯誤應非錯誤以成立彼之逆遍成就故若許爾者與說色等相同非味等亦定相同成相違失又有遮者即有逆遍者如以有命成立活身有我之因亦應成為正因以是成立彼之宗法逆遍成就故若許爾者則與論說其餘五種九句因中除二正因二相違因餘五不定因於正因或相違皆不決定是猶豫之因成相違失又於宗法猶豫不成與逆遍猶豫義喻相合顯非正因應非所說以於異品唯不見因便能成立逆遍故若許爾者則與論說宗法立故俱須決定如是同品或有或無等亦如應當說成相違失又差別所聞性應於聲上成常無常二品決斷之正因以是成立彼之宗法唯於異品不見成就故若許爾者則與論說差別者非決斷因成相違失若謂所聞性於聲上非常無常二品決斷之正因餘量於彼有違害故是則彼非唯由於異品不見而成其無於彼有餘量違害故如所聞性如是餘因亦應唯於異品不見不能成就其逆遍於彼容有餘量違害故曰以捨觸不見成立於可見之地等即不具捨觸之遍相應無錯誤以於成立彼之異品無所見故若許爾者則與論說若唯以不見而破見者亦不應理成相違失壬二明共同現量違害由處等差別物能力各異見一而謂餘定有則非理如酸果由見一枚成熟味力殊勝便謂餘處之酸果亦定成熟有勝味力不應道理以由處所等差別現見物品能力各異故壬三破他部自許相違我地有知等非能立為無豈唯不可得是因無能立豈唯因於異品不可得便是異品無因之能立以說活身有我如勝論說地等有知如順世派說乳中有酪如數論等其無所見非無彼等之能立故辛二立自宗分二壬一表因之遍相有待於繫屬二遮因之遍相有待於繫屬初又分三癸一正說二於喻上顯示繫屬三知繫屬之勝利今初故由彼繫屬自性遮自性或由其因法於果無誤故不爾遮一法云何餘亦遮如說人無馬豈亦非有牛如是一近故云何餘亦近如言人有牛豈是亦有馬由唯於異品無所見不能成其逆遍故如所作性由遮無常則汝性亦遮以是與彼無常相繫屬之自性故又如煙果由火因遮故汝亦即遮以汝於火無錯誤故若所作性與無常之繫屬不爾者云何遮無常一法餘所作性亦遮定不應爾譬如說人無馬豈唯由此便牛亦非有耶如是所作性一法相近故云何餘無常亦相近定不應爾以所作性與無常無所繫屬是各別故譬如言人有牛豈唯由此便亦有馬耶癸二於喻上顯示繫屬故定異法喻不必許所依由說彼等無此無亦知故喻彼性因事為不知者說若對諸智者但說因即足此果法與自性之正因成立逆遍時不必許決定觀待了知一切異法喻遮因之所依以說因法繫屬即能了知逆遍故由說若彼等所立法無則此因亦無亦可通達彼逆遍故按頌文義似是說於異法喻決定其逆遍時不許必須有所依即無所依亦能通達彼相故於同喻上顯因法繫屬亦有所為是對不知彼所立法即彼因之自性及因事者為令了知故對已了知繫屬之智者則不須為令了知繫屬而說若不知宗法為令知彼只須說因即足故癸三知繫屬之勝利故知繫屬者說二相隨一義了餘一相能引生正念若已了知因法繫屬於順逆二種遍相中隨說一相即能引生餘一相之正念以正通達一種遍相餘一遍相義亦了解故為令了知於一切異品皆無因故顯示繫屬有所為故壬二遮因之遍相有待於繫屬故無因自性有遮亦是因理應可得者無所得亦是如是無得因此雖說三種由於結構門有多種差別彼及彼違等不通達通達若由無因及自性則於某上有果及所遍可遮者是能遮正因以遍相之根本謂繫屬彼待繫屬故又若有瓶理應可得而瓶無所得亦是於某處成立無瓶之正因以是成立彼之三相故如是不可得因此處雖只說三種若由結構格式門則可分為多種差別謂彼因不可得能遍不可得自性不可得之三種及與彼因能遍自性相違可得之三種等字包括相違果可得與因相違之果可得等此等不可得因之事例余以前寫過一篇因理論稿其中敘述較詳惜未刊出今不暇重出也是由不通達繫屬即繫屬不可得及通達相違即相違可得之構結格式而分也辛二總結由是因果事或自性決定若無定不生非不見非見否則餘與餘如何有決定若法有餘因則如衣染色若法有餘因則應成他性後生故非因是果何能定非唯於異品不見而成逆遍非唯由於同品見而成隨遍要因與法或決定是因果事或同一自性因與法無則不生之繫屬乃能決定故否則謂離因與法之繫屬則其餘煙與餘火如何能有決定以煙與火無繫屬故又所作性應非成已必壞以是與無常有餘因之法故如衣所染色若所作性是與無常有餘因之法者則應與無常成為他性若爾則與無常應無繫屬既無同體繫屬亦無因果繫屬故若謂有因果繫屬者其無常為是所作性之因抑是其果耶無常且非所作性之因是後生故若是果者則成立聲是無常之遍相何能決定以汝是成立彼之宗法而無常是汝之果故庚二廣釋分二辛一決定表因之繫屬二決定遮因之繫屬初又分二壬一別釋二總結初又分二癸一決定果因之繫屬二決定自性因之繫屬今初煙是火之果果法隨轉故若無彼有此越出具因理無因不待餘應常有或無諸法暫時生是由觀待故若帝釋頂上是火性即火若非火自性如何彼生煙煙因自性火具彼能差別若煙從非煙因生則無因由隨轉隨遮見某隨某轉彼性彼為因故異因不生問應無煙於火不錯誤之能立以唯見煙從火生及唯不見從無火生不能成立又無餘能立故曰其因不成煙是火之果以果法由火資助之力隨火有無而轉故若謂無彼火而有此煙生者則越出具足因之道理以煙從無火生故若許爾者則應不待餘因緣而生以無因生故若許無因不待餘因緣者則應常有或是永無以諸法暫時生即有時生有時不生是觀待因緣乃爾若謂帝釋頂蟻垤之異名上應有火是能生煙火之自性故若謂非能生煙火之自性則如何從彼生煙應必不生煙之自性為火彼具有能生煙之功能差別故又煙若從非煙之因而生則煙應無因彼煙之自性不從異因生是以彼火為因故由火資助之力隨火有無而轉及遮現見某煙隨某火轉故癸二決定自性因之繫屬分三子一自性因之理二自性因之差別三自性因繫屬之能立初又分二丑一明因法同體繫屬二斷諍成立遣餘今初性亦無不生與唯有繫屬無彼則有體應無無異故問煙從火生雖不錯誤自性如何不錯亂耶曰於自性亦無錯誤如所作性若無無常則必不生之繫屬亦得成立以自才有便與無常相繫屬故若無彼無常則汝所有體性亦應無以與無常體性無異故丑二斷諍成立遣餘分二寅一標二釋今初諸法由自性住各自體故從同法餘法遮回為所依故從彼彼遮此因緣類別以彼差別故即善能通達是故某差別由某法了知其餘則無能故別異而住若謂彼所作性是將成立聲無常宗義之一分立為因者應不成就以所作與無常體性無異故曰聲之諸法是從同類法與餘異類法中遮回為所依者以是由自性力安住各自體性之所聞性故又如聲義由從非所作及常等彼彼遮回由此因緣可分為多種差別所作性及無常等以從非所作及常住等遮回故又於聲上所作性與無常之差別即善能漸次通達以於聲上須先成立所作性其後乃能通達無常故又所作性某差別是將成立聲無常宗義之一分立為因者非不成就以與無常別異而住故由言所作性某法所了知者非其餘無常語所能了知故寅二釋分二卯一廣釋有之遣餘二無之遣餘則易成立初又分三辰一破聲與分別為表詮二明為遮詮三於彼詮轉相斷諍初又分三巳一後心應無用二聲覺應成異門三破彼釋難初又分二午一所別事決定之後後心應無用二能別法決定之後後心應無用今初義自性是一體性是現事有何未見分為餘量所觀由見色法同蚌殼誤為銀若不由亂緣而計餘功德故由見於法見一切功德由錯不決定故當善成立陳那論師書中有云聲與諸因以遮通達非唯由表知法自性云何了知曰有餘量及餘聲轉故為顯此義故造此文義之自性如一聲體有何緣聲耳識所未見分要諸餘後量所觀察必無此分以是緣聲耳識所現量事其緣聲分別由表相於汝轉故然緣聲分別非由表詮於聲決定以於汝後量聲是無常之量有作用故如現量等無分別心以表相緣境比量等諸分別心以遮相緣境在奘師所譯之論中似未提及但在法稱論師之因明論中則作為一重要問題提出表相緣境是緣任何一法時即緣彼法上之一切差別義如聲上之所作性暫起性生滅性無常性苦性空性無我性等同時遍緣無所遮遣但對此等義不能決定要待餘心方能決定遮相緣境是緣隨一境時即須遣除該境之反義乃對彼決定如緣聲是無常之比量智是由遣除聲常而決定聲是無常此等智有分別有簡擇只能決定一義不能遍緣一切差別故餘義更須由餘量決定則不犯餘量無用之過問緣聲是無常之比量無用之過汝亦相等以緣聲耳識知聲是無常故曰如見白色等法相同誤認蚌殼以為銀質若無錯亂因緣於聲增益餘功德則後量無用然緣聲是無常之比量實有作用為除執聲常之增益而轉故緣聲耳識能見與聲同一安危之一切功德以由表相門見聲事故成立聲是無常之因及比量亦有作用由有錯亂耳識對聲無常不能決定故午二能別法決定之後後心應無用比量亦緣法決定一法時應緣一切法遮遣無此過故如是說因是遮遣有境餘則有法成餘有何不成於所見若知是總義分別不增益餘分除爾許行境定與增益意能所害性故說此於遠離增益轉應知盡其增益分為遣除彼故其決定與聲亦唯有爾許彼等境有異非僅緣聲分別即比量智若以表相緣法者則通達聲是無常之比量智亦應普緣聲上一切法以由表相門於聲一法得決定故而佛弟子則無此後心無用之過以說緣聲分別以遮相轉故故如是宣說因及比量是遮除之有境心以緣聲分別由表相轉則有過失由遮相轉無過失故若不許以遮相轉而說由餘表相轉者則有法聲成立時更有何餘聲法不成立以汝說緣聲分別是以表相轉故現量所見法如定知為青色之識應非以遮相轉以無所遮之增益故然不應許爾以是緣總義之分別故曰彼定知青色之識是以遮相為所行境是僅於不增益餘非青分而轉之定知故此因成就以說此定知是於遠離增益處而轉應知定知與增益之意是能害與所害性故又此等緣聲分別是行境各異者謂盡其所有增益分如聲之非所作性常性等為遮除彼故亦唯有爾許決定與聲轉故巳二聲覺應成異門餘則於一法一聲覺能遍非是餘境故應成為異門若非遮相轉而是餘表相轉者則於聲事之能別法應由一聲或一覺心即能遍緣以說所作性與無常之二聲即二語應成為異名即一事之二名以非餘境無所為義僅是聲差異故謂二語僅聲不同並無各別所詮境亦無各所為義巳三破彼釋難或說覺能緣各種別異義於各種差別饒益支功能無差別體性遍緣諸體性則有何所益差別不決定彼等體屬故知一則取二益法能若異彼等是彼何彼無益彼等如是則無窮若取能益一見彼於未見饒益非餘故取彼取一切若遮錯亂故取者亦許餘彼成遮境者其餘亦同彼於無增益境轉故餘自性諸定者不定如何是彼境若捨差別分現量所取中於差別若有證緣亦當證或說如勝論宗說各種差別義如聲與所作無常物體各異以聲能饒益所作無常故所作與無常亦物體各異以覺執為異故以是無成異門之過失曰若爾聲與彼饒益所作無常之功能為一物為異物若言一者則緣聲之分別應遍取饒益所作無常之功能體性而起決定以由表相門決定於聲其聲於能饒益各種差別之支分功能是無差別體性故簡言之緣聲心應遍緣彼功能體性以聲與功能體無別故若許爾者則更有何所益差別如所作無常不決定耶皆應決定以聲饒益所作無常之功能是一體性若了知汝則亦須緣所作無常二法以汝與所作無常彼等體性相繫屬故若言聲與彼功能物各異者則聲對於所作無常法彼饒益之功能等是彼聲之何事應非聲所屬事以汝與聲物體各異彼聲於汝不饒益故若謂如是饒益者則聲饒益所作無常之功能應成無窮以汝饒益所作無常時復須於異體功能作饒益故總之若謂緣聲分別只取彼聲饒益一差別法者則彼分別若取聲能饒益所作性差別法之功能即須總取饒益一切差別法之功能以見饒益彼所作性之功能彼與饒益所未見差別法之功能非餘事故由於彼諸功能是一體性所以現量見時一切俱見是由表明緣境故若分別心亦以表相緣境則彼取一功能時亦應總取一切功能若爾則後起之心仍犯無用過失若謂為遮遣錯亂故彼分別心雖總取一切差別法然仍須許起餘量者是則彼比量智即成為遮遣境者以是為遣除增益而轉之分別故其餘分別應同比量是遮相轉是於無增益境而轉之分別故餘於聲自性決定之諸分別汝所不決定者如何是汝之境即非汝境以汝是於自境以表相轉之定知故若謂緣聲耳識應於聲之所作無常一切義皆能決定以見彼一切故曰此不決定捨棄對聲之差別分析而轉之現量所取中若有通達其差別之緣者亦當能通達故通達即證知義辰二明由遮相轉分三巳一斷返遮與總別相等之諍二明遣餘之總三明立名之境初又分三午一說遣除者無過二表相轉則有過三聲隨欲轉應理今初其言從他遮及言從他返聲與決定等是隨名言作二雖各詮一由所詮他別以異囀聲別成立如異義捨不捨餘別彼二名差別是隨通達者欲樂之所依遍說物與事唯聲之差別故彼等所詮都無少差別欲了知彼義益彼或具作設以餘詮說都無餘差別故於遣餘境能除為具彼宗派所說過外難汝所言遮與所言返其實體為一為異若一者則異聲不轉言詞不應不同若異者則為總明異體所出過失亦應同犯曰其說聲與分別遮相轉者所言從他遮及言從他返之言聲與決定等非由所詮物體各異之力而轉是隨名言作故問若法與有法無異體者則與第六囀聲詮各異義應成相違曰如說牛與牛性之聲所詮非異此二語皆是從非牛遮返而說一牛故即遮其非牛也雖同說一牛然牛與牛性由分為差別之第六囀聲表其似有差別其緣因是由習慣於異體所詮立此名言之力而了解為異故問若無異物則立異名應成無用曰法與有法立異名者亦有作用其捨棄與不捨棄餘差別等彼二名言之差別是隨通達者欲樂之所依即為令其通達故遍一切境說有法物與事法之聲等其所詮物都無少許各異差別其捨不捨餘差別唯聲之差別而已其欲了知彼法與有法之義者對於聲明中非由字緣各異則所詮亦異如彼益或具作用設以餘詮說此皆聲明中字緣之種類除捨不捨餘差別之外更無餘差別故其說言聲與分別皆於遣餘境轉之佛弟子則能除為主張彼種類與具彼種類物體各異之宗派所說之過失以不許總別物體各異故午二表相轉則有過種類及具種若異則犯過若謂諸言句由事力而說不依樂說欲彼等第六囀分語等成過勝論派應犯不自在故非具彼所說之過失以許種類與具種類物體異故勝論彼等宗中應犯第六囀聲及分語等不可用之過失以許語句是由事力而說不依樂說欲而說故午三聲隨欲轉應理不待於外義諸語由說者如能詮決定即如是宣說諸妃六城等非異事安立或名空自性空性有何因說遣相者則無第六囀聲等不應理之過失以不觀待外義之語如說者所立名言決定能詮即如是宣說故問於他宗中第六囀聲等不應理有何原因曰如於一妃稱云諸妃安立為異此有何因都無原因實無異故如六城等言城立為非異此有何因應無原因以非一故如言虛空之自性此亦無因虛空與自性體非異故又虛空之自性名為空性此亦無因以虛空與空性無異體故巳二明遣餘之總分二午一境總之理二現總之覺如何轉初又分三未一世俗諦之世俗訓釋二成立分別所現唯於意樂為諦三明彼執錯亂今初依於諸異事現為一義覺由其自體性障蔽餘體性由彼能障故體性雖各異蔽其各異性有諸法體性現似非別異問如何為分別所現之總曰如依諸樹各異之事現為同一種類樹義之分別覺此覺即世俗由其自體性同一樹性能障蔽餘樹體性各別樹性為所取境故能障即世俗義於分別心所現遮其非樹即各樹之總諸樹體性雖各差異然於能障蔽異性為所取境之分別前覺諸樹法是從非樹遮回之體性似非異種類故未二成立分別所現唯於意樂為諦彼由意樂力宣說為有總由彼所遍計於勝義中無諸別不隨行餘隨行不現非離知各異如何隨餘義其於分別所現之總是由意樂力宣說為有以彼是分別所現如彼分別所遍計於勝義中無故以諸各別樹互不隨行此樹非彼樹其隨行之餘體總於不錯亂覺前無所現故問分別所現從非樹遮回即樹的概念豈非緣樹分別之法云何勝義無耶曰分別所現從非樹遮回如何隨餘義各別樹而行必不隨行以彼非離分別知有各別異體與彼知同一安危故未三明彼執錯亂故執義一體此分別顛倒名義諸具者互異即此種達一知義等成其為一義有雖是各異由自性決定猶如諸根等如見藥雖異或共或各別能治疫病等餘物則不爾無別故非總田等雖別異彼等應無別堅固無益故其於各別樹義執為一體之分別是顛倒覺是執非樹為樹之心故問若分別所現從非樹遮是無事者有為法名有事無為法名無事是因明中常用詞緣樹分別應成無因曰不成無因以具樹名義之各別樹互異物體即此緣樹分別之種子故問若諸各別樹物體各異其總是常是無事者則生一類果相違各別樹是多體緣樹分別是一體則多因生一果故說相違曰雖各別樹物體各異其總是常無事然通達一類了知樹義等成辦其一果義以自性決定其功能故猶如根等及如諸藥物體各異其總是常無事然共和合或各別用現見能治瘟疫等病其酪等餘物則不能治若謂是藥總常法能治疫病者應非藥總治療疫病以汝是一切各別藥所共有故若汝能治疫病者則各別諸藥田地等雖異功能應無差別故由其堅固應於其果不饒益故午二現彼之覺如何轉分三未一標二釋三結今初緣性分別覺無義似有義從非彼果義異究竟而生彼體似外一似從餘遮返觀察支無故非是彼自性問分別心所現從非樹遮返於各別樹隨不隨行若隨行者則諸各別樹應成分別之所取境若不隨行則說是各別樹之總應成相違曰緣樹自性之分別覺雖無所取義然現似所取義以是從非彼樹果義相異而生決定能得究竟自相樹故彼緣樹分別之體性似與外樹為一似從遮餘非樹而返然非即彼樹自性以無可觀察之支分能作義故能作義是有事之相未二釋分三申一總與共依之名言轉二轉之原因三作彼建立之所為今初知所有諸義謂遮返體性故似非各異現從彼餘返其總與共依為所行境者由知與言說廣作錯義名諸法一切名依於互無雜故遣餘為境若與事有屬是得事之依如比量所說雖同是錯亂然非從餘得如燈光求珠知所有義即所現遮非樹彼諸義是以總與共依為行境之知與言說廣作錯誤義之名言謂遮異類為體性者故現似非異類現從餘同類返故問若名言錯亂應不能得自相曰諸法之一切名言是以義之遣餘為境者以是依於互無雜亂自相之合理名言故凡與實事有繫屬之名言即是能得實事之所依故如依果法及自性因之比量時所說雖同是錯亂然得不得自相並不相同以從餘執聲常增益不能得自相故如從燈光求明珠然誤以燈光為珠光申二轉之原因彼雖多一果非彼果依餘由言說及知作一名言轉如是一作多彼普顯事故從彼非果義異故知多法總與共依作一類果之各別樹雖多然由言說及知作一類名言而轉以從非彼樹果依餘相同故如是雖一樺樹然有共依名言而轉之原因以從非彼樹果義而異亦從非樺樹而返種種遮法量了知故顯示一法能作多果亦有所為其作多果是為普達彼實事故申三作彼建立之所為此聲義共依雖然非實有如共許而說此於事非有法有法建立如異非異等是不觀實性如世間所許唯依如是許遍立能所立為入勝義故諸智者所作諸勝義之義非自雜無異其體一及多是由覺所染言總言差別此別於覺義從此及餘遮觀察法差別能所立分別失壞見事故別總相雜中自相非所取其總別相等都非是所取諸眾多差別於一不可故此聲義與此共依於實事非有以於勝義雖非有然於分別如世共許而說故問作此諸建立有何所為耶曰法與有法之建立及如異不異之總與共依是不觀察於真實義中有無唯如世間所共許即依如是許而建立一切能立所立是諸智者為令入勝義而造故問以何因緣說實事不成耶曰言總言別之差別唯於覺所現義中有於實事無以於異物現為一體及於一物現為眾多是由覺所染故爾然勝義諸義非自然相雜合為一於一物異物皆非有故問若無實事則法與有法如何應理曰即此分別所現便可觀察法有法之差別以從此同類及餘異類遮返故問若於分別現自相者則自相應成分別之所取境曰分別能立所立之覺不以自相為所取境失壞見實事為所取境之力故問與論說差別與總和雜而緣則成相違曰論說差別與總和雜而緣中非說自相為比量所取以彼自相總別相等都非勝義所取故諸眾多差別於一自相勝義皆不可故未三結彼體從眾返彼如是通達聲分別非有於總性轉故彼聲體性從同類異類眾相而返唯如是通達之聲及分別亦皆非有以聲與分別唯以總相於境轉故此中所說自相共相勝義世俗皆與一般所說不同諸法之自體實事為自相為勝義諦諸法由分別假立之現相概念為共相為世俗諦勝義是有作用法世俗是無作用法此等差別甚多不及煩述西藏寺中初學之攝類論即專講此等名相差別為學因明論作基礎準備者也巳三明立名之境分三午一破二立三斷諍今初諸聲顯立名彼為名言作爾時無自相故彼中非名為使人了知能作成其事為辦彼故轉於義說其名其類非能作若具彼能者何故不直說無邊故此同若謂聲與分別不以總相於境轉以彼不待遮非而於自相安立名故曰彼立名時之樹自相非樹名之所趣境以汝於言說時已無故以諸言聲是顯所立名義為於言說時令了解其義而作故若謂總常法是名所趣境者曰總類常法應非名所趣境非能作事故以安立名言是令士夫了知能作事後為成辦彼事而轉乃於諸義說彼名故若謂具彼總類之各別樹能有作事於彼立名問曰何故不於各別樹直接立樹名若謂於各別樹不能立名無邊際故曰若爾別具總類之各別樹亦應不能立名此亦無邊相同故午二立作從非作返相同何不作具彼過同故寧不須餘類從彼遮餘已即轉說其聲由此從彼等不斷彼如何若此有決斷諸聲之所為豈非唯爾許汝餘總何為問若爾於何處立名耶曰能作樹果與從非能作返相同何不於彼安立樹名理應安立以彼能作樹用又於一切各別樹隨行故若謂前說具彼無自在故之過汝亦同犯以遮返與總類義同具遮返與具總類義同故曰實不相同即寧使相同安立名時亦不須餘義之總類以許遣餘者不須計餘義之總類不許遣餘者即計餘義之總類亦不能成其所為故其理由謂言樹之聲為決斷不決斷非樹若由此言樹之聲不從彼等非樹決斷此樹者則言樹之聲如何能使了知彼樹必不能了以不決斷是樹故此因決定以從彼樹遮斷餘已即向樹轉為使知此而說樹聲故若謂此言樹之聲已有決斷非樹者則汝勝論者計立名時須餘義之總復何所為全無意義諸聲之所為豈非遮斷非彼了知其義唯爾許耶午三斷諍分三未一破不能知多二破總執從總生三總聲於義無欺今初諸別雖各異然見彼諸義能作彼彼事見餘亦離餘為境之諸聲結合能了知問若諸別樹無常事總而是異物者則認識為一類不應道理曰諸各別樹雖無常法總而物各異然可認識為一類由先見諸樹能作彼彼眾事後見餘諸各別樹亦知離餘不能作樹事以此為境之諸言聲分別結合前後諸樹便能了知為一類故未二破總執從總生分三申一破總執從唯總生二破從總助之別生三破從別助之總生今初如餘亦彼覺非從唯總性若常唯知彼應不知別故爾時終不取具彼繫屬故不決定具彼如何立名言如餘勝論派彼總覺亦非從唯總性為所取義而生若常時唯知彼總則應不知諸別故若謂不知諸別者則爾時終不應取具彼總之諸別繫屬若許爾者則如何於具彼總之諸別法安立名言耶應不能立以於具彼總之諸別法不決定故申二破從總助之別生若謂一事助諸別為知因豈一事能除彼等差異性異故亦不許彼等一識因若謂多待一能生非異覺彼等各各無彼一亦生覺彼等無能故其覺無能緣青等於眼識功能各見故合亦能諸別任何亦非爾若謂由一總事所助之諸別法是總執識之因者此不應理豈彼一總事能除彼諸別法之差異性耶必不能除故又物異故亦不許彼諸別法為一總識之因故若謂別法雖多然待一總事類非異故能生一分別覺曰總覺應不能緣諸別法為所取義以彼諸別法於汝無饒益之功能故以彼等別法各各無時由彼一總亦能生覺故若謂不定如無青色時黃色能生眼識然彼青色仍有生眼識之功能曰此不相同青黃等色和合亦有生眼識之功能以現見各各都有饒益眼識之功能故然諸別法於總覺應無饒益之功能若各別若和合任何都非能如是生總覺故申三破從別助之總生分二酉一出過二破救今初若待彼隨一乃能非唯總彼等若益一云何非一覺此成彼等果能益即能生若謂要待彼諸別之隨一法其總事乃能生總覺非唯總者曰彼諸別法云何不能饒益一總覺應能饒益以饒益一總故此總應成彼等諸別法之果諸別法能饒益故此因決定以能饒益者即是能生之因故酉二破救若現非異覺不許從異者覺所現各異執彼等同故若謂彼等同云何覺取異同一果彼等果覺亦各異達為一因故以覺無各異以一覺因事諸別亦不異彼離非彼果其餘隨行事未見故破故名了彼為義若謂總覺不許唯從諸別異法生以唯現非異故曰其因不成總覺所現是各異故執諸別法謂彼等相同故若謂既執彼諸別法相同云何其覺復取為異耶曰諸別樹是一種類同作一類果故若謂因不成諸別樹之根覺果亦各異者曰緣諸別樹之諸根覺亦無異類是通達一類之因故又諸別樹類亦不異以是通達為一類之一覺之因事故若謂造成一類果者即是常事總曰彼造成諸別樹果為一類者非常事總以是唯離非彼樹果故除諸別法應無餘隨行之總事以未見故前已破故言樹之名有其意義以了知樹之遣餘為義故未三總聲於義無欺於彼非能作現似能作體以離事各異唯事為種子能生無義覺永斷不能作支分體性故事異為依故許義不欺誑故遣餘有境依能作體故問若樹聲詮說分別所現者則於自相樹云何不欺耶曰於非能作彼樹義而似能作彼義之體性者及離非樹事而各異之唯事為種子者能生無所取義之分別覺及言樹之聲許為於義無所欺誑以永斷不能作樹義是了知為樹之支分體性故及是離非樹事以各異為所依之合理名言故是以遣餘為境是依能作樹義為體性之合理名言故辰三於彼轉相斷諍分三巳一斷了達互依之諍二斷遮詮不遍於聲之諍三斷後有境無用之諍初又分二午一諍二答今初有作如是說若由遮非樹而執樹義者以二者互依若無一執時二者俱不執故立名非有行者派童女取等作如是說了知樹與非樹二事之心應互相依以由從遮非樹門而執樹義故若許爾者彼二執中隨無一執時則二執俱無是故樹名終不能立也午二答分二未一以相同破二明自無過今初彼等立名時遮不遮非樹若遮如何知尚未執樹義若名不除彼則諸立名者應非斷彼已而轉如樹別若遮餘不立示前住一樹說言此是樹設立名言時亦當了知彼故此無過失言此亦是樹或言唯此者過失不可免如彼等敵者宗立樹名時為遮不遮非樹耶若言遮者為樹立名之人在立名之前如何知非樹應尚不知以尚未執樹義故若由樹名不除彼非樹則諸安立樹名者應非遮斷彼非樹而於樹轉譬如樹聲不斷樹之差別若謂遮餘不能立樹要指示現前安住之一總樹說言此是樹於樹總常事立名次於立名言時亦當通達彼總常事故無相同之過失曰汝行者派不能免此相同過失若言此亦是樹或言唯此是樹二種立名決定任作何說皆犯上述之過故未二明自無過了知一類識住一續知者彼非彼因義本性能分辨彼覺所有事現為覺因性及離非因性雖似一體性自能知為異於異立言詞由此了知覺錯知似一事外曰若無總常事則有了知樹與非樹之心互相依賴之過曰無過了知諸別樹為一類之識安住一相續之知者對於彼樹與非彼之因義本性各異能分辨故外曰若無總常事應無樹名之境曰不爾彼執樹之分別覺中所有事現為分別覺之因性及離非因之體性雖現似一體性然自能了知彼樹異於非樹故於各別異樹立樹言詞故外問若無常事總則由樹聲應不了知是樹曰不爾由彼樹聲了知樹之覺錯亂於各別樹事了知似一類故巳二斷遮詮不遍於聲之諍分二午一斷遮詮不遍於別聲二斷遮詮不遍於遣餘之聲今初覺從某義遮向某義轉故善安立其聲定取其義故餘立名無義故所知等語於名言安立亦有所遮除問如言瓶之聲有所遮故可是遮詮言所知之聲應非遮詮無非所知之所遮故曰善安立其聲有所為義是為定取其所詮義故是為使覺從某種不樂義遮而於某種所樂義轉故若不爾者餘則立名無義以聲非遮不樂義而趣所樂義故為破立義設立名言之所知等語亦有某種所遮除以斷不樂義而趣所樂義故午二斷遮詮不遍於遣餘之聲分三未一明聲之境二顯彼是論師意趣三解釋教義今初若法從彼異遮彼從彼異差別相同因現相者安立顯論者問遣餘之聲是否遮詮若遮詮者應成無窮若非遮詮則說一切言聲分別皆是遮詮應成相違曰樹之差別從諸非樹各異相同之因謂現樹相於彼安立樹聲若法從彼異遮彼非樹而安立樹名故未二顯彼是論師意趣即由從餘遮能達彼法分是師所宣說即從遮非樹所現是言樹聲之境此是陳那論師所宣說如云由從餘義而遮即當通達彼事一分又云聲唯詮遮餘義簡別之事又云聲遣餘聲義而詮自義未三解釋教義此無少體性從諸聲通達即了知遮餘其中無某別通達某餘義亦非作二聲非互相有故無事見具事是由覺染壞是故非勝義餘則從事遮即不成為事說此異此故此從非樹遮返所現無少體性是增益故其通達樹中都無由某遮非樹所簡別而通達之某餘義以由言樹諸聲通達遮非樹所現之門中而通達餘遮非樹故又遮非樹而詮樹者亦不須作遮非樹聲與言樹聲之二種聲由說樹聲即了知遮非樹故以樹與非樹是正相違非有互依之第三品故又此現從非樹遮返亦非勝義以從無事見為具事是由覺所染壞故若餘是事者則現從樹事遮返應不成為樹事以與栴檀物體若一若異皆非有故若言異者則栴檀應非從非樹遮返以與現從非樹返物體異故不能許爾以說此栴檀異此非樹故巳三斷後有境無用之諍分二午一明前後有境行境各異二自他建立應不應理之差別今初若遮一雜義以一聲或因作事彼全無所遮事所遮若從能詮中無餘皆通達由事功能故多果一所依或曰若無總事應以自相為聲所詮自相分故則後有境應成無用曰若於聲上就覺中遮一合雜之常義則言聲無常之聲或成立彼之因於彼聲中全無以遮常事之一切法為所詮即非以聲上一切法為所詮只於聲上遮一常性為所作事故若從某法之能詮中通達一切分者是由事之功能力故非由言聲能詮一切分故無後有境無用之過以言所作無常之聲多果於一所依轉故午二自他建立應不應理之差別分二未一總與共所依應不應理之差別二立名應不應理之差別今初若示一遮時不斷餘而住彼遍彼現一爾時就覺前成為共所依若聲能遮遣當觸於事法說彼於彼有一事非能詮覺不現可現無事決定故故遣餘有境諸聲及覺性亦說為總境事無彼等故事唯一體故覺何見體異一法隨行還一義非行境若異則無別名言應無因一切遮有故無彼等過失或曰若無總事則總與共所依皆不應理曰若示一遮非青時言青之聲不遮斷餘鄔波羅而住以現見彼青遍彼鄔波羅故青鄔波羅花就覺前是共所依以是現為具二種遮之一有法故彼言瓶之聲若觸瓶事之法則說彼法為汝所有遮非瓶故其一總事非是能詮以無總事量決定故以若有者無錯亂覺應可現見而無所見故以總為境之諸聲及覺性亦說為遣餘之有境以說遮者即佛弟子總與共所依皆應理故說常事總者總與共所依彼等非有故如何非有如瓶與金瓶為一為異若如數論者說物體唯一者則瓶與金瓶云何覺其體異耶應不見異以與金瓶是一體性故若許爾者應與彼為一若是一者則於瓦瓶隨不隨行成二種性以是瓦瓶之總即隨行又與金瓶是一故即不隨行不能許爾以一法於一義非既隨行又從彼還為行境故若如勝論者說物體異者則無差別共所依之名言應成無因以總別各異故於一切遮則無彼等無總與共所依之過以於同類異類一切遮中皆有故未二立名應不應理之差別分二申一自宗應理二他派不應理今初為顯彼果故異法同一果老者說一聲是對無彼果遮除之因者顯示諸異難不能無果故非於事諸事各住自體故所有雜色體黃色則非有從非彼果遮則於二俱有於義若無異聲異則非理故欲求彼果亦異無彼果譬如由眼等生一色識果何故有宣說彼果無差別頓達某一切彼體雖離總已說其無異然由名而說外曰若無總事則立名無用曰如諸別牛物體各異然作一類果諸老年人以一聲立名曰牛為顯彼諸別牛能作一類果故又諸別牛同有牛聲轉之因由是從無彼牛果而遮除為因之聲轉故問何故不於不待遮非彼之各各別法而立名耶曰若不待遮非彼於各各別法立名不應道理以不待遮非彼顯示各別異法極為困難不能如是顯示如是顯示無有果故非於常事總上立名以一切事各住自體不雜亂故如雜色體性非黃色有故雜色與黃色義雖無異體之總然無異類之聲轉則應理以從非有彼牛果而遮則於彼二俱有故雜黃皆是牛若欲求彼牛果者亦應許無彼牛果之異性以無常事總故雖無常事總然一聲轉譬如有宣說眼等能生無差別果以說是有緣色識一果者故眼等三緣彼等體性雖離總無異體然由立名而說是根識之因是為頓時通達某根識之一切因聚故申二他派不應理分二酉一敘計二破執今初若謂一住故諸多亦聞一若謂諸別法雖多然一聞轉以有一常總無分住故酉二破執分二戌一破常事總住二破無分總住初又分二亥一標二釋今初住為依為顯如是彼非理汝說彼總安住於別之義為依諸別為由別顯如是皆不應理是常事故亥二釋分二乾一破依二破顯今初於常無益故非依如盤等於墮性棗等亦能生彼境彼亦無是用無彼亦住故非住復非理若異若不異觀察皆非理彼諸別法應無餘依義以諸別法不能饒益故是常事故若謂盤應非棗之所依於彼不饒益故曰盤等能益於棗往下墮性之棗為棗之親因及境同能生故由諸別法饒益別總汝亦無彼用以是常故若謂總已成就由別法使住曰諸別法非使已成者住即無彼別法已安住故又由別法令住彼亦非理以別法為住為異非異如是觀察皆非理故乾二破顯於自堪生識為此就餘作所顯堪能性作者亦是因此若先已能待彼則不可無變異故彼豈由具總顯非如眼藥等於根起作用於彼有無時通達無異故諸種類能顯若許具種者燈等能顯者應得具牛等若謂彼別法是能顯總曰如彼瓶色是燈光所顯許彼燈光是能顯之因為使緣自之識堪能生起故就餘燈光前而作其燈光亦是堪能生緣自識之作者故此總不可觀待彼別法生緣自識以在別法之前已能生緣自識故又彼總豈是由具總別法而顯應非由彼顯無變異故若謂別法是於緣總諸根而起作用曰彼諸別法亦非如眼藥等於緣總根而起作用以汝有無之時通達彼總無差異故若說由是諸種類之能顯許具種類者則燈等亦應得具彼牛等性以能顯牛故戌二破無分總住分二亥一總破二別破今初諸謂類從別為餘非餘有彼先無諸別總慧如何起見一所有者於餘不見故非餘不隨行餘亦非依故諸謂類是總者其類為從別法其體為餘耶為非餘而有耶於彼宗中先無之諸別法上如何生起總慧耶應不能起以總無分於前一別法所見有者於後餘別法不可見故其原因謂彼總與前別法其體為一為異若體一者則於後別法應不隨行以非離前別法而有餘性是一體故若相異者則總應不依前別法以離彼為異體又非因果故亥二別破分二乾一破勝論宗二破數論宗初又分二坎一破總體性二破其能立初又分二艮一破別法間隙無總二破別法間隙有總今初不行彼非有非後有具分不捨前所依嗚呼失敗因安住餘法者不動於自處於生餘處上安住極其理彼事於何住於彼無繫屬周遍彼等境嗟乎太希有衛世師說總住一切彼一派弟子解說此義謂總唯遍於自所依就是說所依的差別法上才有總無所依處即無總若爾則總於新生之別法應不隨行以有新生別法之處既非先有亦非後有亦一分住於先別法一分移於後別法之具分故亦非完全轉移於後別法以未棄捨先所依別法故嗚呼勝論派計總之理唯是失敗之因以前後別法隨計何者具足其總則餘分無總若計二者皆具足總則失壞計總無分故又若彼總住於離前別法生於餘處之別法者極為具理即不應理以安住於前別法不動自處體無分故又若彼總遍於新生諸別法之境者嗟乎太為希有即不應理以彼新生別事安住何處汝於彼處無繫屬故艮二破別法間隙有總若總類普有一顯彼顯性無異故普見彼非特別顯未通達能顯必不達所顯總與具總法何故相反許彼另一派說遍於一切有無別法處皆有總類若爾彼總應一切處普見以於一處別法所顯性於一切處無異分有故若謂非一切處可見要特別法所顯故彼總應不待別法所顯以未通達能顯必不通達所顯總與具總之別法通達之理何故相反而許由取汝門而緣別法故前計由總而知別今反說要由別顯總前後相反坎二破其能立無異義雖無如說煮者等異故業非因非類屬業故是餘聽因故業亦無有住無繫故聲因是總則非理太過故無業非諸知說因得非有因故由無隨行故亦非是功能若煮者等總如初有性等如是應明顯不爾無別故後亦不應顯待所作饒益方是能顯者無變故無待若此有增盛剎那故何作雖同是各異種類隨相近於某轉非餘此是聲知因外曰諸別法必有餘實總以有總聲及總覺轉故曰此因不定雖無餘義無異分之總亦說煑者等故若謂唯煑飯之業是煑者聲隨轉之因者曰煑飯之業應非煑者聲隨轉之因以物體各異故若謂煑飯業之類是煑者聲隨轉之因者曰煑飯業之類應非於多煑飯者煑者聲隨轉之因以繫屬彼業不繫屬煑者故又言煑飯之業是餘聽聞之因緣故又先曾作煑飯之業現在不作煑飯業之人現在煑飯者之聲應不轉以現在不住煑飯之業故又即彼人煑飯業之總是煑者聲現在於汝隨轉之因不應道理彼總於汝現在無繫屬故若無繫屬猶是因者太過失故若謂現在雖無業亦是因者曰若已無業則現在非煑者知說之因若如是則汝得非有因之煑者故若謂煑飯功能是煑者聲隨轉之因者曰諸煑飯功能應非煑者聲隨轉之因是互不隨行之異法故若謂煑者等之總是煑者聲隨轉之因者則後當煑飯之人初生無間如最初有性等彼應即明顯為煑者以從最初即與煑者之總會合故若謂非最初即明顯如是後亦不應顯以先既不顯先後無差異故若謂要待煑飯作用有所饒益方是能顯彼人應不待緣無變異故若謂此人由緣有所增盛彼人應是剎那性從緣生故若許爾者彼人煑飯作用何所饒益以於煑飯作用時已壞滅故外曰既無常事總法相同則樹聲與分別於別樹與別牛有轉不轉之區別不應道理曰雖同無常事總法物體各異然由樹之遣除總類近者則於某別樹樹聲隨轉於餘牛上樹聲不轉即此遣餘是為聲智隨轉之因故
