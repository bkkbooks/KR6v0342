body:
  text: 法稱論師造僧成大師釋民國法尊譯編成量品第二丁二顯解脫道之成量品分三戊一略釋成為量二廣釋其能立三釋以量稱讚之所為初又分二己一釋量二說成為之所為初又分二庚一能相量二所相量初又分二辛一明不欺智為量二顯不知義為量初又分三壬一正說二斷諍三不欺決定今初量謂無欺智上來已說能宣說量論之因謂自義比量今當解說陳那論師云敬禮成量欲利生大師善逝救護者之義或問若說世尊為正量者量之總相云何何故世尊是量曰量之總相謂新生無欺智如說見青根識是量以是新生無欺智故壬二斷諍分三癸一斷不遍過二斷太寬過三說智之所為今初安住能作義不欺聲亦爾顯示所欲故說者能作境何義覺明顯於彼聲是量義性非有因問若不欺智是量相者則不遍比量以比量不以自相為所取境故曰如通達具煙山上有火之比量是不欺誑以是通達安住能燒煮作用之覺故問若不欺智為量相者不應道理以不能遍聲起量故曰聲所起量亦是不欺以顯示所欲趣境故此之理由如說瓶之聲是說者自身中能作之境即是瓶義使其行相於覺中明顯對彼是量即說瓶時說者心中瓶相明顯於彼瓶相瓶聲無誤即不欺義以是成立彼之三相故然說瓶之聲非成立某處有瓶義體性之果法正因以非瓶義之有因有因即果故癸二斷太寬過緣於已取故不許彼世俗問若不欺智是量相者則決智亦應是量曰世俗覺之決智不許為新生不欺智以是緣自親因前量已取境之念覺故癸三說智之所為覺是正量性所取所捨事轉趣彼主故由有境各異覺證各異故彼有此有故問諸有色根豈非是量何故說不欺智是量耶曰新生不欺之覺乃是量性以於所取捨事隨轉還中新生不欺智是主要故要有彼義相顯現方有此對彼義之通達故由有境相之覺各異方安立此覺通達彼義各異故壬三不欺決定由自證自體由名言是量論是遮愚蒙問若不欺智是量相者為由自決定為不欺抑由他決定為不欺耶曰如緣青之根現量非唯由自或唯由他決定不欺謂由自證現量證知自體由後起之名言量證知於青是正量故問若由自或他能決定為不欺則宣說量相之論應成無用曰宣說量相之論亦有所為是為遮遣對量相之愚蒙故辛二顯不知義為量顯不知義爾證知自體後總相識應得意謂於自相不知所知故觀察自相故問唯不欺智量相即圓滿耶曰不爾能顯以前不知之義亦是量相之一分故問證知青色自體之後緣青色總之識於青色應亦得是量以是新知青色總故曰彼不決定以於青色是量意謂須是先不知青色自相所有新了知故若於青色是量是於青色自相觀察轉故緣總之識非觀自相故庚二所相量世尊具是量佛世尊是量以於所化之增上生決定勝無所欺誑及新了知四諦真理具彼二德故以佛具彼新生不欺智故是為定量己二說成為之所為分二庚一正說二斷諍今初為遮無生者論說成為故待立量應理問若爾說量已足何故說成為耶曰論說成量有所為義為遮無生自然量故及為令了知諸佛世尊觀待圓滿能立成為定量士夫應正理故無生有二解一謂外道妄計大自在等是無生自然之量二謂若未生起一切種智亦非是量圓滿能立即意樂圓滿欲利眾生之大悲心與菩提心及加行圓滿廣修無我慧等二種資糧由此圓滿而成正覺是為定量庚二斷諍分二辛一於遮斷諍二於表斷諍初又分二壬一破自然是量二破有自然之能立今初量非有常性達有事量故由所知無常彼不堅性故有依次生者常生非理故不可觀待故非誰饒益故無常亦非量問為遮無生不應道理以自在是常住自然量故曰量非有常性以通達有事之覺是量故由所知境是無常性則能知量亦是不堅性故若謂自在之智雖是無常但自在是常曰自在之前後諸智從常法生不應道理有依次生故以常法非任何助緣能饒益故常法不可觀待緣故若謂有無常自然量者曰應無無常自然量無彼能立量故壬二破自然之能立分二癸一敘計二破執今初住行形差別及能作義等外曰世間之處身受用皆由士大夫覺心為先而作以住行故如小斧具足形狀差別故如宮殿是能作義等故如斧龯此復除自在外餘不能作故成立為自在所作癸二破執分三子一破所立二破能立三破自在為一切因今初極成或無喻復是疑惑性若說世間之處身受用是士夫作者為總成立以士夫覺慧為先抑成立常士夫所作若如初者對佛弟子以覺為先不須成立以佛弟子許覺為先已極成故若如次者應不能成常士夫所作以成彼宗無同喻故又能作義亦非成立世間處身等以士夫覺慧為先所作之正因以於成立彼宗之遍相是疑惑性故子二破能立分三丑一正破二由此亦遮餘理三彼所成義初又分二寅一形義不能為因二形聲不能為因今初隨有無加持形等如欲成由彼所比度彼是正理性異事所成就聲同無異故比度則非理如灰物比火非爾則陶師製作陶瓶等作泥團形故蟻垤亦彼作所立隨行故果總亦能立繫屬各異故說異過果同若以形為成立彼宗之因者為以形差別為因抑僅以形為因若如初者則隨加持者有無其形如欲成就由彼比度宮殿之形是由士夫所作者此應正理以是成立彼宗之三相故若由彼成立山峰形狀是士夫所作則非正因以成立彼宗之宗法不成故若如次者則由從種類異事成就之形與名為形之聲同轉僅以是形無所異故以此為因比度山形是士夫所作則不應理成立彼宗之遍相不定故譬如由灰色物比度有火若非遍相不定者則應成立蟻垤亦是陶師所作以與陶師製作瓶等及泥團形狀有相同故若謂今以形為因汝觀形之差別而破是果同之似破果同是一種似能破之名原是勝論對正理派立螺聲是果勤勇所發故如瓶正理派破云為是先有勤勇所顯抑是先無勤勇新生耶若勤勇所顯則因不定若是新生則因不成勝論說彼是果同似能破即以彼之破他方式對彼自己之因亦同樣能破因為前量式是觀察果故名果同又解由彼似能破為他人所出之過彼自亦同犯其過結果相同故名果同曰以總果所作性是成立聲無常之正因以是成立彼宗之宗法所立法之順遍決定故對此正因若謂聲之所作於瓶不成瓶之所作於聲不成故所作性非成立聲無常之正因如是由有繫屬之聲瓶各異觀察別異出過而破許此似破為果同似能破以是於能成所立之總因觀察差別而破之似能破故今說特殊形為因則不成僅以形為因則不定故形非成立彼宗之正因如是破之能破非果同之似能破以非對於以能成所立之總因觀其差別而破之似能破故寅二形聲不能為因種類別所成由見聲之總成立非正理如說語言等牛故是有角依他說欲故諸聲皆非無有彼故義成一切成一切若由見具形種類之差別所成就與名為形之聲總共同轉便成立山形為士夫所作不應道理以成立彼宗之遍相錯亂故如說語言等是有角以牛聲轉故若因不成者應一切士夫不用劬勞便能成辦一切義利以有彼聲便能成辦有彼義故此因決定以諸聲於任何處無不可轉故以諸聲是依他樂說欲而轉故丑二由此亦遮餘理以此而觀察劫毗羅等派由無常等故亦說無心等及剝皮死故而說具足心以此所說觀察形非正因之理而觀察也何所觀察謂觀察刼毗羅派等尼犍子派前者說樂覺無心等是物質以是無常及等是有生故及尼犍子派說樹具足心以剝皮即死故如何觀察謂剝皮即死非成立樹具足心之正因以於樹上按立量法因不成故數論派以無常及有生亦非成立樂覺無心及是物之正因是不定因故丑三彼所成義若事體不成此理若成就別不成無害如聲依虛空聲雖不成立事成即成立如佛對鵂鶹說身等能立若彼性誤等聲雖不錯誤知能立有過由事成事故行故有手故立有角及象此聲之所詮世許非欲說所舉之因有因之體性與差別二事其中以體性為主若因事體性於有法上不成即犯宗法不成過此理應理若因體性於有法上按立量式成就者即量之差別不成亦不妨害宗法成立故譬如聲上依虛空之所作性雖不成就然於所作性是成立聲無常之宗法都無妨害問若爾因之聲不成立而義成立彼將如何曰於有法上因之聲雖不成立若因之事成立者亦能成立所立如佛弟子對鵂鶹派立四大種之微塵無常說有身有礙等為能立有身即有所觸之義對勝論者說有身之聲於四大種微塵上雖不成立但有所觸對勝論者則是四大種微塵無常之正因以是對彼成立彼宗之三相故相反若彼因之義性錯誤等等取不成及相違聲雖不錯誤當知亦是有過失之能立要由果及所遍事成立因及能遍事故以果證因是因果繫以所遍證能遍是同體繫聲雖不錯誤而義錯誤之譬喻如說花牛是有角能行故及說象兒是象是具手故此說牛名能行及說象名具手之聲於所詮牛象之名並不錯誤以是世間共許立彼名故然所欲說之能行及具手於牛象非無錯誤彼是人故子三破自在為一切因如彼事是因即何時非因由何計彼因而不許非因由械藥等繫黑者傷及癒無繫屬株杌何不計為因自性無差別亦不可能作常則無遮故功能亦難知有何成何性計餘為彼因則於一切果諸因應無窮能生苗地等性轉變是因若彼善修治見彼差別故若如根境合無別是覺因此如是非爾彼亦有別故諸別別無能若性無差別合亦應無能故成有差別故各別無能合則有功德是因自在等則非無別故彼自在事由何理由許彼為因而不許非因不應道理如彼是因之自在與即彼何時非因之自在無差別故若謂不定者則無繫屬之株杌何故不計為黑者受傷與傷癒之因應計為因以與非因雖無差別亦有是因故不能許爾要由與器械及藥等連繫黑者乃受傷與傷癒故若謂觀待助緣方能作果者曰自在亦不可觀待助緣而能作果以與不作果之自在自性無差別故又彼自在生果之功能亦難了知以汝雖返果無遮故以是常故若謂根本不遍者則於一切果諸因應無窮以有何等因即生何等果性是離彼等妄計餘法為彼果之因故若謂地等應能生苗以與不生苗之地等無差別故曰地等由不生苗之地等自性轉變即能生苗是生苗因若將彼地善加修治則見彼苗差別美好故若謂如彼和合根境與未和合根境雖無差別然是根識之因如是自在亦爾曰根境和合與未和合非無差別於彼根識亦有明不明之差別故若不爾者則根境和合亦應無生根識之功能以與根境別別無生識功能者自性無差別故此即成立和合根境與未和合根境是有差別以根境未和合不能生根識根境和合即能生根識故自在等則非因以與非因無差別故此因決定若各別時無生果之功能和合時則有生果之功德者彼等乃是因故自在不爾故非是因辛二於表斷諍分二壬一諍二答今初量知不現義無彼能立故殷重修非有有作如是說順世派有作如是說說佛世尊是定量士夫不應道理若是定量士夫須知一切不現見義以無彼能立故於彼方便殷重修行亦非有故壬二答分三癸一尋求遍智之原因二尋求之理三明遍智今初於不知而說諸恐錯誤者為修彼說故尋求具知者對於實不了知寂滅苦之方便而妄宣說者恐誤以為真正大師之求解脫者尋求有真知滅苦方便者之原因為於彼大師所說方便殷重修行故癸二尋求之理故應善觀察辦彼所修智此能知蟲數於我無所需求解脫者當觀察此師有無了知滅苦方便之智成辦求解脫者所修之事非是觀察此師能否知蟲數量以知蟲數量於我求解脫者無所需故癸三明遍智了知取捨性及其諸方便許彼為定量非了知一切隨能見遠否要見所欲性若見遠是量當來依鷲鳥許佛世尊是定量士夫以於所取所捨性及其方便了知究竟故又佛世尊非以了知一切蟲數為定量士夫以求解脫者無所需故又佛世尊是定量士夫隨能否見遠皆可以見所欲求性到究竟故若謂以能見遠為定量士夫者則應教云求解脫者當來依止鷲鳥為師以彼能見遠故戊二廣釋能立分二己一順成立量二逆成立量初又分二庚一因圓滿二果圓滿初又分二辛一意樂圓滿二加行圓滿初又分二壬一正說二釋難今初能立由修悲諸佛世尊是定量士夫其能立是由修習大悲心而生故其大悲心非從無因及邪因生是由多生修習悲愍而生故壬二釋難分二癸一釋無多生修難二釋修亦無無邊增長難初又分二子一難二釋今初覺依於身故由修無所成順世派云由前後生修習悲無所成就以無前後生故以身壞時心亦壞故以覺意依於身故子二釋分二丑一略標二廣釋今初非爾破依故彼身非是覺意之殊勝所依以正理破身為覺意之殊勝所依故丑二廣釋分二寅一明有前後生二破無之能立今初最初受生時呼吸根覺等非不待自類唯從於身生太過故現見具有結續能彼為有何事又由無何事於後無結續何處不產生濕生等眾生全無彼地等故一切種性故根等不待自類是大種如一轉變時皆變無別故諸根一一損意覺非有損此變則現見彼等亦轉變故覺住所依有依於覺性是諸根之因故是根從覺有如彼能引後亦當如彼由彼識益故說意依於身若無根非覺彼亦非彼無如是互為因故互是有因從無次第者非生有次第非別亦無待從身次生覺彼亦顯次第其前前剎那是一一剎那先無者之因是故一切時可見其為因最初受生之時其氣呼吸及諸根意覺等非不待各自同類唯從身生若如是者有太過失故現見現在前念心具有與後念心結續之功能彼有何增上事能續又由無何因緣於後時無後心相結續實不應理立量式云胎生無間之心應有前心為先是心識故如此現在心平常人之死心應有後心結續是有染心故如此現在心問如何有太過之失耶曰地等一切應皆成有情之種子體性以地等無任一分不產生濕生等有情故若根等不待前念自類唯從大種生者如有一大種轉變為有情則一切大種皆應轉變為有情以彼等之大種因無差別故又若計身為意覺之殊勝所依者為有根身抑無根身無根身下文當破若有根身者有根身應非意覺之殊勝所依以一一根受損害時非意覺直接有損害故然此意覺都是身之所依以汝轉變時現見彼身等亦有轉變故是諸根從意覺生以後覺安住之所依是前覺有依前覺之業是諸根之因故臨終時之根等後亦當與如彼同類後根等相結續以有如彼之能引業故問若身非意覺之殊勝所依則與經說身與心互相隨逐應成相違曰此不相違由彼身識能饒益意覺之原因經說意依身故若謂根是意覺之所依以無根時意覺不生故反難曰意覺應是身之所依以無意覺彼身亦不生故若許爾者觀待相續亦應是身心互為因身是心所依心亦是身所依故若許爾者觀待相續身心應互為有因以互為因故又若依身者為依常身抑依無常身常且非理應非從身次第生意覺以身是常非次第故若謂身雖是常然觀待諸緣能次第生意覺曰彼身亦不能待緣次第生意覺以身是常緣不能使有差別故若謂觀待前意覺從身漸次生後意覺曰若爾彼身亦顯有次第以從漸次生覺故若許爾者應一切時可見前念身心為後念身心之因以身心前前剎那是先無身心一一剎那之因故以上成立初生之心有前因臨終之心有後因故證有前後生寅二破無之能立分三卯一標二釋三結今初後心與餘心結續有何違彼羅漢後心由何許無續豈隨此宗派量不成義耶若謂離彼因此中何不說外曰平常人之死心不與後心相結續是死心故如阿羅漢之死心曰最後死心非是成立平常人死心不與後心相結續之正因以汝與餘心相結續無任何相違故試問彼阿羅漢死心亦由何因不與後心相結續若謂佛教中如是說故者曰佛教宗義汝豈隨行耶不應隨行以是量不成義故若謂阿羅漢死心不與後心相結續以彼因氣息已離身故即彼因息離身於此成立平常人死心不與後心相續之因中何為不說理應宣說以汝與死心隨一是成立彼宗之正因而死心非成立彼宗之正因故卯二釋分三辰一破是增上緣二破是親因緣三斷諍今初如彼覺取故意非從有根生識能異故亦非從一切無心故非餘一因故共住如根如色味由義門轉變常隨彼轉故由有能饒益彼因故第七及說言生故有時於心續亦容能饒益如瓶等火等唯爾非必遮若謂身是意覺之殊勝所依者為是增上緣抑是親因緣耶若是增上緣者意識分別非從有根身為增上緣而生以若是者應如彼根覺明顯取境有此過故分別意識緣色等境不如根識明了亦非由一切根和合發生意識以諸根發生根識之功能各異故亦非餘髮爪等為增上緣發生意識是無心故問若爾身心共住應成相違曰身心可以共住從一聚因生故譬如五根如色與味若謂身是意覺所依以見由身轉變意覺轉變故曰外義即外境應是意覺之所依是由義門見意覺轉變故有由飲酒使意識醉亂有因服毒使意識昏迷皆由外義使然非由根力所致故不能證明身是意覺之殊勝所依問若爾如何是使果隨遮之殊勝所依因耶曰如燈是燈光之殊勝因要先有燈方有燈光燈對燈光作直接饒益故要常隨彼燈有無轉故經說此有故彼有說第七囀依聲又說此生故彼生說第五囀從聲即為令了知若是彼果之殊勝遮因須是彼果前無間所生能直接饒益者故這三句頌文即釋經義由有即由此因有故對彼果能饒益即是彼果之因用第七囀聲表為所依是增上緣經又言此生故說的第五囀從聲表能生之親因緣用何囀聲是梵文文法在漢文中難以表明此說明殊勝所依因要常隨轉如燈光依燈身與意識不具此種關係故非真能依所依彼身有時於心相續亦容作饒益然唯爾許非是身滅心必隨遮之殊勝因以無色界仍有心故譬如火等對於瓶等暫時饒益非必隨遮之因辰二破是親因緣分二巳一觀身為親因緣之理而破二觀身體性而破初又分二午一是親因之違害二非親因之能立初又分二未一觀前後破二觀同時破初又分三申一出過二破救三明親因相今初於身安住時心應無遮滅若謂身是心之親因者已死之身心應無遮滅以親因之身仍安住故申二破救分二酉一破順緣不備救二破違緣破壞救今初由彼有乃有彼自在轉故彼呼吸非彼若無勤功力由何風呼吸由彼等盛衰應得為盛衰彼等過亦同心因則不同餘安住能引亦許是因故若謂雖有親因之身然無息緣故無心不遮之過者曰是從彼意覺生出入息非彼息是意覺之殊勝所依由有意覺之力彼出入息乃有及由彼意自在之力息乃強弱轉故彼風息之呼吸若無意之勤加功力由何而起不能起故又應由彼息等之盛衰而意得為盛衰以計彼息是意之親因故又彼息等亦應於已死身有不遮滅之過失相同以親因身仍安住故若謂汝自亦犯於已死身心應不遮滅之過以前心是後心之親因故曰若許前心為後心親因者則無同犯於已死身心不遮滅之過失以許餘能引業亦是身心共住之因故酉二破逆緣破壞救若如株杌等過違身非因由死過退時則應能復活若如火雖滅薪變不復還彼亦不退轉不然有醫故有令生變化有不復生者有可還轉故如火於薪金初雖小不退所作可還者彼當能復生如金堅硬性說非少可醫能治難得故或壽已盡故若僅是病患則無不可醫死毒等遮故彼咬亦可截由離變壞因彼何不復活若謂如咒加持之株杌等則非火因如是已死之身亦非心之因以由風膽等過患違逆心安住故曰死時之身心應能復活親因之身仍安住而過患已退故若謂如火雖滅然由火造成薪之轉變則不退還如是病患雖退而病之轉變亦不退轉曰由病所作變化非不可遮醫病加行有作用故所有變化非都不可轉有能變化使所生變化不能復生有能變化所生變化能還轉故如火於薪及金初種變化雖小亦不可退從自因生為不可退故如薪化灰其可退變化則能復生從自因生為可退事故如金堅性問若病之變化可退與經說不可治病應成相違曰此不相違意說非少功力所能醫治以能治之醫藥皆難得故或病者之壽已盡故若不待順緣不具僅由病患為死因者則無不可治之病以無餘逆緣而順緣具備則定能醫故又毒死之身心何不復活理應復活以親因之身仍住逆緣致死之毒等可用咒等遮故或被毒蛇咬傷亦可截去傷處令離病患變壞之因故申三明親因相親因無變異則諸有因者不能使變異如泥無變者則瓶等無異若事無變異彼事有變異此彼因非理如牛青牛等心與身亦爾彼從俱有因生果則共住如火與熔銅若親因無所變異則亦不能使有親因之果有所變異如泥團無變異則瓶等亦不變異若此事無所變異而彼事有變異者則此事應非彼事之親因如黃牛與青牛等如是身應非心之親因以身未變時心有變故問若爾身心共住相違曰果心可與身共住以由身之親因作俱有因而生故如火與熔銅未二觀同時破分三申一破同時所依之理二由此亦破餘理三結義今初有無無依故非爾有住因是依此無依離住無餘故是餘即彼因彼於事何為應成無所壞若計由壞因彼亦同上過住因復何為若謂遇壞因之間彼使住壞是事法性有此無害故住因何所為若謂如水等所依此亦同諸事剎那壞是彼事相續如是生因故是為彼所依不爾則非理障碍流失故是水等所依無行者德總業等何用依外曰彼身是意覺之同時所依曰彼身非意覺同時餘義之所依以意覺有事無事皆無餘義之所依故若謂其因不成以於已有事有能住因即餘義所依者曰此意覺已成之後無別安住之所依以離意覺安住者外無餘能住者故意覺之住與意覺是一物故外曰此因不成是由餘物使安住者曰彼身對於已成事之意覺有何安住之作為全無作用其能使意覺安住之餘物即彼意覺之因故若有餘物能使意覺安住者意覺應成為無所壞滅以汝已成後第二剎那仍能住故若計意覺由能壞因使壞滅者曰意覺亦非由壞因使壞以彼由壞因使壞亦同犯上說諸過失故又彼住因復何所作為應全不能住以由壞因使壞滅故若謂住因之身亦有作用乃至意覺未遇壞因時能使住者曰若爾住因何所作為應成無用壞滅是有事之法性有此法性無違害故若謂如瓶是水等之所依如是身亦是心之所依曰瓶應非瓶內水之同時所依如是所計此中亦同犯上文有無無依故時所說之過故問若爾云何世間共說瓶為其中水之所依耶曰說瓶是其中水所依者以瓶中水事剎那壞滅其瓶中水後念相續如前念水事所在處所相同瓶是彼處所之生因即彼水後念相續之助緣故說為瓶水之所依若非如是饒益說有餘義所依不應道理於無常事容有餘義所依若於常事則不應理瓶是其中水等之所依以能礙其流失故外道所計之德總業等何用餘義之所依以前後剎那無行動故是常法故申二由此亦破餘理由此於和合及有和合因種類等住性無依故皆遣由此所說有無無依故破使已成法安住同時所依之道理對於外計德於實和合實是有和合之因種類住別法等字攝大種所造住於大種心住於大種法性住於有法等亦皆遣除已說無同時餘義所依故申三結義若事由餘壞彼住因何為彼無餘而壞諸住因無能有依皆具住有生皆有依故一切有事有時應不壞若是自壞性彼餘何能住若非自壞性何用餘能住彼身住因於意覺何所作為應全無用以若計由餘壞因使意覺壞故若謂因不成無餘壞因彼法自壞者是則諸安住因亦應無能彼法自壞故又一切有事應有時不壞以有生故已許遍相以計有依皆具住有生皆有依故又彼意覺應無餘能住若自壞是本性故若謂因不成者則彼意覺何用餘能住全無所用以汝非自壞為體性故即自能住何用住因午二非親因之能立分三未一正說二破身心一體三明生死因今初身無所增減由覺用差別慧等能增減燈光等諸依則非有此事由彼此能勝非不益於心有時貪欲等以壯等增長是從苦樂生彼從調適等內義近而生由此說合等使退失念等由內義差別生覺使變故如有續差別由聞猛虎性及見流血等便發昏迷等故定由何性作用隨轉心彼無則不生故是依於心慧及貪等彼身非是汝之親因以不待彼身之增減由意覺之作用差別慧等便能增減故此因決定此隨覺增減之理其燈光等諸依物為因者則非有此事故若謂由餐精華使身健壯現見亦能增長慧故其本因不成者曰雖由餐精華使身健壯由彼此慧亦能增勝然彼身非慧之親因非身於根心無所饒益而慧能生故若謂現見由身壯而生貪由衰弱而生瞋故本因不成者曰有時由身盛衰等增長意識眷屬之貪瞋等然彼身非貪等之親因以是從根識眷屬之苦樂而生故又彼根識眷屬之苦樂亦非以彼身為親因彼復是從諸界調適不調適等身內觸義相近而生故由上所說此理亦說由合雜病等令退失念等亦非以身為親因是由內觸義接近之差別所生根覺使生彼變異故譬如有人由心續怯弱等差別但聞說猛虎性之聲及見流血等事便使心意發生昏迷等又後念心是依前念心以若無彼為親因則此不生故非依身為親因以決定由前心任何性慣習作用而隨轉故未二破身心一體如依止於心聽聞等諸行於心時明顯如是無異故身應顯功德若謂雖已成立後念心依前念心然於身為親因都無妨害以身心是一體故曰如依止於前心聽聞等諸行功德能於心中有時明顯如是依身彼等功德亦應明顯身心無異故然實不爾故身非親因未三明生死因由具足我愛非他有情引欲得樂捨苦受生鄙劣處於苦顛倒覺愛縛為生因若誰無彼因彼即不復生若不見去來根不明不見如因目不明不見輕微煙雖有身細故或有無質碍如水如金汞不見故非無問若身非心之親因何為生死因耶曰諸凡夫輩由具足我愛非被他有情引誘自心欲得安樂欲捨痛苦故受生鄙劣處以顛倒執苦為樂之覺及以愛縛是凡夫受生生死之因故若誰無彼邪愛之因彼即不復生生死故若謂無有餘生往來以不見故曰汝順世派不見中有不能成立為無以汝觀中有之眼目不明故譬如因目不明不見輕微之煙若謂中有之身應有質礙是有身故曰中有之身雖是有身或有是無質礙以是微細淨妙之有身故譬如水於新陶器如水銀於金又順世派以汝不見中有故非定為無汝雖不見彼亦容有故巳二觀身本性而破分二午一觀一身為親因而破二觀多身為親因而破初又分三未一正破二斷諍三破依實之餘法今初手等搖動時一切應動故相違之業用於一不可故餘則應成異一覆一切覆或不覆應見一染變應變或不變應知故一聚非有若謂身是心之親因者為是粗身無分一耶抑是眾多支分若是無分一者士夫手等搖動時應一切支分皆動以粗身是無分一故此因決定以動不動相違之業用於無分一身不可共處故若餘者謂非一動一切動則士夫之身應成異分以一分動時餘分不動故又如士夫覆一面時應一切支皆覆或餘支不覆面部亦應不覆可見以粗身是無分一故又如士夫若一面部顏色染變應一切支分皆被染變或餘支分不變面部亦應不變可知本色以粗身是無分一故士夫之身非有無分唯一之聚以具動與不動覆與不覆變與不變等多種相違法故未二斷諍若多則如前無別故微故應不能了知無差別不成有別是根境故非是微塵由此亦遣除謂無能障等水銀與金雜熱石如何見根等別無能如何而了知由具此過同若謂金與汞由具能見者所依無可見由何能了知味色等具違若許由假立是則覺應異如何名長鬘若謂瓶色應是眾多塵性以是外義非粗無分故若許爾者即彼瓶色應如前一一微塵非根識所能了知以與一一微塵無差別故及是極微塵故曰彼瓶諸色與一一微塵全無差別應不成立以是能生根識有差別之塵故又瓶諸色應非微塵是能引根識定解之境故由此上述道理亦能遣除外謂瓶色應無能障等難又水銀與金等合雜或熱石等根識如何可見應不能見以無無分一體之有支物故三緣和合如何了知能生根識應不了知以與根等別別無能時無差別故諸因皆已許若謂由和合而生具或譯成就由具而生根識者曰應不能生具此生具中過亦相同故若謂金與水銀由有具故根識能見者曰根識由何能了知微塵之具應不能知以所依微塵無可見故如奶茶飲料具色味等應成相違以是功德故不應許爾以與世說此飲品色好味美之言說相違故若謂味色立聲許由假立而轉者曰奶茶與乳二者有無實味應於覺現其各異以奶茶與乳二者有無實味各異故此是說乳味是實奶茶味是假或解若謂彼飲料之色味是假立者則應緣彼飲料中不共之色味等生起能見各別無雜之異覺而不起緣共同和雜色味之覺以說是於不共之支分色味假立色好味美之和合色味故又如百花穿成之長鬘如何可名長鬘應不名長鬘以離此花鬘外無餘義之長鬘故以上皆就敵者計要有有支方許支分計離支分外別有有支而破未三破依實之餘法分二申一以不可得破二斷諍今初異具彼自體及諸言說外具數業等體於覺無所現異於具足數量瓶之自體及說瓶之聲別無所謂具數與業等自體以彼於不錯亂覺不顯現故申二斷諍分二酉一無聲與分別不異轉之過失二無不可作第六聲之過失今初聲智是緣於隨異事而行分別假立義喻如功德等已滅及未生若許此是假由何因許彼彼於一切事何不許彼因若謂非皆假異差別為主由何若無異異則應無義非因有餘義白等具數等其聲非異門若彼亦餘義德實應無別雖非有餘義由遮分為異如業非實聲若謂具數之瓶體及說瓶之聲應離瓶之數等別有異體以於覺前與彼數現為異故曰其量度瓶與數等之聲與分別智其所見境非有實事彼是以隨異事行之分別所假立義為所緣故此即是說聲與智雖見瓶與瓶之數各異然彼非見實事只緣分別假立義為境故不能證明瓶與瓶之數有異體也喻如功德青等雖無第二功德可依然現見有一青等名言又如瓶已滅及未生等雖無異體之功德然現見有一二等名言若謂過去已滅及未來未生等許此中數等是假名者曰由何因緣許於過去等數等之聲是為假名試問何不許彼於一切事數等之聲是假名轉之因緣耶若謂非一切事皆是假名以有異體為能別法者主要是實名故曰試問彼是實名由何決定若謂若無異體則異聲無義聲成異門故曰所詮雖無異體然聲不須成異門異門即同一事之異名雖非因是餘義而說異聲然如白等具彼數等之聲非異門故白等色是德數等亦是德應不能同於一實若謂彼白等復有餘義德者則德與實應無差別雖無異實而異聲轉亦不相違雖非有餘義然由遮而分為異聲轉故如說業非實之聲酉二無不可作第六聲之過失由諸說事聲具足彼數等如異而說者是簡別餘法唯欲知彼許餘皆無所引有說指之具如異法而說雖只說一義為引一切故而言指具足許是說有法作如是言說捨色等能別遮非共果因而作瓶聲轉故非言瓶聲作一所依聲此是言種類與言聚差別彼總作為支言瓶之色等顯彼能差別此於餘應說外曰瓶與數應是異體以第六聲說為異故曰諸說有事法之聲如與具彼數相異而說者為顯彼數簡別瓶之餘法故有時言指之具似說指與具是相異之法是唯欲令知指之具彼許事不引指上之餘一切別法故有時言指具足之聲共許是說有法雖只說指之一別法然由能引指上一切別法而令了知指具足故彼二種聲雖同說一義然作說法與說有法之各異言說是由捨不捨餘別法之門而了知一義故外曰若瓶與色無異體者應成同依同依即二名同說一事只可言瓶色不可言瓶之色者曰言瓶之聲非顯離支分外有餘有支以遮非瓶八微共果能盛水之因於彼八微聚說瓶之聲是彼實名故言瓶之色之聲非詮瓶與瓶之色是同一所依之聲以言瓶之聲捨其瓶之色香等能生緣自識之不共功能差別為所詮事故以是言瓶之聲觀待瓶之色等則是詮聚之聲觀待金瓶等則是詮類之聲言瓶之聲不詮色等八微而詮金瓶等別法此即言種類與言聚之差別問若瓶與色無異體者則言瓶之色應全無義曰以彼瓶總聚作為彼瓶之支分言瓶之色者是顯彼瓶能生眼識之功能差別故由此於餘亦應宣說如何說者如云栴檀之香之聲是為顯栴檀之香有別於柏木之香故午二觀多身為親因破分二未一諸支聚為因非理二一一支為因非理今初無餘是因者離一支亦非若眾多支是意覺之因者為無餘一切支是因抑一一支是因若如初者則隨離一支意覺亦應不生要須無餘一切支為因故未二一一支是因非理分三申一出過二破救三解同今初各是功能性應頓生眾多若如第二一一支皆是因者應眾多意覺同時頓生以一一支皆是能生性故申二破救多性相同故呼吸非能定一亦應顯多彼因常住故若非眾多因非漸無別故即於一息頃亦緣多義故非由彼決定若一覺知多彼即成頓知無所相違故漸亦應不知無有差別故若計非自類時息多剎那是如是心因無具次第因彼如何具次前自類為因最初應不生如是因非有生息異境故有亦定成多故覺應頓生雖多一時者是一心之因息動微弱等缺一應不生倘隨有是因識亦應有別若此從彼異不異非彼果若謂彼息能顯意覺唯一一生故無過者曰諸出入息非能決定唯顯一一意覺多性相同故若謂此因不成是常一性者曰諸出入息亦應同時頓顯眾多意覺以彼因常相近故若謂非同時多意覺因者曰諸出入息亦應非漸次生多意覺既不頓生前後無差別故又彼諸息應非決定唯生一一意覺於一息頃亦緣眾多義故若謂此因不定以一覺能知多義故曰是則彼意覺應頓知多義以如是知無相違故又彼意覺應亦不能漸知多義以既不能頓知前後無差別故若計從身所生非從自類前念生有時次第之息多剎那前後生起是如是次第生起一一心之親因即計前後諸息次第各生一心故眾多意覺不同時頓生曰彼等諸息如何能前後次第生不應道理以無能次第生之因故以從常住身為生因故若謂此因不成是從前念自同類因生者曰若爾胎中最初息應不得生以於爾時彼因如是同類前念非有故若言不成則無前生應成相違又初生無間之出入息縱有同類前念亦應決定是多分以遍眾多別異境故若許爾者眾多意覺應頓時生以彼親因身是常住助緣眾多息之功能未退失故若謂其因不定息雖眾多同一時者亦是一心之因非多心因曰若爾息動微弱等時如缺一強烈息轉意覺亦應不生要彼一切完聚方是意覺之因故倘謂此因不成隨有強弱何息皆是意覺之因曰是則由息之力意識亦應有明不明之差別以隨有強弱何息即是意覺之親因故此因決定若此果法從彼增減異因而不隨異者此即非彼之親果故申三解同識功能定故一唯是一因由貪著餘義識則無功能不緣他義故若謂先從身頓生起諸覺後由自類定其身之功能何故而遮止若謂多覺頓生之過汝亦同犯曰此不相同前一覺唯是後一覺之因前一一識生後一一識之功能決定故如識由貪着餘色義則無緣他聲義之功能而不緣聲故若謂先從身頓生起諸覺後由自同類生覺決定故非多覺頓生曰身之功能後時何故遮止應不遮止是常住故辰三斷諍身滅非依故心應單獨住若心續住因不為彼因轉而作其支分即此世五處是生餘身因為破彼支事及因不可得說非能決定根等是有餘前根於自類現見諸功能見轉故餘餘諸生亦成立若彼從身生犯如前過失若從心餘身亦應從此生若謂死時身遮滅心應單獨安住以心不間斷而身非心之所依故曰若從欲界當生無色界之士夫死後心暫單獨安住以彼心相續安住之因臨死之心不為彼後身因獲得隨轉故而為助緣之支分故若從欲界當生欲界之士夫死後心非單獨住以彼臨死之心是後身之俱有緣故問若爾何為後身之親因曰即此生之最後五處是生餘身之親因以是於後身體性主要能饒益者故順世派為破臨死之身心為彼後世身心之支分事及因性以後世身心之俱有緣及親因不可得故為因論說彼非能決定以立彼宗之遍相錯亂故又根等亦非成立彼臨死之根不結續後根之正因以是成立彼宗之有餘因故又亦能成立從前念根引生後念餘餘諸根以現見前念根後轉變成後念根故如現在前念根現見有饒益自類之功能故若謂其因不成是從身生彼諸根者曰諸根應犯如前頓生之過失以其親因之身是常相近有故若謂根從心生則其後餘身亦應從此心生也卯三結非由離因故諸最後心等皆無相結續故彼立有餘外說一切最後心皆無後心結續由離親因之身故此說非理以身非心之親因故如是臨終心之能立非成立凡夫彼臨終心無後心相結續之正因許是成立彼宗之有餘因故癸二釋修亦無無邊增長難分二子一難二釋今初由修雖增勝如跳與水暖非能越自性難曰悲心雖由修習可以增勝然不能超越以前自性無邊增長如跳躍及水暖子二釋分二丑一喻義不同二斷諍今初若所作復須觀待勤功力或所依不堅殊勝不增長非如是自性益彼諸功能於諸後殊勝無辦功能故依非常住故雖增非性故若時所修作不復待勤力餘力轉增勝心中悲愍等修生自然轉如火等於薪水銀與金等故從彼等生是性生功德故能使功力後後轉增勝是從前同類種子增長者悲等諸覺心修習於何住悲心非如是不無邊增長之自性若彼修習所作復須觀待勤勇功力或所依不堅牢性則其殊勝不能增長然悲等之所依堅固是由修習自然轉勝之功德故跳躍雖亦增勝然非如是無邊增長之自性以無饒益汝前殊勝之諸功能而能成辦饒益後殊勝之功能故又水暖性雖亦增勝然非如是無邊增長之自性以其所依非常安住而乾竭故又跳躍等亦應無邊增長若時修習所作不復待功力其餘功力輾轉殊勝故已許此因此頌又可作自宗解謂悲愍等應能無邊增長若時修習所作不復待功力其餘功力輾轉殊勝故又由彼等修習所生彼悲愍等其後後修習功力輾轉增勝是心性中所生功德故以是心中由修習生復是自然而轉故喻如火等於薪等自然而轉又如水銀與金等和合熔化不待第二熔化故悲等諸覺心若已修習於何量住應不住增長何以故以是從前同類種子增長者之心中功德故丑二斷諍跳則非如是從跳生於跳彼因力勤勇功能決定故跳是決定性初跳非如後彼身違逆故功漸除違逆安住自力性悲從自種生若自種為因無逆品損害心成彼體性如是前前修心法悲愍性及離貪覺等是餘顯根本由修彼悲性如離貪貪厭外曰若悲愍等由修習力無邊增長者跳躍亦應能無邊跳曰跳躍非如悲等唯從前念同類生於後念無邊跳躍以跳躍量是決定性故跳躍之因是體力與勤勇等功能量決定故問若爾則從最初應如後時能跳曰彼練習跳躍之人非從最初便能如後時所跳以有痰濕等病與身輕利相違逆故又習跳者縱以功用漸除違逆然亦不能無邊跳躍以安住自因體力決定量故問一切有情應皆有大悲心以悲心從前念同類生時無始故曰悲心以自種子為因者若無逆品損害則於心中自然而轉成彼體性以是從自種子所生之心功德故若悲心後發生瞋恚等逆品違害其種子則不能相續增長故非一切有情皆能成就大悲心也諸佛世尊由修習力成悲體性謂由前前修習之心法悲愍離貪之覺等為同類餘心顯現之根本故喻如阿羅漢離貪之覺有貪者之貪欲瑜伽師之厭離等心皆自然而生起略結上義謂分別意識為有因無因無因如後文破若有因其因為常為無常常不應理常有遍常與不遍常遍常不應理如破自在為因包括計時方為因等破不遍常法為因如上述非從無次第生有次第等所說若計從無常因生者則觀意識自體為常無常若計常者如下文破常我時廣說若自性無常從無常因生者則觀身心為一體為異體一體不應理如是身亦應生功德等文廣說若異體者為從物生為從心生若從物生者身僅為意識之俱有緣是已極成非是所破若計身為意識之殊勝因者為作親因緣為作殊勝增上緣初不應理觀為前後為同時因初不應理身住心亦應住等廣說同時因不應理身無盛衰等文廣說若計為殊勝增上緣者應如眼根饒益眼識之理而破又觀作殊勝所依之身為有根身為一切根之和合為是無分一體之粗身為是眾多細分前二不應理彼如覺緣故等文廣說計無分粗身不應理手等搖動時等文廣說計眾多微塵身為意識殊勝所依不應道理無餘是因者等文廣說若計意識從前念心生者為從自心前念生抑從他身如父母之前念心生若從他身前念心為因者為作自意識之親因緣為作殊勝俱有緣是則父母聰明多聞等子女亦應如是或父母愚暗無知子女亦應爾在講親因使果隨轉時廣說若從自心前念生者則善成立自宗有前後世總主量曰初生無間之意識必有前念心意為先是心法故如現見從現前貪生瞋恚等凡夫臨終意識必有後心結續是有貪心故如現見從貪心生瞋恚等
