body:
  text: 法稱論師造僧成大師釋民國法尊譯編庚三第三說量果建立分三辛一抉擇果自性二抉擇量自性三抉擇所量自性今初縱然有外義如領受定體非是由自性有多體過故若許則二者應不感有異不見障故非非由義了達於彼多體事見為一體性彼不見如何能成為見義若現欲不欲分別非義覺彼亦死相等見不相續心即於外所量受自果應理如其此自性如是決定義縱然有外義亦是了知自體以如所受欲不欲行相由此門中安立義決定體性非由義自性印留行相故若如是者由義自性印留行相則一色法應有可意不可意多種體性之過故問即許有可意不可意多種體性有何過失耶曰是則親怨二種眼識應不感覺天授之色有可意不可意之異親見為可意怨見為不可意應可意不可意二相於二人俱現每人均見二種色以是可意不可意多體以是現彼行相之不錯亂識故若謂由不見業所障蔽故非俱見者破曰則彼應非由義增上力所不了知以彼是可意不可意多種體性而彼可意不可意唯各別現故又彼不能見業如何能使見義應非能見以於彼多體事見為一體故若謂現欲不欲相是分別心非義覺根識者破曰此不應理即於彼根識亦先現為可意者後被死相等所執持時則可意相不復相續之心現可見故非僅分別心見可不可意色既無分別眼識亦見可不可意色故先見為可意後見為不可意故又現義識即有外所量義亦是領受自體為果應理何以故以如所現此義自性之行相即如是決定彼義非如外義了知行相故辛二抉擇量自性爾時此現義是量能取體縱有非餘義故非觀待外何故如義體彼安住於識如是能決定謂此如是住是了自體性故許彼了義非現義體性彼能立於覺住義彼所作如彼義安住如是彼極顯立義彼體故自了許了義故境亦非異觀察自體性說自證是果了義彼體故問若於外所量自證為果者則應能取相為量曰以於現義為所量了知識自體為果時能取相非是量以爾時即此現義之行相是能量故又能取相之體性非觀待外義之量以息滅二相之理了知自體非餘義故又現義識是了知自體何以故以如彼義體之行相安住於識如是決定此義即如是住故即彼現義識觀待後識亦許為了知義謂非現義之體性是由後識執著汝了知義故彼義之所作了達義彼之能立是安住於覺之行相何以故以如彼義之行相安住於覺如是彼義極明顯故問若所取相為量自證為果者則第三量果建立中量與果之境物體應異曰彼是了知自體是能安立了達義彼行相之體性故雖則如是然觀待後識許為了知義以後識執著汝了知義故以青色為所量第三量果建立中之量與果其境體非異以同了達以識為體性之一青色故問若觀待後識安立為了知義者則何以說自證為果耶曰以觀察現義識自體性時說自證為果以彼青義是彼自證之體性故末自盛寶解為是彼許為了知義緣青現量之體性故則可譯為彼了義體故辛三抉擇所量自性同彼或同餘識是如是現其因亦是義許義為所量如某之行相無義事而現如何緣義實如是我不知問若現義識不能如實了知外義則如何外義是所量耶曰隨與彼義相同或餘不同由是現義識行相如是顯現之因亦即是義故許義為所量應理由與義生相同門安立義為所量與外義相同不成立故問如何能緣所取義應不能緣如髮影等某些行相是無義事而顯現故曰彼不緣所取義實爾如是緣所取義我亦不知故非有外境為所取義也若以是因便為所量則根與作意亦是生根識之因亦應是所量故以現相乃為所量彼義是因亦現其相故立為所量庚四雖無外義建立應理分三辛一唯於現相建立二如現無實三雖無外境量果應理今初覺體雖無別諸見顛倒者能所取領受了達如有異如根被咒等染壞泥塊等雖離彼色相而現餘行相未染壞眼者無見如是故如遠曠野中小者現為大能所取了知雖非有而住能所量及果如隨現而作問若能取所取物體無異者與現為異應成相違曰此無相違於一覺體雖無差別然諸倒見者對於能取所取領受等則如有異而了達故喻如諸根被咒術等所迷惑者泥塊等物雖離彼象馬等色然現為餘象馬行相諸眼未被迷者不見如是象馬故又如遠望曠野小現為大不解此喻問能取所取若無異體則能量所量量果三法不應道理曰此皆應理以能取所取了別雖無異體然此安住能量所量及果是如於覺中所隨現而作故辛二如現無實非爾於一事現為種種性行相如何實失彼一性故於餘餘壞故不見性非一覺見無異事乃決定無異由何觀察事真性中無事何故於彼等一多性皆無由見同法故於非彼體性執為彼體性世人生錯亂於此則無彼此行中彼體一亦不見故由內染所生彼從過失起本性顛倒現此亦是有者不待見同法如有眩翳等若非爾者如現實有則於一覺事而現種種體性之行相如何是如現實有應非實有若如是實者則汝一性須失壞故若如是實有而是一者則苦樂於餘物是餘性應失壞故如於多現一又一非實有以不錯亂覺不見一自性故此因決定以決定為無異須由覺見事無異故又能取所取事由何正理觀察於真性中如現諦實彼事非有何以故以如汝所現諦實之一多自性皆非有故問由見同法於非彼體性執為彼體性故世間人而生錯亂於此唯識則無彼能取所取誤為異體錯亂之因於此行者能取所取各異之體性不見有一故盛寶解此句為不住第二時之此行動事彼外義體性不見有一故曰由內染壞所生能取所取現為異體之識彼不待見真假同法等以是從過失所生自性顛倒現者此亦是有故喻如由眩翳等現髮影等辛三雖無外境量果應理彼決斷為覺許為能取相彼體故了我故是彼能立如領受貪等自體立為境住能所量果此當配一切彼領受體故可領受自體如是可即量體性是所量自證是為果於體能取相是決斷體性言可性是量是說為自證問若唯心者則能量所量量果三不應理曰於彼唯心宗所許決斷為覺之能取相是了自體以生為彼自證體性故彼能取相即彼自證之能立以能安立彼故喻如領受貪等貪等為所量領受彼之能取相即能量了知彼之自證即量果即於心法上建立能所量及果之三法問雖無外境自證之量果可爾其證他之量果如何耶曰若以識自體為境而安住能量所量量果之理此於青等為所量之一切量果皆當配合如以青為所量彼中亦以可領受青之行相為能量以識為體之青色為所量了知以識為體之青者即量果故此之因由謂青等是自體諸識所可領受是領受自體識之體性故問若能取相是能量者則論師說貪等自證是量應成相違曰此無所違或言於體能取相或言決斷識體性之量或言可能領受識之量陳那論師意依此義說自證為量故約自證能領受識自體故說自證為能量約自證能知此識了知此境故說自證為量果己二明彼建立應理分二庚一成立二相二成立自證初又分三辛一以經理成立二以論理成立三復以經理成立初又分二壬一以生為具義行相成立二相二以憶念具義行相成立二相初又分二癸一成立有所取義覺二相二成立無所取義覺二相今初從諸境所生一切諸識等其餘雖是因然有境行相如食與時等皆是子生因持父母一形非是餘人者其餘及諸境雖同是因性許彼分是境無彼彼不成外曰說彼現起義相之識為了達義之能立不應道理以識現起義相不成立故若以是識之因故現起義行相者則亦現起根之行相是識因故者曰從諸境所生之一切識除境之外其餘根等雖亦是因然有行相是境行相非根等行相喻如飲食及時間等雖皆是兒生長之因然彼兒唯持父母隨一之色而非持飲食等色也除彼境外餘根境等雖同是根識之因然緣色根識唯現色相即由此分許色是境以色是所取義若無現起彼色行相則色不成彼境故癸二成立無所取義覺二相於具義心中恐無義行相緣過去義者二相自證成青等現異故不具類非義彼無常不成常如何能生名等前已破此理非具義唯欲相屬故非義功能成如此行相識是念從受生彼亦義相空彼如何具彼彼時無有故非是從義生如是受亦爾彼相非由義明相遠離故彼相若異者餘應如是知若常屬我者說亦不應知若屬各各者則不應相續著一義體者講聽者諸心若謂由相同彼有一名言而非現為彼異體如何取時覺應無義若於具所取義之中恐不現起義之行相然緣過去青義之分別心汝之二相及自證應自成就以是所取義空之識故即無所取義之識若謂此因不成以青之種類為所取義者破曰不具彼形等之種類應非所取義以現青等行相各異故又彼種類若是無常則不成為無分之種類若是常者如何是能生非能生故亦非青之名等為所取義計名等為所取義前已破故若謂自相是所取義者曰此憶念青之理非具所取義非由所取義之功能成故唯與欲念相隨屬故外曰憶念青識雖具青義行相然現青根識則非具青義行相破曰彼憶念青識如何能具青義行相應不能具以彼現青根識亦由義相空故此因決定如此青相不明顯識即是念彼念復從領受現青根識生故若謂此因不成是親從青色生者破曰念青之識非親從青色生以汝親因之時爾時已無青色故若謂是現起青相從青生故破曰如是領受現青根識亦應成為彼具青相者從青生故念青之識彼青行相非義所印留以遠離明顯行相故若謂彼不明顯青相是異於識之義者破曰天授分別心所現之青相如天授所知餘亦應能了知是外義故若謂由常屬於天授理故餘人不知者破曰若爾則雖言說餘亦應不能了知以常屬於天授我故若謂講聽之境唯與各各相屬而了解者破曰講者聽者之心同著一義之體性者應不能相續唯與各各境相繫屬故若謂由於相同不現異故故彼二境有同一名言者破曰爾時講聽之覺應成無所取義者以如各異體性而執為一故壬二以憶念具義行相成立二相分二癸一正說二破答今初即彼領受識亦依止二分由一相區別彼識之所緣餘若非有相如何住於識謂後後之識各增加一相義自體二相及我行相中彼第二由彼第三識了知彼領受青色之識依止能取所取二分以由一所取相區別之識如是緣故初念緣青現識亦有二分由第二念心緣彼前念心二相故一所取相區別即多一所取相與前念有區別也此義下文解說除現起行相外若餘不現起行相則第二憶念之識如何安住具青行相耶以不現起青行相故此謂第一念心見青時有青行相第二憶念見青時謂我曾見青色此念心才能有青行相若初見青時不帶青行相則次追憶之念心如何能帶青行相耶成立前因者謂初現青之根識次憶青之念識以後憶彼之念識等此後後之識較前前識增一所取相謂由義體性有二行相及我之能取相彼第二覺念識由第三覺第二念識所了知故此是說初根識以青為所取相識自身為能取相次第二念青之心以青與根識為二所取相自身為能取相次第三憶前念青心之心則有三所取相謂青相根識及念青心自身為能取相故後後心各增一所取相也癸二破答由是義果性憶識憶義故若由於錯誤而相合雜者現相與作意亦皆應如是如是一切果皆與因同緣故無陶師等應不憶念瓶識由何差別依止義相同除同餘何為見雙生等故初性若非二第二性住一決定能緣心應不能分辨故青等自性現前安住覺與義相合繫由第二覺緣餘則唯初一義生故繫屬不見前義屬後後識則非若謂由於識是義之果故憶念能見識時即亦憶念所見義然由於錯亂將所憶念之識與義合雜為一誤為識具義之行相非實具彼行相也此是薩婆多等義破曰若以識是彼之果故憶果時即亦憶其因者則憶識時亦應憶念現相諸根作意等以識亦是彼等之果故又識亦應具彼等之行相與彼等合雜理由相同故如是若未憶陶師等應不憶瓶等以一切果亦應與因同時緣故若謂現義之識由義有所作之殊勝差別故憶念有義之行相根與作意等無所作故不與彼等同時憶念者破曰現義之識由義所作之殊勝差別除現義識與義相同之外餘有何所為識與義相同之分即是憶念現義識具義行相之不共因故由有與義相同分故憶具義行相若無相同分則不憶彼行相故與義相同分即能憶具彼行相之不共因喻如見孿生兄弟由容貌相同故易誤為一人而憶識依止義相同即識具彼行相第二覺念之自性應唯住於一能取相以初現青根識之自性非有二相單有一能取相故若許爾者則現青根識與念青之識決定能緣之心應不能分辨彼二識之所取相各異以單有一能取相故現青根識有青行相以青等行相體性現前安住之覺即現青識為有青義行相合雜繫屬第二覺念識之所緣慮故第二覺念識憶前見青色即自帶青相故能證前識亦有青相也除現起青相外餘由是青之親果故念具青行相者則唯一最初現青根識是從青義親生故與青義相繫屬其後後憶念識應非憶念具青行相以不見與前青義親繫屬故辛二以論理成立分五壬一以決定俱緣之因成立二以一義現多成立三以無體明現成立四遠近中之差別成立五以義識非同時成立初又分二癸一正說二斷諍今初定與覺俱時所頓領受境除彼而為餘由何相成立如亂識二月雖無而見異青黃等異法非有決定受無受或有義或無義之受未見有領受故彼等非異故識時現義非離識為餘此極難遮止謂現青識由是青果故憶念具青相不應道理由青色與現青根識非異體故成立彼者謂青色離緣青識為餘物由何相成立應不成立以決定與緣青識同時頓領受故外曰青色與緣青識二法應是異體以現為異體故破曰不遍是錯亂識見為異故喻如本無而見二月根本因決定如青黃等諸異體者則無決定同時領受故於緣青識時所現青義非離緣青識有餘實體極難遮止以青色與緣青識非異體故若無緣青識領受或少許青義可緣或無可緣青義之領受緣青識亦不見能領受故意謂離能緣識無所緣青離所緣青亦無能緣識癸二斷諍雖有諸餘因諸根識無故比知有異因若不說決定從等無間緣從種子生芽由煙成立火如此依外義作者住證知若現彼體性如是定繫屬若計依彼覺此有何相違煙應非火生非由果知因彼縱然是因由何知決定彼亦現煙覺明醒習氣者現為火覺性了知非火性心續彼堪能習氣為心要現煙覺明顯故從火生煙智者有此說依止於外義說二相彼復由定俱受成若謂諸根覺離根意外比知定有異因以雖有根意等餘因或暫不生或暫生故其彼餘因即外青色破曰若不說從等無間緣之習氣醒發決定生者實爾然現青根識由暫生之原因不須有外青為所緣緣以從醒發等無間緣之習氣決定生故若謂從種子生芽及說以煙成立火如此皆是依止外義若無外義則不得成破曰種子為芽之作者煙為火之證明而住彼等亦非無外義而不成若計所現彼因果體性是依如是決定繫屬之覺體有何相違都無違故若謂應非由煙果了知火因以煙應非火生故唯與自習氣相繫屬故彼火縱是煙因應非由煙決定了知火以因果錯亂故曰由煙比火彼亦非比知外義是由現煙之覺明了醒發習氣之覺性了知現火之覺故明醒習氣者句盛寶連下句解為現火覺若謂彼現煙覺從現煙之習氣生不從現火生故非能證知現火也曰是從火生煙以心相續中堪能現火之習氣為心要者現為火覺由此而顯現為煙覺故智者唯識師可說從火生煙之建立以彼是量所成立故問若無外義云何依外說覺二相耶曰依於外義宣說二相有所為義是為引導說外義者經有二部入真實義故彼覺二相非不成立以決定俱領受而成立故壬二以一義現多成立由根別明顯不明間雜等現異能緣識緣慮於一義若彼義非現義自性一故彼義一切意自性應成一依義而生起隨彼體性作彼亦由餘某以某分成異如子依於父雖是彼父色由某以某分而可得差異彼現義識若非由義現為具義行相者則有彼瓶色義之一切意根識等其現相應唯一自性以所取義自性是一無行相而緣故然不能許爾以由根差別現相明顯不明顯及間雜等執為各異之識是緣一義故他難曰現義之識瓶色現明顯不明顯不應道理同現一瓶色行相故答曰雖是依所取義而生隨彼瓶色行相體性而作然瓶色明不明顯應理以從餘某等習氣亦由某形色等分使瓶色成明不明顯各異故喻如子依於父雖持彼父色然由某緣以某形色等分異於父色而可得也壬三以無體明現成立如燈等焰輪有孔雀翎眼青紅色鮮明目不明所見彼若是外事明根何無能若見真見彼如何是根壞翳淨明利眼所見超根境餘人所見義如何非明顯除現根作意知餘一功能故餘非是因非因何為境若彼是覺因如何觀待燈唯由燈有故亦非二俱因覺之二相成立以燈等焰輪有孔雀翎眼行相青紅鮮明眼不明者見彼相故若謂燈焰花圈是外義事者破曰燈焰花圈根明利之識為何反無見彼之功能應有彼能以是根識可見之外義故又見彼花圈之根識云何是根失壞應非失壞以見真實義故又見花圈之識如餘人所見彼義汝云何非明顯應亦明顯以依止眩翳所淨之明利眼能見超根義故翳淨明利眼句盛寶解為反攻語眩翳應能淨眼根過失以由彼眩翳之力能見超出明眼根識境之自相義故又見燈焰花圈之根識其餘燈焰花圈應非汝之因以除現相根及作意之外更無餘法了知唯從一功能生故盛寶解為除自因現相根及作意外餘一外燈之功能以量了知花圈之功能不了知故若許爾者則彼如何是所取外境應非外境也若謂彼花圈是彼覺之因者破曰則彼如何觀待於燈應不待燈而有也若謂燈與花圈俱是彼識之因者破曰非彼二俱是因唯有彼燈為所緣緣故壬四以遠近中差別成立分三癸一出難二破救三結今初遠近等差別明不明不可若謂無所取義之識雖是二相有所取義之識則非二相者破曰從遠近等差別而望之根識瓶色不應有明不明現相以於瓶色無行相而了知故癸二破救若現別故爾彼間隔無隔見不見應等若由現不明不見某細分故而各異者外義一何由見不見各異微塵多各異何見不見異若現明不明差別覺異者由餘異無異何由而現異彼現何不明障故此何非薄故現亦爾餘非薄有性最近現極明彼亦應顯現若彼依無見有餘色生者彼等應互障則現是能障彼應唯現一不障應頓見明不明自性由無見障一由無義非義無見彼何為若謂由現相差別故成明不明顯此轉計於境識之中間有一現相破曰則於瓶色或明了見或不明了見應皆相同以彼現相於中間隔及不間隔皆相同故若謂自遠望時由現相不明了故彼瓶色細分有不可見故有明不明之差別者破曰彼瓶色為是粗無分一體抑是眾多微塵若如初者則彼瓶色由何而有明見及不見之異應非有異以是粗無分一外義故若如第二亦由何而有明見不見之差異以是眾多微塵體各異故若謂由現相明不明之差別故於覺現明不明之差異者破曰彼瓶為何由他現相明不明各異而現明不明各異應不如是無異分故試問自遠望時彼現相為何不明顯若謂由塵所障故者試問彼塵此自近看時為何非障若謂薄故者破曰自近看時彼現相亦應微薄以塵障微薄理由相同故若自餘遠處望時現相與塵非薄應厚以塵障濃厚理由相同故又極近看瓶之眼識彼現相應極明顯以於瓶色極接近故若許爾者則彼瓶色亦應極明顯也事實不爾若謂瓶色隨遠近看依於無見之業生餘明不明之業色故瓶色成明不明顯者破曰彼明不明諸業色為互相障否若互障者則彼諸明不明業色於彼眼識應唯現一種以於眼識可觀而於眼識現時互相障故若謂不互障者破曰則遠近看瓶色之眼識應頓見明不明之業色自性以彼是根識可見者而又互不相障故若謂由無見業障蔽一種故不俱見者破曰自遠近望瓶色之人其不見業於汝何為應無能為以不見業全無饒益之義及不益之非義故癸三結尾故依義所生領受如其因能緣行相異餘惡慧惡宗其依義所生領受根識如其習氣醒發之因而緣行相各異其餘許無行相而緣者是惡慧惡宗故壬五以義識非同時成立分二癸一破無常無相緣二破常住無相緣今初識聲與燈等是現量及餘能生其以前諸剎那滅故由何而於識已無而明顯若顯餘非益應顯一切義若從因決定識此計亦無彼作識無彼然現為義故而說彼明顯其餘俱生義非益不作相識非以自相而辨其行相如何能明顯諸識及聲並燈等由何於根識無行相而明顯應不能顯以於彼時根識生時已壞滅故以是彼前生之剎那故以是緣自現識及餘念識之能生因故若謂彼聲作同時耳識之所取義者破曰緣聲耳識應能顯一切義以將非作饒益之餘聲顯為所取義故若謂由與彼聲從一聚因生故決定為所取義者破曰緣聲耳識由與聲從一聚因生故分別為所取義者此亦不應理若如是者則同時之耳根亦應成為所取義故然由彼聲所作之耳識當自之時雖已無彼聲然說顯彼聲以具彼聲義行相而現故與耳識俱生之餘義聲不於耳識印留行相以於耳識非饒益故若許爾者則與耳識俱生之餘聲如何顯為耳識之所取義應非所取義以於耳識非以自行相留行相故癸二破常住無相緣金剛石等義堅不待他故一切眾生識應自然頓生俱有饒益故此彼漸生者說餘別剎那此過如前說若謂諸無常法雖無相不緣然常金剛等法是無相緣破曰汝許為堅固之金剛及石塊等義應自然頓生一切眾生之識以不待餘緣能生緣自之識故若謂由俱有緣作饒益故緣此金剛等之有境漸次生者破曰是則應說金剛石等前後剎那各異以緣自識次第生故若許爾者則此中亦有如前已說緣自之識應無相則不現以於彼時已壞滅故之過失辛三復以經理成立彼由自領受都無可辯諍彼義性不成由正念成立自行境無別無各異領受謂此是如此或非是如此應無此別異唯由領受許非能辨各異無明顯各異無辨覺如孿現義之識對婆沙師不須成立有能了所了二相以自領受於彼義理全無所諍故現義之識其義相之自性不成就彼亦無不成之過失以由正念能成立故又現義識謂如是了知色非如是了知聲應無此差異以無領受義差異故以未現起自所行境行相差異而分辨故僅由感覺不能分辨了達義之任何差異以無明顯能分辨差異者則無能辨差異之覺故喻如孿生等則易誤為一人庚二成立自證分四辛一由成二相即成自證二由明了是識體而成立三由破他領受而成立四由能憶念亦成立自證初又分二壬一正說二破救今初由成立二相亦多成自證以現自體相即成領受故由彼事之覺識滅如何受彼不受自體無餘遮領受具現義之識彼向外顯現能緣覺之覺常內向我故所有現境者彼得非受彼由能成立識有二相即亦多分成立自證多分盛寶解為附帶成立之意以現起自體之行相爾時即成立由能取相即自證領受彼行相故若謂是由後識領受者破曰如何由有前覺事行相之後覺領受前覺應不領受以於爾時前覺已滅故又彼後識應無餘遮領受前識以不領受自體故以現任何境行相之彼後識亦應得非領受彼前識以彼具現義之識即緣境相之識是向外顯現其覺之能緣覺是常向內我故壬二破救若謂由相同何有餘領受一切相同者應得互領受若覺同領受彼非同領受彼自領受彼彼非有同因所作業建立此世間為因自體性領受由增益錯亂說領受青等非領受餘體覺是青等事為何外義量覺非青等事如何領受義若時領受體非有相同因此由自成立何用以義成若一切體同識即應非識若一分相同一切受一切如青等體故許領受青等如是受體故彼亦應領受言領受領受非如義決定故無過失者義亦常無彼若有有性因領受何故無若謂由與彼相同即領受彼何用有餘能立耶破曰若爾一切相同者應皆得互相領受以互相同故若謂彼覺相同乃是領受之能立破曰是則彼應非由相同而成領受以覺相同乃是領受之能立故彼能領受識之自證應非以同義為因以是能自領受之所建立故以能自領受建立自證非由與義相同而建立自證他問若爾何為同義之所立耶曰此同義非無所立以是世間所作業了達義建立之因故由與義相同而建立為了達彼義這在上文自證現量時已廣說現青根識非由領受他體性而稱為領受青等是由領受自體自性之行相唯由增益錯亂而稱為領受青等故若謂現青根覺應於外義非任何量以是現起青等事之行相故意謂只現起行相則非緣彼事體故對彼非是量也曰彼現青根覺如何是領受彼義應非領受義以非現起外青等事之行相故若時領受體性非以相同為因則此領受識之自證何須用同義性成立以可自領受即成立故若識與義相同者若一切體性與義相同則識應非識以一切體性與義相同故若由一分與義相同而立為領受義者則應一切識領受一切義矣識與境總有一分相同故若謂由從青等生及是與彼相同體性故許為領受青等者破曰如是彼後現青根識亦應領受前現青根識以從前現青根識生及是與彼相同體性故若謂領受前領受非如於義引生決定故無過失者破曰現青根識應不了達青色以於青義亦常無彼決定故後識緣前識若不引定智則識緣青色亦應不引定智理相同故若謂於青義有引生決定之因謂從彼生及與彼相同者破曰後現青根識何故於前領受現青根識不引決定應引決定以從彼生及與彼相同故辛二由明了是識體而成立分四壬一觀明了是否識體二若非識體太為過失三若是識體自證成立四破自覺非現今初復見白等時白等明顯性此了別明顯所有生起現為離白等顯餘事或彼體復次見白色時白等明顯自性生起明顯了別現相此現相為離白等明顯外是餘事抑是彼體性白等明顯即於識上白等明了顯現而識又明了白等所見白等為離明顯之識外而是餘事為即是彼識體壬二若非識體太為過失餘事明非明如何明顯白識明彼非明眾生盡非明明由餘明明應成無窮故無見繫屬識如何彼簡別二中知一時非有見第二若見二繫屬乃決定謂見由何見相同由餘心而見說言見彼者是則自證成若不了自事何能了他體若由同領受如前已除遣若緣諸見同義非先有見如何彼決定彼與所見同諸不許相同彼則無見二爾時義與識豈能說彼等若謂是餘事者破曰白等明顯之識如何能顯白等應不能顯以自非明顯故此因決定以若顯義識是明顯若識非明顯則無餘眾生皆非明顯故若謂由後識明顯者破曰明明顯白等之識其能顯應無窮以要由他而明顯故又彼識如何以白色簡別而憶念即回憶見白色之識應不能憶以不知見與白色之繫屬故能見根識與所見白義之連繫何以故以汝二法了知一時不是第二故識與境憶識則不知境憶境則不見識根本因決定以決定謂見境者則須見境識二者之繫屬故若謂由見白色之識與白色相同由餘後心而見於彼說見白色者破曰此即成立自證以是同義之識故此後識既見前識與義相同則證明前識亦自知也若能取相不了自事如何能了他體應不能了若謂由與義相同而說領受者亦不應理彼如前已破除故如何由彼念智而決定彼義與所見相同應不決定以彼義非先所取故又解為先見義時識非有故若俱見義識方可執為相同故彼薩婆多師應不俱見義與識以彼亦不許識與義相同故以許彼時豈能說此是義此是識而各別說彼等義與識耶壬三若是識體自證成立若是自事者彼應能自顯若彼不顯者應不能顯義若謂白色明現是緣白識之自事者破曰若爾緣白色識應自明顯以汝所明現白色是自體物故又緣白識應不能顯義何以故以不自顯故壬四破自覺非現分二癸一明自覺是現事二若是自覺不現太為過失初又分二子一正說二破救今初諸非自了宗不見一切義說覺非現者此於彼亦答由依緣修別而別異轉者苦樂欲等別現成彼即覺彼知除彼外不知餘少異對諸說覺非自了之宗所說應不見一切義之理對諸說覺非由現量成立者此亦答覆以自覺若是不現事則不能各別說義與識故彼由現量成立之苦樂欲不欲等差別即是覺性以由所依根所緣境及修習作意等差別有適悅逼惱等差異轉故此苦樂等即成立自證以有能領受而彼領受汝之識離汝之外不知有餘少許異體物故子二破救若由餘了者彼亦餘所行若彼生彼現覺所了非餘於餘能緣者亦定有此二若非從彼生亦非彼現者彼覺應無境若不取彼者亦不緣諸總彼非少許事此於前已說故彼現義者離彼覺非餘現及自了成若謂雖緣彼而非現量者義同由何異若由具不見及一義等故領受決定者餘畢竟不緣領受別已除諸瑜伽現量領受他樂等由領受相同彼如彼逼惱若時自現為苦自體則惱非是緣彼識爾時無彼過以是一切識緣領受各異同義是為緣自顯是領受若謂其因不成其苦樂等是由後起識所領受以餘後起識所了知故破曰若爾彼苦樂等亦應是餘人之覺所行所領受以彼了知故若謂彼樂所生及現彼樂之覺方能了知非餘覺所了者破曰能緣自身安樂之餘人之覺應了知自身之樂以汝亦決定有從自身之安樂所生及現安樂之二事故若謂此因不成餘人之識非從自身之安樂所生亦非現為彼樂者破曰緣自身安樂之餘人之覺應成無境者以彼不取自身之安樂故若謂以安樂之總為所取義者破曰彼識應亦不緣安樂之總為所取義前已說彼總無少許實事故如是之覺應是現量所成及成立自證以汝所現義彼非離自體而為餘體之覺故意為彼覺所現義即是彼覺非是餘物若謂餘人之覺雖能緣自身之樂然非現量故非能領受破曰緣自身安樂之自他二覺由何於自身安樂有是否現量之差異應無差異以同以彼樂為所取義故若謂自身之樂決定為自覺所領受以彼具有應領受不見之業即現在不能見而必受報之宿業及為與我一義而和合似是勝論義等攝是自在所歡喜故自在派義他覺則不領受因由相反故謂不具彼業等破曰若爾則他人之覺應畢竟不能緣以彼緣慮不具不見之業故又彼樂等由自他覺有領受不領受之差別不應道理彼已破除故又諸許瑜伽現量能領受他人安樂等之宗中彼諸聖者如有苦者應亦被痛苦逼惱以與彼領受痛苦相同故若謂由無不悅意境與根集合故諸聖者不生彼所起苦破曰汝宗痛苦生起非是受苦然彼聖者應領受苦以生起緣苦之識故外問汝自宗云何曰彼諸聖者他人之苦非逼惱因他人之樂非利益因以非領受他人之苦等故又諸聖者他人之苦應不如是逼惱僅是生起緣彼之識故此因決定以若是被苦逼惱者則是自己現為苦之自體故若緣彼非必領受彼以是一切識之緣慮與領受各異以與義相同安立為緣義領受彼體性須自己明顯生為彼體性故癸二若自覺是不現太為過失分二子一應由因了知二明因非有今初復由無現量覺應由因知彼亦根義覺或是前作意除此因果聚餘繫屬非有不見功能故復次自覺應由因而了知以是量所成而無現量成立故若許爾者則彼因應是根及義或根覺或先前作意以須由因了知而無餘因故若謂後因不成以我意相合亦是因故破曰果法根識除彼等三因緣外非有我意連繫之因以不見彼有饒益之功能故子二明因非有分二丑一成立根覺之因非有二成立意覺之因非有初又分五寅一根等非因二顯義非因三義法非因四覺法非因五果因非有今初彼誤故非根其義亦如是覺作意是識彼亦不成立不成則非因彼四種因中諸根如是義境應非成立自身根覺之因以成立彼宗之遍相錯誤故彼覺與作意亦於自身成立覺之前應非已成以是識故若許爾者應非成立自身有覺之因以於彼前未成立故寅二顯義非因若顯義是因彼豈非是識此除所顯義若顯非領受所顯不定故若許顯義是因者破曰彼顯義之覺於自身成立覺之前應非成立豈非是識即是識故以此覺非是因之理亦除遣覺所顯義為因以若非能顯覺所領受則彼覺所顯不決定故寅三義法非因若許顯即是義之差別者其無生滅義全無少差別許彼識別別應剎那壞滅彼為知未知若已知為因尚未決斷知由何言彼知未決斷所知如何知能了所見非已見則他應已見全無有所見於他所見中有彼差別故應了達自覺故不待自法從單獨義法非能比度覺若許明顯即義之某差別法者破曰外義應全無先不明顯後乃明顯之差別以無生滅故縱計有彼生滅則彼外義應剎那壞滅以各別引生自果識故又彼義之差別為以覺已知或未知者為因耶若以覺已知為因者則言彼覺已知由何量成應不成立以無量決斷是知故若許爾者則彼覺所了知之顯義如何是自身中覺之能了應非能了以量未決斷故若謂非覺已見而是所見義之差別即彼為因者破曰餘見聲之盲人亦應了知自身之眼覺以眼都無所見以有餘耳識所見之差別顯義故所見非已見等六句是說若以餘人或餘識所見便能證知自身有覺者則耳識聞聲亦應眼識能見色或由他人見色亦應自能見色是大過失盛寶解此頌分為四層義一外云所見顯義於自身覺未成立之前非自量所見之顯義是成立覺之因二破曰他人所見之顯義應是成立自身覺之正因以明顯義之差別是成立自身覺之正因而彼於所立未成之前量未見故三外曰餘人所見義自全無所見故非是因四破曰由餘人所見顯義之因應能了知自身之覺以因之差別顯義於他人所見顯義中亦有故又若不觀待覺之自法單從義法不能比度覺若以覺已知之義法為因者則宗法不成若以覺未知之義法為因者則遍相錯亂故盛寶則云彼若量已成者則自身之覺已成訖若未成者不能為因故寅四覺法非因覺因是現量自法離自覺更有何餘事彼從同因生由何與覺異餘生彼錯亂若謂以覺自法如樂是因者破曰所有覺自法如安樂應是現量所成以是成立自身有覺之因故應不許彼以離自覺非有餘體故若謂此因不成是異物者破曰由何離自覺而是異物應非異物以與彼是從同因生故若謂此因不成是從餘因聚生者破曰彼與覺之繫屬應錯亂以自覺是不現事而與覺是從餘因聚生故寅五果因非有色等五種境諸根及能緣除此非能表彼之所餘果其中二超根五義見色生離於有餘生一亦無可知如是若無知言因乃亂說縱有因不見與彼共繫屬如何能了達故諸因非是不見之能顯若說較彼因先已成立者彼復須餘喻所立故無窮故由覺成義非由義成彼彼未成則義無自成立故現覺及從彼見言及動等不能比他心不見屬我故若謂有成立自身根覺之果因者即以果法作為成立宗法之因初品已廣說破曰彼應非有以除色等五境眼等五根眼識五能緣識之外全無餘法能表彼根覺之果者其實根境等亦非根覺之果不可用以作因而成立根覺彼等亦非成立根覺之果因故彼中根與覺二法超出根現量之境其五義中除見色根識能饒益外餘皆離生無一可了知故此文很難解似是各境只能生各識不生餘識餘識亦不從餘境生故五境不能作因成立有覺尚待研究如是若言根等是成立自身根覺之因者實乃亂說以無量了知故若謂有言說等為因者破曰言說等如何能了知根覺應不能知以不見有與彼根覺共繫屬故此因決定以諸因者非不見繫屬之能顯故若謂先由彼因於餘人身成立彼覺以為同喻者破曰成立自身有覺之同喻應成無窮以餘人之覺是成立有覺之同喻而成餘人之覺復須餘喻所成立故復次是由覺成立義應非由義而成立彼覺以彼覺未成立其義不能自成立故又言說及身轉動等要以現量成立覺次見從彼覺發生言說轉動等不能因此比度他身之心以不見於我身與覺之繫屬故丑二成立意覺之因非有義因於意覺非有成立故意覺分別非有由所取義為因而能成立以所取義不成立故意覺未有之前亦無所取義辛三由破他領受而成立汝覺由餘覺如何能明顯非明體同故由何能所顯境如何是顯於明體轉故彼明彼體性是自極明顯如是覺許覺即成覺自證非爾境與覺亦俱法相同故我覺自己由明體極顯餘於彼體轉明顯而極顯雖相同不許由彼顯餘覺以自極顯故彼義體極顯喻如二燈燭如燈與瓶等依彼而廣作能所顯名言試問汝之前覺如何由餘後覺明顯若謂後覺能顯前覺以與彼生相同故破曰後覺與前覺由何是能顯所顯應非能所以與彼非明顯體性相同故若謂青境如何是明顯自不明故者答曰青境可說為明以於能明根識轉留行相體性故彼能顯根識是自明顯以現起青色行相即彼體性故如是若許後覺現起前覺行相者則彼後覺即成自證以現前覺行相故若非如是自顯者則彼後覺應非顯前覺以境與汝俱非明顯法相同故於我宗中彼覺不須餘覺所顯自是明顯體性即極明顯餘境則由於彼轉留行相體性而明顯是明顯性故前後覺雖相同然不許由後覺而明顯餘前覺以是自體極明顯故喻如二燈燭非能照所照然能顯義以現起彼義之行相體性極明顯故前後二覺應隨一非明以是能明所明故喻如燈是能照瓶是所照依此可廣作能顯所顯體性之名言也由何而生憶念此見境之時彼亦決定見餘彼現義之識以非唯由根境便決定謂見義故憶念所見境時亦必憶念彼現境識要俱憶境識方能決定為見境故辛四由能憶念亦成立自證分二壬一正說二斷諍今初念亦成證我不僅由念成立二相亦能成立證我即自證如何成立曰現義之識有能領受以有念故如色由此因成立也領受即感受壬二斷諍分二癸一諍二答今初若由餘識證若謂彼現義識由餘識證有能領受是成已成癸二答分二子一應無緣長音等二識應不向境轉初又分二丑一標二釋今初緣長等不成以無久住故耳識應不能緣長音字等以一一耳識不能緣眾多亦不能緣故初因成立以一一耳識不久住故丑二釋分二寅一破一耳識緣二破多耳識緣今初若住無次第於覺頓現故字無次不長無互相雜亂字分具次第如何生無次若先住至後後聲應增廣緣無次第故後無具次覺後境無住故覺非自安住自住後亦彼不滅無別故字無次頓生亦有此過失一次功生故功後後無義諸字後顯者此過亦隨住若謂因不成立安住者破曰其聞長音字初分之覺應頓現長音字諸分以現彼分而無次第故又彼覺應不能緣長音字以無次第故具足次第長音字分如何能生無次第之耳識應不能生以是前後互不相雜之多分故若謂前分住至後邊生耳識者破曰是則至後時聲音應增長廣大也其聽聞長音字末後分之覺亦應不能次第緣長音字諸分以非漸次而是頓緣字諸分故其聞長音字初分之覺聞字初分之後應自不住以於彼後汝之境不安住故若謂自安住者破曰彼覺後亦應不滅以前既不滅前後無差別故若字無次第頓時生已長時住者則彼長音字後亦應不滅以前既不滅前後無差別故亦有此過失又生汝之後後功力應皆無義以用一次功力即圓滿生故若計諸字已完成後由緣顯者破曰則後能顯亦應無義以初功力已顯訖故此過依然存在寅二破多耳識緣分二卯一出過二破救今初若多緣彼者後覺領受彼彼亦非緣長故不念長覺若謂先以眾多耳識緣彼長音字再由後識領受彼耳識者破曰是則緣長音字之覺應無能領受者以彼後識唯領受彼聞長音字最後分之覺彼亦非緣長音字故只緣最後分非緣整個字若許爾者應不念彼矣卯二破救分二辰一破覺受漸生二破覺受頓生初又分二巳一破雜生覺受二觀察而破今初諸覺各異受彼聞聲不應現為無間隔結合亦遣除若謂見間隔誤彼無隔者則誦二短音應誤為無隔若謂緣長音字諸覺各別間雜領受故無過失者破曰聞彼長音字聲之耳識應不能無間隔現起彼境以汝前後之間為餘能領受物所間隔故又彼耳識亦非由轉動速疾結合無間以彼前已破除故若謂雖見間隔仍誤為無間隔者破曰是則誦二短音字如薩羅海亦應誤為無間隔也然實不爾巳二觀察而破分二午一破以根識結合二破以分別結合今初若根見間斷根不增無斷一切諸根覺應皆顛倒故一切字體邊亦住一瞬頃彼亦漸連屬多微塵乃滿一塵轉動時最短時剎那覺亦剎那故漸次了解字故字及色等雖餘覺間隔現無間隔者一切具倒義若由根迷亂餘結合諸事無表異錯亂是念有分別與言說繫屬豈是明現者已說根所取非有聲合者若謂結合無間者為由根識結合抑由分別結合初且非理若諸根識見有間隔則諸根識不可復增益為無間若增益者則一切根識應皆成顛倒故諸長音字應漸次了解以諸字與聞彼之覺皆是多剎那故一切字體性最短邊際亦安住瞬頃時量彼復須漸與許多極微連屬時間乃完滿故以一極微轉動之時亦許為時間邊際之剎那以是最短時間故一切緣慮字及色等之根識應皆成具顛倒義者以被餘覺間隔而現為無間隔故若由根識錯亂前後各異諸事結合為一者如是根識應是與言說相繫屬之有分別心以是不能表示前後各異而是誤認為一之念故若許爾者汝豈是明現境者應不明現也以前已說諸根所取勝義非有聲結合故午二破以分別結合分三未一正破二斷諍三此理亦破餘正理派今初若根見間隔由分別合者義與彼領受現無間斷者若無正理害由何言彼斷若謂諸根雖見間斷然由分別結合為一者破曰義及現義識彼之領受由何說彼為間斷應非間斷以現無間斷無正理妨害故未二斷諍若覺能定故彼由何許爾不見頓覺故彼應如是現彼等同類者則功能決定謂諸分別心正解次第起若謂前因不成以二覺不頓生故以前一一覺生後一一覺之功能決定故試問由何而許二覺不頓生若謂二覺無頓見故者對彼當如是觀察覺領受應不間斷不見間斷故若謂二覺必無頓生以契經說無處無容二心俱生故破曰如是契經非顯二覺不頓時生意說彼諸覺於後同類一一饒益之功能決定故謂正了解諸同類分別次第起故未三此理亦破餘正理派諸於所見義起認識分別明顯計為現此亦遣除彼聲卵及燈等了知各異者明現故彼覺如何是現量故由於認識不定字等一若無憶先領增益為彼法則亦無了知謂彼即是此彼豈是根生此說根識同類二識不頓生之理復有餘所為亦為破除勝比者勝比者行者正理派同屬一派以彼妄計認識根識所見義之分別明了顯現是現量故如諸了解聲卵燈等前後各異者認為是一之覺應是現量以有明了顯現故若言許者如何是現量應非現量以誤認前後為一故聲等三喻盛寶解為聲音前後幻師之兩卵燈之前後剎那各異諸事謂即是此妄分別為一之覺應有明了顯現以認為是此故若許者應是現量許明現故許彼不應理如何是現量不應理故又彼認識應不能決定字等為一是誤認前後為一故謂前者即此之識如何是根生非但不是現量且非根生之根識應非根生以若無憶念所受非色增益彼法則汝不生故辰二破覺受頓生義與識領受不許其頓生義與識現相不了達各別諸現義之識與單獨外義非一覺所取應無別異故無善知差別領受善了解諸義及義識後如何別憶諸義及義意領受漸次生則種種現相諍過難拔出謂了知青等一相或一受領受青現相非有餘領受外曰如我所許緣義之識與領受彼識之能領受者其體各異可以頓生如汝所許多識頓生者破曰緣義之識與緣彼識之能領受異體頓生不應道理以緣青義識與領受現青識之能領受異體頓生汝正理派自宗亦不許亦不應正理故汝自許多識不頓生是意之相故不應理者以現青義之現青識與現青識行相顯現之覺即現彼識行相之後念心若是異體同時各別有者須能了解然非有如是了解故若謂雖有彼二覺然由一青行相覺執取為一故不了解為異者破曰若着彼二覺為一者非是正量則錯亂覺雖執為一然正量了知是異若謂着二覺為一之心是量者破曰現青義之緣青識與外單獨青義二者應無異體以正量了知無異體故是就外計執二覺為一之心是正量正量所緣無誤故二覺應是一也又非由一青行相覺執取為一故不可各各分別以正量了解各異故又青義與現彼青義之識後時如何各別憶念不應道理以無對彼二由各別引起定智善了解之差別而於彼二之各別能領受善了解故要由善了解彼二之差別乃善了解彼二之領受由彼領受乃能憶念今既無彼了解與領受如何能憶念故憶念亦應非有也此是顯為計青色與現青識二者為一不可分別所說妨難與計能緣青色之現青識與能領受彼識者二者為一不可分別之妨難相同也義與義意之領受漸次生者亦有此種種現相諍論之過失難以拔出謂了解青等一種行相或一種領受而領受青色現相非有餘體領受故此說青義與緣青義之意二者之能領受亦非有異體漸次而生若有則可見而實不可見故子二識應不向境轉分二丑一標二釋今初由餘識隨領彼亦見有念彼由何領受彼亦由餘者識了鬘連屬生此彼為何若即前覺者應不轉餘境若謂彼前識由餘識隨領受者破曰於彼亦見有念試問彼由何領受若謂彼後識復由餘識領受者破曰如是由後識了知前識如鬘相連繫者試問復是誰生此後識若謂即前識者破曰彼後識應不向餘境轉以自親因為所取義而領受故丑二釋分三寅一破後識單緣義二破俱緣識義三破雖無能受而於境轉初又分二卯一出過二破救今初成為所取相能生因諸覺後識何不緣而緣取餘境能生緣我識性決定內支由何餘外支而能障碍彼外義縱接近亦非能障彼餘則境接近全無領覺者義非近分位全無以無本覺念亦無故此計噫妙哉過去等分別非有義接近移轉因無故應無行於義後識如何不緣能生諸覺而緣餘境應不如是以彼前覺由成所取相而接近故若謂由境接近而障礙緣前覺者破曰決定能生緣我之識為自性之內支分其他外支分何能為障應不能障外義縱近於彼後覺緣前覺亦不能作障故倘若能作障者則任何五蘊士夫若境接近應皆不能領受自覺以全無不接近彼義之分位故若許爾者應亦不能憶念彼覺以無根本領受故若謂不遍者無因而許有果嗚呼妙哉緣過去等之分別應永不行於義以無向義轉之因故非有接近所取義故卯二破救分二辰一破由識功能盡故而轉二破雖是能生而非所取義故轉初又分二巳一正破二斷諍今初若緣我生識功能漸消盡轉向餘境者彼義覺何從前覺功能盡應不轉於義無前覺非覺著餘義失能未知生識故異類雖頓生由一極明心使失功能故非從阿賴耶而生起餘識非爾則意轉等不待餘意意識如次生亦成立相待若謂前識由能生緣我識之功能逐漸消盡故轉向餘境者破曰彼轉向義之覺從何因而有因應非有以前覺之功能盡故若許爾者則應不向義轉矣根本因決定以無先覺則後覺不生故如由貪着餘色義而失壞發生緣聲耳識之功能者則不見發生緣聲耳識故若謂由阿賴耶是一切轉識之親因故意着色時亦能生緣聲耳識者破曰雖由阿賴耶能頓生異類諸識然意增上貪着色之士夫應不從阿賴耶生餘緣聲耳識以由意增上貪着色極明利之一心能使引生緣聲耳識之功能失壞故意於境轉相等則餘後意應不相待以非從前覺生後覺故然後覺要待前覺亦善成立非僅由意着餘色時不生餘緣聲耳識之理已善成立即由意識依而生亦善成立故巳二斷諍若意是一故著餘餘不轉不生餘識者否有頓生故轉同一切時同故不解餘唯我意合生亦應頓時生從一一所作如何多見燈漸次亦無能後亦無別故此說身士夫若從行決定彼後從何生若即從覺者實爾是所許勝論派計意量如極微是常是一故彼若入鼻根着餘香塵則不住餘根故不生餘識非觀待餘有功能之同類識也破曰應非由意是常一故唯一一識生以有時多識頓生故又六轉識於境轉相等時亦應除一境外不了解餘境以一切時唯有一意相同故即如汝宗應多識一時頓生以常功能永不失壞唯由我意常和合相應而生識故若謂從一能作意唯作一所作故唯一一識生者破曰如多士夫共觀一燈則不應有以一能作唯作一所作故又彼意漸生多識之功能亦應非有以不頓生多識後時亦無不同之功能差別故此破常一意生識之理對順世派計大種常身能生多識及數論派計常士夫神我受用多境勝論派計常士夫為生識因亦說能破彼等以常住法都不能作任何所作故正理派若謂從我之功德行勝論亦計我之功德行決定唯一一識生者破曰彼生果非理是常法故若謂彼非常是後生者試問彼從何因生若謂即從前覺生者告曰彼後識之因隨立何名實是從前覺生觀待有功能之前識而生後識亦是吾宗所許故辰二破雖是能生而非所取義故轉分三巳一正破二破答三破異體功能今初所取由所取是能生非餘能生即彼相現無非所取無分無細等若謂彼前覺雖是後覺能生而非所取義故後覺轉向境者破曰所取義即由所取義門而為能生非有餘事以能生識具同自行相是所取義之相故喻如現相無非所取義之餘能生義若謂如現相由轉成細分便不作所取義如是前覺亦有時不作後覺之所取義者破曰前覺應無轉成細分之時以是無方分故巳二破答失所取功能非餘能生體有所取相者除取無餘生色等非如是於覺無饒益此除所取相有何餘定事覺亦有彼故彼亦住彼性能取因領受是心所取相色等及心法觀察所取相是覺未淨者瑜伽證叵思彼由微等體取成非所取色覺何先無有何為後生若緣自覺者即應緣彼自無間因之心故不解餘義若謂前覺只失為後覺所取之功能非失餘能生體性故後覺轉向境者破曰其有所取相者除所取義無餘能生色等若非如是所取義則於根覺更無直接饒益故於彼色上除所取相餘有何事決定為此根識之因無是事故即彼前覺亦應安住為後覺之所取義以前覺亦有能生後覺具同自行相之功能故又彼前覺亦應安住為後覺之所取義以是後覺之親因及所領受故此因決定以彼緣自覺之親因及領受即心所取義之相故他曰若爾他心應非瑜伽現量之所取義以非彼之能生故若曰此說色等由細分故非所取義及說他心由非親因故非所取義如是觀察所取相者是依未淨慧者而說以依異生說故聖瑜伽師了解境界之理如汝所解異生不可思議以如汝所解諸分別覺不能思議故若彼後覺緣自前覺者則後覺應不了解餘義以緣彼無間因心為所取義故此因決定以彼色法由成細分等體性先是所取後成非所取義而緣色等之覺先無何細分後有何生起都無有故巳三破異體功能無一多功能然說事本性能作一多果若非一生多非有一生一果從諸聚生一亦成二聚故說能作多若謂前覺雖是後覺之親因然不須為所取義以親因與所取義之功能各異故者破曰非由功能體一異而生果一多以功能體雖無一多而說由諸事體性能作一多果故若謂一因非生多果唯生一果者破曰應非從一因唯生一果以諸果法皆從因緣合聚而生故外曰若一因中無異體多功能者與經說一亦作多則成相違答曰無違雖是一因然由入因緣合聚二者中而說能作多果故喻如色法能俱生自同類及緣色根識也寅二破俱緣識義若謂由餘覺緣義及前識有現前後故觀察於一義常漸見誦說應成非漸次一亦二二現現了我彼故若謂由其後識俱緣義與前識故後覺於境轉者破曰常漸次見阿伊二字中觀察一伊字義之覺應非漸次而是頓緣所誦阿伊二字以是將前緣阿字之耳識及後伊字俱現為所取義故又一阿字亦應於現量前現二二相以於了我及了彼識二現量前俱現為所取義故寅三破雖無能受而於境轉若轉向餘境非領受後者如他所領受應一切無受若我受是現他受非爾者由何如是說我受由何成明因不成者非許明所明若不成明明眾生應皆明若謂由最後覺向餘境轉非所領受故無無窮與不於境轉二種過失破曰天授一切覺應皆無能領受以最後覺無能領受故喻如他人所領受自不領受也若謂喻義不同以我自所領受是現量所成他人所領受非現量所成者破曰由何如是說領受之差別不應正理彼我自領受由何量成不成立故他問若爾為何說眼根為明耶眼既不自明答曰眼根自明不成然可說為明以是根識明之因故許為明之根識非自不明而能明若自明不成而能明者則此一切眾生皆應成明故
