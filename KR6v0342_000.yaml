body:
  text: 法尊法師譯釋量論序佛家因明自彌勒無著等菩薩之瑜伽宗興漸成專門之學與內明並立相輔相成辨析日精其時約始公元四五世紀之交前此漢土無聞焉世親菩薩繼踵前修而作論軌論式西藏譯有解釋道理論漢土譯有如實論反質難品並題為世親作與元魏所譯傳為龍樹菩薩之方便心論西元四七二年出同屬因明古學雖楨幹已立而枝葉尚疏當諸家競立之秋異學爭長之際尚不足以適應無窮從容中道也逮乎陳那匡正頽綱廣造八論揭櫫量義以為宗極其集量論則薈萃羣説斥邪顯正理門論則廣明立破宣暢真宗微言紛論精義絡繹佛家因明賴以確立誠一代絶作也理門論玄奘法師譯之輔以天主入正理論及門諸賢敷陳發揮蔚為專科集量論則義淨三藏譯之然譯本旋佚後世無傳焉陳那菩薩的弟子有護法及自在軍前者傳唯識而後者傳因明法稱論師者出生南天竺婆羅門族甫逾志學精嫻外論不慊師承轉求真宗皈依釋門失姓無悔遂負笈中天參禮護法從受近圓具足德相復依自在軍學集量論聞法一遍見與師齊再覽之後解等陳那三復論義慧超先賢遂從師囑覃思作論妙辨如流世傳七支金聲玉振厥維釋量文有四品一四五四頌半其中成量一品即達二八五頌半釋成量義而以佛為量真蓋欲以量統攝釋尊一代教法掃玄言之紛紜闢實證之經路即現比以求真融言思於一味為説之精嘆觀止矣斯誠佛教思想發展史中之隨珠和璧也晚年獨取為自比量一品自為訓釋蓋以心之官則思思正則義明而神智通焉新理出焉數百年來科技發明日新月異正以概念本性之研究恩斯語成為極深研究之軌躅耳釋尊而後獨法稱得與龍樹提婆無著世親陳那諸賢比肩並稱為六莊嚴而為印土顯乘殿軍大師非無故也然其孤明獨映逈出時流曲高和寡知音罕遇論文既成見譏當世作頌明志撫卷太息智士無偶千古同慨法稱之説漢土無聞西藏後宏期始漸有譯傳丹珠藏中所收印土後世疏記約四百卷釋文闡義明教三派各有專籍其後宗喀巴大師二大弟子克主結與賈曹杰並擅因明蓋分主釋文闡義兩派也二師並有述作後世特以僧成大師之釋深入淺出義理明備奉為治斯學之圭泉諷誦研習更數百載不替法尊法師早歲耽道抗心希古入藏求法學窮閫奧譯業之富近世罕儔宏法之志老而彌篤慶法教之重興欣四化之在望用奮彩筆傳茲絶學大願卓行誠足以繼古德而勵來茲書成凡二十餘萬言佛典中之巨著也竊念法稱之學結印土大乘之終而陽春白雪漢土絶響高山景行徒傳名字法師此譯補三藏之缺文飫承學之渴望誦習可遵研究可據斯學光顯實利賴之謂為繼往開來之作誰曰不宜辛酉之冬余時於役外地適法師化緣已畢遽升兜率佛教界同仁擬將遺著付梓用廣宏通囑為作序不慧如余何足以宣妙論之精微讚法師之德業謹略敘源流以志仰止云爾至於詞旨之流美義理之宏富則法師之文具在閲者展卷即知無待淺學覼縷也謹序時辛酉佛成道日末學郭元興謹序序釋量論是公元七世紀印度因明學家法稱論師的一部量理論著據藏語系所傳法稱論師的量理著作共有七部他繼承了因明學大師陳那菩薩的學説並有所發展法稱論師的七部量理論著一般稱為因明七論即一釋量論二定量論三正理滴論四因滴論五觀相屬論六成他相續論七諍正理論前三部為體如人之軀體解釋陳那集量論的六門要義後四部側重解釋集量論部分之義如因滴論側重解釋比量之量式因義觀相屬論側重解釋比量之量式各概念的關係和合義及過類成他相續論側重論證他人之心理以成立唯識的道理諍正理論側重解釋為他比量合稱為七部釋論並有天慧等所作若干注釋迄今較完整地保存於藏文丹珠爾論藏之中釋量論為七部釋論的廣論在公元十四世紀宗喀巴大師在西藏創立了佛教格魯派僧侶學制之後以拉薩格魯派俗稱黃教三大寺甘丹哲蚌色拉為中心的顯教寺院都把釋量論列為必修科目宗喀巴大師的弟子如賈曹達瑪仁欽有譯為盛寶克主格蕾貝桑有譯為善賢根敦珠巴有譯為僧成等皆為釋量論作有注釋他們認為釋量論是研究法相抉擇正見所必須研讀的論典闡明了推理論證和衡量辨論正確與否所必須依據的思維規律釋量論原為對陳那集量論的釋論他把集量論的六門實為六品即現量品為自比量品為他比量品觀喻似喻品觀遮詮品觀過類品攝為四品即為自比量品自義比量成立量士夫品成量現量品為他比量品他義比量法稱對為自比量品自己作了注釋他認為分辨義理的是非須賴於比量智方能消弭邪智最終獲得明辨是非的理智而比量智必須依靠正確的因才能對所衡量的義理得到正確的了解他開宗以宗法由彼因所遍具此正因有三種無則不生唯限此似因則與此相違一頌概括敘述了正因的性相數目及其理據並包括了與三相相違的似因他的理論關鍵在於扼要提出因和宗所具有的有法和法的遍及關係更指出具備此種遍及關係的唯有果因自性因與不可得因此譯名尚待斟酌三種類型由此所謂遍及關係不外依據客觀的因果關係和自性關係建立對事理的表詮或遮詮這是立量所必須具備的條件亦即因所必須具備的三相遍是宗法性同品定有性異品遍無性法稱又簡約為宗法隨遍反遍的基礎所在據此他認為沒有別立喻支的必要而檢查因相的正確與否以同品有異品有同品有異品無同品無異品有同品無異品無四句料簡即足代替了九句因凡此都是陳那集量論中或引而未發或發而未盡含有批評意味的獨到之處絶非只限於解釋原文而已在成立量士夫品中法稱引集量論頌説歸敬為量利諸趣示現善逝救護者悲愍邪分別衆生如實宣説成量理前兩句頌文攝為五義謂成為量利諸趣示現善逝救護者其中成為量為抉擇之差別事其餘四義為抉擇之差別法此依與頌文所敘次序相順而言為流轉門與其次序相逆而言為還滅門何以要從此二門論述呢一方面為了論證成為量士夫的一切智者是遵行一定的方法逐步串習而成以駁敵論者認為一切智為無因生另一方面論證有由因所生之一切智是因為見到果位自利利他圓滿這就是先從流轉門論述的道理又為遮止故從還滅門論證以大悲心為成立量士夫的道理推知以菩提心及加行圓滿證無我智慧串習利他之行乃為主要行為從而又顯示了必須修持布施等六度總而言之從流轉門的論述旨在使人明了示現佛從何道修習而至從還滅門的論述旨在使人明了最初抉擇四諦道理方能證得功德圓滿如是從因圓滿到果圓滿即自利利他皆圓滿者才産生成為量之薄伽梵也才是真正的量士夫對此作反覆的論證其目的在於建立有前生後世的輪回説這是釋量論所要成立的核心命題在這品中法稱還對印度順世派等認為沒有業果相續的説法用較多的立破量式進行了批駁以建立佛為量士夫在現量品中論述量必須是新生非虛誑的認識因為由它所認識的事物唯有自相與共相所以決定量也只有現量和比量現量即現見的認識比量即推理比度的認識因為以自相為所現境之量必是現量以共相為所現境之量必是比量既離分別又非錯亂之智才可以叫做現量這分為根現量意現量自證現量瑜伽現量四種在為他比量品中旨在闡述所立量式之所以成為真必須具備的條件以及似宗因喻所犯過類簡言之為自比量品所論述的主要內容為具三相的因從而理解所立法而為他比量品所抉擇的主要內容為能立語即通過立量形式使人對立破得到正確的理解藏文文獻中關於釋量論尚有較重要的著作如法稱的釋量論第一品自注天慧對釋量論的後三品釋等以及西藏學者的不少注釋應當全部譯出始能窮源竟委窺其全豹再據以對邏輯學作比較研究實屬重要的一項佛學研究工作本書譯者法尊法師萃其一生精力貢獻於漢藏佛典傳譯工作在垂暮衰病之日猶能初步完成釋量論這一巨大著作的譯述這種獻力於佛教的精神是值得欽佩與學習的在法師譯傳這一著作的同時我適擔任藏漢大詞典因明部分的編譯工作每遇審名定義盤根錯節之處時想有機會能與之商榷沒有想到在我前往參加大會的前夕法師遽爾圓寂未及最後謁見承佛教界同仁囑為本書作序淺學如我愧何敢當勉就管見所及撮述本書梗概作為讀者研索的引線藉志對譯者尊公的悼念之忱民國七十年一九八一年元月楊化羣謹序引言釋量論是法稱論師為解釋陳那菩薩之集量論而造之義疏也內容分為四品第一自義比量品解釋立論者自身引生比量智必要條件正因等第二成量品解釋集量論的歸敬頌義成立如來為世間之定量第三現量品現量乃比量所依止之基礎本品廣釋現量之定義差別及似現量等第四他義比量品廣釋能立因等之得失闡明使他人引生比量智之方便本論總集因明理論之大成為世間各國研習因明學之範本在我國藏族佛教中已宏傳數百年為學習教理必讀之書而漢地佛徒尚無所知余不揣駑鈍茲將原文譯出並依僧成大師之大疏摘譯編成一部略解其於漢族研究因明學者或略有所裨益焉民國六十九年一九八年九月二十七日法尊記附注本論翻譯始於民國六十七年一九七八年八月二十三日動筆至同年十二月間因病停止又於民國六十八年一九七九年十月十四日續譯至民國六十九年一九八年二月十九日方譯畢前後共經八月有餘法尊附記釋量論略解科判目録卷第一甲一解論題義一甲二譯時禮讚一甲三論文義一乙一造論之支分一丙一供讚一丙二立誓造論二乙二有支分之論二丙一釋通達所量之能量自性二丁一明不現見義之自義品二戊一建立總體二戊二廣釋支分四己一釋三正因四庚一果法因四庚二自性因四庚三不可得因四辛一不現見不可得因四辛二可現見不可得因五壬一體性五壬二差別五壬三斷諍六己二於定詞斷諍六庚一斷依前後之諍六庚二斷依同時之諍七己三釋逆品似因七己四廣釋無則不生八庚一略標八辛一破他宗八壬一破自部自教相違八癸一明有繫屬八癸二説違自教九壬二明共同現量違害十一壬三破他部自許相違十一辛二立自宗十一壬一表因之遍相有待於繫屬十一癸一正説十一癸二於喻上顯示繫屬十二癸三知繫屬之勝利十二壬二遮因之遍相有待於繫屬十三辛三總結十四庚二廣釋十四辛一決定表因之繫屬十四壬一別釋十四癸一決定果因之繫屬十四癸二決定自性因之繫屬十五子一自性因之理十五丑一明因法同體繫屬十五丑二斷諍成立遺餘十六寅一標十六寅二釋十六卯一廣釋有之遺餘十六辰一破聲與分別為表詮十六巳一後心應無用十六午一所別事決定之後後心應無用十七午二能別法決定之後後心應無用十八巳二聲覺應成異門十九巳三破彼釋難十九辰二明由遮相轉明為遮詮二一巳一斷返遮與總別相等之諍二一午一説遣除者無過二一午二表相轉者有過二三午三聲隨欲轉應理二三巳二明遺餘之總二四午一境總之理二四未一世俗諦之世俗訓釋二四未二成立分別所現為於意樂為諦二四未三明彼執錯亂二五午二現彼之覺如何轉二六未一標二六未二釋二六申一總與共依之名言轉二六申二