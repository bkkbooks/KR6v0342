body:
  text: 法稱論師造僧成大師釋民國法尊譯編乾二破數論宗分二坎一正破二順破尼犍子派初又分二艮一敘計二破執今初若無捨離遮餘事物隨行一果非餘果極其各異故若由一體性多能作一果數論計二十五諦除神我為受者外餘二十四諦是所用法其中自性又名最勝是一切法即二十三諦之自性以三德平等功能不明顯位為相餘二十三諦即自性所生之果皆以三德為體故說一切法之生起皆以自性為總因今數論者曰若無捨離遮遣隨一切法行之餘最勝總者則一種子之苗果應非餘水肥暖等之果以種子與水肥暖等極其各異故若爾汝宗云何彼曰若在最勝總中同一體性由此多因能作一果艮二破執分三震一多因應無用二因果應錯亂三趣行應錯亂初又分二巽一俱有緣應無用二因果應無定斷諍今初一體有彼故俱有應無用彼無異自性離不行別定離一無果故從別彼等起所有能作義即是勝義有彼亦無隨行隨行不生果若如汝宗有隨一切法行之最勝總者則諸俱有緣如水肥暖等應成無用以一種子體性中即具備彼能生苗之功能故以無異體之總最勝離不隨行即普遍隨行又離水肥等別法所有之決定故若許俱有緣無用不應道理其苗等果法必須從諸差別俱有緣生起以隨離彼等任何一緣其果法亦不生起故又彼所計隨一切法行之最勝總應不能生果以能作義即有生果之作用是為勝義有彼勝義作用亦不隨行故有釋為彼勝義作用隨行總中無故巽二因果應無定斷諍分三離一異性無過二一性有過三結無過義今初故體性雖異有是因非餘此是其本性如麥種與稻種雖同是異法然有是麥苗之因而非餘稻苗之因或說麥種稻種雖皆與麥苗之體性各異然有者是麥苗之因餘者則非因以麥種生麥苗不生稻苗此是其法之本性故離二一性有過若無各異者應頓時生滅從彼有異故無如是過者一壞時體住非彼性是故不起總別覺遮無體性故不觀住不住總覺亦染壞故亦無破難彼之能生性其餘如何生異別性能生若非異亦有已說彼非生現亦不依餘作異即勝義彼是從餘返說彼為因果許彼是自相彼有取捨果故人皆趣彼若如汝說一切法於最勝總中無差異者則麥稻種子應頓生滅以於最勝總中都無異故若謂從彼最勝所生轉變即二十三諦分位有異故無頓生滅之過者試問彼最勝總在一別法如瓶壞時為壞不壞若不壞者彼最勝總應非別法瓶之本性以彼別法一瓶壞時汝仍常往故若許爾者則應不起總別之覺以汝非彼之體性故若謂別瓶壞時觀察總壞不壞汝遣餘之總豈不相同耶曰此不相同遣餘有三種且初義遣餘如瓶別瓶壞時觀其壞不壞此不能破說遣餘者以彼許別瓶壞時瓶亦即壞無過失故一瓶壞亦是瓶壞並不須一切瓶全壞方名瓶壞二無遮遣餘無遮是一名詞如一別瓶壞時由分別門觀察住不住者此不能破說遣餘者以說遮無實體性故三總覺遣餘即覺有總之心於一別瓶壞時觀壞不壞對說遣餘者亦不成過難以許是由分別所染即由分別假立故外問若無最勝總水肥暖等如何能生苗應不能生以離彼苗能生性之種子外是餘法故曰汝因不定要各異之差別性法方能生苗故若謂水肥暖等非異體之最勝總中亦有故彼能生苗者曰彼最勝總已說不能生彼苗最勝總無故有能安立諸法為異之理由以於不錯亂心現相時亦是不依餘緣而現為異故即彼異法便是勝義不增益而有故又即彼法是從餘返與餘不共住故又彼異法說為因果是能益所益故又彼異法許為自相能作義故又彼異法是一切士夫所趣境界是有取捨果故離三結無過義如無異無別非一切皆成如是異無別非皆成一切雖異由法性成為某作者如數論宗說物體無異雖無差別然非一切因普成辦一切果如是物體各異都無差別亦非一切因普成辦一切果以物體雖異然由諸法法性之力能使一因成為某果之作者故震二因果應錯亂無異唯一性作不作相違有異故無作俱有應不作若依次作者為彼事性耶為具彼諸事應極異不異有同不同性異門應互異若謂彼異者由何性說彼名差別名總若彼等各異成異性如是如瓶等互別雖許為總別不成總別者又如麥種唯作麥苗一性之作者不作稻苗之作者應成相違以與稻種全無異故若謂麥種無生稻苗之作用以與稻種分位有異故曰若爾俱有緣應不作生苗事以與種子分位異故若謂是最勝總依次為諸苗之作者曰為最勝總依次為諸事性之作者耶此不應理以是無分一故又具彼總之諸法應成極異與不異以於分位各異而於最勝總中是一體故又總與別應成異門互異以有同不同體性故若謂總別是異以總是功能差別是顯了故曰是則所謂諸法之總與差別應成異性以由是功能與顯了性而成異故如是雖許為總與差別然不成其為總別以性各異故如瓶布等互無總別之關係也震三趣行應錯亂由何性現前欲求所辦果此人即趣彼觀其異不異自體異遮同彼等各異性無事體隨行應趣等過故如牛體性現前其欲求𤚲乳載運等所辦果之人則應觀察𤚲乳運載所依諸差別牛有異無異而趣彼非趣於最勝總以諸別牛自體各異有從非牛遮相同而無隨諸事行之最勝總故若謂因不成者則求火之人應趣於水等以水火二法於最勝總中是一性故坎二順破尼犍子派即此對無慚無理隨便說彼等亦破除一向容有故一切二體性除彼差別故教云飲酪時何不奔向駝若謂有殊勝由此趣別者彼即酪餘無故非二是餘一切同體性覺聲應不異說異統攝者彼無故非有無慚派說諸法亦一亦異計諸法自性是一分位為異又亂說駝是酪又非酪等今即以破數論最勝總之理亦順便破除無慚派無理亂說之謬論以諸法物體容有一向故外曰其因不成以一切法自性一分位異皆具二種體性故曰若爾教云飲酪時何故不奔向於駝理應奔彼以汝除去彼酪與駝之各異差別故若謂酪有乳製成之殊勝差別由此故趣於差別酪者曰若爾酪與駝二者應非一自性應是餘性以由乳製成之殊勝即是酪於餘駝上無彼事故是餘二字頌文原本作非餘很難理解盛寶僧成二師注疏中皆作是餘解今據改但其餘注疏尚多未暇校訂又故非二句謂酪既非駝則諸法各異非具二性又一切法應不起異覺異聲以彼一切皆同一體性故若許爾者則計諸異法統攝為一自性之尼犍子派攝異為一應非有以無彼異故卯二無之遣餘則易成立無事無體故詮體非所觀即彼等言聲便成為遮詮問有之言聲分別可是遮詮無之言聲分別如何遮詮耶曰言無事之聲非應觀察是否由表體性門詮顯無事彼語已說無事體性故即彼等言聲已成立為遮詮以一切言聲分別皆已成為遮詮故一切言聲分別總分二類一表相言聲如言瓶衣青黃等二遮相言聲如言無瓶無衣非青非黃等遮詞屬遮詮易解表詞亦是遮詮則難知外人對此提出許多攻難故上文廣為辨釋神泰法師所著因明正理門論述記中解釋遮詮時有一段文很扼要茲錄下以資參考如云諸法有二相一自相唯根等五識等得非散心意等得也二共相即散心意識等得也名言但詮共相不能詮表諸法自相以自相離言說故詮共相要遣遮餘法方詮顯此法如言青遮非黃等方能顯彼青之共相若不遮黃等喚青黃即應來故一切名言欲取其法要遮餘詮此無有不遮而詮法也然有名言但遮餘法更無別詮但遮不詮即是止濫如言無青更不別顯無青體也子二自性因之差別分三丑一正說二斷諍三結合之差別今初自性諸差別待別或單純成所立故說如滅果及有問自性因差別有幾曰為成立所立故所說自性因有二種謂有觀待能作法之差別者或單純自性因例如為成立聲滅列所作果及有性為因所作性是成立聲無常觀待差別之自性正因以是成立彼之自性正因言所作之語即本身差別能作法故有事是成立聲無常之單純自性正因以是彼正因言有事之語不引差別能作法故丑二斷諍分二寅一諍二答今初若因有性有如何非所立差別無隨行失因及所立數論派諍云若有是自性因最勝聲義之有云何非所立耶曰汝難彼有應失壞所立若是唯有則已極成若是有之差別則於喻不隨行故是則彼有亦應失壞因若是唯有則遍相不定若是有之差別則於喻不隨行故寅二答分三卯一立有無用二唯有成因三由無能立故非所立今初若立唯有別於有法總上無少義可成如此亦無遮所別為所立此因無隨行若有是所立則別成所立數論派所立最勝為有之宗應是以有之諸差別為宗以汝說有為所立但唯有非所立故若謂於最勝聲義總有法上唯有之差別法是所立者如此唯說最勝聲義為有者對立者來說全無少許可成立之義立者是欲成立具有常一等德之自性為有對敵者來說僅有聲義亦非所破故佛弟子亦是破其計常一為萬物因之自性若謂是以差別為所立者則無於諸差別隨行之因數論說有為所立實是欲成有之差別為所立耳卯二唯有成因不取彼差別若成唯有事彼能遍所立隨行無失壞佛弟子以有事為因成立聲無常者是不取有事之差別唯以有事成立聲是無常所立法之隨行無所失壞以自成就時無常即能遍決定故卯三由無能立故非所立不成有法無依二有錯亂無法是相違有豈成所立彼最勝聲義計有實事如何成為所立以無成立彼之正因故若以有法為因有法是指能作義則於彼宗法中無若依有事無事二者之法為因則遍相錯亂若以無事法為因則成相違此說數論立最勝為有之宗不僅宗不成立亦無能立之正因若以有為法為因彼最勝非是有為法因犯不定過若以無為法為因則與實有事相違成相違因若俱依有為無為二法如所知性所量性等為因則遍相錯亂成不定因故數論所欲成立之最勝自性若宗若因俱不能成立也丑三結合之差別自性成能了彼能遍決定性定是所了此遮則彼遮譬無常所作非作則不滅此無常若遮則彼所作性亦遮以無常自性成就之所作性是能了其能遍所作性自性決定之無常是所了故因明結合式有二種一是同品結合式二是異品結合式初如說凡所作性皆是無常譬如瓶聲亦是所作性此語是同法結合能立語以是正顯因唯於同品有之能立語故二如說凡不滅者皆非所作如虛空聲是所作此語是異法結合能立語以是正顯因於異品唯無之能立語故子三自性因繫屬之能立無因故若滅自體即相屬諸事有所待則見無決定彼因縱眾多亦容有不遇以無果住故說滅待因者一切能滅因說皆成錯誤彼因無能故此由自性滅所說由何滅餘亦由自性問如何決定凡所作性皆是無常曰所作性滅是由自體相繫屬以彼滅是不待後起因之有事故若謂因不成者則瓶等諸有事應見滅無決定以滅要待後起之因故若謂彼滅有眾多因者縱有多因亦應有不滅者以容有不遇能滅因故諸說滅要待後起因者其所說之一切能滅因對於壞滅皆成錯亂以不定安住能滅果故如椎非瓶滅之因以彼無生滅之功能故又椎非瓶之滅因以瓶之滅是無事故又如此閃電是自性滅者以不待後起因而消滅故如所說閃電自性消滅之理由此定知餘山岳等亦應是自性滅理由相同故壬二總結故有事為境比量為二種果自性由彼定屬所立故由上所說果法與自性之因於所立法無有錯亂故以有事表相為境之比量因唯有二種以由果及自性繫屬於自所立法二種決定故一是因果繫屬二是同體繫屬如以煙比知火是因果繫以所作性比知無常是同體繫無此關係便非正因辛二決定遮因之繫屬分二壬一正說二斷諍初又分二癸一決定不可見不可得因之繫屬二決定可見不可得因之繫屬今初覺為先轉故彼性不可得即說彼不轉說不得為量論時無關係諸義超諸根由無因彼等不得故豈無非定有無果故不成為量如當前此處不現見鬼瓶之人決斷有鬼瓶之決智不轉以彼人對鬼瓶體性量不可得故此因決定以決斷彼法定有之決智轉者必得彼法之覺先行故彼人之量不得鬼瓶即說為成立彼宗之能立量以是成立彼宗之三相故問既不可得何以不成立決定為無耶曰彼諸不可見由不可得故不能成立為決定無有以彼義縱有三種定量亦不定能得故一聖教量諸論不說當時無關係事故二現量諸根不能得諸不現見義超越諸根現見境故三比量不能證無成立不現見義之正因故又彼人量不得鬼瓶不是於當前此處成立無鬼瓶之量以於此處非是決定有無鬼瓶之結果故總之就彼人來說既不能斷定為有亦不能斷定為無因為此義非彼所知故由彼不能了知即證彼不起決定智此是對不可見之物以不可得因證不能決斷為有為無此是以無因證無果也是因果繫癸二決定可見不可得因之繫屬若有殊勝因有者亦成量能知性不知此理是所說不知因能成果即無所有義自性有因性不得亦是若由某等因通達彼為無可見不見因若全非有者可見不可得當知為無事若有相違事能害彼有故得彼相違者決定彼為無不可得因亦有能成立為決定無者若有則可見為殊勝條件之因有此種不可得因即成為能立決定無之量故若爾前說由不可得不能成立決定無應成相違曰不相違前說由不可得因不能成立決定無之理是說縱有自性其能知量不能了知之不現見義故若爾何為可見不可得因耶曰如若不知火因則能立無煙果又義自性如無樺樹為有因即所立其不可得樹自性亦是可見不可得因問因與能遍不可得因由何成立曰因與能遍不可得因無不成之過若由某等可見不可得因即能通達彼因與能遍無故如瓶可見而無餘不可見之因即障蔽使不得見之因緣則由可見之瓶事不可得因能通達瓶事為無以瓶若有量須可得故又由與寒觸相違之火可得則能決定無有寒觸以有與寒觸相違之火事則於有寒觸能違害故壬二斷諍分二癸一於不可得因之數定斷諍二別於不可見不可得因斷諍初又分三子一明聲義二彼不能遮三斷違教諍今初無始習氣生分別所熏成依有無及俱聲義法三種成彼非事因謂彼不可得是因彼非無安立言說故一向勝義轉於見差各異諸義諸言聲無因應不轉過未生亦爾諸語亦應無虛妄義者故許覺義為境問若不可得因一為遮其定有二為成其定無決定為二者則說最勝非有不可得故應非不可得因以非遮定有及成立定無故以最勝若有則說非有自成相違若無者而言最勝不應理故曰最勝雖無而言最勝亦不相違由無始習氣所生分別熏習造成之分別心中現似最勝彼即最勝之聲義故聲義之法凡有三種以有依於有事無事及二俱之三種聲義故聲義即是言說聲所詮說之境義此義不須定有如說龜毛兔角等皆非有故為有事親因之最勝不可得者即最勝之聲義此即成立決定無有事親因最勝之正因以是成立彼之三相故彼最勝聲義非無以安立最勝之言說故問最勝若無自相則無最勝聲義以能詮聲一向於聲義轉故曰若如汝說則由見差別各異於所見諸義常無常之諸聲應不轉以無如是轉之因故是常則非無常是無常則非常決不能二種聲俱轉故知聲義非一向勝義有也又於過去已滅事及未來尚未生事聲亦應不轉以是無事故又諸語言亦應無成虛妄義者以言聲分別唯於自相轉故言聲分別非唯詮自相以許是以覺心中所現之聲義為境故子二彼不能遮撥聲義成立遣法所依故非和合所立是成立單法不撥聲義者由有無品別有事為所現從此生果故於不能作義求者觀何為中性人美醜欲者觀何益若誹撥云無聲義者其成立宗時則最勝聲義與無事和合即總宗應非所立以成立彼宗之所立法之所依被遣除故若謂許爾單法是所立者單所立法應非所立以敵者已極成故諸不撥聲義為求燒煮者是由有無品之差別而觀察火事即觀察有無火而趣於火非趣聲義要從此火而生燒煮之果聲義不能作彼義故若不能作義求者觀察何為全無義故如貪欲婦女對中性人觀其美醜都無所益子三斷違教諍分別智境故聲義是假立事所依不成言說正理者說唯此是法問若不可得是聲義者則與論說亦假安立不可得法而成相違曰無違以最勝事所依不成宣說正理者說唯此是聲義之法故若爾彼聲義云何是假立耶曰聲之義是假安立是分別智所現境故癸二別於不可見不可得因斷諍分二子一破計教為量二明計教為量是愚人初又分三丑一標二釋三結今初聲與事同時無無不生故非由彼成義彼顯說者意問現量比量不可得雖不能成立為無由教不可得應能成為無以教是以一切法為境故故教是能立自所詮者曰諸聲非能成立所說義以與所說事同時無無則不生之關係故彼諸能詮能顯說者身中之意樂以是成立彼之三相故丑二釋分二寅一破士夫所作之教是量二破士夫未作之教是量初又分二卯一釋違教難二破勝者語是量初又分二辰一難二答今初可信語不欺由總而比度問若教非量者與論說可信語不欺由總而比度則成相違辰二答繫屬順方便說士夫義語依觀察而說非依諸餘語於見及不見有事諸義理現量二比量無害此不欺可信語不欺由總雖不現無位故此覺亦說為比量所取所捨性及方便決定要義無欺故可比度其餘曰此不相違以是就前後繫屬顯示士夫能得隨順方便宣說士夫利義之語由遍觀察後說此教為量非就餘教而說故問彼教於所說義如何無欺曰此具三種觀察之教於所說義是無欺誑以是由三種觀察清淨之教故以是於可見現事與不現事現量與比量無害於不可見極不現事可信比量亦無害之教故從說極不現事可信之語由三觀察清淨之總新生通達於所說無欺誑之覺亦說是比量以是通達自境不現事之量於汝緣境無現量趣入之位故於餘極不現事亦應如佛所說而比度由於所取滅諦所捨性苦集二諦及彼方便道諦善決定門於四諦真理要義如佛所說無欺誑故卯二破勝者語是量分二辰一破他派二立自宗今初待殊勝士夫餘知如實義若對彼殊勝能知許彼義言如此或非他有過無過諸量難得故餘知難了達外曰觀待永盡諸過殊勝士夫之語餘人可知如實之義曰若能了知彼是殊勝士夫則可許彼語是量然若不觀待對彼士夫之言教加以抉擇則難了知彼人諸過永盡否以不觀待彼便言此人有無如此功德過失了達他人有過無過之量極難得故此是餘佛弟子所了知辰二立自宗減及依勝進皆有逆品故由習彼成性有能盡諸漏無害真實義顛倒極力阻成性終不退覺執彼品故一切諸過失薩迦耶見生無明彼彼貪從彼起瞋等由此說眾過其因為愚癡餘說薩迦見斷彼皆斷故問若爾無盡過者耶曰有人能盡諸漏過失有由修習無我義使內心相續成為通達無我慧之體性者故若通達無我之智慧增長則諸過減少若彼減少則依勝進之一切過皆有逆品能違害故問過失斷盡一次仍當復生曰究竟轉依之人雖顛倒極力阻撓然已斷苦終不退轉以無生死苦害現證真實義已成心性故以彼覺心專執通達無我之智慧品故問何為眾過之本曰一切過失非無因生是從薩迦耶見生故問若薩迦耶見為因與經說無明為因應成相違曰此不相違以薩迦耶見即無明故經說愚癡為諸過失因者以由無明而貪彼我及貪彼我所由此而生瞋恚等故又餘經說薩迦耶見為眾過根本者以斷彼薩迦耶見則一切過失皆隨斷故寅二破士夫未作之教是量分二卯一破未作之吠陀諦實二破一分不欺故為諦實初又分二辰一敘計二破執今初諸語顛倒因諸失依人故人不作諦義有者作是說外曰士夫未作之語是諦實義者以諸語是顛倒之因諸過失依士夫故是行者派有作是說辰二破執分二巳一破所立諦實義二破能立士夫未作初又分三午一以相同破二以待名破三以觀察而破今初諸語諦性因功德依人故餘說人不作豈非顛倒義士夫未作之語豈非顛倒義者以諸語是諦實性之因功德依士夫故是餘佛弟子說午二以待名破能了解義因名依士夫立語縱非人作故容有顛倒若繫非人作不了名應知若由名彼顯計餘應無能吠陀諸語縱非士夫所作義亦容有倒說以能了解義之因名言是依士夫而立故若曰此因不成聲義之連繫非士夫作自性成就故曰是則應不了解名言即能通達其義若謂不定要由名言而顯了彼聲義之連繫曰是則計餘連繫由自性成就應全無能力以了解義要觀待名言故午三以觀察而破分三未一觀察所詮而破二觀察連繫而破三觀察能詮而破今初諸語定一義不應達餘義若連繫多義應能顯相違士夫縱未作遍計應無義連繫諸異事立故應說因士夫未善作應畢竟無義若計善作者此真同象浴若聲義之連繫由自性成就者為各與一義連繫抑與多義連繫初則吠陀諸語與名結合應不能了達餘義唯於一義決定轉故次則吠陀諸語應能顯與所詮義相違之義以與多義相連繫故又吠陀諸語遍計士夫未作亦全無義以與多義相連繫故又諸各異聲義應無實事連繫若有彼者為建立彼應說正因而無因故又吠陀諸語應畢竟不能顯示義理以未經士夫善構作故若謂許曾經士夫善構作者則此吠陀派者真同象浴初為成立吠陀義諦實故計士夫未作後為能顯義故又計士夫作故未二觀察連繫而破分二申一觀常無常破二觀一異破今初繫者無常故繫屬常非有故義與聲繫是人覺善作若與義俱生於諸聲自性相反不應理假繫無此過若所依雖滅不滅常如類於常依何能由何許彼依由能生於智俱有因和合彼智可生故了智於瓶等生起許為顯諸不變無別能顯自何作何許彼顯彼若聲義之連繫有實事者為常為無常若常者則瓶與言瓶之聲汝之連繫應非有常事以汝有連繫者是無常故義與聲之連繫是由士夫覺慧善察而作聲義之連繫是增益故若無常者則吠陀語應與後義不相連繫以前義滅時已隨滅故若謂連繫與後義俱生者則此吠陀諸聲與後義無連繫之自性今相反者不應道理是常住故諸佛弟子則無為實事連繫所說過失以許連繫是分別假立故若謂所依聲義雖滅然連繫不滅以是常故如別法雖滅種類不滅相同曰由何道理許彼種類依諸別法不應道理於諸常法所依無有任何饒益功能故若謂別法能顯種類者曰如瓶等由了別智生緣自智時許用燈光照顯以能生緣自智之俱有因和合要以燈光方使緣自智堪能生起故然許彼種類要由彼別法顯了不應道理以能顯自身全不能作任何饒益事故外緣不能使起差別故無變異故此說能顯義如瓶在暗處眼識不能見要借燈光照亮方能見故燈光名能顯今別法對種類聲義對連繫皆無彼照了作用故非能顯更加彼計總類是常恒不變無有差別則諸別法對彼全無損益如何能為彼作所依作能顯耶申二觀一異破連繫成實事異故種種覺不異即彼性離此無餘事事性各異故繫屬分別作有實依賴餘如何成餘繫若許連繫為實事則聲義與彼實物為異非異若是異者則連繫與聲義應於不亂覺前現為種種事物各異故若不異者則連繫應即彼聲義體性以離聲義非有異物是一物故又彼連繫應非實事一物異物皆非有故此因決定以離一異物外無餘實事故又聲與義之事性是由分別作為連繫以物體各異故又聲義之連繫或依賴餘聲義或為餘聲義之連繫如何應理以實有故未三觀察能詮而破諸字當無義句遍計無事此有事連繫當如何而轉若吠陀聲與所詮勝義連繫者為與一一字連繫抑與句等連繫初則一一字應與所詮勝義不連繫不能顯義故次顯句等與所詮此實事連繫如何而轉應不能轉以能詮自所詮分是由分別遍計之無事故巳二破能立士夫未作分四午一成立吠陀是所作二成立無常三不作因錯誤四成立咒是所作初又分二未一破不作之能立二破不作性初又分三申一破不憶因二破能讀誦因三破無始因今初不憶作者故傳許人未作有隨此宣說故惡暗周遍傳說吠陀未經人作以不憶作者故曰行者派之覺慧為惡暗遍覆以不憶作者便計必定未作許有隨此而說故申二破能讀誦因猶如此士夫未從他聽聞於字句安布無有能說者有說餘亦爾編製諸餘論離師教授外曾見有誰讀何不如是比何類從何成無別如火薪餘未見因者正知由彼成見果相同故未說諸差別凡所宣說因一切皆錯亂有說其餘第八亦有讀誦為先是讀誦故如現在此人若不從他人聽聞則於字句安布不能宣說又黑女民論師所編製之討論何不比度非士夫作應當比度除有先前師長之教授者外其餘現在見有誰讀誦皆不見故其餘未見從士夫因生之吠陀亦應正知是從士夫生以現見世間語言與士夫之語言結果皆相同故此因決定以何類果從何因生成無有差別彼果定從彼因類生故如火與薪又彼吠陀未曾顯示士夫未作之差別凡所說一切因皆成錯亂以彼果定從彼因成故申三破無始因雖皆無始成然非依非士故士夫未作餘亦不依人蔑戾車等言說斷無等語無始故亦爾是先作因故如此人未作即成有何德義於功用別見故亦是疑吠陀諸論雖皆無始而成然不能因此便成立為依於非士夫所作以無始故便謂非士夫作者則餘言詞亦應不依人故又蔑戾車等之言詞及說無前後世之語言亦應如是非士夫作皆是無始故若謂是從前人先作為因而出故即成立如此名言非士夫作者曰如是士夫未作於成立吠陀是諦實義有何功德全無所益現見彼有顛倒義故又吠陀義一向決定是可疑惑現見說者功力配合差別義故未二破不作性分二申一破字未作二破語未作今初字餘無別故成立有何果若吠陀未作者為字未作抑語未作耶若字未作吠陀諸字成立未作有何結果全無意義以與世間餘字無差別故申二破語未作分二酉一破異字之語未作二破字之次序未作初又分二戌一以不可得破二觀察而破今初語非異於字以不可得故若言語未作者則彼語為異於字耶為即字之次序為語耶若語異字者然語非離字別有異體如是體不可得故戌二觀察而破分三亥一觀有無分破二觀常無常破三觀遍不遍破今初是多支體性彼等異無義非事假名事如云獅子等若各各有義多立是顛倒由通達一支當達諸語義頓了達一切應無時差別一性亦無異漸達非有故彼吠陀語為以多支分為體性抑無分一體耶若多分者為彼異分一一不能顯示義理抑彼一一分能顯義理耶若如初者則吠陀語應是士夫作以非一一分能顯義理之有事而假立為彼有事故如婆羅門童子假名獅子等若謂一一分能顯一切義者則吠陀語假立多分應是顛倒以一一分即能顯示一切義故又吠陀語通達一支分即應通達一切語義因同前若謂頓時聽聞一切支分無過失者則吠陀語應無時間差別也若謂是無分一體者則吠陀語應無漸次通達以無異分故亥二觀常無常破無常勤發故何非士夫作若常應常得以無障覆故若謂俱有因未具不聞者必待他寧爾決定則相違彼吠陀語為常無常若無常者則吠陀語云何非士夫作應是所作是勤勇所發故若謂是常性者應常可得是可聞之常法故此因決定以於常性無障覆故若謂由俱有緣有所不具故不常聞者何為觀待他緣即使爾者彼吠陀語常時決定亦應相違以待緣故亥三觀遍不遍破若彼非能遍非一切可得若遍則一切應頓時可得若作可得者無變何能作若根善淨者彼無餘應聞若由善淨別異故一義定聲聚多喧雜如何而得聞若聞彼散聲非是能詮者謂離聲有異當極信於此若餘聲靜住能詮如何聞又功能定故如何達異聲如由彼彼過不許聲能詮由諸聲所顯能詮如何無又彼吠陀語是否能遍一切處若非遍者則應非一切處可得以是不遍一切處之無分一體故若謂遍者則吠陀語應一切耳識同時可得聞以遍一切處又是耳識可聞之無分一體故若謂由緣所作乃可得聞故無過者彼吠陀語何緣能有所作應不可作是無變故若謂由根善淨乃可聞者則吠陀語彼根善淨者應無餘得聞是彼可聞之無分一體故若謂由根善淨差別決定唯聞一聲能詮之義以各異根各各決定故若爾耳識如何得聞眾多喧雜聲聚應不得聞以決定唯聞各各能詮聲故若謂從彼聲聚中但聞散聲非聞能詮者則離聲外有異能詮應極信受實不應理以離聲音外異體能詮有應可見實不可得故又諸餘聲靜住不誦唯一士夫誦詩詞時如何聞其能詮應不得聞以只聞散聲故又彼如何了達聲音異體以聽聞一一能詮之功能決定故若謂離聲音外有異體能詮以能詮能顯義聲音不能顯義故是有分故者則由有分等彼彼過失不許聲音為能詮者是諸過失如何能詮非有彼亦應有以是有分故酉二破字之次序未作分三戌一破字安布次序是未作語二破字顯了次序是未作語三明已破離字有異次序今初若謂字次序字無異故非彼亦無建立餘次序違故說遍及常故無時方次第無常非能遍過失前已說若謂字之次序是未作語者為字安布次序是未作語耶抑字顯了次序是未作語耶若如前者則吠陀諸字汝之次序應非未作語以與世間字所作性無異故吠陀諸字亦無一定建立次序許是常故常法與餘次序相違故又吠陀諸字應無時方次序以說遍常故無常與非遍亦不應理其過失前已說故戌二破字顯了次序是未作語分二亥一常則無顯二縱有亦非理今初顯次亦非語常則除顯故由功用所作成故即是果善知已成義許餘覺能顯如燈若餘者作者有何別由諸作和合所作事決定復得故是果能顯非有故吠陀諸字其顯了次序亦非未作語是常法故以常法則遣除以緣顯故又吠陀諸字是舌顎動作所成之果是從舌顎等功用新作成故若許爾者則除舌顎等能顯者外其餘新作者有何差別以能顯自智由能緣門於餘所顯同類已成義為能緣覺之因許為能顯故譬如燈光又吠陀諸字即是舌顎新生之果是從舌顎和合作用決定復新可得故若唯能顯必無新生故亥二縱有亦非理若謂作體性離障為顯者於無事功作和合有何能與聲無別故餘亦得為顯若如是許者諸因皆無用認識有合等所計諸能立無喻諸有事皆剎那壞故亦破餘惡因覺非依人者自許現世共比量頓違害若謂由舌顎作用使彼吠陀聲之體性唯離聽聞之障礙是能顯義者若唯離聽聞吠陀聲之障礙何故說汝是功用和合之功能應非彼能是無事故餘諸陶師應得為陶瓶之能顯以舌顎僅是吠陀聲之能顯以彼生吠陀聲之理與汝生陶瓶之理無差別故若如是許者別諸餘因皆成無用以彼陶師即是陶瓶之能顯故試問何為成立吠陀聲常之能立若謂認識即此及先有立名等許為能立者則成立吠陀聲常之同喻非有以諸有事皆剎那滅故其成立聲常之諸餘惡因亦應破除以諸有事皆剎那滅故若謂吠陀聲於耳識顯了之次序是未作語者則耳識應成常事以顯了吠陀聲常事故若許爾者則耳識應不依士夫矣若亦許者則應許餘覺亦不依士夫故行者派立宗貪覺不依士夫不應道理以如是宗自許貪心為士夫之德能違害故又行者派立宗苦樂覺不依士夫不應道理以如是宗現量能違害故又行者派立宗耳識不依士夫不應道理以如是宗世間共許及以比量頓違害故戌三明已破離字有異次序異字之次序已明顯觀察彼由分別增何非依士夫又離諸字計有異體次序亦非未作語明顯觀察已破訖故又彼文字次序如何不依士夫定依士夫是由分別所增益之次序故午二成立無常分三未一舉因二斷諍三明此亦遮餘執今初有即壞繫屬故聲是無常聲是無常性是有事故又彼壞滅從有事有時即繫屬故未二斷諍分二申一於無待因斷諍二於根本因斷諍初又分二酉一斷以餘壞因而壞二斷無壞因相違今初由火生餘義其壞無實故薪應猶可見若彼由此壞如何餘壞餘寧薪何不現彼持故不現非彼不障故生故壞有壞如是薪應見若如殺殺者罪人不復生於彼亦如是能殺非即殺若壞非餘性薪應即壞性彼無故非因此外無餘相若謂其因不成以由火使薪壞生為餘義若爾薪焚燒之後應仍可見以薪以前可見薪壞無實物故若謂即彼餘義之壞是彼薪之壞者餘義壞如何能成薪之壞以離薪外是餘物故寧許彼是薪之壞試問何故薪焚燒後薪不復現耶若謂由彼餘義壞所攝持故不顯現者彼薪應非由餘義壞攝持映覆而不現以彼不能障故彼餘義壞亦應有壞以有生故若許爾者應自成已第二剎那即應壞滅若許爾者則第二剎那薪應可見以於爾時不見薪之因已壞滅故若謂如殺罪人之殺者被殺其罪人不能復生如是壞此薪之壞雖滅然薪亦不能復現曰罪人之殺者被殺罪人不能復生與薪壞已滅薪不能復現並不相同以罪人之殺者非即罪人被殺分而薪之壞即薪之滅分故又彼薪應即壞性以除自壞非餘事故又火應非薪滅之因以彼滅是無事故又火應不能生薪之壞以薪之壞與薪若一體異體俱不生故以離此一體異體亦無餘事相故酉二斷無壞因相違分三戌一斷事與滅同時有二斷自相同三由此亦遮餘理今初壞雖是無因常故有事壞同時俱有者無事由何常於無則不犯事不壞過失不許諸有事由壞而壞故為知有事壞不觀待餘故心增益彼異說彼住無因若謂壞雖是無因然薪事與壞可同時有以彼壞是常事故曰薪之壞滅由何而是常事應非常事是無事故若謂薪應不壞無餘能壞因故曰許無餘能壞因者不犯薪事不壞之過失以不許薪事由餘能壞因而壞是從自因生於壞故外曰若薪從自因生於壞者與前說壞無因相違言薪之壞第六囀聲亦不應理曰於薪壞位說為無因有其意義是為了知薪事壞時不待餘因故其薪與壞雖非餘物然可用第六囀聲由分別心增益似異於薪云彼薪之壞用第六聲故戌二斷自相同若無從自有此分別相同無彼少許過僅是成為無有則此分別成與事繫故說言是無者亦是非有事若少有所作則是觀待餘若事無少作何為有所待外曰薪滅彼無應是從薪自因已成就而有以從薪自因而生於壞故若許爾者則觀察一體異體之分別於汝亦相同曰薪之壞滅無有少許觀察一體異體之過失僅是成為無事故若計薪之壞滅是有事者則有觀察一體異體之分別以凡由因成就者則與有事一體異體隨一繫屬故若說薪滅是無者非說滅從因生亦是說薪滅已即名非事故又彼火事豈是薪滅所觀待事若有少許饒益事者可觀待他汝於薪壞不作少益故戌三由此亦遮餘理以此雖無因未生而壞故先有與壞過太過亦除遣以此說滅為無事即遣除太過之失謂薪從未生即應壞以壞是無因故若許爾者則未生之前應已有及應壞故如何遣除謂滅非從因生是無事故申二於根本因斷諍如有具生者則許有碍性如是諸有者有是可壞性有非生則非由因性決定果性則決定無諸異因故無常性無異外曰如具生法有者是有礙有者是無礙如是有具生事是有壞性有非具生事是非壞性故非有事皆可壞滅曰果法離無常性無異體性以離無常無生異體之因故以從因性決定而果性決定故未三明此亦遮餘執故彼等繫屬常性已遣除聲能由前說連繫過已遣彼等聲義之繫屬亦遣除常事凡是有事皆無常故由聲了解義理之功能亦非常事以彼由前所說於繫屬常事之過失已遣除故午三不作因錯誤分二未一正說二破釋難今初言士夫未作非能立知實無人過造失火等見餘相計彼為未作不成為智因於諸常住中全不生事能分別習氣生增益行境覺有從彼所生非義為行境言士夫未作不能成立吠陀了知如實義即無士夫過失所作過失之火等已現見可成為餘相顛倒之因故即許吠陀未作亦不成為了知實義之因以諸常法都無生有事之功能故若謂此因不成以緣虛空無為之分別成就故曰其緣虛空無為之分別覺是從習氣所生非以所取義虛空為所行境是以分別習氣所生之增益為所行境故未二破釋難若謂所作者見為顛倒故未作語義實反則違遍故無故未說因則疑彼容有有事於相違亦見能遍故由不得不成遍無前已說無性若不成於遮生疑惑若隨行及遮於宗有法有由決定果智成者是能立若所立異品說其遮遣性即成此同法故因皆隨行若謂未作之語是實義者以未作相反則與實義遍相違故現見所作語是顛倒故曰彼士夫未作於成立吠陀是實義之異品亦容疑有以為成立彼於異品無故未說能立因故若謂士夫未作應於顛倒義無以見於實義有故曰彼因不定以於勤勇所發非所發相違事上現見一有事即能遍故若謂士夫未作於顛倒義應無於彼未見故曰此亦不定以不可得不能成立一切皆無前已說故又士夫未作於成立彼宗之遮性應有疑惑以於異品不能成其唯無故若許爾者則非成立彼宗之正因若是能立正因須有隨行返遮於宗有法決定有性為果之智所成就故又逆遍成就之一切因皆應有同品隨行凡說於所立異品相返性時即顯此因法於同品轉故午四成立咒是所作分三未一正說二成立作者殊勝三若非殊勝自語相違初又分四申一由名言辦果二破由聲功能成辦三破由加行成辦四釋無次序相違今初有編製名言諸咒能成果諸咒語是由某等士夫所編製名言以能成辦息實等果故申二破由聲功能成辦若謂事功能無別餘亦成若謂是餘義安布前已除彼義應常成有待應無能若事能如此彼應皆能成非由善作故不待作者別若有事作為亦事異成異非由作者別能定由言成若謂唯由諸字事物之功能而辦息實等事者則從所作餘顛倒儀軌亦應能辦息實等事以儀軌顛不顛倒字無別故若謂離文字是餘義安布者亦非是咒前已破除有餘安布故又彼諸咒應常成辦息實等事以常能轉息實等故以字功能常時有故若謂要待餘緣方能辦息實等事者曰餘緣於咒無裨益之功能是常住故諸咒要待餘緣方能成辦息實等事則唯字事便無息實等功能又彼諸咒應一切人皆能成辦息實等事以若唯由字事功能便能成辦如此息實等事故若謂要如此修儀軌之婆羅門方能辦息實等事者曰諸咒效果不應待作者之差別以非由士夫善製作故汝計唯由字事之功能故若許爾者則非由作者差別而息實等之功能決定也若謂有事由緣作為者則有事各異是由因緣各異而造成非由是否婆羅門而別也若問婆羅門與旃陀羅等種姓差別由何而成者曰於勝義中實無種姓貴賤之別唯由世間名言分為種姓貴賤故吠陀諸咒非與婆羅門方與息實等果不與旃陀羅等是由士夫智力製作名言起如是作用故即由咒力生效非由種姓生效又吠陀諸咒息實等之功能非由誦咒等作者是否婆羅門等差別而決定是由製作之名言而成辦息實等事故申三破由加行成辦差別無可作作何成作者若顯為加行彼前已遣除若彼覺是顯彼合於果者說者是顯因聽者應繫果若不顯微誦聲功用加行意誦應無義聲是耳行境間從彼生故彼覺亦顯者若有義不成分別隨行故自與共自性欲一體而誦由諸言誦故不違非由事諸婆羅門由作何事而成修咒之作者應非作者以咒差別無可作故若謂能顯諸咒是於咒果加行者曰咒果非緣能顯是常法故常法由緣顯前已破故若謂彼婆羅門是於咒果修加行者由誦咒緣彼有顯咒之聞覺故若爾自不誦咒聽他誦咒者之旃陀羅亦應與息實等咒果相連繫由說者之因使咒顯故又若咒聲不明顯僅以發聲之加行微音誦咒或以意誦咒應無義咒聲不明顯故非耳識所行境故聲是耳識所行境故若謂以意誦咒時之分別覺亦是咒之能顯以是間接從彼咒聲所生故曰若意覺分別應不能成立有咒聲之義為所取境彼是前同類分別之隨行故若謂汝自宗過亦相同意誦應無作用曰以意誦咒而息實等亦不相違以咒自相與共相自性欲為息實等一體性而誦之心所發起如製名言者所製名言而誦故諸咒非唯由事功能而成息實等事息實等事待名言故申四釋無次序相違分二酉一難二釋今初若無次序者聞說味與海應無差異果若聞說味羅薩與海薩羅應無了解異果以彼字無次序及差別故酉二釋分二戌一明次序二明差別今初彼依士夫有字從起智生從智而生聲有彼差別彼是由耳決定由彼智生智聞彼非疾聞由待憶彼故能憶後體性彼是因持心諸字因與果說是諸次序彼由士夫作彼文字次序是依士夫而有諸字是從前發起智而生後發起智從有次序智而生有次序之聲故又文字次序是依士夫而有以彼前字之差別至彼後字是由耳根漸次決定故又彼字次序是依士夫而有以由彼聞前字之智生起有智之後字聽聞彼字時非有速疾徐徐聽聞觀待憶念前字而生憶念後字之體性故以上三段初是次序之起因次是構成次序結果後是次序之後果彼等諸字是士夫所作以是自因發起心之果及是緣自心次第之因由此說有諸字次序故戌二明差別故彼字體性句與句他性作者功用異共作果差別彼諸字次序編製而詮轉不違欲成序常住相違故士夫與諸字因果性成故字序皆從士如火與薪理說薩羅海之句與說羅薩味之句各有二字體性是他物性是從作者功用行異而生故共同讀二字連讀時即了解為海味之結果差別各異故彼字次序非常住事由欲編製而詮轉故與欲樂不相違之次序與常住法成相違故一切字次序皆從士夫生以士夫與諸字成為因果性故如火與薪之理未二成立作者殊勝諸智力士夫能作咒次者不共性成就餘無彼能故有了知續者作某等密咒彼是主者力隨彼說理故欲果作諸咒應說士夫作成立士無能由此而除遣所說覺根語士夫等能立似量有餘故非能達實義諸具智力能新作咒次序之士夫已成為不共餘人者以餘常人無彼智力故若謂此因不成以大路人亦有能作消毒等事者故曰若有了解揭路茶續之士夫作某等密咒彼等消毒之功能主要是作揭路茶續者之功力以是隨順彼所說道理而行乃生效故諸咒應說是士夫所作以欲求息實等果而製作故今此成立作咒者殊勝亦有所為是為破除說士夫無見超根義功能之能立故以彼所說有覺有根發語是士夫等能立皆非能通達如實義之正因以是似量即似因故是有餘因故未三若非殊勝自語相違分二申一正說二破義決定今初聲自體不說此義此非義士設立此義彼復具貪等一了義非餘誰作此差別如是有人知汝為何不許若語量不欺說彼了義者諸極不現事非有量能知誰語量不欺彼所作語言得謂正教故非士作無義若極不現義無教有知者則許超根義有能了知者今顯說無殊勝士夫與說勝比者外道人名了知吠陀定義自語相違行者外道名士夫是汝假立此定義以汝假彼定義而吠陀聲自體不能說此是我義此非我義故若許爾者汝不能成立彼定義以具貪等故如勝比者如是有餘士夫亦能了解定義汝為何不許不應道理汝說勝比者了知定義唯彼一人了知定義非餘能了如此差別是誰所作無能作故若謂誰語於所說義以現量不欺即說彼是了知定義者曰如諸天與梵等非是勝比者之現量所能測量是極不現見事故汝為成立吠陀是實義者故以非士夫作為因應全無義以說勝比者所作語得為正教故以說勝比者之語由現量門於所說義不欺誑故汝現已許諸超根義有能了知者以極不現見義雖無正教有能了知者故申二破義決定分四酉一破由量成二破世許成三破吠陀自成四破自性成今初或自具貪等餘非了明義吠陀非能了誰達吠陀義故欲生天者聞說祭祀火有謂食狗肉非義何量證勝比者自己應非了知吠陀定義者以具足貪等故其餘士夫亦不能了知吠陀定義以具足貪等故吠陀自己亦不能使了知吠陀定義若彼能使了解則講說者都無義故吠陀定義由何量能通達都不能達以勝比者及餘士夫並吠陀本身皆不能通達吠陀之定義故若許爾者則欲生天者聞說祭祀於火說食狗肉非所說義於此有何量證都無定量由上所許故酉二破世許成世語共計者彼有種種義誰辨此聲義超根義誰見見非世許義天天女等聲如是聲於餘起如是分別世許諸人語不許彼為量復由彼達義此欲瞋何為若違越世許分別有何因世許非量故執彼有何因世許於聲義決定生猶豫以見彼諸聲種種義轉故由未見決定有各種功能聲自引疑惑餘無不可故若謂阿伽尼貨黨祖呼耶達底吠陀之聲義是了解為注酥於火內以世間語言共許如是故曰世間共許有種種義之聲義誰能分辨決定此義全不應理超越根義有誰能見無能見故又吠陀之聲由世間共許不能成立汝義決定以見汝所說義與世間共許不相同故如世間說天神之住處為天趣彼處之女子為天女汝說天趣為欲樂天女為器具故若謂彼吠陀聲阿伽尼等是了解為注酥於火內以吠陀本釋中說故曰於根本吠陀如是聲諸餘注釋不能成立吠陀定義以餘注釋中對根本吠陀所說起如是過失之分別故即阿伽尼咒聲既可作為燒護摩解亦可作為食狗肉解故注釋中起疑惑分別不能決定汝何為復欲以世間共許而通達吠陀定義此不應理汝原說世間共許乃諸人之語不許為定量而瞋棄故即為何時而瞋恚不許為量又時而愛欲用以成立定義耶若謂汝以何因緣違越世間共許分別彼吠陀聲為食狗肉之能詮耶曰汝以何因定執世間共許為成立彼之定量彼非量故又即由世間共許於吠陀聲義之決定引生猶豫由世間共許現見諸聲於種種義轉故又吠陀自身使未見能定者懷疑汝能於種種義轉除所說義非不能向餘轉故酉三破吠陀自成有說此是路是此株杌說餘謂是自說當觀彼差別可於一切轉而說顯一義是由何而定除說欲決定何知超根境說欲是定因言是彼能顯彼非人則無彼非唯一義若謂吠陀為勝比者說其定義是彼為我行者宣說曰如有人問何者是往城市之路有狡獪者謂是此右路是此株杌所說餘人則謂是自己說對如是兩人所說當觀察其差別是各隨己欲而說都無差別其株杌全無指示道路之能力故行者與餘講吠陀定義之外道二人皆各隨己欲解說吠陀定義全無差別以汝二人皆欲說吠陀定義而吠陀自己全無宣說定義之能力故又吠陀聲由何決定唯顯一義全非決定以於一切義皆可轉故除隨說欲決定義外於超根義無能知故又吠陀聲由何知彼唯於一義轉應非如是以計士夫未作故此因決定以樂說欲是決定義之因名言是決定義之能顯非士夫作彼非有故酉四破自性成若由自性定於餘彼不可言亦成無義名顯性差別由何而決定隨自何所欲何謂定於彼故言皆可立非唯顯汝欲若謂吠陀聲由其自性決定各是一義之能詮者則餘說者欲作餘義解彼應不可轉全無所了解又以名言解釋如云此聲是此義亦應全無意義若謂名言亦唯顯一義者曰彼吠陀聲決定唯顯一義由何決定應不決定是由名言了解義故又非唯顯行者所欲以可隨欲配合名言故凡隨自欲而轉者則全無唯詮一義之決定故卯二破一分不欺故為諦實分二辰一敘計二破執今初吠陀一分故餘亦應如是如火禦寒實餘作如是說若謂阿伽尼等吠陀餘聲亦是如是真實義者以是吠陀之一分故譬如說火能禦寒之語是真實義行者等餘人作如是說辰二破執分三巳一能立不定二破所立三破太過失今初味同體同故一器餘亦熟有餘錯亂故知理如此破若謂吠陀一分如是是成立阿伽尼等吠陀有真實義之正因不應道理了知正理之陳那論師如此破云是成立彼之有餘錯亂因故譬如為證餘果與所食果其味相同而云與彼色體相同故又如為證所食餘飯皆是熟飯云與所食飯同在一器中無差別故巳二破所立士常為作者諸事常超根根所取諸事因住壞不等餘由二種量遣除為行境違依教比量諸所有言說未遣諸相違論義亦未顯計彼義諦實娼婦以吵勝又行者派計吠陀有真實義與諸娼婦唯以吵嚷勝其夫主相同以士夫常證為作者及受者故說諸有事常故說超根之總義等是根所取故說諸有事因不平等常法為因住不平等成已由緣而住滅不平等由後起因而壞滅故復說許多量相違事為二種量所遮除之行境及與依教之比量相違故如計覺是不現見事為現量所遣除計吠陀有真實義是不現見為比量所遣除說沐浴等能淨罪障為自許所遣除等對以上所說一切相違過失未能除遣對吠陀論之定義亦未善解說僅以一分不欺誑便計吠陀有真實義故巳三破太過失若如是量成則此何非量士夫多說中非無一實義若由一分不欺誑如是便能以量成立吠陀有真實義者則此語言何有非量以諸士夫說多語言非無一語是實義者故丑三結聲住於說者非事性非果除此相反者亦無不錯亂諸能詮轉趣見所詮而作彼此相違義如何通於一故教與諸事任何了達者不成無不生彼能定何義故彼雖遮返不成有事無定無為果者不得不能成此能詮聲應非所詮事之自性或果以是住於說者之樂說欲故若許爾者則於所詮義全無繫屬以除此同體繫及因果繫外其相反者即非二種繫屬者無有不錯誤之繫屬故若謂能詮之轉趣是由見所詮而作故能詮是所詮之果者若爾常無常彼此二種聲云何於一聲而轉如說聲無常或說聲常應不能轉以常無常是互相違義故又由彼教能決定何義都不能定以教與所詮事任何通達者都不能成立無則不生之繫屬故由教於不現見義不能以不可得故成立決定無之結果以彼教雖遮返即無彼教亦不能成立不現見事為無故雖無能詮教仍有所詮事故非因果繫屬此品略義謂於抉擇自義比量之支分中須廣抉擇決定因三相之方便不能如實了知彼理之原因是由於未能無例通達言聲與分別是遮詮之理之所致故廣抉擇遣餘及彼詮顯之理一般引生比量智並不須了知遮詮之差別今於求解脫之支分中須無例抉擇證解脫與一切種智之道若不了知遮詮之差別則於增益執未斷謂斷於不須斷者反謂須斷顛倒執着喪失大義為除此過所以廣說遣餘之理次因敵者對不可見不可得因起邪分別謂現比二量不可得雖不能成立為無然不見教中宣說則能成立為無以造教典即為抉擇一切所知之真理故凡有者教中即須說故在破此執之支分中廣破計吠陀為量又敵者未見教中宣說亦不能成立為無即教中有所宣說敵者亦不定能見故又先未了解之義唯以教證新了知時須觀待名言若以教中不可得便成立為無者須於一切所知堪為定量士夫之言教中全都遮止方能成立非僅一分未見便能成立故彼教亦非以士夫未作為準以彼都無顯示真義之能力故許士夫所作言教為定量之方便要先觀察彼所說語審察清淨方許為量非先成立無過士夫為量其後即許彼所說語為量為使了知此義故廣破吠陀為量等子二明計教為量是愚人計吠陀量有作者計浴為法種姓傲為滅罪故行苦惱是愚惡慧五種相行者派愚癡惡慧之五相俱全一計內容相違之吠陀為定量二說有常士夫為作者三計僅作沐浴便使法增長四縱無功德謂是婆羅門種而生驕傲五為滅罪惡苦惱身故
