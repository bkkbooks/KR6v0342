body:
  text: 法稱論師造僧成大師釋民國法尊譯編子三破餘類之能立分二丑一正破二雖無餘類而多法一聲轉今初異於有事者類等無比量有杖等一切世俗立名言有事殿鬘等聲亦非待他若房是具者彼鬘復是何若是種類者一房猶如樹亦應說為鬘於眾多殿鬘彼聲如何轉種類無類故於鬘等大等所許假立者與實無差別識取故非假即許實轉者非餘因相同六等句義聲見待何餘因如共稱所成真名彼同故如是說俗名事立無事故共稱隨名行彼隨樂說行名言義所作如韵名聲分外曰牛之別法有餘義總以總聲與總覺轉故譬如由有餘別法杖故其人名有杖者之聲轉破曰以聲轉之因緣成立離有事外有異體之類等應無比量有杖者等一切亦由世俗分別安立有杖者名言故法同上外道計六句義為有事及宮殿殿鬘如說殿羣殿組等之聲亦非待餘義種類故若謂房屋非是實事是異類塵和合之具也試問其殿鬘是何事若謂是殿種類者則獨一殿堂亦應說為殿鬘以殿鬘是汝之種類故譬如一株栴檀亦說為樹樹是栴檀之種類又於眾多殿鬘其殿鬘聲如何能轉應不能轉以殿鬘是種類於種類上無第二種類故是外自許又殿與殿鬘等大等聲應不轉以除汝外無餘義之大等故大小等即宮殿本身之差別非離宮殿之外另有大小等差別若許彼上大等聲由假立而轉者破曰大等聲應非假立以與實大如大山等無有差別同是識所取故若謂詮有餘義能別法者為真名詮無餘義能別法者為假名者不應道理即許名實轉者亦非有餘義能別法為因彼相同故真名假名都無餘實能別法又宗同上以於六句義六句義之聲轉見待何因無所見故又宗同上謂如由共稱所成之名是為真名其與彼義相同故於如是說真名之後隨成而轉者是俗假名故如獸王力大勇敢名獅子若人亦力大勇敢亦呼為獅子即假名獅子如癡呆子事假說無子事故由無能承父業之子假說無子若謂其因不遍以世共稱是由事力而轉者破曰應非爾非由事力而轉以共稱是隨名轉彼名復是隨樂說而轉故外曰若無餘義之種類則合聲應無義也曰不成無義以於名言時即在言說時為使了解其義而作彼聲故立彼名也如韻譜之名曰持華鬘於聲之部分曰字界字緣假立其名丑二雖無餘類而多法一聲轉分二寅一標二釋今初雖異由事法如是識因義彼識於彼等即如是了知異了知無異其知亦如是故離無彼果隨行無一事於諸事有故事聞有彼邊問若無餘義種類則於多法如何一總聲轉曰如諸別樹雖物各異而由彼識如是了知為一類是由事物法性為執為一類如是識之因義故緣各別樹之眾多根識如樹亦是一類物雖各異而是了知類無異之因故又各別樹非有一常事總離無彼樹之果而隨行故彼樹果即緣樹之識無彼果即非彼樹離無彼果即遮非樹遮非樹即樹總隨一切各別樹行但非常一實事於樹事言樹之聞者是以彼樹為邊際者是為了解諸別樹上有彼遣餘而合名故聞謂可聞即說物名之言聲下同邊際或曰究竟即說最後達到該事故以彼事為究竟合名謂名與義結合即於彼事說彼名也寅二釋分二卯一斷諍二明立名之境今初外功能遮斷雖無觸彼聲其分別影像彼究竟相屬遣餘究竟故說聞能遣餘外曰言樹之聲應唯詮樹事以彼詮說樹究竟故若許者則與前說聲義為所詮相違曰彼樹聲雖不能觸及外能作義遮遣非樹然彼樹聲是以樹之遣餘為究竟以依彼聲緣樹分別之影像與彼諸樹之究竟相繫屬故樹之究竟即各別諸樹言樹之聞名為了解遣餘而說是為了解樹之遣餘而合名故卯二明立名之境分二辰一破他派二立自宗今初如遮由諸聲於識現餘影彼亦非義體彼從亂習起彼若由聞說能知義何分不知為彼義作名則無義聲詮義何分當詮彼遣餘彼相於義無說彼豈義依隨行聲隨行義果由見習所變無隨行由覺無異故以知彼事益了知遮餘故何為其聲義說即彼無違識由聲所變彼等所現遮此隨義分行如是聞遣餘外曰由從非樹返即是樹故樹聲唯詮樹事曰從諸樹聲所起之分別識如遮非樹所現餘樹影像彼亦非義體性之樹分別心所現之影像非真實樹是由錯亂習氣所起之現相故自部有說緣樹分別之所取相是言樹聲所詮曰言樹之聞名能了知樹義何分應不能知以詮緣樹分別之所取相故若謂不了知者則為了知樹故設立名稱應全無義外問若爾樹聲詮樹何分曰詮說遣餘是能了樹之遣餘故緣樹分別之所取相由詮汝如何是了知樹義之所依應非所依以樹義中無彼相故若謂其因不成隨各別樹行之樹聲所詮義果為緣樹分別之所取相彼相是隨各別樹行者曰由見樹慣習所變現緣樹分別之所取相是不隨各別樹轉者以與緣樹分別覺安危無異故同安危即是一體外問若爾樹聲之義為何耶曰說即彼樹之遣餘是彼聲義並無相違依彼樹聲緣樹分別所現相增益為彼樹事由了知此而能了知遮非樹故由言樹之聲所變起諸分別識彼諸識所現從非樹遮返即遣餘即諸別樹之總以於別樹義分皆隨行故言樹之聞名是樹遣餘之能詮以是能了樹之遣餘故辰二立自宗故於立名時亦見自為果與說義屬故遣餘與聲屬待不見於餘待有見彼故遣餘與聲屬彼於事不可言樹之聲與樹之遣餘相屬在立名時亦以見樹自體為果與前所說義之遣餘相屬故彼言樹之聲是與遣餘相屬而不可於常事總轉以待除樹外不見向餘轉及待見向彼樹轉故癸三結義故無類等具於義及彼等非聞相繫屬遮餘合聲故非有與彼常事類等相應之義以無常事種類故若有常事之種類方可說與它相應義彼常事類且非有如何可說有與彼相應之實物耶外計種類功德事業等是所相應的支分實物是能相應的有支分如勝論派義又非於常事種類相應之義即實及彼常事種類等以根識將聞名相繫屬以彼等非有故彼等雖非有然可結合樹聲是於遮餘非樹之遣餘上結合樹聲故這段總說沒有外道所計常法種類等故亦不是於彼等上設立名聲而一切名聲只是與遣餘相繫屬於遣餘上立名壬三再破是合名分別分五癸一以前後執空破二以分別餘而見破三以應無能受破四以應無了知自相破五以見與分別是餘因破今初以念名為因所見合雜性執前後所空眼識彼如何眼識如何是以念名為因將後見之義與先見之名二者合一為體性之分別耶應非是彼以由前後執空故根識不執前名後義為一法故非合名分別癸二以分別餘而見破心向餘轉者眼見眾色時不明執彼名無彼生分別於何定立聲於彼生分別根生隨欲轉應不見外境其分別心向餘境如聲轉者眼見諸色時其根識亦無由名所生之分別以不明了緣彼名故又解此句為明了見境而不取彼名故如緣色時不緣色名故非合名分別若計根識是合名分別者則諸根識應以聲義為所現境以是合名分別故以於何境決定安立名聲即緣彼境生合名分別故若許爾者則根識應隨欲轉而不見外色義也然根識是由外境力而生非是隨欲而起癸三以應無能受破於色謂見色彼覺如何見亦有彼領受如何無分別若彼自領受無頓二分別彼即說同時由他識領受於過去成念無受彼如何覺自覺他覺決斷體應一於了過去義離喻因非有由何成於彼非現非有因若謂現彼體由彼無間覺如色等緣者不緣彼前覺如有自境識領受無分別不能名如是餘亦無分別外人許根識有分別而不許二分別同時生則於色謂見色時其念曰此是緣彼色之覺如何可見應不能憶念以無領受故必先領受後方憶念既對彼緣色覺未有領受如何能念耶若謂有領受者下廣觀察破然彼緣色之覺應有能領受以有彼念故意謂應有自證分否則有下說過失若許有領受者其能領受緣色之覺者如何是無分別應非無分別以是覺故因彼計一切覺皆是分別故成難復次試問緣色之覺由誰領受若謂彼覺自領受者彼緣色覺應非自己領受不見有二分別同時生故若謂由同時識領受者彼不應由彼領受不見同時有分別彼理亦即說同時由他識領受之違害故若謂由後起之識領受者後起之識應非緣色識之能領受以於彼緣色識成為緣過去之念故後識緣前識後識即成追念又彼前識如何有念應無念無領受故如天授之覺緣自身之覺及決斷他人之覺此二能緣覺應成一體以彼二能緣覺皆以不現見之理而緣故又了知過去義之識由何量決定應不成立以汝非由現量成立亦非由有因比量成立故於成立汝既離諸同喻極成之宗法因亦非有故無正因及同喻則不成其比量見過去義之識若有能知者即屬自證分以同時異時之現比二量皆不能成立故若謂如現彼色體性無間之覺能緣色等如是彼緣色覺亦為彼無間覺所緣也即前念心為他念心緣破曰若爾緣多義之後所起之覺於彼前覺應不能緣以汝與彼中間為餘時所隔故若謂緣自色境識其能領受之覺是無分別以於自境不能設立名故破曰如是其餘根識亦應是無分別以於自境不能設立名故癸四以應無了知自相破詮總為性聲分別亦一義若無無分別差別由何知若有無分別與彼同因者一切皆如是果異由因異若謂一切識皆有分別者則差別自相法復由何識作為所取境而了知耶應不能知以無有無分別識故此因決定以分別心緣境之理與詮總為性之聲同一義故分別心與能詮聲皆唯緣總相不能以自相法為所取境若謂無過亦有無分別之根識者破曰一切根識應如彼前識是無分別以與彼同以三緣為因故此因決定以果體性各異是由異因生故癸五以見與分別是餘因破不觀待外義由念名結合如是不待名由事能眼覺若色待念名於根覺有能非無所待者如因於念性彼彼繫生故念根識或非餘時亦應生有時散亂故若漸為二因無異故即前若根覺餘因於彼念無義如為成假名許憶念名者緣別無假名彼念有何義若緣唯總者不可待差別故依眼及色而生於眼識眼覺非是合名分別以合名分別不觀待外義是從憶念名而生如是眼覺則不觀待名是由所取義事功能而生故若謂此因不成謂色要觀待憶念名乃於根覺有饒益功能非不觀待者破曰彼色應親饒益彼念以於彼念名相繫屬故要觀待彼念汝方能生根識故譬如從因生緣因心從彼心方生有因比量若許爾者根覺應親從念生或應非親從色生以從色生念名汝親從念名生故若許爾者則諸根識除自三緣完聚外餘時亦應生起以彼時亦容有念名故又於自三緣完聚亦應有時不生以彼有時意散亂不念名故外曰言念根識或非根識應從念生或非從色生又解此句為應從念生根識或非從念生以從自三緣生故遍相不定以彼色漸次為念與根識二者之因故破曰為念與根識因之二色為一為異若是一者彼二者中即彼前色為念因之色應生根識以既能生根識前後二色無異故若謂根識因之色是餘色者非即念因之色是則彼念因之色於根識生有何用義應無意義生根識者是餘色故又如為成立根識是假立之分別而許念名為根識之因而根識緣差別自相法無有假名或解根識是緣無假名之差別自相故於根識之生念有何義實無意義也若謂根識緣唯總者即單獨之總則不可觀待差別自相為所取義而生根識又眼覺非是合名分別以依眼及色等而親生故非待念名而生也庚二現量之差別分四辛一根現量二意現量三自證現量四瑜伽現量初又分二壬一於根識之名義斷諍二於離分別斷諍今初若生起現識如根境是能何故依二生而不以彼說由見能了知決定立名言根名言有彼所立是彼法故此立名言是自性正因反能遍自性故彼亦應遮外問若生起現量識如根有功能境亦具足功能彼識既俱依賴根境二法而生何故不名境識而以根識之聲而說耶不名色識而名眼識曰於五門識應立根識之名言以彼有了解不共之功能故由見有彼了解功能決定設立彼名言故又能了解不共是成立此五門識應設立根識名言之自性正因以是成立彼宗之因又是與彼所立法同一自性之法故於五門識設立境識之名言則應遮止以僅能了解彼能遍自性故即沒有了解不共之功能壬二於離分別斷諍分二癸一斷違教諍二斷緣遮返及餘總之諍初又分二子一諍二答今初諸集合是聚彼總彼根覺總覺定無疑與分別相連外曰根覺應是分別以經說五識身緣集合法緣集合法故諸集合者即是聚彼聚即是總緣彼總之總覺無疑定與分別相連故子二答分二丑一正說二斷諍今初餘義相連故餘何塵當生說彼等集合是生識原因若無餘微塵亦無彼別塵識定非於一故說總行境如是經教應非說根識緣餘集合義離所集微塵外另有餘集合體以與前餘義微塵相連繫故生起能生根識之餘後微塵經說彼等前後微塵為集合故意說彼等是能生眼識之原因故外問如何根識從微塵聚生而不從一一微塵生耶曰經說根識以總聚為所行境以決定非緣一塵能生根識要從眾多微塵乃得生故若無餘同類微塵則能生根識之特別微塵亦非有故丑二斷諍分二寅一諍二答今初若雖是一處非能頓緣多若謂集合有支倘無別物則彼眾多色塵雖是能生根識之一色處十二處中之一處應非一覺所能頓緣以是無有支實物之眾多法故有支即能統一諸支分之總體外人計為實有寅二答分五卯一應無能緣麻等二應無能緣雜花等三應無能緣犎等四應無能緣餘物五能頓緣多法餘宗亦成今初於胡麻等異如何現頓緣此中速已說於次第降落何不非次緣諸覺皆同時如何彼等中有現非次第餘現有次第故緣眾義時此應非次第如胡麻等蘊即胡麻堆如何現見頓緣應不頓緣以是無實有支物之各異法故外人計要有別實有支乃能頓緣若無實有支則不能頓緣眾多法故以麻蘊等破若謂由運轉疾速故現似頓緣者計由運轉疾速故現似頓緣此不應理其違害前已說故又如胡麻等次第降落時緣彼之覺如何不非次第緣何不頓緣應非漸緣以速緣胡麻故又彼諸覺有現非次第餘現有次第如何可爾應不如是以一切諸覺皆時速疾相同故又緣眾義之覺彼義於汝應現非次第以速疾緣彼眾義故卯二應無能緣雜花等分三辰一出過二成立種種非一三斷諍今初如花蝶等色眾多如何現如花蝴蝶及孔雀翎等之雜花色如何於覺能頓現應不頓現以無有支實物而是眾多色故辰二成立種種非一若種種是一此尤為希有種種非一性喻如摩尼色青等諸區別花布等亦同若唯支分色乃見如是者若捨青等外見餘花甚奇時與義行相同了知諸覺一次第多義一非次一義覺種種體故諸義種種體若彼非因者建異由何成異類無造故畫覺非種種由無有色故相應非種種亦非依假設各各非種種非漸次取已覺合為種種一不緣多故故一有多義由知一義時亦見餘義故亦成無分別若謂彼種種法是一無分有支者是一個不可分割的有支統一體破曰較彼孔雀翎花不能頓現此說種種是無分一尤為希有不應道理若是種種則非無分一之自性故如摩尼眾多色若謂彼不相同以摩尼色覺能區別孔雀翎之花色不能區別故者破曰孔雀翎花色覺應能區別以分為青黃等色汝與花布等亦相同故若謂孔雀翎之花色中唯支分色見能如是區分非有支之色者破曰此不應理以捨離青等支分外而見餘雜花等色甚為希奇不應理故又花布與孔雀翎等雜色諸覺對彼二色一者以次第多義一者以次第一義而緣應非如是以時間速疾及義之行相皆同了知為種種故外問彼孔雀翎之雜色如何是種種耶曰孔雀翎之雜色諸義是種種體性由不錯亂諸覺緣為種種體性故若謂此因不遍不決定以不錯亂覺緣為種種非安立為種種物之因故者破曰此物體各異之建立應非任何所能成立也若謂由有一有支物體故現為種種非由是種種而現為種種者破曰繪畫之雜色等應不於覺現為種種以無有支物體故此因為他所許以計異類諸塵非實物所造故若謂是繪畫雜色之相應於覺現為種種者外謂非繪畫之雜色於心現為種種是彼之相應即由和合力使諸塵相應計相應是實法破曰彼繪畫之相應應非於眼識現為種種以無色故外人許相應非色法若謂由與實和合之原因假立為種種者破曰應非由與實和合之原因依此假立為種種以非被和合之青黃等一一實物和合於種種故繪畫之雜色亦非由根識漸次取已再由分別覺合雜為種種以由一覺不能緣多義故因是他所許此即成立一覺能緣多義以緣雜色根識已成立故緣雜色根識已成立為無分別以了知一青色時亦能明見餘黃色故辰三斷諍分三巳一諍二答三釋今初現種種諸義若一性非理且彼獨一覺如何現種種外曰若現為種種之諸義無分一性不應理者且覺所現之雜色行相如何現為種種耶應不顯現以唯一為諦實故巳二答分二午一許無實行相者答二許有實行相者答初又分二未一成立無實二斷諍初又分二申一以離一異成立二以義與識不成實而成立三略明空性之理今初如如思惟義如是如是離諸智者所說是由事力來一種種何過彼覺亦不成若諸義體爾於彼我何為雜色義之行相如現無實如如思惟其實有義如是如是如所顯現離其實有一異此諸智者所說是從事力而來故即由事力比量所成立問於一覺中所現為種種行相如現實有有何過失曰彼中亦有不成一覺體之過失若謂雜色諸義之行相是如現實有有之體性是此所許以現為實有故破曰若如現實有則我破彼復何所為全無意義現為實有應不成為實有以現為實有之覺是錯亂識故申二以義與識不成實而成立故於義與識現粗色非有破彼體一故體多亦非有決斷是內心似安住於外此是所餘分無異者諸識現異是染性彼中由一無二者俱失壞是故彼二空亦是彼實性根識所現粗色其體性如現無實體以如所現於義與識皆非有故破粗色義一故於多外塵亦非有故外曰於義雖無然於識如現實有破曰此不應理以決斷為內識者是能取相離彼餘分如外而住是錯亂相故其原因謂諸根識能取所取現為各異是染壞性以是於無異物體現為有異物之識故外曰所取雖無異體能取則有異體破曰此不應理其二取中由一所取無餘異體則異體二取俱失壞故是故彼二空真實性亦即是彼能取之實性以二取異體空故申三略明空性之理此諸事異住是依於彼異彼既是染性彼等亦當染離能所取相其餘相非有由其相空故說為無自性由蘊等差別一切能相者彼亦非實性彼等皆離相現二取為異體之識是染壞性者則彼二取異體亦是染壞以此諸事各異而住是依彼覺現各異故經說諸事無遍計自性以相實空故即諸相非實有而空名相無性以離二取相外餘相非有能取所取異體空故又諸蘊等亦離諦實相以由蘊等差別一切能相所表相者亦皆非真實性故未二斷諍無明所染體觀待如自緣生識非真如如有眩翳等未見彼岸者皆不了實性無能所取染彼皆非有故彼捨真實義以象王顧視唯順世間心趣向觀外義外曰若無外義生現義識則成相違曰此不相違以由無明所染體性觀待如自緣之習氣生起現非真如外義行相之識故喻如由眩翳等力現髮影相外問若無異體能取所取如何現量不了知無異體耶曰以彼一切未見彼岸之異生不能現前了知二空真實性以若無能取所取染壞則汝非有故問若無外義則作彼建立有何作為曰諸佛世尊暫捨宣說二空真實義如象王顧視唯以隨順世間之心觀察外義而轉是為遮止整體我執而說故午二許有實行相者答識青等種種識別不依餘非能見爾時分辨趣外義識如其所現即如是領受如是心行相種種成一體布等色若一如於無區別除去差異者不見餘無異諸識所現青等種種行相離識差別外無所依餘物以離識外不能別別見故若謂此因不成以於彼行相能分辨此是青色此是黃色故者曰此不應理以分辨此是青是黃時此分辨心是向外義轉故如是內心行相現為種種者即是一覺體性以於諸識如其所現行相即如是領受故若謂如雜色之行相是一如是雜色布等之色亦是無分之一破曰雜色之布應如雜色行相無可分辨以是無分之一故若謂是所許分辨支分乃有有支則無謂支分色可分辨為青黃等有支色則不可分辨為青黃等破曰此不應理以除去有異之支分外其餘無異之有支無可見故巳三釋若如諸根等差別生眾多頓為一覺因亦有何相違除為因事外全無餘所取彼中覺所現說為彼所取外曰若無有支實體則由多微塵生一根識應成相違曰此不相違已生眾多殊勝微塵同時為根識之因有何相違全無違故猶如根等生一根識若謂是因可爾如何是境曰若於何義覺現彼行相即說彼義是彼覺之所取以除能生帶自行相緣自識之因事外更無餘事名所取故卯三應無能緣犎等如何能頓取具自支有支未見垂胡等不見知是牛若許頓了知功德最勝等非頓取眾支亦非德等具差別有差別樂說他力故先取為支分由此而緣彼如於具自支之有支牛如何一覺而能頓取應不能取以一覺不能頓取多義故然不能許爾以未見垂胡等則不見知是牛故若謂未成差別與有差別即所別能別之眾多法則不能頓緣若牛耳等功德與牛自性由是差別與有差別故則許一覺能頓了知破曰應不能頓緣牛之一切支分以彼等亦是未成差別與有差別之眾多法故又彼牛耳雖具青等功德亦應一覺不能頓緣因同前又差別與有差別非由事增上所成是隨樂說他力轉故若許不能頓緣一切支者則應先取為支如牛角等後緣彼支所簡別之牛以不能頓緣多支故卯四應無能緣餘物自事離餘者無異故未取德等能異故雖見餘餘法其覺當成一若取德等別故了知多者雖爾縱如是其繫屬錯亂雖見瓶衣等餘餘諸法其覺應成一種行相以瓶衣自事與餘法無異故當時彼覺只緣自事不覺與餘法各異因為一覺只緣一法其能使成異之德等一覺亦未取故若謂先取實物後取德等差別即漸次取多法故能取多法者破曰縱然如是其實物與功德之繫屬應成錯亂以彼二非有同時緣故卯五能頓緣多法餘宗亦成聲等多性故頓緣多已成未取能建者不取所建故數論宗中亦成立頓緣多法以計聲等是由樂苦捨即三德多法所建立故此因決定以未取能建立者必不可取所建立故癸二斷緣遮返及餘總諍有法遮一切從彼彼返異假立有異者彼眾多體性假立自性異現種種彼等非無分別心現為種種事非暫生行境設有白等性如根所行境非聲能詮說識自性異故諸覺雖一義由種種所依故成彼異者則彼耳等心由何有異義心雖然是從彼彼所依生然於彼一事現種種自性彼是由何成無所見了知言分別轉故是遮由所見而認識牛等於所見牛等隨言說分別比度種類等由此亦破彼所見雖各異分別認謂一是由自性造如前已說訖外曰根識應是分別能緣眾多遮返故曰從非所作及常等一切法除聲遮返者由從彼彼遮返即待彼假立為異有此異性之有法如聲假立為眾多體性自性各異現為種種彼等種種非是暫時生根識之親所行境非於無分別心而現彼種種相故若謂根識緣白等總者曰縱然有白等總亦非如根識所行境言聲所能詮說以根識與分別自性現相之理各異故根識現境明顯分別心現境不明顯根識緣諸法自相分別心緣諸法共相如前已數說若謂根識與分別心所取義雖一然由所依根有種種根識依有色根即眼等五根分別心依意根故成明不明之差別者曰如耳等諸心有各異所取義者彼由何成汝計所取義是一故又心縱是從彼彼所依生然根識與分別心現明不明種種自性彼由何而成耶應不現種種自性以唯以一事為所取義故若謂現相之理雖異而所取義是一以於根識所見分別謂是此而認識故曰是為遮止計由根識所見認識是牛等之覺是有所取義者以不了知根識所見言說要分別皆可轉故又於所見牛等由有言說與分別隨行而比度有常時種類彼亦由此正理破除以根識所見雖是異物而認識謂是一類之分別心是由自性所作前已說訖辛二意現量分二壬一諍二答今初若緣前領受意則非是量若緣未見者盲等應見義不穿耳外道云若緣根識先已領受者意現應非是量若緣先未見者則盲人等應亦見義壬二答分三癸一破他派二立自宗三斷諍今初是剎那性故非見過去義若非剎那性應說相差別所作已辦業不作少差別有根或餘者如何許能立彼事所生覺一切應頓起若餘無別作待彼相違故有釋者云是緣根現量已取者破曰若爾意現量於自親因時見彼過去色為所取義則應非有以汝所取義是剎那性故若謂因不成者則應說緣前量已取者為汝之相應俱彼簡別而說以非剎那性為所取義故若後起根現或餘意現如何許為能立之量應不許爾以於前量已辦所作之業更無少許差別可作故又意現與根覺應頓生起以從彼常事生故若謂雖常要待餘緣次第生者彼所取義若待彼餘緣應成相違以諸餘緣非能作少許差別故癸二立自宗是故諸根識無間緣所生意能緣餘境故盲者不見待隨自義者根生覺是因故此雖緣餘許緣境決定意現是除根現境外而緣餘境以能緣瓶而不緣根現之境故雖則如是然無盲人能見色之過失以是由根識作無間緣所生故問若離根現境外緣餘境者則所緣境應不決定曰此雖緣餘境然許緣境決定以隨自義行而觀待自義之根生覺即根識是汝之因故癸三斷諍與彼無同時自識時諸義如何為根識而作俱生緣無前無能故後亦不合故一切因先有非義俱自覺彼如何緣異由理智了知能立識行相因性為所取因雖有眾多能隨生果者彼立彼體性說彼是所取外曰意現所取義如何是由根識生意現之俱有緣應非彼緣以意現之作用與彼根識無同時故汝與自識意現是同時故曰破意現所取義與自覺意現非是同時以一切諸因皆是於自果前有故若於果前無者則無饒益果之功能故後亦不能結合饒益故外曰若爾意現如何能緣應不能緣以與彼異時故曰彼意現果雖有眾多因然能安立彼色行相之體性者說彼是所取以是隨順色之行相而生故此因決定以理智了知能安立識行相之因性是所取故辛三自證現量分二壬一成立能領受離分別二於所領受斷諍今初樂等不依餘不能設立名故彼等自證非繫屬言說領受樂等之自證非是於樂等繫屬言說之分別以汝於樂等不能設立名故樂等體性於餘名言時不隨行依止故壬二於所領受斷諍分二癸一斷勝論之諍二斷數論之諍初又分二子一諍二答今初餘非證彼等自體如何證有說依一義是識所證知勝論有云彼樂等如何證知自體應不能知餘亦非能證知故故是依於與我一義之識所證知勝論計樂等是屬我之德是我及識所證知非能自證子二答分三丑一成立是識二成立自證三成立證他今初彼非彼自性彼非彼因生識因生非餘樂等何非識俱義根堪能有如自體心見能生樂等意亦與彼同彼等若有無有樂等及覺見生不生故從彼生非餘由彼等差別苦樂等各異喻如即由覺明不明及疑彼樂等由何非識應是識以彼等從識因非餘之三緣生故以有俱義堪能根及如自體之心則見樂等生起意亦與彼根識相同故又有說為意亦與彼樂等相同故同從三緣生前因決定以彼同類及非彼同類自性諸果是由彼同類及非彼同類之親因所生故若謂根本因不定雖從三緣生然要從我之功德行乃生根識及樂等物外計樂等是物質非精神即非心識破曰彼樂等及根覺應從彼三緣生非從其餘我之功德行生以有無彼等三緣則見有人相續生與不生而不見從我之功德行生故外曰若爾同從三緣生故苦樂亦應無有差別曰不爾即由三緣差別而生苦樂等異故喻如即由覺之差別而生明不明顯及疑等丑二成立自證由近於何義覺及樂等生捨彼則樂等彼如何能知故漸次緣者領受彼不能無間斷顯現速故者同故何非無領受非由一知二根心決定故即無有樂等從諸義生故彼能無成故若謂二別別是能如青等應唯緣樂等未取彼因義領受彼非理若與義同緣樂等有何能不許彼生覺若無義眼等領受樂等者眼終不能緣色等婦等別有內支能義應不見外境緣義從彼生則不受樂等由有彼彼境諸覺頓生者則頓有諸義苦樂應頓了若有內因識則生起苦等許彼識唯一非相連因者何緣計彼識為無知親因若是增上者於相違亦見喻如一光明對夜行及餘諸根觀色相頓作逆順緣外曰若棄捨彼所取義則彼根識如何能了知樂等應不能知由近於何所取義彼諸根覺及樂等乃生起故是由根識緣色由意識漸次緣樂等破曰領受彼樂等之識應非境相無間顯現以於領受境之中間有根識隔斷故若謂運轉速故無間斷現者破曰根識何非無領受樂等而色顯現應如是現以緣色速疾彼相同故若謂由一根識俱緣色及樂等為所取義者破曰緣色根心即眼識非汝一識俱緣色及樂等為所取義而了知以汝緣色處境決定故彼樂等饒益功能不成立故樂等非色處攝不能饒益眼識故非眼識所取義即無樂等亦從諸義生故若謂此因不定色與樂等彼二別別俱能生起根識如青等色一一皆能生起根識破曰若爾根識應有唯緣樂等者以有唯以樂等為所取義故不能許爾以未取彼樂等之因義而領受彼樂等不應理故若謂俱時緣樂等及義者破曰樂等應全無饒益之功能以由彼樂等生覺汝不許故若無義境眼等能領受樂等者則眼等應終不能緣色等及婦女等差別以有內支能作饒益之所取義則不見外境故若根識單緣義者則從彼義所生樂等應不能領受以二種覺既不頓生又計單緣義故若謂由有彼彼義故覺頓生者破曰若同時有可意不可意義則應頓時證知苦樂若謂亦有內識為近因而苦等生彼唯一識故許非頓生苦樂相違之近因破曰彼樂等以何識為其因應非彼因以計為無知之物質故若謂彼識是增上緣故苦樂相違二法不頓時生者破曰此不應理以彼增上緣頓生相違二果亦可見故如一日光明相對夜行鵂鶹及餘諸根觀色同時頓作逆順緣故丑三成立證他故樂等自身所投義相現領受故世設非親受外義此等了自體唯從義生耳彼等義體相成自體彼受故說領受義即所緣彼現又如樂等世間亦可設立為領受義以投於自身之義相顯現及由能取相即自證分領受彼行相故此謂見分現義境行相自證分緣見分行相義即是所緣以義行相於行現故癸二斷數論之諍分二子一諍二答今初有者說樂等住外及無心是所取數論有說樂等安住於外無心是所取此派計樂等是屬五微量又計是覺或名大子二答分二丑一破是外二立是心今初彼亦頓緣二非理青等性樂等一故頓緣者現異相之心所取何非異外境無差別由修習差別則不應於覺生歡戚差別若覺是樂等體性無違者如何知外境是樂等體性若謂種類異非能所取者則士夫應非一切能取者則受者失壞此亦除因果應非是因果無能所取故若有餘亦爾彼數論派說現青根識頓緣青等及樂等亦不應理以色處為所取義性決定故若謂青等之自性與樂等是一故能頓緣者破曰青等與彼樂等如何不異理應各異以現為異之不錯亂心取為異故又彼樂等由修習差別應不於覺起歡喜與憂戚之差別以彼外義無差別故若謂覺亦是樂等之體性故由修習發生差別無相違者破曰彼如何知彼外微是樂等之體性應不能知以由修覺之樂等成差別故若謂色與樂等應非能取所取種類異故者破曰則汝神我應非一切五微量之能取者以與樂等種類異故若許非能取者則說彼為受者應當失壞以此道理亦除色與樂等為因果如云色與樂等應非因果種類異故當進破云汝之神我與樂等應非因果種類異故又上說色與樂等應非因果外計覺與五微量是因果以是能取所取不能成為因果外計神我是能取然非因果又無餘能立故若謂由是能取所取即有因果者破曰則汝神我與色等餘法亦應成為因果是能取所取故許則違其自宗丑二立是心分二寅一正說二破救今初故彼是內性所受故是心領受何自性彼非彼領受又彼樂等是內性及是心體性是能取相之所領受故彼領受知者外計之神我亦名知者受者非彼樂等之能領受者以非樂等之自性故寅二破救若非自性受謂了住覺者除現念行相領受何用覺依於彼彼義領受樂苦等見有一受起中間不見餘如火與鐵丸合雜無分者如是一切事異不異失壞受無異是一非爾則成異若此非能立異能立不成苦白等現異非異而覺受現無異異者異無異何依一時為明障然於心相續見其有異故異建立得成若謂非樂等自性之領受取神我了知安住於覺之行相者破曰除現知與憶念行相之領受外根識現見境分別心則憶念境於根境之間何有覺或大數論計覺是物質定不應有以現見依彼彼義有一領受苦樂等生不見根境中間有餘覺或大故數論計神我受用苦樂等境界是通過覺在中間現起境物之影相而受用非神我直接能見彼境也若謂覺與領受雖體各異然如熱鐵丸與火是合雜而不能分辨者破曰若爾則一切義異與不異之建立應皆失壞以覺與領受雖是異體而於不錯亂覺現為不可分辨故此因決定以領受無異即是一之能立者如是非一現為異者即成立為異若現為一而非一之能立則異之能立亦不能成故又異與不異應全無所依之量以苦與白等現為有異而非異覺與領受現為無異而是異物故若謂如五遍行雖不見異而實是異覺與領受亦如是者破曰義喻不同以於一時由受相明顯障蔽諸餘法然於心差別相續五遍行各異可見故各異建立即得成立覺與領受終不見有異故辛四瑜伽現量分三壬一略標二廣釋三斷諍今初瑜伽智前說彼等修所成現證如前所說彼等四諦無常等十六行相瑜伽師之智即是瑜伽現量以是修習真實義所成聖者身中離分別無錯亂智故壬二廣釋由除分別網是明了顯現欲怖憂所惱夢賊等所壞如現前安住見非真實事分別相隨屬義不明了現夢中所憶念念非如是事不淨地遍等雖非真實事由修力所化無分別明見故真非真實彼彼善修習修習圓滿時其果當生覺明了無分別彼如上說事許彼不欺誑修所成現量餘者有染壞彼智是除分別網者由修習力使自境界明了顯現故喻如由貪欲恐怖憂愁所惱及夢盜賊等所害見非真實事如現前安住此因決定以有分別相隨屬者則義非明了顯現故以夢中所念亦念非如是明了義故次成立由修習力便能明現任隨彼彼真非真實只要善修修習圓滿時便生明了無分別覺是所修果如不淨觀及遍處等雖非真實然亦見由修力所化無分別明了顯現故問若爾由修習力明了顯現一切皆是現量耶曰此如前說若是現證四諦事無常等十六行相之智則許為現量以是由修真實義所成又是於真實性新生無欺誑之智故其餘遍處等三摩地則非現量是有染壞故是勝解作意所引起的定果壬三斷諍若識緣聲義彼即是分別自體非聲義故彼皆是現外難若是現識即明了現者則分別心亦應明了顯現是自證現識故若許爾者與說不明現應成相違曰如緣瓶之分別識是於彼瓶之分別心以是於瓶雜緣聲義之覺故一切識上之能取相是於彼自體之現識以是於自體不雜緣聲義之不錯亂識故己二似現量分三庚一標二釋三結今初似現量四種三種分別識從壞所依起無分別一種集量論云錯亂世俗智比量比量生隨念與計度似現有眩翳共說七類似現量今此論中攝為四種以說三種有分別識及一種從染壞所依生起之無分別識故庚二釋分二辛一有分別似現量二無分別似現量今初為成非根生說二見誤故說比等已成為成前二故有依止名言於餘義增益是等諸分別近現量轉故時為錯亂因如緣不現義憶念等分別待名言為性不緣現前義不念所領受不如是瓶等故彼知亦從現量中失壞問說三種分別為似現量有何所為耶曰說錯亂識與世俗智二種為似現量者有所為義由見有錯誤認為是根識者為成立彼一非由根生而說為似現量故其比量等雖已成立為似現量而今說者亦有所為是為顯示成立前二種非根識之喻故問以何因緣誤認前二種為現識耶曰依止名言之世俗智及增益餘義之錯亂分別有時是誤為現量之因以近現量境轉故分別瓶等之識彼亦從現量中失壞以不憶念所曾領受即不生故如緣不現見義之念等分別心是觀待名言為本性者則不緣現量之所取義此亦如是辛二無分別似現量分二壬一立自宗二破他派今初此第四例外彼說從患生彼唯說眩翳是表有患者若謂說無分別似現量無有意義以集量論云離名種等合分別為現量此說無分別識是現量故曰陳那論師許此所說第四為似現量以先總說離分別為現量次說有眩翳為例外故問若爾唯有眩翳識為無分別似現量耶曰言有眩翳者此即通說一切有患諸根親生之識言有眩翳但說眩翳者即表示一切有患根故壬二破他派分二癸一以教破二以理破今初有說彼屬意青二月等覺謂根亦是因此論與彼違若是輾轉因今此是觀察根識所行境如何成意時有注疏說由明現二月之識亦是分別意識故言有眩翳非屬例外曰論說眼根亦是現青及二月等覺之因此論與彼計為分別者相違明現二月之識應非親從眼根生是分別故若謂彼論是說眼根輾轉為分別之因者彼亦非理此處是觀察根識所行境由是根識之親因故許為所緣緣如何成為由眼根是輾轉因應為意所緣緣之時非是時故癸二以理破如何為依根若隨根有無彼同若有變則何故破此此如誤蛇等根雖變而退根患雖除癒然而不退轉如是於他身由說時安立應待憶所見應不明了現睡眠或醒時所有明顯覺彼即無分別隨於二時中非爾即分別復次明現二月之識若非根識則如何立為親依根之識耶若謂隨根有無轉者曰則明現二月之識應是根識以與彼前品相同故也是隨根有無轉故若謂隨根有變易者曰則何故破此現二月之識為根識以隨根有變易故又於此中如誤繩為蛇等是意識分別者應根雖有變易而可退失根患雖癒而不退失如是於他人身由諸言說有時亦能安立如說某處有蛇他人即信有蛇應待憶念所曾見境應不明了顯現是分別故以上對計明現二月之識為分別心者用一因一喻通出五過後難亦決定即現二月識應不明現是分別故以睡眠或醒寤時凡明了顯現之覺即是無分別隨於眠醒二時中凡非如前而是不明了顯現之覺即是分別故庚三結故彼無分別亦破是正量欺故為彼亦說二似現量故彼明現二月之識雖是無分別然破其為量以欺誑故說為二種似現量有所為義以雖離分別若有錯亂顯示亦非現量亦為此義故戊三於量果除邪分別分二己一正說二明彼建立應理初又分四庚一初說量果建立二第二說量果建立三第三說量果建立四雖無外義建立應理初又分二辛一總標二別釋今初言能立所作非是說一切諸業之能立從何是何果彼是彼能立問何為此量之果曰了達所量問若爾何為安立了達所量之量曰同義若謂能生了達義之根等豈非量耶如何同義是了達義之能立曰僅言能立所作了達義非說一切所作業了達義之能生等一切能立是說由何能不間斷安立了達義果者彼乃是了達義之能立故這段文太繁很難看懂了達所量或了達義即了知境義如眼觀色知是色安立彼之量即何量能證明彼了知境者同義即能證明之量謂與所證明之心同緣一境故名同義如眼識見色證明眼識見色者亦須見色方能作證了達義是被證明者故是所作同義是能證明者故名能立外以能生者亦是能立故問眼根等生眼識亦是眼識之能立何故說同義為能立耶答說此處非說能生等能立只說能證明了達義者之能立耳色等是所量於彼新生不欺誑之眼識是能量能證明眼識了達色者是量果對什麼是量什麼是果頗多異執故下文廣辨辛二別釋分二壬一標二釋今初於彼唯領受相同體之識由何辨別業彼是其體性非體性諸因雖異於異業此無所異者非能決定異故此體性異由何定作業謂此了知此成為彼能立雖有相能使識自性各異此能與義屬除義性非餘唯領受彼境相同體性之五識於別別業分辨了達義各異者即是汝之體性以有安立汝了達義者異汝之物不能安立了達義故這說量果與量是一體性又諸根因根即識因雖有明不明之異然唯領受異業則無別異根對境雖別然唯能領受則無差別不能決定識了達義之差異故非量果非能決定了達義各異非現義識之體性故量果與量須是一體性諸根與能量識非一體性故非是量果現起此義體性諸行相之識即現起境相之識如見青色之眼識彼即成為了達義各異之能立由汝能決定現義此識能了達此義之作業即能安立了達義各異故又有色根雖由汝明不明之行相能使識自性各異然不能使此現義識與義成為境與有境之繫屬以除現起義之行相體性外非是餘故最後二句義盛寶大師則解為此根現量與義成為境有境之繫屬除生為有義相體性外餘非能安立以若無現起自境之行相則不能安立了達任何義故但就原頌文義看似應解為有色根雖由某行相能使識性各異然使此識與義相繫屬者除義之體性外非餘色根所能也壬二釋分三癸一立自宗二破他派三斷諍今初能立知所量即所量自性若餘能立者彼彼繫不成彼是彼體性故果非餘義緣彼體性者是知義體性於自所作業現似有作用自雖非作者由此立彼故如果似諸因體性而生故雖非具所作世說持因色現起所量行相新生不欺誑之識是了知所量量之能立以是彼之能立故了知所量量所量即境了知境即量故名了知所量量其能安立彼量者即是量果若謂了知義之能立是餘有色根者破曰彼有色根不能成立彼現義識與業為境與有境之繫屬以除現起行相外而是他故彼同義亦非離了達義果外而是他義以是彼了達義之體性故若謂同義與了達義應非能作所作以與彼是一物故者曰現青根識於自業青色有斷除增益所作之作用以由自證緣青相體性門而作了達青義體性之所作故簡言之為緣青眼識有於青色斷增益之作用以青行相為體之自證證明眼識了達青義為體是作所作故言現似者謂同義非勝義能安立了達義以與彼了達義之量是一物故即說同義安立了達義是就世俗說非約勝義說以彼二是一體無能作所作之差別體故然是安立了達義者雖於勝義自體非安立了達義之作者然由汝同義之力而安立彼了達義故喻如彼兒果似諸父因之體性而生故子生似父雖非具足真持父色之所作非真持有父之色相然世間說兒果持父因色說兒像父癸二破他派分二子一標二釋今初故見及根繫並差別覺等所作隔斷故不許為量性能作於所作一切皆和合最後能異者許彼正能立除同義外餘者不能安立了達義故不許唯根見根義繫屬及差別覺等為安立了達義之量以汝與了達義之間為同義所隔斷故其能作根等對於所作了達義雖能和合饒益是能生因然不能安立了達義各異其現起義相各異之識乃許為彼了達義各異之正能立或勝能立以是安立最後了達義各異之能立故子二釋分三丑一破根等是量二破差別覺是量三破根義繫屬是量今初一切等因故如此非根有彼雖異無異由何言此此此即說餘者如此各別安立了達義之功能汝諸根非有以是一切根識之同等因故又由諸根明不明利雖使根識明不明各異然由何能安立現義之識了達此及此義應不能立以無現起義行相各異故言彼雖異無異等此理即亦說其餘外道所計觀義之識等亦非是量以無現起行相則觀義不成故行者派計先未決定之義初觀義之識為量從彼所生着總等之覺為果次耽着為量轉於取境為果次取境為量得境為果次得境為量成辦所求為果此文即破彼等丑二破差別覺是量彼若無事者則諸差別覺亦應無差異餘覺亦如是所作與能立不許二境異若是一義者則第二無義應無次第起若覺頓生者無能立所立依於彼建立建分能所立差別覺亦應與有差別覺無異諸餘有差別覺如是亦應與差別覺無異以無彼行相事故又差別與有差別二覺亦不許於境各異以是量果之所作與能立故若謂許爾是一所取義故者破曰亦不應理則差別覺之境第二有差別覺量度汝應全無義以差別覺已成立故又彼二覺應無次第起以是一所取義故若謂許爾以彼二覺同時頓生者破曰若爾應無能生所生之能立所立也外問若爾汝之同義與了達義亦應非能立所立也答曰我是以同義與了達義諸分建立為能立所立是依於現為異相之建立而如是建立故丑三破根義繫屬是量體性皆相繫則了知某法不應有決定相繫無別故彼雖無差別然由何立異彼即此量性非由所為立若無彼事者彼亦無立故緣瓶色之眼識根義繫屬應非是量以汝之增上緣眼根雖與瓶之色香等一切體性皆相繫屬然汝只了知瓶色而不了知瓶之香故又彼眼識不應決定唯了知瓶色少法亦應了知瓶香等以汝增上緣之眼根與瓶之色香等繫屬無差別故又彼眼根雖與瓶之色香等繫屬都無差異然彼現起義相各異之識則是此了達義各異之量以由汝能安立了達義各異故非由我之功德所為外道所計我之功德而能安立了達義各異以無現起彼義之事相則彼我功德所為亦無可建立故癸三斷諍若謂能所作一相違不實許為異法故許無真實異能所作名言皆如是安住許為異諸事皆增益轉故若謂同義與了達義是能作所作應成相違以是一故者曰彼二是一不是諦實以許遮法各異故然許物體各異是一體故一切能作所作之名言皆是增益如是安住以許為異體諸事皆由增益為能作所作而轉故庚二第二說量果建立分三辛一破了外境之能立二明了外境之妨難三明彼所成義初又分二壬一正破二斷與現相相違今初何為了知義若謂別別了此所有現量彼由何知義由彼相同者應當成錯亂由何領受此此是觀察彼諸微塵由何令現此粗相故彼非實義縱是由錯亂故非能成立彼領受體性若彼同彼生是領受相者則應等義識領受等無間言見此聞此由何決定覺彼是領受者由何而許彼是彼之能立現與見彼等相近是所觀依彼等繫屬是見者決定試問言了知義是何了知義若謂即此各別了知色聲等之現量試問彼現量由何立為了知義若謂由與彼義相同而立為了達義者破曰與義相同應非能安立了達義以對彼錯亂故問若現義識不了外義則現義識現領受此義是由何能立耶曰現義識現領受義之能立此非應問唯識宗者是應問彼經部師而觀察之時故彼現義識應非由義親留行相以所現為粗行相而粗物不成實其諸微塵由何而作如此粗相應不能作故雖是與義相同然與義相同非能成立領受彼義之體性以是於彼有錯亂故若謂與彼義相同及從彼義所生是領受彼義之相者破曰則後念緣青識應領受前念等無間現青根識以從彼生與彼等有青義行相故若謂由何能引決定覺謂見此色聞此聲者彼是彼現義識領受義之能立破曰由何而許於義引決定者彼即彼了達義之能立不應道理以觀察所現境與見彼者彼等境有境之相近彼不成就故要依境有境之繫屬方生見者之定智故壬二斷與現相相違分三癸一破能取所取異體二唯於現相立能所取三成立自證為果今初彼領彼體性彼非餘誰領現量別別了彼是彼體性無餘所領受彼復無餘領彼所諍同故彼自性是明彼事青等故亦領受自性彼雖領自體現為領青等如彼體性故能明明義時許能明自體如是覺自了彼所了餘義能所受難成無能所了相彼現義識亦非離自體是任何餘法之能領受以彼現義識之所領受即現義識之體性故如色聲等現量之各別所了彼亦無所領受之餘物即彼現義識之體性故彼現義識亦非有餘能領受以許餘物能領受於彼所諍亦同故彼現義識自性是明以從自因生為明了故問若領受自體與現青等相違曰彼領受自性之現青識雖是領受自體然現似領受外青等以現起彼青等事之行相故若謂自領受自不應道理以自於自能作所作成相違故曰如能明燈光於明義時即許能明自體以從自因生為明體性故如彼譬喻現義之覺是自了者以從自因生為明了故若謂彼所了是餘義者曰青色與現青識能受所受難以應理是餘物故青色與現青識能了所了行相無有餘物以是能取所取故癸二唯於現相立能所取如髮等識異若時能所取分離相有害如錯亂所見如是建立此爾時能所取於相非所諍問若能取所取無異物者應無能取所取之建立曰若時作能取所取之建立爾時言無能取所取之相非是所諍以分辨能取所取之相是由有損壞之錯亂心如其所見即如是作此能取所取之建立故喻如現髮影等識之能所取各異也癸三成立自證為果以無了他故許自證是果現義之識了知自體即許是果以了知境無了知餘物故以無外義故辛二明了外境之妨難若領受外境有何過雖無領受外義者此當說何因若覺有彼相雖有隨相轉彼由外或餘此理應觀察離所見差別則不能取彼取彼則取故青現是所見非有單外義此中謂有某醒發某習氣故覺成決定非觀待外義若問現義識若領受外境有何過失曰雖全無過試問領受外境此當說有何因緣若謂現義之覺是了知義是有彼義之行相故曰現義之覺雖有彼隨義行相而轉然僅由彼不能安立了知外境以彼義行相是由外境或是由餘此理應觀察觀之外境不成故問如何不成曰所現青色是見青之體性非單獨外境之所有以離緣青識所見差別則不緣汝若緣彼緣青識則緣汝故問若無外境則現義識暫時生起則成相違曰此不相違此現義識暫時生者是由某前識醒發某後識習氣故現義覺暫時生起決定非觀待外義故辛三明彼所成義故一有二相由如是領受及念此二相領受即是果若時識因境餘欲或不欲彼事不成就彼如是領受若時將識分安立為義故說為識俱境爾時受自體決定彼為義若領受此體欲相及餘相則彼欲不欲亦當了知義一現義識有二種相何以故以由第二相如是能取相所領受及由後識所憶念故此能取所取二行相中所取相是所量能取相是能量領受自證是量果此說是唯識宗不共建立第一說是經部唯識之共同建立彼現義識是現義行相如是自領受以現義行相若時餘因境或所欲或所不欲而彼事物不成就故又彼現義識是與境俱若時將識一分立為義或境故又即彼識領受自體即由後識決定彼義以若領受此識體性或所欲行相或餘不欲行相則彼所欲或不欲行相亦當是了知義故
